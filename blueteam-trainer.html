troller. This value can be decrypted with gpp-decrypt on Kali Linux.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1552.006-2","name":"GPP Passwords (Get-GPPPassword)","description":"Look for the encrypted cpassword value within Group Policy Preference files on the Domain Controller. This test is intended to be run from a domain joined workstation, not on the Domain Controller itself. The Get-GPPPasswords.ps1 executed during this test can be obtained using the get-prereq_commands. Successful test execution will either display the credentials found in the GPP files or indicate \"No preference files found\".","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1552.007","name":"Kubernetes List Secrets","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1552.007-1","name":"List All Secrets","description":"A Kubernetes secret is an object that lets users store and manage sensitive information, such as passwords and connection strings in the cluster. Secrets can be consumed by reference in the pod configuration. Attackers who have permissions to retrieve the secrets from the API server (by using the pod service account, for example) can access sensitive information that might include credentials to various services or provide further access to the cluster. [More information about secrets](https://kubernetes.io/docs/concepts/configuration/secret/). This test will make a request to the Kubernetes api at the `/api/v1/secrets` endpoint requesting every secret stored within the cluster.","supportedPlatforms":["containers"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1552.007-2","name":"ListSecrets","description":"A Kubernetes secret is an object that lets users store and manage sensitive information, such as passwords and connection strings in the cluster. Secrets can be consumed by reference in the pod configuration. Attackers who have permissions to retrieve the secrets from the API server (by using the pod service account, for example) can access sensitive information that might include credentials to various services.","supportedPlatforms":["containers"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1552.007-3","name":"Cat the contents of a Kubernetes service account token file","description":"Access the Kubernetes service account access token stored within a container in a cluster.","supportedPlatforms":["linux"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1553.001","name":"Subvert Trust Controls: Gatekeeper Bypass","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1553.001-1","name":"Gatekeeper Bypass","description":"Gatekeeper Bypass via command line","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1553.003","name":"Subvert Trust Controls: SIP and Trust Provider Hijacking","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1553.003-1","name":"SIP (Subject Interface Package) Hijacking via Custom DLL","description":"Registers a DLL that logs signature checks, mimicking SIP hijacking. This test uses a DLL from https://github.com/gtworek/PSBits/tree/master/SIP and registers it using regsvr32, thereby causing the system to utilize it during signature checks, and logging said checks.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1553.004","name":"Subvert Trust Controls: Install Root Certificate","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1553.004-1","name":"Install root CA on CentOS/RHEL","description":"Creates a root CA with openssl","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1553.004-2","name":"Install root CA on FreeBSD","description":"Creates a root CA with openssl","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1553.004-3","name":"Install root CA on Debian/Ubuntu","description":"Creates a root CA with openssl","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1553.004-4","name":"Install root CA on macOS","description":"Creates a root CA with openssl","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1553.004-5","name":"Install root CA on Windows","description":"Creates a root CA with Powershell","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1553.004-6","name":"Install root CA on Windows with certutil","description":"Creates a root CA with certutil","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1553.004-7","name":"Add Root Certificate to CurrentUser Certificate Store","description":"The following Atomic test simulates adding a generic non-malicious certificate to the CurrentUser certificate store. This behavior generates a registry modification that adds the cloned root CA certificate in the keys outlined in the blog. Keys will look like - \\SystemCertificates\\CA\\Certificates or \\SystemCertificates\\Root\\Certificates Reference: https://posts.specterops.io/code-signing-certificate-cloning-attacks-and-defenses-6f98657fc6ec","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1553.005","name":"Subvert Trust Controls: Mark-of-the-Web Bypass","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1553.005-1","name":"Mount ISO image","description":"Mounts ISO image downloaded from internet to evade Mark-of-the-Web. Upon successful execution, powershell will download the .iso from the Atomic Red Team repo, and mount the image. The provided sample ISO simply has a Reports shortcut file in it. Reference: https://www.microsoft.com/security/blog/2021/05/27/new-sophisticated-email-based-attack-from-nobelium/","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1553.005-2","name":"Mount an ISO image and run executable from the ISO","description":"Mounts an ISO image downloaded from internet to evade Mark-of-the-Web and run hello.exe executable from the ISO. Upon successful execution, powershell will download the .iso from the Atomic Red Team repo, mount the image, and run the executable from the ISO image that will open command prompt echoing \"Hello, World!\". ISO provided by:https://twitter.com/mattifestation/status/1398323532988399620 Reference:https://www.microsoft.com/security/blog/2021/05/27/new-sophisticated-email-based-attack-from-nobelium/,","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1553.005-3","name":"Remove the Zone.Identifier alternate data stream","description":"Remove the Zone.Identifier alternate data stream which identifies the file as downloaded from the internet. Removing this allows more freedom in executing scripts in PowerShell and avoids opening files in protected view.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1553.005-4","name":"Execute LNK file from ISO","description":"Executes LNK file document.lnk from AllTheThings.iso. Link file executes cmd.exe and rundll32 to in order to load and execute AllTheThingsx64.dll from the ISO which spawns calc.exe.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1553.006","name":"Subvert Trust Controls: Code Signing Policy Modification","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1553.006-1","name":"Code Signing Policy Modification","description":"Allows adversaries to subvert trust controls by modifying the code signing policy, enabling the execution of unsigned drivers.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1555","name":"Credentials from Password Stores","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1555-1","name":"Extract Windows Credential Manager via VBA","description":"This module will extract the credentials found within the Windows credential manager and dump them to $env:TEMP\\windows-credentials.txt","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true},{"id":"T1555-2","name":"Dump credentials from Windows Credential Manager With PowerShell [windows Credentials]","description":"This module will extract the credentials from Windows Credential Manager","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1555-3","name":"Dump credentials from Windows Credential Manager With PowerShell [web Credentials]","description":"This module will extract the credentials from Windows Credential Manager","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1555-4","name":"Enumerate credentials from Windows Credential Manager using vaultcmd.exe [Windows Credentials]","description":"This module will enumerate credentials stored in Windows Credentials vault of Windows Credential Manager using builtin utility vaultcmd.exe","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1555-5","name":"Enumerate credentials from Windows Credential Manager using vaultcmd.exe [Web Credentials]","description":"This module will enumerate credentials stored in Web Credentials vault of Windows Credential Manager using builtin utility vaultcmd.exe","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1555-6","name":"WinPwn - Loot local Credentials - lazagne","description":"The [LaZagne project](https://github.com/AlessandroZ/LaZagne) is an open source application used to retrieve lots of passwords stored on a local computer. Each software stores its passwords using different techniques (plaintext, APIs, custom algorithms, databases, etc.). This tool has been developed for the purpose of finding these passwords for the most commonly-used software","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1555-7","name":"WinPwn - Loot local Credentials - Wifi Credentials","description":"Loot local Credentials - Wifi Credentials technique via function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1555-8","name":"WinPwn - Loot local Credentials - Decrypt Teamviewer Passwords","description":"Loot local Credentials - Decrypt Teamviewer Passwords technique via function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1555.001","name":"Credentials from Password Stores: Keychain","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1555.001-1","name":"Keychain Dump","description":"This command will dump keychain credential information from login.keychain. Source: https://www.loobins.io/binaries/security/ ### Keychain File path ~/Library/Keychains/ /Library/Keychains/ /Network/Library/Keychains/ [Security Reference](https://developer.apple.com/legacy/library/documentation/Darwin/Reference/ManPages/man1/security.1.html)","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1555.001-2","name":"Export Certificate Item(s)","description":"This command finds all certificate items and sends the output to local file in pem format.","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1555.001-3","name":"Import Certificate Item(s) into Keychain","description":"This command will import a certificate pem file into a keychain.","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1555.001-4","name":"Copy Keychain using cat utility","description":"This command will copy the keychain using the cat utility in a manner similar to Atomic Stealer.","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1555.003","name":"Credentials from Password Stores: Credentials from Web Browsers","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1555.003-1","name":"Run Chrome-password Collector","description":"A modified sysinternals suite will be downloaded and staged. The Chrome-password collector, renamed accesschk.exe, will then be executed from #{file_path}. Successful execution will produce stdout message stating \"Copying db ... passwordsDB DB Opened. statement prepare DB connection closed properly\". Upon completion, final output will be a file modification of PathToAtomicsFolder\\..\\ExternalPayloads\\sysinternals\\passwordsdb. Adapted from [MITRE ATTACK Evals](https://github.com/mitre-attack/attack-arsenal/blob/66650cebd33b9a1e180f7b31261da1789cdceb66/adversary_emulation/APT29/CALDERA_DIY/evals/data/abilities/credential-access/e7cab9bb-3e3a-4d93-99cc-3593c1dc8c6d.yml)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1555.003-2","name":"Search macOS Safari Cookies","description":"This test uses `grep` to search a macOS Safari binaryCookies file for specified values. This was used by CookieMiner malware. Upon successful execution, MacOS shell will cd to `~/Libraries/Cookies` and grep for `Cookies.binarycookies`.","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1555.003-3","name":"LaZagne - Credentials from Browser","description":"The following Atomic test utilizes [LaZagne](https://github.com/AlessandroZ/LaZagne) to extract passwords from browsers on the Windows operating system. LaZagne is an open source application used to retrieve passwords stored on a local computer.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1555.003-4","name":"Simulating access to Chrome Login Data","description":"Simulates an adversary accessing encrypted credentials from Google Chrome Login database.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1555.003-5","name":"Simulating access to Opera Login Data","description":"Simulates an adversary accessing encrypted credentials from Opera web browser's login database.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1555.003-6","name":"Simulating access to Windows Firefox Login Data","description":"Simulates an adversary accessing encrypted credentials from firefox web browser's login database. more info in https://support.mozilla.org/en-US/kb/profiles-where-firefox-stores-user-data","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1555.003-7","name":"Simulating access to Windows Edge Login Data","description":"Simulates an adversary accessing encrypted credentials from Edge web browser's login database. more info in https://www.forensicfocus.com/articles/chromium-based-microsoft-edge-from-a-forensic-point-of-view/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1555.003-8","name":"Decrypt Mozilla Passwords with Firepwd.py","description":"Firepwd.py is a script that can decrypt Mozilla (Thunderbird, Firefox) passwords. Upon successful execution, the decrypted credentials will be output to a text file, as well as displayed on screen. Will create a Python virtual environment within the External Payloads folder that can be deleted manually post test execution.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1555.003-9","name":"LaZagne.py - Dump Credentials from Firefox Browser","description":"Credential Dump Ubuntu 20.04.4 LTS Focal Fossa Firefox Browser, Reference https://github.com/AlessandroZ/LaZagne","supportedPlatforms":["linux"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1555.003-10","name":"Stage Popular Credential Files for Exfiltration","description":"This test is designed to search a drive for credential files used by the most common web browsers on Windows (Firefox, Chrome, Opera, and Edge), export the found files to a folder, and zip it, simulating how an adversary might stage sensitive credential files for exfiltration in order to conduct offline password extraction with tools like [firepwd.py](https://github.com/lclevy/firepwd) or [HackBrowserData](https://github.com/moonD4rk/HackBrowserData).","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1555.003-11","name":"WinPwn - BrowserPwn","description":"Collect Browser credentials as well as the history via winpwn browserpwn function of WinPwn.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1555.003-12","name":"WinPwn - Loot local Credentials - mimi-kittenz","description":"Loot local Credentials - mimi-kittenz technique via function of WinPwn - Extend timeout to 600s","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1555.003-13","name":"WinPwn - PowerSharpPack - Sharpweb for Browser Credentials","description":"PowerSharpPack - Sharpweb searching for Browser Credentials technique via function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1555.003-14","name":"Simulating Access to Chrome Login Data - MacOS","description":"This test locates the Login Data files used by Chrome to store encrypted credentials, then copies them to the temp directory for later exfil. Once the files are exfiltrated, malware like CookieMiner could be used to perform credential extraction. See https://unit42.paloaltonetworks.com/mac-malware-steals-cryptocurrency-exchanges-cookies/ .","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1555.003-15","name":"WebBrowserPassView - Credentials from Browser","description":"The following Atomic test utilizes WebBrowserPassView to extract passwords from browsers on a Window system. WebBrowserPassView is an open source application used to retrieve passwords stored on a local computer. Recently noticed as a tool used in the BlackCat Ransomware.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1555.003-16","name":"BrowserStealer (Chrome / Firefox / Microsoft Edge)","description":"[Github Repo](https://github.com/SaulBerrenson/BrowserStealer) Simple password/cookies stealer for chrome, edge, and gecko based browsers (30 listed working). This attack simulates stealing the data from the browser files and printing them to the command line. If using to test with Firefox, if the browser is x64 you need to use the x64 build","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1555.003-17","name":"Dump Chrome Login Data with esentutl","description":"This test simulates an adversary using esentutl to dump encrypted credentials from Google Chrome's Login database. [Reference](https://actzero.ai/resources/blog/hygiene-tip-shut-down-attackers-harvesting-cached-browser-credentials/)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1555.004","name":"Credentials from Password Stores: Windows Credential Manager","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1555.004-1","name":"Access Saved Credentials via VaultCmd","description":"List credentials currently stored in Windows Credential Manager via the native Windows utility vaultcmd.exe Credential Manager stores credentials for signing into websites, applications, and/or devices that request authentication through NTLM or Kerberos https://blog.malwarebytes.com/101/2016/01/the-windows-vaults/ https://medium.com/threatpunter/detecting-adversary-tradecraft-with-image-load-event-logging-and-eql-8de93338c16","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1555.004-2","name":"WinPwn - Loot local Credentials - Invoke-WCMDump","description":"Loot local Credentials - Invoke-WCMDump technique via function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1555.006","name":"Credentials from Password Stores: Cloud Secrets Management Stores","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1555.006-1","name":"Azure - Dump All Azure Key Vaults with Microburst","description":"Upon successful execution of this test, the names, locations, and contents of key vaults within an Azure account will be output to a file. See - https://www.netspi.com/blog/technical/cloud-penetration-testing/a-beginners-guide-to-gathering-azure-passwords/","supportedPlatforms":["iaas:azure"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1556.001","name":"Modify Authentication Process: Domain Controller Authentication","tactic":"TA0003","tactics":["TA0003","TA0006"],"atomicTests":[{"id":"T1556.001-1","name":"Skeleton Key via Mimikatz","description":"Injects a Skeleton Key into LSASS on a domain controller using Mimikatz. Once injected, any domain user account can be authenticated using the password 'mimikatz' until the domain controller is rebooted. This test must be run on an isolated domain controller and must not be performed on a production DC. Cleanup forces a reboot of the domain controller to evict the skeleton key from LSASS memory.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1556.002","name":"Modify Authentication Process: Password Filter DLL","tactic":"TA0003","tactics":["TA0003","TA0006"],"atomicTests":[{"id":"T1556.002-1","name":"Install and Register Password Filter DLL","description":"Uses PowerShell to install and register a password filter DLL. Requires a reboot and administrative privileges. The binary in bin is https://www.virustotal.com/gui/file/95140c1ad39fd632d1c1300b246293297aa272ce6035eecc3da56e337200221d/detection Source is in src folder. This does require a reboot to see the filter loaded into lsass.exe. It does require Administrative privileges to import the clean registry values back into LSA, it is possible you may have to manually do this after for cleanup.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1556.002-2","name":"Install Additional Authentication Packages","description":"lsass.exe loads all DLLs specified by the Authentication Packages REG_MULTI_SZ value. Uses PowerShell to install and register a password filter DLL. Requires a reboot and administrative privileges. The binary in bin is https://www.virustotal.com/gui/file/95140c1ad39fd632d1c1300b246293297aa272ce6035eecc3da56e337200221d/detection Source is in src folder. This does require a reboot to see the filter loaded into lsass.exe. It does require Administrative privileges to import the clean registry values back into LSA, it is possible you may have to manually do this after for cleanup.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1556.003","name":"Modify Authentication Process: Pluggable Authentication Modules","tactic":"TA0003","tactics":["TA0003","TA0006"],"atomicTests":[{"id":"T1556.003-1","name":"Malicious PAM rule","description":"Inserts a rule into a PAM config and then tests it. Upon successful execution, this test will insert a rule that allows every user to su to root without a password.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1556.003-2","name":"Malicious PAM rule (freebsd)","description":"Inserts a rule into a PAM config and then tests it. Upon successful execution, this test will insert a rule that allows every user to su to root without a password.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1556.003-3","name":"Malicious PAM module","description":"Creates a PAM module, inserts a rule to use it, and then tests it. Upon successful execution, this test will create a PAM module that allows every user to su to root without a password.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1557.001","name":"Adversary-in-the-Middle: LLMNR/NBT-NS Poisoning and SMB Relay","tactic":"TA0006","tactics":["TA0006","TA0009"],"atomicTests":[{"id":"T1557.001-1","name":"LLMNR Poisoning with Inveigh (PowerShell)","description":"Inveigh conducts spoofing attacks and hash/credential captures through both packet sniffing and protocol specific listeners/sockets. This Atomic will run continuously until you cancel it or it times out.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1558.001","name":"Steal or Forge Kerberos Tickets: Golden Ticket","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1558.001-1","name":"Crafting Active Directory golden tickets with mimikatz","description":"Once the hash of the special krbtgt user is retrieved it is possible to craft Kerberos Ticket Granting Ticket impersonating any user in the Active Directory domain. This test crafts a Golden Ticket and then performs an SMB request with it for the SYSVOL share, thus triggering a service ticket request (event ID 4769). The generated ticket is injected in a new empty Windows session and discarded after, so it does not pollute the current Windows session.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true},{"id":"T1558.001-2","name":"Crafting Active Directory golden tickets with Rubeus","description":"Once the hash of the special krbtgt user is retrieved it is possible to craft Kerberos Ticket Granting Ticket impersonating any user in the Active Directory domain. This test crafts a Golden Ticket and then performs an SMB request with it for the SYSVOL share, thus triggering a service ticket request (event ID 4769). The generated ticket is injected in a new empty Windows session and discarded after, so it does not pollute the current Windows session.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1558.002","name":"Steal or Forge Kerberos Tickets: Silver Ticket","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1558.002-1","name":"Crafting Active Directory silver tickets with mimikatz","description":"Once the hash of service account is retrieved it is possible to forge Kerberos ticket granting service (TGS) tickets, also known as silver tickets. The generated ticket is injected in a new empty Windows session and discarded after, so it does not pollute the current Windows session.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1558.004","name":"Steal or Forge Kerberos Tickets: AS-REP Roasting","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1558.004-1","name":"Rubeus asreproast","description":"Information on the Rubeus tool and it's creators found here: https://github.com/GhostPack/Rubeus#asreproast This build targets .NET 4.5.  If targeting a different version you will need to compile Rubeus","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1558.004-2","name":"Get-DomainUser with PowerView","description":"Utilizing PowerView, run Get-DomainUser to identify domain users. Upon execution, progress and info about users within the domain being scanned will be displayed.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1558.004-3","name":"WinPwn - PowerSharpPack - Kerberoasting Using Rubeus","description":"PowerSharpPack - Kerberoasting Using Rubeus technique via function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1559","name":"Inter-Process Communication","tactic":"TA0002","tactics":["TA0002"],"atomicTests":[{"id":"T1559-1","name":"Cobalt Strike Artifact Kit pipe","description":"Uses the [Named Pipes Micro Emulation](https://github.com/center-for-threat-informed-defense/adversary_emulation_library/tree/master/micro_emulation_plans/src/named_pipes) executable from the Center for Threat Informed Defense to create a named pipe for inter-process communication. The named pipe executable will pause for 30 seconds to allow the client and server to exchange a message through the pipe.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1559-2","name":"Cobalt Strike Lateral Movement (psexec_psh) pipe","description":"Uses the [Named Pipes Micro Emulation](https://github.com/center-for-threat-informed-defense/adversary_emulation_library/tree/master/micro_emulation_plans/src/named_pipes) executable from the Center for Threat Informed Defense to create a named pipe for inter-process communication. The named pipe executable will pause for 30 seconds to allow the client and server to exchange a message through the pipe.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1559-3","name":"Cobalt Strike SSH (postex_ssh) pipe","description":"Uses the [Named Pipes Micro Emulation](https://github.com/center-for-threat-informed-defense/adversary_emulation_library/tree/master/micro_emulation_plans/src/named_pipes) executable from the Center for Threat Informed Defense to create a named pipe for inter-process communication. The named pipe executable will pause for 30 seconds to allow the client and server to exchange a message through the pipe.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1559-4","name":"Cobalt Strike post-exploitation pipe (4.2 and later)","description":"Uses the [Named Pipes Micro Emulation](https://github.com/center-for-threat-informed-defense/adversary_emulation_library/tree/master/micro_emulation_plans/src/named_pipes) executable from the Center for Threat Informed Defense to create a named pipe for inter-process communication. The named pipe executable will pause for 30 seconds to allow the client and server to exchange a message through the pipe.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1559-5","name":"Cobalt Strike post-exploitation pipe (before 4.2)","description":"Uses the [Named Pipes Micro Emulation](https://github.com/center-for-threat-informed-defense/adversary_emulation_library/tree/master/micro_emulation_plans/src/named_pipes) executable from the Center for Threat Informed Defense to create a named pipe for inter-process communication. The named pipe executable will pause for 30 seconds to allow the client and server to exchange a message through the pipe.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1559.002","name":"Inter-Process Communication: Dynamic Data Exchange","tactic":"TA0002","tactics":["TA0002"],"atomicTests":[{"id":"T1559.002-1","name":"Execute Commands","description":"Executes commands via DDE using Microsfot Word","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1559.002-2","name":"Execute PowerShell script via Word DDE","description":"When the word document opens it will prompt the user to click ok on a dialogue box, then attempt to run PowerShell with DDEAUTO to download and execute a powershell script","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1559.002-3","name":"DDEAUTO","description":"TrustedSec - Unicorn - https://github.com/trustedsec/unicorn SensePost DDEAUTO - https://sensepost.com/blog/2017/macro-less-code-exec-in-msword/ Word VBA Macro [Dragon's Tail](https://github.com/redcanaryco/atomic-red-team/tree/master/ARTifacts/Adversary/Dragons_Tail)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1560","name":"Archive Collected Data","tactic":"TA0009","tactics":["TA0009"],"atomicTests":[{"id":"T1560-1","name":"Compress Data for Exfiltration With PowerShell","description":"An adversary may compress data (e.g., sensitive documents) that is collected prior to exfiltration. When the test completes you should find the files from the $env:USERPROFILE directory compressed in a file called T1560-data-ps.zip in the $env:USERPROFILE directory","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1560.001","name":"Archive Collected Data: Archive via Utility","tactic":"TA0009","tactics":["TA0009"],"atomicTests":[{"id":"T1560.001-1","name":"Compress Data for Exfiltration With Rar","description":"An adversary may compress data (e.g., sensitive documents) that is collected prior to exfiltration. When the test completes you should find the txt files from the %USERPROFILE% directory compressed in a file called T1560.001-data.rar in the %USERPROFILE% directory","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1560.001-2","name":"Compress Data and lock with password for Exfiltration with winrar","description":"Note: Requires winrar installation rar a -p\"blue\" hello.rar (VARIANT)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1560.001-3","name":"Compress Data and lock with password for Exfiltration with winzip","description":"Note: Requires winzip installation wzzip sample.zip -s\"blueblue\" *.txt (VARIANT)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1560.001-4","name":"Compress Data and lock with password for Exfiltration with 7zip","description":"Note: This test requires 7zip installation","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1560.001-5","name":"Data Compressed - nix - zip","description":"An adversary may compress data (e.g., sensitive documents) that is collected prior to exfiltration. This test uses standard zip compression.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1560.001-6","name":"Data Compressed - nix - gzip Single File","description":"An adversary may compress data (e.g., sensitive documents) that is collected prior to exfiltration. This test uses standard gzip compression.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1560.001-7","name":"Data Compressed - nix - tar Folder or File","description":"An adversary may compress data (e.g., sensitive documents) that is collected prior to exfiltration. This test uses standard gzip compression.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1560.001-8","name":"Data Encrypted with zip and gpg symmetric","description":"Encrypt data for exiltration","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1560.001-9","name":"Encrypts collected data with AES-256 and Base64","description":"An adversary may compress all the collected data, encrypt and send them to a C2 server using base64 encoding. This atomic test tries to emulate the behaviour of the FLEXIROOT backdoor to archive the collected data. FLEXIROOT typically utilizes AES encryption and base64 encoding to transfer the encrypted data to the C2 server. In this test, standard zip compression and the OpenSSL library are used to encrypt the compressed data. https://attack.mitre.org/versions/v7/software/S0267/","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1560.001-10","name":"ESXi - Remove Syslog remote IP","description":"An adversary may edit the syslog config to remove the loghost in order to prevent or redirect logs being received by SIEM.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1560.001-11","name":"Compress a File for Exfiltration using Makecab","description":"An adversary may compress data using Makecab (in-built Windows binary) that is collected prior to exfiltration. [reference](https://unit42.paloaltonetworks.com/exchange-server-credential-harvesting/)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1560.001-12","name":"Copy and Compress AppData Folder","description":"Copies the AppData folder, compresses it, and cleans up temporary files.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1560.002","name":"Archive Collected Data: Archive via Library","tactic":"TA0009","tactics":["TA0009"],"atomicTests":[{"id":"T1560.002-1","name":"Compressing data using GZip in Python (FreeBSD/Linux)","description":"Uses GZip from Python to compress files","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1560.002-2","name":"Compressing data using bz2 in Python (FreeBSD/Linux)","description":"Uses bz2 from Python to compress files","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1560.002-3","name":"Compressing data using zipfile in Python (FreeBSD/Linux)","description":"Uses zipfile from Python to compress files","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1560.002-4","name":"Compressing data using tarfile in Python (FreeBSD/Linux)","description":"Uses tarfile from Python to compress files","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1563.002","name":"Remote Service Session Hijacking: RDP Hijacking","tactic":"TA0008","tactics":["TA0008"],"atomicTests":[{"id":"T1563.002-1","name":"RDP hijacking","description":"[RDP hijacking](https://medium.com/@networksecurity/rdp-hijacking-how-to-hijack-rds-and-remoteapp-sessions-transparently-to-move-through-an-da2a1e73a5f6) - how to hijack RDS and RemoteApp sessions transparently to move through an organization","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1564","name":"Hide Artifacts","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1564-1","name":"Extract binary files via VBA","description":"This module extracts a binary (calc.exe) from inside of another binary. In the wild maldoc authors will use this technique to hide binaries inside of files stored within the office document itself. An example of this technique can be seen in sample f986040c7dd75b012e7dfd876acb33a158abf651033563ab068800f07f508226 This sample contains a document inside of itself. Document 1 is the actual maldoc itself, document 2 is the same document without all the malicious code. Document 1 will copy Document 2 to the file system and then \"peek\" inside of this document and pull out the oleObject.bin file. Contained inside of this oleObject.bin file is a payload that is parsed out and executed on the file system.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true},{"id":"T1564-2","name":"Create a Hidden User Called \"$\"","description":"Creating a user with a username containing \"$\"","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1564-3","name":"Create an \"Administrator \" user (with a space on the end)","description":"Creating a user with a username containing with a space on the end","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1564-4","name":"Create and Hide a Service with sc.exe","description":"The following technique utilizes sc.exe and sdset to change the security descriptor of a service and \"hide\" it from Get-Service or sc query. Upon successful execution, sc.exe creates a new service changes the security descriptor. https://twitter.com/Alh4zr3d/status/1580925761996828672 https://learn.microsoft.com/en-us/windows/win32/secauthz/security-descriptor-string-format","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1564-5","name":"Command Execution with NirCmd","description":"NirCmd is used by threat actors to execute commands, which can include recon and privilege escalation via running commands via the SYSTEM account See https://www.kroll.com/en/insights/publications/cyber/black-basta-technical-analysis","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1564.001","name":"Hide Artifacts: Hidden Files and Directories","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1564.001-1","name":"Create a hidden file in a hidden directory","description":"Creates a hidden file inside a hidden directory","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1564.001-2","name":"Mac Hidden file","description":"Hide a file on MacOS","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1564.001-3","name":"Create Windows System File with Attrib","description":"Creates a file and marks it as a system file using the attrib.exe utility. Upon execution, open the file in file explorer then open Properties > Details and observe that the Attributes are \"SA\" for System and Archive.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1564.001-4","name":"Create Windows Hidden File with Attrib","description":"Creates a file and marks it as hidden using the attrib.exe utility.Upon execution, open File Epxplorer and enable View > Hidden Items. Then, open Properties > Details on the file and observe that the Attributes are \"SH\" for System and Hidden.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1564.001-5","name":"Hidden files","description":"Requires Apple Dev Tools","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1564.001-6","name":"Hide a Directory","description":"Hide a directory on MacOS","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1564.001-7","name":"Show all hidden files","description":"Show all hidden files on MacOS","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1564.001-8","name":"Hide Files Through Registry","description":"Disable Show Hidden files switch in registry. This technique was abused by several malware to hide their files from normal user. See how this trojan abuses this technique - https://www.sophos.com/en-us/threat-center/threat-analyses/viruses-and-spyware/W32~Tiotua-P/detailed-analysis.aspx","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1564.001-9","name":"Create Windows Hidden File with powershell","description":"Creates a file and marks it as hidden through powershell. Upon execution, open File Epxplorer and enable View > Hidden Items. Then, open Properties > Details on the file and observe that the Attributes is \"H\" Hidden.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1564.001-10","name":"Create Windows System File with powershell","description":"Creates a file and marks it as System through powershell. Upon execution, open File Epxplorer and enable View > Hidden Items. Then, open Properties > Details on the file and observe that the Attributes is \"S\" System.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1564.002","name":"Hide Artifacts: Hidden Users","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1564.002-1","name":"Create Hidden User using UniqueID < 500","description":"Add a hidden user on macOS using Unique ID < 500 (users with that ID are hidden by default)","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1564.002-2","name":"Create Hidden User using IsHidden option","description":"Add a hidden user on macOS using IsHidden optoin","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1564.002-3","name":"Create Hidden User in Registry","description":"Adversaries may similarly hide user accounts in Windows. Adversaries can set the HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Winlogon\\SpecialAccounts\\UserList Registry key value to 0 for a specific user to prevent that user from being listed on the logon screen. Reference https://attack.mitre.org/techniques/T1564/002/ and https://thedfirreport.com/2022/07/11/select-xmrig-from-sqlserver/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1564.003","name":"Hide Artifacts: Hidden Window","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1564.003-1","name":"Hidden Window","description":"Launch PowerShell with the \"-WindowStyle Hidden\" argument to conceal PowerShell windows by setting the WindowStyle parameter to hidden. Upon execution a hidden PowerShell window will launch calc.exe","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1564.003-2","name":"Headless Browser Accessing Mockbin","description":"The following Atomic Red Team test leverages the Chrome headless browser to access a mockbin site. Create your own Mockbin.org site and replace the BIN in the inputs. The default Mockbin ID forwards to google.com and you may view the details here https://mockbin.org/bin/f6b9a876-a826-4ac0-83b8-639d6ad516ec/view. Reference: https://cert.gov.ua/article/5702579","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1564.003-3","name":"Hidden Window-Conhost Execution","description":"Launch conhost.exe in \"headless\" mode, it means that no visible window will pop up on the victim's machine. This could be a sign of \"conhost\" usage as a LOLBIN or potential process injection activity. conhost.exe can be used as proxy the execution of arbitrary commands","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1564.004","name":"Hide Artifacts: NTFS File Attributes","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1564.004-1","name":"Alternate Data Streams (ADS)","description":"Execute from Alternate Streams [Reference - 1](https://gist.github.com/api0cradle/cdd2d0d0ec9abb686f0e89306e277b8f) [Reference - 2](https://oddvar.moe/2018/01/14/putting-data-in-alternate-data-streams-and-how-to-execute-it/)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1564.004-2","name":"Store file in Alternate Data Stream (ADS)","description":"Storing files in Alternate Data Stream (ADS) similar to Astaroth malware. Upon execution, cmd will run and attempt to launch desktop.ini. No windows remain open after the test","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1564.004-3","name":"Create ADS command prompt","description":"Create an Alternate Data Stream with the command prompt. Write access is required. Upon execution, run \"dir /a-d /s /r | find \":$DATA\"\" in the %temp% folder to view that the alternate data stream exists. To view the data in the alternate data stream, run \"notepad T1564.004_has_ads.txt:adstest.txt\"","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1564.004-4","name":"Create ADS PowerShell","description":"Create an Alternate Data Stream with PowerShell. Write access is required. To verify execution, run the command \"ls -Recurse | %{ gi $_.Fullname -stream *} | where stream -ne ':$Data' | Select-Object pschildname\" in the %temp% directory to view all files with hidden data streams. To view the data in the alternate data stream, run \"notepad.exe T1564.004_has_ads_powershell.txt:adstest.txt\" in the %temp% folder.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1564.004-5","name":"Create Hidden Directory via $index_allocation","description":"Create an Alternate Data Stream Directory and File with the command prompt. Write access is required. Upon execution, run \"dir /A /Q /R\" in the %temp% folder to view that the alternate data stream folder exists. To view the data in the alternate data stream, run \"type %temp%\\...$.......::$index_allocation\\secrets.txt\"","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1564.006","name":"Run Virtual Instance","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1564.006-1","name":"Register Portable Virtualbox","description":"ransomware payloads via virtual machines (VM). [Maze ransomware](https://threatpost.com/maze-ransomware-ragnar-locker-virtual-machine/159350/)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1564.006-2","name":"Create and start VirtualBox virtual machine","description":"Create a simple VirtualBox VM and start up the machine Cleanup command stops and deletes the newly created VM and associated files https://www.virtualbox.org/manual/ch08.html#vboxmanage-startvm https://news.sophos.com/en-us/2020/05/21/ragnar-locker-ransomware-deploys-virtual-machine-to-dodge-security/ https://attack.mitre.org/techniques/T1564/006/","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1564.006-3","name":"Create and start Hyper-V virtual machine","description":"Create a simple Hyper-V VM (Windows native hypervisor) and start up the machine Cleanup command stops and deletes the newly created VM https://docs.microsoft.com/en-us/virtualization/hyper-v-on-windows/quick-start/enable-hyper-v https://embracethered.com/blog/posts/2020/shadowbunny-virtual-machine-red-teaming-technique/ https://attack.mitre.org/techniques/T1564/006/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1564.008","name":"Hide Artifacts: Email Hiding Rules","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1564.008-1","name":"New-Inbox Rule to Hide E-mail in M365","description":"This test simulates a user adding an inbox rule in M365 to delete emails with specific keywords in email subject or body. Reference: https://www.mandiant.com/sites/default/files/2021-09/rpt-fin4.pdf","supportedPlatforms":["office-365"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1566.002","name":"Phishing: Spearphishing Link","tactic":"TA0001","tactics":["TA0001"],"atomicTests":[{"id":"T1566.002-1","name":"Paste and run technique","description":"Tests the **Paste and Run** technique, where users are tricked into running malicious PowerShell commands by automating the Win+R command to open the Run dialog and input `encoded PowerShell to execute calc.exe.` - [Fake CAPTCHA Campaign](https://medium.com/@ahmed.moh.farou2/fake-captcha-campaign-on-arabic-pirated-movie-sites-delivers-lumma-stealer-4f203f7adabf) - [From Clipboard to Compromise](https://www.proofpoint.com/us/blog/threat-insight/clipboard-compromise-powershell-self-pwn)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1567.002","name":"Exfiltration Over Web Service: Exfiltration to Cloud Storage","tactic":"TA0010","tactics":["TA0010"],"atomicTests":[{"id":"T1567.002-1","name":"Exfiltrate data with rclone to cloud Storage - Mega (Windows)","description":"This test uses rclone to exfiltrate data to a remote cloud storage instance. (Mega) See https://thedfirreport.com/2022/06/16/sans-ransomware-summit-2022-can-you-detect-this/","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1567.002-2","name":"Exfiltrate data with rclone to cloud Storage - AWS S3","description":"This test uses rclone to exfiltrate data to a remote cloud storage instance. (AWS S3) See https://thedfirreport.com/2022/06/16/sans-ransomware-summit-2022-can-you-detect-this/","supportedPlatforms":["linux","macos"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1567.003","name":"Exfiltration Over Web Service: Exfiltration to Text Storage Sites","tactic":"TA0010","tactics":["TA0010"],"atomicTests":[{"id":"T1567.003-1","name":"Exfiltrate data with HTTP POST to text storage sites - pastebin.com (Windows)","description":"This test uses HTTP POST to exfiltrate data to a remote text storage site. (pastebin) See https://web.archive.org/web/20201107203304/https://www.echosec.net/blog/what-is-pastebin-and-why-do-hackers-love-it","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1568.002","name":"Dynamic Resolution: Domain Generation Algorithms","tactic":"TA0011","tactics":["TA0011"],"atomicTests":[{"id":"T1568.002-1","name":"DGA Simulation (Python)","description":"Simulates Domain Generation Algorithm (DGA) traffic by generating pseudo-random domains based on the current date and querying them using dig. This is designed to trigger DNS analytics and NGIDS.","supportedPlatforms":["linux"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1569.001","name":"System Services: Launchctl","tactic":"TA0002","tactics":["TA0002"],"atomicTests":[{"id":"T1569.001-1","name":"Launchctl","description":"Utilize launchctl","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1569.002","name":"System Services: Service Execution","tactic":"TA0002","tactics":["TA0002"],"atomicTests":[{"id":"T1569.002-1","name":"Execute a Command as a Service","description":"Creates a service specifying an arbitrary command and executes it. When executing commands such as PowerShell, the service will report that it did not start correctly even when code executes properly. Upon successful execution, cmd.exe creates a new service using sc.exe that will start powershell.exe to create a new file `art-marker.txt` [BlackCat Ransomware (ALPHV)](https://www.varonis.com/blog/blackcat-ransomware) [Cybereason vs. BlackCat Ransomware](https://www.cybereason.com/blog/cybereason-vs.-blackcat-ransomware)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1569.002-2","name":"Use PsExec to execute a command on a remote host","description":"Requires having Sysinternals installed, path to sysinternals is one of the input input_arguments Will start a process on a remote host. Upon successful execution, cmd will utilize psexec.exe to spawn calc.exe on a remote endpoint (default:localhost).","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1569.002-3","name":"psexec.py (Impacket)","description":"Will execute a command on the remote host with Impacket psexec.py script.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1569.002-4","name":"BlackCat pre-encryption cmds with Lateral Movement","description":"This atomic attempts to emulate the unique behavior of BlackCat ransomware prior to encryption and during Lateral Movement attempts via PsExec on Windows. Uses bundled PsExec like BlackCat","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1569.002-5","name":"Use RemCom to execute a command on a remote host","description":"Requires having RemCom installed, path to RemCom is one of the input input_arguments Will start a process on a remote host. Upon successful execution, cmd will utilize RemCom.exe to spawn calc.exe on a remote endpoint (default:localhost).","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1569.002-6","name":"Snake Malware Service Create","description":"The following Atomic Test will create a new service named WerFaultSvc with a binary path of WinSxS\\x86_microsoft-windows-errorreportingfaults_31bf3856ad364e35_4.0.9600.16384_none_a13f7e283339a050\\WerFault.exe. This was recently seen in the Snake Malware report. Upon execution, sc.exe will create a new service named WerFaultSvc with a bin path \\WinSxS\\x86_microsoft-windows-errorreportingfaults_31bf3856ad364e35_4.0.9600.16384_none_a13f7e283339a050\\WerFault.exe and a display name of WerFault Service. [Snake Malware - CISA](https://media.defense.gov/2023/May/09/2003218554/-1/-1/0/JOINT_CSA_HUNTING_RU_INTEL_SNAKE_MALWARE_20230509.PDF)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1569.002-7","name":"Modifying ACL of Service Control Manager via SDET","description":"Modify permissions of Service Control Manager via SDSET. This allows any administrative user to escalate privilege and create a service with SYSTEM level privileges.Restart is required. [Blog](https://0xv1n.github.io/posts/scmanager/)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1569.002-8","name":"Pipe Creation - PsExec Tool Execution From Suspicious Locations","description":"Requires PsExec tool installed. BlackCat Ransomeware tried to propagate by creating pipe using PsExec process executing from suspicious locations (In the particular case the legitimate PsExec executable is embedded within the Windows variant and is dropped in the victim\u2019s %TEMP% directory). pon successful execution, PsExec will be executed from suspicious location and create a new pipe to execute CMD.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1569.003","name":"System Services: Systemctl","tactic":"TA0002","tactics":["TA0002"],"atomicTests":[{"id":"T1569.003-1","name":"Create and Enable a Malicious systemd Service Unit","description":"Creates a new systemd service unit file in /etc/systemd/system/ and enables it using systemctl enable followed by systemctl start. Adversaries commonly abuse this workflow to establish persistence or execute arbitrary commands under the context of systemd. This simulates the full attacker workflow: writing the unit file, reloading the systemd daemon, enabling the service to survive reboots, and starting it immediately. This is consistent with techniques observed in ransomware precursor activity and post-exploitation frameworks targeting Linux infrastructure.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1569.003-2","name":"Create systemd Service Unit from /tmp (Unusual Location)","description":"Creates a systemd service unit file in /tmp and loads it using systemctl start with an absolute path. Adversaries may write service unit files to world-writable directories such as /tmp to avoid triggering alerts on new file creation in standard service directories, or to execute payloads transiently without permanently installing a service. Loading a service unit from an arbitrary path rather than a standard systemd directory is unusual behaviour that should be detectable by monitoring systemctl command arguments.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1569.003-3","name":"Create systemd Service Unit from /dev/shm (Unusual Location)","description":"Creates a systemd service unit file in /dev/shm and loads it using systemctl. /dev/shm is a memory-backed filesystem that is world-writable on most Linux systems and does not persist across reboots, making it particularly attractive to adversaries seeking to execute transient payloads while evading file-based forensic detection. This technique has been observed in post-exploitation scenarios where attackers deliberately avoid writing to disk-backed locations to limit forensic artefacts.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1569.003-4","name":"Modify Existing systemd Service to Execute Malicious Command","description":"Creates a service unit file that initially runs a benign command, then modifies the ExecStart directive using sed to substitute a malicious command before reloading and restarting the service. Adversaries may hijack existing services to blend in with normal service activity and avoid triggering detections focused solely on new service creation. This technique reflects the tradecraft observed in more sophisticated intrusions where blending into existing process trees is a priority over creating net-new services.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1569.003-5","name":"Execute Command via Transient systemd Service (systemd-run)","description":"Uses systemd-run to execute a command as a transient systemd service without creating a persistent unit file on disk. Adversaries may use systemd-run to execute arbitrary commands under the context of systemd while bypassing controls that monitor for new unit file creation, since transient services exist only in memory for their lifetime. This is a particularly stealthy technique as it leaves minimal on-disk artefacts and the service disappears from systemctl list-units once execution completes.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1569.003-6","name":"Enumerate All systemd Services Using systemctl","description":"Enumerates all systemd services and their current states using systemctl list-units and systemctl list-unit-files. Adversaries may enumerate running and enabled services to identify targets for hijacking, understand the host environment, map installed security tooling, or identify gaps in monitoring coverage. Service enumeration is a common reconnaissance step during post-exploitation and may precede service hijacking or masquerading activity. This test does not require elevation as service listing is available to unprivileged users on most Linux systems.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1569.003-7","name":"Enable systemd Service for Persistence with Auto-Restart","description":"Creates a payload script and a systemd service unit that executes it, then enables the service to survive reboots using systemctl enable. The service is configured with Restart=always to automatically restart on failure, mimicking the persistence mechanism used by adversaries deploying backdoors or beacons on Linux hosts. This technique is consistent with observed post-exploitation tradecraft where adversaries establish a foothold that survives reboots and self-heals after interruption, complicating incident response and remediation efforts.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1569.003-8","name":"Masquerade Malicious Service as Legitimate System Service","description":"Creates a systemd service with a name and description closely resembling a legitimate system service to blend in with normal service activity. Adversaries may deliberately choose service names similar to well-known system services such as systemd-networkd, cron, or ssh to evade detection from analysts reviewing service lists or automated alerting on service names. This masquerading technique is particularly effective in environments where detection relies on service name allowlists or manual review of systemctl list-units output rather than behavioural analysis of service unit file contents and ExecStart paths.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1570","name":"Lateral Tool Transfer","tactic":"TA0008","tactics":["TA0008"],"atomicTests":[{"id":"T1570-1","name":"Exfiltration Over SMB over QUIC (New-SmbMapping)","description":"Simulates an attacker exfiltrating data over SMB over QUIC using the New-SmbMapping command. Prerequisites: - A file server running Windows Server 2022 Datacenter: Azure Edition - A Windows 11 computer - Windows Admin Center","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1570-2","name":"Exfiltration Over SMB over QUIC (NET USE)","description":"Simulates an attacker exfiltrating data over SMB over QUIC using the NET USE command. Prerequisites: - A file server running Windows Server 2022 Datacenter: Azure Edition - A Windows 11 computer - Windows Admin Center","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1571","name":"Non-Standard Port","tactic":"TA0011","tactics":["TA0011"],"atomicTests":[{"id":"T1571-1","name":"Testing usage of uncommonly used port with PowerShell","description":"Testing uncommonly used port utilizing PowerShell. APT33 has been known to attempt telnet over port 8081. Upon execution, details about the successful port check will be displayed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1571-2","name":"Testing usage of uncommonly used port","description":"Testing uncommonly used port utilizing telnet.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1572","name":"Protocol Tunneling","tactic":"TA0011","tactics":["TA0011"],"atomicTests":[{"id":"T1572-1","name":"DNS over HTTPS Large Query Volume","description":"This test simulates an infected host sending a large volume of DoH queries to a command and control server. The intent of this test is to trigger threshold based detection on the number of DoH queries either from a single source system or to a single targe domain. A custom domain and sub-domain will need to be passed as input parameters for this test to work. Upon execution, DNS information about the domain will be displayed for each callout in a JSON format.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1572-2","name":"DNS over HTTPS Regular Beaconing","description":"This test simulates an infected host beaconing via DoH queries to a command and control server at regular intervals over time. This behaviour is typical of implants either in an idle state waiting for instructions or configured to use a low query volume over time to evade threshold based detection. A custom domain and sub-domain will need to be passed as input parameters for this test to work. Upon execution, DNS information about the domain will be displayed for each callout in a JSON format.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1572-3","name":"DNS over HTTPS Long Domain Query","description":"This test simulates an infected host returning data to a command and control server using long domain names. The simulation involves sending DoH queries that gradually increase in length until reaching the maximum length. The intent is to test the effectiveness of detection of DoH queries for long domain names over a set threshold. Upon execution, DNS information about the domain will be displayed for each callout in a JSON format.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1572-4","name":"run ngrok","description":"Download and run ngrok. Create tunnel to chosen port.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1572-5","name":"Microsoft Dev tunnels (Linux/macOS)","description":"Dev Tunnels enables insiders as well as threat actors to expose local ports over the internet via Microsoft dev tunnels. This atomic will generate a dev tunnel binding it to the local service running on the provided port. Can be used to expose local services, web applications and local files etc. Reference: - [Microsoft Docs](https://learn.microsoft.com/en-us/tunnels/dev-tunnels-overview) - [LOT Tunnels](https://lottunnels.github.io/lottunnels/Binaries/devtunnels/)","supportedPlatforms":["linux","macos"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1572-6","name":"VSCode tunnels (Linux/macOS)","description":"Visual Studio Code Remote Tunnels can be used for exposing local development environment/services/files over the internet. This atomic will generate a dev tunnel binding it to the local service running on the provided port. Reference: - [Microsoft Docs](https://code.visualstudio.com/docs/remote/tunnels) - [LOT Tunnels](https://lottunnels.github.io/lottunnels/Binaries/vscode-server/)","supportedPlatforms":["linux","macos"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1572-7","name":"Cloudflare tunnels (Linux/macOS)","description":"Cloudflared can be used for exposing local development environment/services/files over the internet. This atomic will generate a dev tunnel binding it to the local service running on the provided port. Reference: - [Cloudflared Docs](https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/) - [LOT Tunnels](https://lottunnels.github.io/lottunnels/Binaries/cloudflared/)","supportedPlatforms":["linux","macos"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1573","name":"Encrypted Channel","tactic":"TA0011","tactics":["TA0011"],"atomicTests":[{"id":"T1573-1","name":"OpenSSL C2","description":"Thanks to @OrOneEqualsOne for this quick C2 method. This is to test to see if a C2 session can be established using an SSL socket. More information about this technique, including how to set up the listener, can be found here: https://medium.com/walmartlabs/openssl-server-reverse-shell-from-windows-client-aee2dbfa0926 Upon successful execution, powershell will make a network connection to 127.0.0.1 over 443.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1574.001","name":"Hijack Execution Flow: DLL","tactic":"TA0002","tactics":["TA0002"],"atomicTests":[{"id":"T1574.001-1","name":"DLL Search Order Hijacking - amsi.dll","description":"Adversaries can take advantage of insecure library loading by PowerShell to load a vulnerable version of amsi.dll in order to bypass AMSI (Anti-Malware Scanning Interface) https://enigma0x3.net/2017/07/19/bypassing-amsi-via-com-server-hijacking/ Upon successful execution, powershell.exe will be copied and renamed to updater.exe and load amsi.dll from a non-standard path.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1574.001-2","name":"Phantom Dll Hijacking - WinAppXRT.dll","description":".NET components (a couple of DLLs loaded anytime .NET apps are executed) when they are loaded they look for an environment variable called APPX_PROCESS Setting the environmental variable and dropping the phantom WinAppXRT.dll in e.g. c:\\windows\\system32 (or any other location accessible via PATH) will ensure the WinAppXRT.dll is loaded everytime user launches an application using .NET. Upon successful execution, amsi.dll will be copied and renamed to WinAppXRT.dll and then WinAppXRT.dll will be copied to system32 folder for loading during execution of any .NET application.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1574.001-3","name":"Phantom Dll Hijacking - ualapi.dll","description":"Re-starting the Print Spooler service leads to C:\\Windows\\System32\\ualapi.dll being loaded A malicious ualapi.dll placed in the System32 directory will lead to its execution whenever the system starts Upon successful execution, amsi.dll will be copied and renamed to ualapi.dll and then ualapi.dll will be copied to system32 folder for loading during system restart. Print Spooler service is also configured to auto start. Reboot of system is required","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1574.001-4","name":"DLL Side-Loading using the Notepad++ GUP.exe binary","description":"GUP is an open source signed binary used by Notepad++ for software updates, and is vulnerable to DLL Side-Loading, thus enabling the libcurl dll to be loaded. Upon execution, calc.exe will be opened.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1574.001-5","name":"DLL Side-Loading using the dotnet startup hook environment variable","description":"Utilizing the dotnet_startup_hooks environment variable, this method allows for registering a global method in an assembly that will be executed whenever a .net core application is started. This unlocks a whole range of scenarios, from injecting a profiler to tweaking a static context in a given environment. [blog post](https://medium.com/criteo-engineering/c-have-some-fun-with-net-core-startup-hooks-498b9ad001e1)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1574.001-6","name":"DLL Search Order Hijacking,DLL Sideloading Of KeyScramblerIE.DLL Via KeyScrambler.EXE","description":"Various threat actors and malware have been found side loading a masqueraded \"KeyScramblerIE.dll\" through \"KeyScrambler.exe\", which can load further executables embedded in modified KeyScramblerIE.dll file.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1574.006","name":"Hijack Execution Flow: LD_PRELOAD","tactic":"TA0002","tactics":["TA0002"],"atomicTests":[{"id":"T1574.006-1","name":"Shared Library Injection via /etc/ld.so.preload","description":"This test adds a shared library to the `ld.so.preload` list to execute and intercept API calls. This technique was used by threat actor Rocke during the exploitation of Linux web servers. This requires the `glibc` package. Upon successful execution, bash will echo `../bin/T1574.006.so` to /etc/ld.so.preload.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1574.006-2","name":"Shared Library Injection via LD_PRELOAD","description":"This test injects a shared object library via the LD_PRELOAD environment variable to execute. This technique was used by threat actor Rocke during the exploitation of Linux web servers. This requires the `glibc` package. Upon successful execution, bash will utilize LD_PRELOAD to load the shared object library `/etc/ld.so.preload`. Output will be via stdout.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1574.006-3","name":"Dylib Injection via DYLD_INSERT_LIBRARIES","description":"injects a dylib that opens calculator via env variable","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1574.008","name":"Hijack Execution Flow: Path Interception by Search Order Hijacking","tactic":"TA0002","tactics":["TA0002"],"atomicTests":[{"id":"T1574.008-1","name":"powerShell Persistence via hijacking default modules - Get-Variable.exe","description":"Colibri leverages PowerShell in a unique way to maintain persistence after a reboot. Depending on the Windows version, Colibri drops its copy in %APPDATA%\\Local\\Microsoft\\WindowsApps and names it Get-Variable.exe for Windows 10 and above. https://blog.malwarebytes.com/threat-intelligence/2022/04/colibri-loader-combines-task-scheduler-and-powershell-in-clever-persistence-technique/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1574.009","name":"Hijack Execution Flow: Path Interception by Unquoted Path","tactic":"TA0002","tactics":["TA0002"],"atomicTests":[{"id":"T1574.009-1","name":"Execution of program.exe as service with unquoted service path","description":"When a service is created whose executable path contains spaces and isn\u2019t enclosed within quotes, leads to a vulnerability known as Unquoted Service Path which allows a user to gain SYSTEM privileges. In this case, if an executable program.exe in C:\\ exists, C:\\program.exe will be executed instead of test.exe in C:\\Program Files\\subfolder\\test.exe.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1574.011","name":"Hijack Execution Flow: Services Registry Permissions Weakness","tactic":"TA0002","tactics":["TA0002"],"atomicTests":[{"id":"T1574.011-1","name":"Service Registry Permissions Weakness","description":"Service registry permissions weakness check and then which can lead to privilege escalation with ImagePath. eg. reg add \"HKLM\\SYSTEM\\CurrentControlSet\\Services\\#{weak_service_name}\" /f /v ImagePath /d \"C:\\temp\\AtomicRedteam.exe\"","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1574.011-2","name":"Service ImagePath Change with reg.exe","description":"Change Service registry ImagePath of a bengin service to a malicious file","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1574.012","name":"Hijack Execution Flow: COR_PROFILER","tactic":"TA0002","tactics":["TA0002"],"atomicTests":[{"id":"T1574.012-1","name":"User scope COR_PROFILER","description":"Creates user scope environment variables and CLSID COM object to enable a .NET profiler (COR_PROFILER). The unmanaged profiler DLL (`T1574.012x64.dll`) executes when the CLR is loaded by the Event Viewer process. Additionally, the profiling DLL will inherit the integrity level of Event Viewer bypassing UAC and executing `notepad.exe` with high integrity. If the account used is not a local administrator the profiler DLL will still execute each time the CLR is loaded by a process, however, the notepad process will not execute with high integrity. Reference: https://redcanary.com/blog/cor_profiler-for-persistence/","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1574.012-2","name":"System Scope COR_PROFILER","description":"Creates system scope environment variables to enable a .NET profiler (COR_PROFILER). System scope environment variables require a restart to take effect. The unmanaged profiler DLL (T1574.012x64.dll`) executes when the CLR is loaded by any process. Additionally, the profiling DLL will inherit the integrity level of Event Viewer bypassing UAC and executing `notepad.exe` with high integrity.
