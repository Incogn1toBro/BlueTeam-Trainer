0C 0D 0E 0F 00000000   EB 52 90 4E 54 46 53 20 20 20 20                 \u00ebR?NTFS ```","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1007","name":"System Service Discovery","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1007-1","name":"System Service Discovery","description":"Identify system services. Upon successful execution, cmd.exe will execute service commands with expected result to stdout.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1007-2","name":"System Service Discovery - net.exe","description":"Enumerates started system services using net.exe and writes them to a file. This technique has been used by multiple threat actors. Upon successful execution, net.exe will run from cmd.exe that queries services. Expected output is to a txt file in in the temp directory called service-list.txt.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1007-3","name":"System Service Discovery - systemctl/service","description":"Enumerates system service using systemctl/service","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1007-4","name":"Get-Service Execution","description":"Executes the Get-Service cmdlet to gather objects representing all services on the local system.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1007-5","name":"System Service Discovery - macOS launchctl","description":"Enumerates services on macOS using launchctl. Used by adversaries for identifying daemons, background services, and persistence mechanisms.","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1007-6","name":"System Service Discovery - Windows Scheduled Tasks (schtasks)","description":"Enumerates scheduled tasks on Windows using schtasks.exe.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1007-7","name":"System Service Discovery - Services Registry Enumeration","description":"Enumerates Windows services by reading the Services registry key (HKLM\\SYSTEM\\CurrentControlSet\\Services) instead of using Service Control Manager APIs or CLI tools such as sc.exe or Get-Service.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1007-8","name":"System Service Discovery - Linux init scripts","description":"Enumerates system services by listing SysV init scripts and runlevel symlinks under /etc/init.d and /etc/rc*.d.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1010","name":"Application Window Discovery","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1010-1","name":"List Process Main Windows - C# .NET","description":"Compiles and executes C# code to list main window titles associated with each process. Upon successful execution, powershell will download the .cs from the Atomic Red Team repo, and cmd.exe will compile and execute T1010.exe. Upon T1010.exe execution, expected output will be via stdout.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1012","name":"Query Registry","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1012-1","name":"Query Registry","description":"Query Windows Registry. Upon successful execution, cmd.exe will perform multiple reg queries. Some will succeed and others will fail (dependent upon OS). References: https://blog.cylance.com/windows-registry-persistence-part-2-the-run-keys-and-search-order https://blog.cylance.com/windows-registry-persistence-part-1-introduction-attack-phases-and-windows-services http://www.handgrep.se/repository/cheatsheets/postexploitation/WindowsPost-Exploitation.pdf https://www.offensive-security.com/wp-content/uploads/2015/04/wp.Registry_Quick_Find_Chart.en_us.pdf","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1012-2","name":"Query Registry with Powershell cmdlets","description":"Query Windows Registry with Powershell cmdlets, i.e., Get-Item and Get-ChildItem. The results from above can also be achieved with Get-Item and Get-ChildItem. Unlike using \"reg query\" which then executes reg.exe, using cmdlets won't generate new processes, which may evade detection systems monitoring process generation.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1012-3","name":"Enumerate COM Objects in Registry with Powershell","description":"This test is designed to enumerate the COM objects listed in HKCR, then output their methods and CLSIDs to a text file. An adversary could then use this information to identify COM objects that might be vulnerable to abuse, such as using them to spawn arbitrary processes. See: https://www.mandiant.com/resources/hunting-com-objects","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1012-4","name":"Reg query for AlwaysInstallElevated status","description":"The reg query commands allows to check the status of the AlwaysInstallElevated registry key for both the user and the machine. If both queries return a value of 0x1, then AlwaysInstallElevated is enabled for both user and machine thus allowing a regular user to install a Microsoft Windows Installer package with system level privileges. This can be abused by an attacker to escalate privileges in the host to SYSTEM level.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1012-5","name":"Check Software Inventory Logging (SIL) status via Registry","description":"Microsoft's Software Inventory Logging (SIL) collects information about software installed per host basis. Adversary can use such logs to passively check for existence of software of interest to them. Status of SIL can be checked via registry. [Reference](https://blog.talosintelligence.com/chinese-hacking-group-apt41-compromised-taiwanese-government-affiliated-research-institute-with-shadowpad-and-cobaltstrike-2/)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1012-6","name":"Inspect SystemStartOptions Value in Registry","description":"The objective of this test is to query the SystemStartOptions key under HKLM\\SYSTEM\\CurrentControlSet\\Control in the Windows registry. This action could be used to uncover specific details about how the system is configured to start, potentially aiding in understanding boot parameters or identifying security-related settings. key is.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1014","name":"Rootkit","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1014-1","name":"Loadable Kernel Module based Rootkit","description":"Loadable Kernel Module based Rootkit","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1014-2","name":"Loadable Kernel Module based Rootkit","description":"Loadable Kernel Module based Rootkit","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1014-3","name":"dynamic-linker based rootkit (libprocesshider)","description":"Uses libprocesshider to simulate rootkit behavior by hiding a specific process name via ld.so.preload (see also T1574.006).","supportedPlatforms":["linux"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1014-4","name":"Loadable Kernel Module based Rootkit (Diamorphine)","description":"Loads Diamorphine kernel module, which hides itself and a processes.","supportedPlatforms":["linux"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1016.001","name":"System Network Configuration Discovery: Internet Connection Discovery","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1016.001-1","name":"Check internet connection using ping Windows","description":"Check internet connection using ping on Windows. The default target of the ping is 8.8.8.8 (Google Public DNS).","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1016.001-2","name":"Check internet connection using ping freebsd, linux or macos","description":"Check internet connection using ping on Linux, MACOS. The default target of the ping is 8.8.8.8 (Google Public DNS).","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1016.001-3","name":"Check internet connection using Test-NetConnection in PowerShell (ICMP-Ping)","description":"Check internet connection using PowerShell's Test-NetConnection cmdlet and the ICMP/Ping protocol. The default target is 8.8.8.8 (Google Public DNS).","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1016.001-4","name":"Check internet connection using Test-NetConnection in PowerShell (TCP-HTTP)","description":"Check internet connection using PowerShell's Test-NetConnection cmdlet and the TCP protocol to check for outbound HTTP (Port 80) access. The default target is www.google.com.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1016.001-5","name":"Check internet connection using Test-NetConnection in PowerShell (TCP-SMB)","description":"Check internet connection using PowerShell's Test-NetConnection cmdlet and the TCP protocol to check for outbound SMB (Port 445) access. The default target is 8.8.8.8.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1016.002","name":"System Network Configuration Discovery: Wi-Fi Discovery","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1016.002-1","name":"Enumerate Stored Wi-Fi Profiles And Passwords via netsh","description":"Upon successful execution, information about previously connected Wi-Fi networks will be displayed with their corresponding key (if present).","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1018","name":"Remote System Discovery","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1018-1","name":"Remote System Discovery - net","description":"Identify remote systems with net.exe. Upon successful execution, cmd.exe will execute `net.exe view` and display results of local systems on the network that have file and print sharing enabled.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1018-2","name":"Remote System Discovery - net group Domain Computers","description":"Identify remote systems with net.exe querying the Active Directory Domain Computers group. Upon successful execution, cmd.exe will execute cmd.exe against Active Directory to list the \"Domain Computers\" group. Output will be via stdout.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1018-3","name":"Remote System Discovery - nltest","description":"Identify domain controllers for specified domain. Upon successful execution, cmd.exe will execute nltest.exe against a target domain to retrieve a list of domain controllers. Output will be via stdout.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1018-4","name":"Remote System Discovery - ping sweep","description":"Identify remote systems via ping sweep. Upon successful execution, cmd.exe will perform a for loop against the 192.168.1.1/24 network. Output will be via stdout.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1018-5","name":"Remote System Discovery - arp","description":"Identify remote systems via arp. Upon successful execution, cmd.exe will execute arp to list out the arp cache. Output will be via stdout.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1018-6","name":"Remote System Discovery - arp nix","description":"Identify remote systems via arp. Upon successful execution, sh will execute arp to list out the arp cache. Output will be via stdout.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1018-7","name":"Remote System Discovery - sweep","description":"Identify remote systems via ping sweep. Upon successful execution, sh will perform a ping sweep on the 192.168.1.1/24 and echo via stdout if an IP is active.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1018-8","name":"Remote System Discovery - nslookup","description":"Powershell script that runs nslookup on cmd.exe against the local /24 network of the first network adaptor listed in ipconfig. Upon successful execution, powershell will identify the ip range (via ipconfig) and perform a for loop and execute nslookup against that IP range. Output will be via stdout.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1018-9","name":"Remote System Discovery - adidnsdump","description":"This tool enables enumeration and exporting of all DNS records in the zone for recon purposes of internal networks Python 3 and adidnsdump must be installed, use the get_prereq_command's to meet the prerequisites for this test. Successful execution of this test will list dns zones in the terminal.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1018-10","name":"Adfind - Enumerate Active Directory Computer Objects","description":"Adfind tool can be used for reconnaissance in an Active directory environment. This example has been documented by ransomware actors enumerating Active Directory Computer Objects reference- http://www.joeware.net/freetools/tools/adfind/, https://www.fireeye.com/blog/threat-research/2019/04/pick-six-intercepting-a-fin6-intrusion.html","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1018-11","name":"Adfind - Enumerate Active Directory Domain Controller Objects","description":"Adfind tool can be used for reconnaissance in an Active directory environment. This example has been documented by ransomware actors enumerating Active Directory Domain Controller Objects reference- http://www.joeware.net/freetools/tools/adfind/, https://www.fireeye.com/blog/threat-research/2019/04/pick-six-intercepting-a-fin6-intrusion.html","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1018-12","name":"Remote System Discovery - ip neighbour","description":"Use the ip neighbour command to display the known link layer (ARP table) addresses for hosts sharing the same network segment.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1018-13","name":"Remote System Discovery - ip route","description":"Use the ip route command to display the kernels routing tables.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1018-14","name":"Remote System Discovery - netstat","description":"Use the netstat command to display the kernels routing tables.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1018-15","name":"Remote System Discovery - ip tcp_metrics","description":"Use the ip tcp_metrics command to display the recent cached entries for IPv4 and IPv6 source and destination addresses.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1018-16","name":"Enumerate domain computers within Active Directory using DirectorySearcher","description":"This test is a Powershell script that enumerates Active Directory to determine computers that are joined to the domain. This test is designed to mimic how SessionGopher can determine the additional systems within a domain, which has been used before by threat actors to aid in lateral movement. Reference: [Head Fake: Tackling Disruptive Ransomware Attacks](https://www.mandiant.com/resources/head-fake-tackling-disruptive-ransomware-attacks). Upon successful execution, this test will output the names of the computers that reside on the domain to the console window.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1018-17","name":"Enumerate Active Directory Computers with Get-AdComputer","description":"The following Atomic test will utilize Get-AdComputer to enumerate Computers within Active Directory. Upon successful execution a listing of Computers will output with their paths in AD. Reference: https://github.com/MicrosoftDocs/windows-powershell-docs/blob/main/docset/winserver2022-ps/activedirectory/Get-ADComputer.md","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1018-18","name":"Enumerate Active Directory Computers with ADSISearcher","description":"The following Atomic test will utilize ADSISearcher to enumerate computers within Active Directory. Upon successful execution a listing of computers will output with their paths in AD. Reference: https://devblogs.microsoft.com/scripting/use-the-powershell-adsisearcher-type-accelerator-to-search-active-directory/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1018-19","name":"Get-DomainController with PowerView","description":"Utilizing PowerView, run Get-DomainController to identify the Domain Controller. Upon execution, information about the domain controller within the domain will be displayed.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1018-20","name":"Get-WmiObject to Enumerate Domain Controllers","description":"The following Atomic test will utilize get-wmiobject to enumerate Active Directory for Domain Controllers. Upon successful execution a listing of Systems from AD will output with their paths. Reference: https://docs.microsoft.com/en-us/powershell/module/microsoft.powershell.management/get-wmiobject?view=powershell-5.1","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1018-21","name":"Remote System Discovery - net group Domain Controller","description":"Identify remote systems with net.exe querying the Active Directory Domain Controller. Upon successful execution, cmd.exe will execute cmd.exe against Active Directory to list the \"Domain Controller\" in the domain. Output will be via stdout.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1018-22","name":"Enumerate Remote Hosts with Netscan","description":"This test uses Netscan to identify remote hosts in a specified network range.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1020","name":"Automated Exfiltration","tactic":"TA0010","tactics":["TA0010"],"atomicTests":[{"id":"T1020-1","name":"IcedID Botnet HTTP PUT","description":"Creates a text file Tries to upload to a server via HTTP PUT method with ContentType Header Deletes a created file","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1020-2","name":"Exfiltration via Encrypted FTP","description":"Simulates encrypted file transfer to an FTP server. For testing purposes, a free FTP testing portal is available at https://sftpcloud.io/tools/free-ftp-server, providing a temporary FTP server for 60 minutes. Use this service responsibly for testing and validation only.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1021.003","name":"Remote Services: Distributed Component Object Model","tactic":"TA0008","tactics":["TA0008"],"atomicTests":[{"id":"T1021.003-1","name":"PowerShell Lateral Movement using MMC20","description":"Powershell lateral movement using the mmc20 application com object. Reference: https://blog.cobaltstrike.com/2017/01/24/scripting-matt-nelsons-mmc20-application-lateral-movement-technique/ Upon successful execution, cmd will spawn calc.exe on a remote computer.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1021.003-2","name":"PowerShell Lateral Movement Using Excel Application Object","description":"Powershell lateral movement using the Excel COM objects. Reference: https://posts.specterops.io/lateral-movement-abuse-the-power-of-dcom-excel-application-3c016d0d9922 Upon successful execution, cmd will spawn calc.exe on a remote computer.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1021.004","name":"Remote Services: SSH","tactic":"TA0008","tactics":["TA0008"],"atomicTests":[{"id":"T1021.004-1","name":"ESXi - Enable SSH via PowerCLI","description":"An adversary enables the SSH service on a ESXi host to maintain persistent access to the host and to carryout subsequent operations.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1021.004-2","name":"ESXi - Enable SSH via VIM-CMD","description":"An adversary enables SSH on an ESXi host to maintain persistence and creeate another command execution interface. [Reference](https://lolesxi-project.github.io/LOLESXi/lolesxi/Binaries/vim-cmd/#enable%20service)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1021.005","name":"Remote Services:VNC","tactic":"TA0008","tactics":["TA0008"],"atomicTests":[{"id":"T1021.005-1","name":"Enable Apple Remote Desktop Agent","description":"ARD leverages a blend of protocols, including VNC to send the screen and control buffers and SSH for secure file transfer. Adversaries can abuse ARD to gain remote code execution and perform lateral movement. References:  https://www.mandiant.com/resources/blog/leveraging-apple-remote-desktop-for-good-and-evil","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1021.006","name":"Remote Services: Windows Remote Management","tactic":"TA0008","tactics":["TA0008"],"atomicTests":[{"id":"T1021.006-1","name":"Enable Windows Remote Management","description":"Powershell Enable WinRM Upon successful execution, powershell will \"Enable-PSRemoting\" allowing for remote PS access.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1021.006-2","name":"Remote Code Execution with PS Credentials Using Invoke-Command","description":"Simulate lateral movement with PowerShell Remoting on the local host. Upon successful execution, PowerShell will execute `whoami` using `Invoke-Command`, targeting the local machine as remote target.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1021.006-3","name":"WinRM Access with Evil-WinRM","description":"An adversary may attempt to use Evil-WinRM with a valid account to interact with remote systems that have WinRM enabled","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1025","name":"Data from Removable Media","tactic":"TA0009","tactics":["TA0009"],"atomicTests":[{"id":"T1025-1","name":"Identify Documents on USB and Removable Media via PowerShell","description":"This test simulates an attack where PowerShell is used to detect connected USB or other removable storage devices and gather a list of specific document files (e.g., .docx, .xls, .txt, .pdf). The command works by first identifying removable drives on the system and then recursively searching through each one for files matching the targeted extensions. If no removable drives are present, the script will return a message stating that no media is detected. This behavior mimics how adversaries might scan for sensitive documents on removable devices for exfiltration or analysis.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1027","name":"Obfuscated Files or Information","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1027-1","name":"Decode base64 Data into Script","description":"Creates a base64-encoded data file and decodes it into an executable shell script Upon successful execution, sh will execute art.sh, which is a base64 encoded command, that echoes `Hello from the Atomic Red Team` and uname -v","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1027-2","name":"Execute base64-encoded PowerShell","description":"Creates base64-encoded PowerShell code and executes it. This is used by numerous adversaries and malicious tools. Upon successful execution, powershell will execute an encoded command and stdout default is \"Write-Host \"Hey, Atomic!\"","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1027-3","name":"Execute base64-encoded PowerShell from Windows Registry","description":"Stores base64-encoded PowerShell code in the Windows Registry and deobfuscates it for execution. This is used by numerous adversaries and malicious tools. Upon successful execution, powershell will execute encoded command and read/write from the registry.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1027-4","name":"Execution from Compressed File","description":"Mimic execution of compressed executable. When successfully executed, calculator.exe will open.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1027-5","name":"DLP Evasion via Sensitive Data in VBA Macro over email","description":"Upon successful execution, an excel containing VBA Macro containing sensitive data will be sent outside the network using email. Sensitive data includes about around 20 odd simulated credit card numbers that passes the LUHN check.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1027-6","name":"DLP Evasion via Sensitive Data in VBA Macro over HTTP","description":"Upon successful execution, an excel containing VBA Macro containing sensitive data will be sent outside the network using HTTP. Sensitive data includes about around 20 odd simulated credit card numbers that passes the LUHN check.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1027-7","name":"Obfuscated Command in PowerShell","description":"This is an obfuscated PowerShell command which when executed prints \"Hello, from PowerShell!\". Example is from the 2021 Threat Detection Report by Red Canary.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1027-8","name":"Obfuscated Command Line using special Unicode characters","description":"This is an obfuscated certutil command that when executed downloads a file from the web. Adapted from T1105. Obfuscation includes special options chars (unicode hyphens), character substitution (e.g. \u1da0) and character insertion (including the usage of the right-to-left 0x202E and left-to-right 0x202D override characters). Reference: https://wietze.github.io/blog/windows-command-line-obfuscation","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1027-9","name":"Snake Malware Encrypted crmlog file","description":"The following Atomic Test will create a file with a specific name and sets its attributes to Hidden, System, and Archive. This was related to the Snake Malware campaign and is later decrypted by Snake's kernel driver. [Snake Malware - CISA](https://media.defense.gov/2023/May/09/2003218554/-1/-1/0/JOINT_CSA_HUNTING_RU_INTEL_SNAKE_MALWARE_20230509.PDF)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1027-10","name":"Execution from Compressed JScript File","description":"Mimic execution of compressed JavaScript file. When successfully executed, calculator.exe will open. This test is meant to help emulate Gootloader as per https://redcanary.com/blog/gootloader/","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1027-11","name":"Obfuscated PowerShell Command via Character Array","description":"Spawns a child PowerShell process using character array obfuscation. Both the PowerShell binary name and executed command are constructed from ASCII values at runtime to evade string-based detection.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1027.001","name":"Obfuscated Files or Information: Binary Padding","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1027.001-1","name":"Pad Binary to Change Hash - Linux/macOS dd","description":"Uses dd to add a zero byte, high-quality random data, and low-quality random data to the binary to change the hash. Upon successful execution, dd will modify `/tmp/evil-binary`, therefore the expected hash will change.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1027.001-2","name":"Pad Binary to Change Hash using truncate command - Linux/macOS","description":"Uses truncate to add a byte to the binary to change the hash. Upon successful execution, truncate will modify `/tmp/evil-binary`, therefore the expected hash will change.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1027.002","name":"Obfuscated Files or Information: Software Packing","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1027.002-1","name":"Binary simply packed by UPX (linux)","description":"Copies and then runs a simple binary (just outputting \"the cake is a lie\"), that was packed by UPX. No other protection/compression were applied.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1027.002-2","name":"Binary packed by UPX, with modified headers (linux)","description":"Copies and then runs a simple binary (just outputting \"the cake is a lie\"), that was packed by UPX. The UPX magic number (`0x55505821`, \"`UPX!`\") was changed to (`0x4c4f5452`, \"`LOTR`\"). This prevents the binary from being detected by some methods, and especially UPX is not able to uncompress it any more.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1027.002-3","name":"Binary simply packed by UPX","description":"Copies and then runs a simple binary (just outputting \"the cake is a lie\"), that was packed by UPX. No other protection/compression were applied.","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1027.002-4","name":"Binary packed by UPX, with modified headers","description":"Copies and then runs a simple binary (just outputting \"the cake is a lie\"), that was packed by UPX. The UPX magic number (`0x55505821`, \"`UPX!`\") was changed to (`0x4c4f5452`, \"`LOTR`\"). This prevents the binary from being detected by some methods, and especially UPX is not able to uncompress it any more.","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1027.004","name":"Obfuscated Files or Information: Compile After Delivery","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1027.004-1","name":"Compile After Delivery using csc.exe","description":"Compile C# code using csc.exe binary used by .NET Upon execution an exe named T1027.004.exe will be placed in the temp folder","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1027.004-2","name":"Dynamic C# Compile","description":"When C# is compiled dynamically, a .cmdline file will be created as a part of the process. Certain processes are not typically observed compiling C# code, but can do so without touching disk. This can be used to unpack a payload for execution. The exe file that will be executed is named as T1027.004_DynamicCompile.exe is contained in the 'bin' folder of this atomic, and the source code to the file is in the 'src' folder. Upon execution, the exe will print 'T1027.004 Dynamic Compile'.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1027.004-3","name":"C compile","description":"Compile a c file with either gcc or clang on FreeBSD, Linux or Macos.","supportedPlatforms":["linux","macos"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1027.004-4","name":"CC compile","description":"Compile a c file with either gcc or clang on FreeBSD, Linux or Macos.","supportedPlatforms":["linux","macos"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1027.004-5","name":"Go compile","description":"Compile a go file with golang on FreeBSD, Linux or Macos.","supportedPlatforms":["linux","macos"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1027.006","name":"HTML Smuggling","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1027.006-1","name":"HTML Smuggling Remote Payload","description":"The HTML file will download an ISO file from [T1553.005](https://github.com/redcanaryco/atomic-red-team/blob/d0dad62dbcae9c60c519368e82c196a3db577055/atomics/T1553.005/bin/FeelTheBurn.iso) without user interaction. The HTML file is based off of the work from [Stan Hegt](https://outflank.nl/blog/2018/08/14/html-smuggling-explained/)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1027.007","name":"Obfuscated Files or Information: Dynamic API Resolution","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1027.007-1","name":"Dynamic API Resolution-Ninja-syscall","description":"This test calls NtCreateFile via API hashing and dynamic syscall resolution. I have dubbed this particular combination of techniques 'Ninja-syscall'. When successful, a new file named 'hello.log' will be created in the default user's temporary folder, which is a common location for a dropper.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1027.013","name":"Obfuscated Files or Information: Encrypted/Encoded File","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1027.013-1","name":"Decode Eicar File and Write to File","description":"Decode the eicar value, and write it to file, for AV/EDR to try to catch.","supportedPlatforms":["windows","macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1027.013-2","name":"Decrypt Eicar File and Write to File","description":"Decrypt the eicar value, and write it to file, for AV/EDR to try to catch.","supportedPlatforms":["windows","macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1027.013-3","name":"Password-Protected ZIP Payload Extraction and Execution","description":"Extracts and executes a script from a password-protected ZIP archive. This technique is commonly used by malware families like Emotet and QBot to deliver payloads via email attachments where the password is provided in the message body. The encrypted ZIP evades static file analysis until extracted at runtime. Upon successful execution, displays confirmation and system information.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1030","name":"Data Transfer Size Limits","tactic":"TA0010","tactics":["TA0010"],"atomicTests":[{"id":"T1030-1","name":"Data Transfer Size Limits","description":"Take a file/directory, split it into 5Mb chunks","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1030-2","name":"Network-Based Data Transfer in Small Chunks","description":"Simulate transferring data over a network in small chunks to evade detection.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1033","name":"System Owner/User Discovery","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1033-1","name":"System Owner/User Discovery","description":"Identify System owner or users on an endpoint. Upon successful execution, cmd.exe will spawn multiple commands against a target host to identify usernames. Output will be via stdout. Additionally, two files will be written to disk - computers.txt and usernames.txt.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1033-2","name":"System Owner/User Discovery","description":"Identify System owner or users on an endpoint Upon successful execution, sh will stdout list of usernames.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1033-3","name":"Find computers where user has session - Stealth mode (PowerView)","description":"Find existing user session on other computers. Upon execution, information about any sessions discovered will be displayed.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1033-4","name":"User Discovery With Env Vars PowerShell Script","description":"Use the PowerShell environment variables to identify the current logged user.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1033-5","name":"GetCurrent User with PowerShell Script","description":"Use the PowerShell \"GetCurrent\" method of the WindowsIdentity .NET class to identify the logged user.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1033-6","name":"System Discovery - SocGholish whoami","description":"SocGholish performs whoami discovery commands and outputs the results to a tmp file. The test will generate a filename similar to the random one generated during execution and write the file to AppData\\Temp. Reference: https://redcanary.com/threat-detection-report/threats/socgholish/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1033-7","name":"System Owner/User Discovery Using Command Prompt","description":"Identify the system owner or current user using native Windows command prompt utilities.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1036","name":"Masquerading","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1036-1","name":"System File Copied to Unusual Location","description":"It may be suspicious seeing a file copy of an EXE in System32 or SysWOW64 to a non-system directory or executing from a non-system directory.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1036-2","name":"Malware Masquerading and Execution from Zip File","description":"When the file is unzipped and the README.cmd file opened, it executes and changes the .pdf to .dll and executes the dll. This is a BazaLoader technique [as reported here](https://twitter.com/ffforward/status/1481672378639912960)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1036.003","name":"Masquerading: Rename System Utilities","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1036.003-1","name":"Masquerading as Windows LSASS process","description":"Copies cmd.exe, renames it, and launches it to masquerade as an instance of lsass.exe. Upon execution, cmd will be launched by powershell. If using Invoke-AtomicTest, The test will hang until the 120 second timeout cancels the session","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1036.003-2","name":"Masquerading as FreeBSD or Linux crond process.","description":"Copies sh process, renames it as crond, and executes it to masquerade as the cron daemon. Upon successful execution, sh is renamed to `crond` and executed.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1036.003-3","name":"Masquerading - cscript.exe running as notepad.exe","description":"Copies cscript.exe, renames it, and launches it to masquerade as an instance of notepad.exe. Upon successful execution, cscript.exe is renamed as notepad.exe and executed from non-standard path.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1036.003-4","name":"Masquerading - wscript.exe running as svchost.exe","description":"Copies wscript.exe, renames it, and launches it to masquerade as an instance of svchost.exe. Upon execution, no windows will remain open but wscript will have been renamed to svchost and ran out of the temp folder","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1036.003-5","name":"Masquerading - powershell.exe running as taskhostw.exe","description":"Copies powershell.exe, renames it, and launches it to masquerade as an instance of taskhostw.exe. Upon successful execution, powershell.exe is renamed as taskhostw.exe and executed from non-standard path.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1036.003-6","name":"Masquerading - non-windows exe running as windows exe","description":"Copies an exe, renames it as a windows exe, and launches it to masquerade as a real windows exe Upon successful execution, powershell will execute T1036.003.exe as svchost.exe from on a non-standard path.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1036.003-7","name":"Masquerading - windows exe running as different windows exe","description":"Copies a windows exe, renames it as another windows exe, and launches it to masquerade as second windows exe","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1036.003-8","name":"Malicious process Masquerading as LSM.exe","description":"Detect LSM running from an incorrect directory and an incorrect service account This works by copying cmd.exe to a file, naming it lsm.exe, then copying a file to the C:\\ folder. Upon successful execution, cmd.exe will be renamed as lsm.exe and executed from non-standard path.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1036.004","name":"Masquerading: Masquerade Task or Service","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1036.004-1","name":"Creating W32Time similar named service using schtasks","description":"Creating W32Time similar named service (win32times) using schtasks just like threat actor dubbed \"Operation Wocao\"","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1036.004-2","name":"Creating W32Time similar named service using sc","description":"Creating W32Time similar named service (win32times) using sc just like threat actor dubbed \"Operation Wocao\"","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1036.004-3","name":"linux rename /proc/pid/comm using prctl","description":"Runs a C program that calls prctl(PR_SET_NAME) to modify /proc/pid/comm value to \"totally_legit\".  This will show up as process name in simple 'ps' listings.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1036.004-4","name":"Hiding a malicious process with bind mounts","description":"Creates a malicious process and hides it by bind mounting to the /proc filesystem of a benign process","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1036.005","name":"Masquerading: Match Legitimate Name or Location","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1036.005-1","name":"Execute a process from a directory masquerading as the current parent directory","description":"Create and execute a process from a directory masquerading as the current parent directory (`...` instead of normal `..`)","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1036.005-2","name":"Masquerade as a built-in system executable","description":"Launch an executable that attempts to masquerade as a legitimate executable.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1036.005-3","name":"Masquerading cmd.exe as VEDetector.exe","description":"This test simulates an adversary renaming cmd.exe to VEDetector.exe to masquerade as a legitimate application. The test copies cmd.exe, renames it to VEDetector.exe, adds a registry run key for persistence, and executes the renamed binary. This technique may be used to evade detection by mimicking legitimate software names or locations. **Expected Output:** - A new process named VEDetector.exe appears in the process list, but its behavior matches cmd.exe. - SIEM/EDR systems may detect this as suspicious process activity (e.g., Sysmon Event ID 1 for process creation, or Event ID 13 for registry modifications). - Registry modification in HKLM:\\Software\\Microsoft\\Windows\\CurrentVersion\\Run may trigger persistence alerts in XDR platforms. **References:** - [MITRE ATT&CK T1036.005](https://attack.mitre.org/techniques/T1036/005/) - [Sysmon Process Creation](https://docs.microsoft.com/en-us/sysinternals/downloads/sysmon)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1036.006","name":"Masquerading: Space after Filename","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1036.006-1","name":"Space After Filename (Manual)","description":"Space After Filename","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1036.006-2","name":"Space After Filename","description":"Space after filename.","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1036.007","name":"Masquerading: Double File Extension","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1036.007-1","name":"File Extension Masquerading","description":"download and execute a file masquerading as images or Office files. Upon execution 3 calc instances and 3 vbs windows will be launched. e.g SOME_LEGIT_NAME.[doc,docx,xls,xlsx,pdf,rtf,png,jpg,etc.].[exe,vbs,js,ps1,etc] (Quartelyreport.docx.exe)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1037.001","name":"Boot or Logon Initialization Scripts: Logon Script (Windows)","tactic":"TA0003","tactics":["TA0003","TA0004"],"atomicTests":[{"id":"T1037.001-1","name":"Logon Scripts","description":"Adds a registry value to run batch script created in the %temp% directory. Upon execution, there will be a new environment variable in the HKCU\\Environment key that can be viewed in the Registry Editor.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1037.002","name":"Boot or Logon Initialization Scripts: Logon Script (Mac)","tactic":"TA0003","tactics":["TA0003","TA0004"],"atomicTests":[{"id":"T1037.002-1","name":"Logon Scripts - Mac","description":"Mac logon script","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1037.004","name":"Boot or Logon Initialization Scripts: Rc.common","tactic":"TA0003","tactics":["TA0003","TA0004"],"atomicTests":[{"id":"T1037.004-1","name":"rc.common","description":"Modify rc.common [Reference](https://developer.apple.com/library/content/documentation/MacOSX/Conceptual/BPSystemStartup/Chapters/StartupItems.html)","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1037.004-2","name":"rc.common","description":"Modify rc.common","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1037.004-3","name":"rc.local","description":"Modify rc.local","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1037.005","name":"Boot or Logon Initialization Scripts: Startup Items","tactic":"TA0003","tactics":["TA0003","TA0004"],"atomicTests":[{"id":"T1037.005-1","name":"Add file to Local Library StartupItems","description":"Modify or create an file in /Library/StartupItems [Reference](https://www.alienvault.com/blogs/labs-research/diversity-in-recent-mac-malware)","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1037.005-2","name":"Add launch script to launch daemon","description":"Add launch script to /Library/StartupItems to launch agent [Example](https://cybersecurity.att.com/blogs/labs-research/diversity-in-recent-mac-malware)","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1037.005-3","name":"Add launch script to launch agent","description":"Add launch script to /Library/StartupItems to launch agent [Example](https://cybersecurity.att.com/blogs/labs-research/diversity-in-recent-mac-malware)","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1039","name":"Data from Network Shared Drive","tactic":"TA0009","tactics":["TA0009"],"atomicTests":[{"id":"T1039-1","name":"Copy a sensitive File over Administrative share with copy","description":"Copy from sensitive File from the c$ of another LAN computer with copy cmd https://twitter.com/SBousseaden/status/1211636381086339073","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1039-2","name":"Copy a sensitive File over Administrative share with Powershell","description":"Copy from sensitive File from the c$ of another LAN computer with powershell https://twitter.com/SBousseaden/status/1211636381086339073","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1040","name":"Network Sniffing","tactic":"TA0006","tactics":["TA0006","TA0007"],"atomicTests":[{"id":"T1040-1","name":"Packet Capture Linux using tshark or tcpdump","description":"Perform a PCAP. Wireshark will be required for tshark. TCPdump may already be installed. Upon successful execution, tshark or tcpdump will execute and capture 5 packets on interface ens33.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1040-2","name":"Packet Capture FreeBSD using tshark or tcpdump","description":"Perform a PCAP. Wireshark will be required for tshark. TCPdump may already be installed. Upon successful execution, tshark or tcpdump will execute and capture 5 packets on interface ens33.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1040-3","name":"Packet Capture macOS using tcpdump or tshark","description":"Perform a PCAP on macOS. This will require Wireshark/tshark to be installed. TCPdump may already be installed. Upon successful execution, tshark or tcpdump will execute and capture 5 packets on interface en0A.","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1040-4","name":"Packet Capture Windows Command Prompt","description":"Perform a packet capture using the windows command prompt. This will require a host that has Wireshark/Tshark installed. Upon successful execution, tshark will execute and capture 5 packets on interface \"Ethernet\".","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1040-5","name":"Windows Internal Packet Capture","description":"Uses the built-in Windows packet capture After execution you should find a file named trace.etl and trace.cab in the temp directory","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1040-6","name":"Windows Internal pktmon capture","description":"Will start a packet capture and store log file as t1040.etl. https://lolbas-project.github.io/lolbas/Binaries/Pktmon/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1040-7","name":"Windows Internal pktmon set filter","description":"Select Desired ports for packet capture https://lolbas-project.github.io/lolbas/Binaries/Pktmon/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1040-8","name":"Packet Capture macOS using /dev/bpfN with sudo","description":"Opens a /dev/bpf file (O_RDONLY) and captures packets for a few seconds.","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1040-9","name":"Filtered Packet Capture macOS using /dev/bpfN with sudo","description":"Opens a /dev/bpf file (O_RDONLY), sets BPF filter for 'udp' and captures packets for a few seconds.","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1040-10","name":"Packet Capture FreeBSD using /dev/bpfN with sudo","description":"Opens a /dev/bpf file (O_RDONLY) and captures packets for a few seconds.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1040-11","name":"Filtered Packet Capture FreeBSD using /dev/bpfN with sudo","description":"Opens a /dev/bpf file (O_RDONLY), sets BPF filter for 'udp' and captures packets for a few seconds.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1040-12","name":"Packet Capture Linux socket AF_PACKET,SOCK_RAW with sudo","description":"Captures packets with domain=AF_PACKET, type=SOCK_RAW for a few seconds.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1040-13","name":"Packet Capture Linux socket AF_INET,SOCK_RAW,TCP with sudo","description":"Captures packets with domain=AF_INET,type=SOCK_RAW,protocol=TCP for a few seconds.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1040-14","name":"Packet Capture Linux socket AF_INET,SOCK_PACKET,UDP with sudo","description":"Captures packets with domain=AF_INET,type=SOCK_PACKET,protocol=UDP for a few seconds. SOCK_PACKET is \"obsolete\" according to the man page, but still works on Ubuntu 20.04","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1040-15","name":"Packet Capture Linux socket AF_PACKET,SOCK_RAW with BPF filter for UDP with sudo","description":"Captures packets with domain=AF_PACKET,type=SOCK_RAW for a few seconds. Sets a BPF filter on the socket to filter for UDP traffic.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1040-16","name":"PowerShell Network Sniffing","description":"PowerShell Built-in Cmdlets to capture network traffic. https://learn.microsoft.com/en-us/powershell/module/neteventpacketcapture/new-neteventsession?view=windowsserver2022-ps","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1041","name":"Exfiltration Over C2 Channel","tactic":"TA0010","tactics":["TA0010"],"atomicTests":[{"id":"T1041-1","name":"C2 Data Exfiltration","description":"Exfiltrates a file present on the victim machine to the C2 server.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1041-2","name":"Text Based Data Exfiltration using DNS subdomains","description":"Simulates an adversary using DNS tunneling to exfiltrate data over a Command and Control (C2) channel.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1046","name":"Network Service Discovery","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1046-1","name":"Port Scan","description":"Scan ports to check for listening ports. Upon successful execution, sh will perform a network connection against a single host (192.168.1.1) and determine what ports are open in the range of 1-65535. Results will be via stdout.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1046-2","name":"Port Scan Nmap","description":"Scan ports to check for listening ports with Nmap. Upon successful execution, sh will utilize nmap, telnet, and nc to contact a single or range of addresses on port 80 to determine if listening. Results will be via stdout.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1046-3","name":"Port Scan NMap for Windows","description":"Scan ports to check for listening ports for the local host 127.0.0.1","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1046-4","name":"Port Scan using python","description":"Scan ports to check for listening ports with python","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1046-5","name":"WinPwn - spoolvulnscan","description":"Start MS-RPRN RPC Service Scan using spoolvulnscan function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1046-6","name":"WinPwn - MS17-10","description":"Search for MS17-10 vulnerable Windows Servers in the domain using powerSQL function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1046-7","name":"WinPwn - bluekeep","description":"Search for bluekeep vulnerable Windows Systems in the domain using bluekeep function of WinPwn. Can take many minutes to complete (~600 seconds in testing on a small domain).","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1046-8","name":"WinPwn - fruit","description":"Search for potentially vulnerable web apps (low hanging fruits) using fruit function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1046-9","name":"Network Service Discovery for Containers","description":"Attackers may try to obtain a list of services that are operating on remote hosts and local network infrastructure devices, in order to identify potential vulnerabilities that can be exploited through remote software attacks. They typically use tools to conduct port and vulnerability scans in order to obtain this information.","supportedPlatforms":["containers"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1046-10","name":"Port-Scanning /24 Subnet with PowerShell","description":"Scanning common ports in a /24 subnet. If no IP address for the target subnet is specified the test tries to determine the attacking machine's \"primary\" IPv4 address first and then scans that address with a /24 netmask. The connection attempts to use a timeout parameter in milliseconds to speed up the scan. Please note the atomic might not print any output until the scans are completed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1046-11","name":"Remote Desktop Services Discovery via PowerShell","description":"Availability of remote desktop services can be checked using get- cmdlet of PowerShell","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1046-12","name":"Port Scan using nmap (Port range)","description":"Scan multiple ports to check for listening ports with nmap","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1047","name":"Windows Management Instrumentation","tactic":"TA0002","tactics":["TA0002"],"atomicTests":[{"id":"T1047-1","name":"WMI Reconnaissance Users","description":"An adversary might use WMI to list all local User Accounts. When the test completes , there should be local user accounts information displayed on the command line.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1047-2","name":"WMI Reconnaissance Processes","description":"An adversary might use WMI to list Processes running on the compromised host. When the test completes , there should be running processes listed on the command line.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1047-3","name":"WMI Reconnaissance Software","description":"An adversary might use WMI to list installed Software hotfix and patches. When the test completes, there should be a list of installed patches and when they were installed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1047-4","name":"WMI Reconnaissance List Remote Services","description":"An adversary might use WMI to check if a certain Remote Service is running on a remote device. When the test completes, a service information will be displayed on the screen if it exists. A common feedback message is that \"No instance(s) Available\" if the service queried is not running. A common error message is \"Node - (provided IP or default)  ERROR Description =The RPC server is unavailable\" if the provided remote host is unreachable","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1047-5","name":"WMI Execute Local Process","description":"This test uses wmic.exe to execute a process on the local host. When the test completes , a new process will be started locally .A notepad application will be started when input is left on default.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1047-6","name":"WMI Execute Remote Process","description":"This test uses wmic.exe to execute a process on a remote host. Specify a valid value for remote IP using the node parameter. To clean up, provide the same node input as the one provided to run the test A common error message is \"Node - (provided IP or default)  ERROR Description =The RPC server is unavailable\" if the default or provided IP is unreachable","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1047-7","name":"Create a Process using WMI Query and an Encoded Command","description":"Solarigate persistence is achieved via backdoors deployed via various techniques including using PowerShell with an EncodedCommand Powershell -nop -exec bypass -EncodedCommand <encoded command> Where the \u2013EncodedCommand, once decoded, would resemble: Invoke-WMIMethod win32_process -name create -argumentlist \u2018rundll32 c:\\windows\\idmu\\common\\ypprop.dll _XInitImageFuncPtrs\u2019 -ComputerName WORKSTATION The EncodedCommand in this atomic is the following: Invoke-WmiMethod -Path win32_process -Name create -ArgumentList notepad.exe You should expect to see notepad.exe running after execution of this test. [Solarigate Analysis from Microsoft](https://www.microsoft.com/security/blog/2020/12/18/analyzing-solorigate-the-compromised-dll-file-that-started-a-sophisticated-cyberattack-and-how-microsoft-defender-helps-protect/)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1047-8","name":"Create a Process using obfuscated Win32_Process","description":"This test tries to mask process creation by creating a new class that inherits from Win32_Process. Indirect call of suspicious method such as Win32_Process::Create can break detection logic. [Cybereason blog post No Win32_ProcessNeeded](https://www.cybereason.com/blog/wmi-lateral-movement-win32)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1047-9","name":"WMI Execute rundll32","description":"This test uses wmic.exe to execute a DLL function using rundll32. Specify a valid value for remote IP using the node parameter.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1047-10","name":"Application uninstall using WMIC","description":"Emulates uninstalling  applications using WMIC.  This method only works if the product was installed with an msi file.  APTs have been seen using this to uninstall security products.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1048","name":"Exfiltration Over Alternative Protocol","tactic":"TA0010","tactics":["TA0010"],"atomicTests":[{"id":"T1048-1","name":"Exfiltration Over Alternative Protocol - SSH","description":"Input a domain and test Exfiltration over SSH Remote to Local Upon successful execution, sh will spawn ssh contacting a remote domain (default: target.example.com) writing a tar.gz file.","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1048-2","name":"Exfiltration Over Alternative Protocol - SSH","description":"Input a domain and test Exfiltration over SSH Local to Remote Upon successful execution, tar will compress /Users/* directory and password protect the file modification of `Users.tar.gz.enc` as output.","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1048-3","name":"DNSExfiltration (doh)","description":"DNSExfiltrator enables the transfer (exfiltration) of a file over a DNS request covert channel. This is basically a data leak testing tool allowing to exfiltrate data over a covert channel. !!! Test will fail without a domain under your control with A record and NS record !!! See this github page for more details - https://github.com/Arno0x/DNSExfiltrator","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1048-4","name":"Exfiltrate Data using DNS Queries via dig","description":"This test demonstrates how an attacker can exfiltrate sensitive information by encoding it as a subdomain (using base64 encoding) and making DNS queries via the dig command to a controlled DNS server.","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1048.002","name":"Exfiltration Over Alternative Protocol - Exfiltration Over Asymmetric Encrypted Non-C2 Protocol","tactic":"TA0010","tactics":["TA0010"],"atomicTests":[{"id":"T1048.002-1","name":"Exfiltrate data HTTPS using curl windows","description":"Exfiltrate data HTTPS using curl to file share site file.io","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true},{"id":"T1048.002-2","name":"Exfiltrate data HTTPS using curl freebsd,linux or macos","description":"Exfiltrate data HTTPS using curl to file share site file.io","supportedPlatforms":["macos","linux"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1048.002-3","name":"Exfiltrate data in a file over HTTPS using wget","description":"Exfiltrate data over HTTPS using wget --post-file method","supportedPlatforms":["linux"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1048.002-4","name":"Exfiltrate data as text over HTTPS using wget","description":"Exfiltrate data over HTTPS using wget --post-data method","supportedPlatforms":["linux"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1049","name":"System Network Connections Discovery","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1049-1","name":"System Network Connections Discovery","description":"Get a listing of network connections. Upon successful execution, cmd.exe will execute `netstat`, `net use` and `net sessions`. `net sessions` requires elevated privileges; on standard user accounts this command may not return results. Results will output via stdout.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1049-2","name":"System Network Connections Discovery with PowerShell","description":"Get a listing of network connections. Upon successful execution, powershell.exe will execute `get-NetTCPConnection`. Results will output via stdout.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1049-3","name":"System Network Connections Discovery via PowerShell (Process Mapping)","description":"Enumerate TCP connections and map to owning process names via PowerShell.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1049-4","name":"System Network Connections Discovery via ss or lsof (Linux/MacOS)","description":"List active TCP/UDP network connections using ss, with lsof as a fallback when ss is unavailable. Serves as an alternative to the netstat-based test.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1049-5","name":"System Network Connections Discovery FreeBSD, Linux & MacOS","description":"Get a listing of network connections. Upon successful execution, sh will execute `netstat` and `who -a`. Results will output via stdout.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1049-6","name":"System Network Connections Discovery via sockstat (Linux, FreeBSD)","description":"Enumerate IPv4/IPv6 network endpoints on FreeBSD using sockstat.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1049-7","name":"System Discovery using SharpView","description":"Get a listing of network connections, domains, domain users, and etc. sharpview.exe located in the bin folder, an opensource red-team tool. Upon successful execution, cmd.exe will execute sharpview.exe <method>. Results will output via stdout.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1053.002","name":"Scheduled Task/Job: At","tactic":"TA0002","tactics":["TA0002","TA0003","TA0004"],"atomicTests":[{"id":"T1053.002-1","name":"At.exe Scheduled task","description":"Executes cmd.exe Note: deprecated in Windows 8+ Upon successful execution, cmd.exe will spawn at.exe and create a scheduled task that will spawn cmd at a specific time.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1053.002-2","name":"At - Schedule a job","description":"This test submits a command to be run in the future by the `at` daemon.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1053.002-3","name":"At - Schedule a job via kubectl in a Pod","description":"Launches a short-lived Ubuntu pod, installs the `at` utility, starts the `atd` daemon, and submits a job with `at`. The pod is deleted after execution.","supportedPlatforms":["containers"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1053.003","name":"Scheduled Task/Job: Cron","tactic":"TA0002","tactics":["TA0002","TA0003","TA0004"],"atomicTests":[{"id":"T1053.003-1","name":"Cron - Replace crontab with referenced file","description":"This test replaces the current user's crontab file with the contents of the referenced file. This technique was used by numerous IoT automated exploitation attacks.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1053.003-2","name":"Cron - Add script to all cron subfolders","description":"This test adds a script to /etc/cron.hourly, /etc/cron.daily, /etc/cron.monthly and /etc/cron.weekly folders configured to execute on a schedule. This technique was used by the threat actor Rocke during the exploitation of Linux web servers.","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1053.003-3","name":"Cron - Add script to /etc/cron.d folder","description":"This test adds a script to /etc/cron.d folder configured to execute on a schedule.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1053.003-4","name":"Cron - Add script to /var/spool/cron/crontabs/ folder","description":"This test adds a script to a /var/spool/cron/crontabs folder configured to execute on a schedule. This technique was used by the threat actor Rocke during the exploitation of Linux web servers.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1053.006","name":"Scheduled Task/Job: Systemd Timers","tactic":"TA0002","tactics":["TA0002","TA0003","TA0004"],"atomicTests":[{"id":"T1053.006-1","name":"Create Systemd Service and Timer","description":"This test creates Systemd service and timer then starts and enables the Systemd timer","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1053.006-2","name":"Create a user level transient systemd service and timer","description":"Schedule a user level transient task (will not survive a reboot) without having to create the .timer or .service files by using the systemd-run command.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1053.006-3","name":"Create a system level transient systemd service and timer","description":"Schedule a system level transient task (will not survive a reboot) without having to create the .timer or .service files by using the systemd-run command.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1053.007","name":"Kubernetes Cronjob","tactic":"TA0002","tactics":["TA0002","TA0003","TA0004"],"atomicTests":[{"id":"T1053.007-1","name":"ListCronjobs","description":"Kubernetes Job is a controller that creates one or more pods and ensures that a specified number of them successfully terminate. Kubernetes Job can be used to run containers that perform finite tasks for batch jobs. Kubernetes CronJob is used to schedule Jobs. Attackers may use Kubernetes CronJob for scheduling execution of malicious code that would run as a container in the cluster.","supportedPlatforms":["containers"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1053.007-2","name":"CreateCronjob","description":"Kubernetes Job is a controller that creates one or more pods and ensures that a specified number of them successfully terminate. Kubernetes Job can be used to run containers that perform finite tasks for batch jobs. Kubernetes CronJob is used to schedule Jobs. Attackers may use Kubernetes CronJob for scheduling execution of malicious code that would run as a container in the cluster.","supportedPlatforms":["containers"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1055","name":"Process Injection","tactic":"TA0004","tactics":["TA0004"],"atomicTests":[{"id":"T1055-1","name":"Shellcode execution via VBA","description":"This module injects shellcode into a newly created process and executes. By default the shellcode is created, with Metasploit, for use on x86-64 Windows 10 machines. Note: Due to the way the VBA code handles memory/pointers/injection, a 64bit installation of Microsoft Office is required.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true},{"id":"T1055-2","name":"Remote Process Injection in LSASS via mimikatz","description":"Use mimikatz to remotely (via psexec) dump LSASS process content for RID 500 via code injection (new thread). Especially useful against domain controllers in Active Directory environments. It must be executed in the context of a user who is privileged on remote `machine`. The effect of `/inject` is explained in <https://blog.3or.de/mimikatz-deep-dive-on-lsadumplsa-patch-and-inject.html>","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1055-3","name":"Section View Injection","description":"This test creates a section object in the local process followed by a local section view. The shellcode is copied into the local section view and a remote section view is created in the target process, pointing to the local section view. A thread is then created in the target process, using the remote section view as start address.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1055-4","name":"Dirty Vanity process Injection","description":"This test used the Windows undocumented remote-fork API RtlCreateProcessReflection to create a cloned process of the parent process with shellcode written in its memory. The shellcode is executed after being forked to the child process. The technique was first presented at BlackHat Europe 2022. Shellcode will open a messsage box and a notepad.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1055-5","name":"Read-Write-Execute process Injection","description":"This test exploited the vulnerability in legitimate PE formats where sections have RWX permission and enough space for shellcode. The RWX injection avoided the use of VirtualAlloc, WriteVirtualMemory, and ProtectVirtualMemory, thus evading detection mechanisms that relied on API call sequences and heuristics. The RWX injection utilises API call sequences: LoadLibrary --> GetModuleInformation --> GetModuleHandleA --> RtlCopyMemory --> CreateThread. The injected shellcode will open a message box and a notepad. RWX Process Injection, also known as MockingJay, was introduced to the security community by SecurityJoes. More details can be found at https://www.securityjoes.com/post/process-mockingjay-echoing-rwx-in-userland-to-achieve-code-execution. The original injector and idea were developed for game cheats, as visible at https://github.com/M-r-J-o-h-n/SWH-Injector.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1055-6","name":"Process Injection with Go using UuidFromStringA WinAPI","description":"Uses WinAPI UuidFromStringA to load shellcode to a memory address then executes the shellcode using EnumSystemLocalesA. With this technique, memory is allocated on the heap and does not use commonly suspicious APIs such as VirtualAlloc, WriteProcessMemory, or CreateThread - PoC Credit: (https://github.com/Ne0nd0g/go-shellcode/tree/master#uuidfromstringa) - References: - https://research.nccgroup.com/2021/01/23/rift-analys
