ineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1528-2","name":"Azure - Functions code upload - Functions code injection via File Share modification to retrieve the Functions identity access token","description":"This test injects code into an Azure Function (RCE) to perform Subscription Privilege Escalation by retrieving the identity access token of an Azure functions instance. Attack idea/reference: https://orca.security/resources/blog/azure-shared-key-authorization-exploitation/ Once executed, the \"https://changeme\" will retrieve the access token when the function app is executed on behalf of the tenant. The function may be triggered manually from authorized people, triggered in regular intervals, or in various other ways. The access token can then be used to perform further attack steps with the permissions that the function app holds (e.g. listening virtual machines). Note: - The Azure Function modified in this test must be hosted via Azure Files in a File Share (Info on storage considerations for Azure Function: https://learn.microsoft.com/en-us/azure/azure-functions/storage-considerations). - For Function code upload to Azure Functions that are hosted via Azure Blob storage, refer to T1528 \"Azure - Functions code upload - Functions code injection via Blob upload\". - The required input fields can be retrieved in a reconnaissance step in test T1619 \"Azure - Enumerate Storage Account Objects via Key-based authentication using Azure CLI\". The code of function apps may be inspected and prepared from the result of test T1530 \"Azure - Dump Azure Storage Account Objects via Azure CLI\". - Important: Change the https://changeme.net in code_to_insert_path to a self-controlled endpoint. This endpoint can be hosted e.g. as request bin via Pipedream to display the body of incoming POST requests. - The default injected code to retrieve the access token can be replaced by arbitrary other code. In this case: Replace the code defined in code_to_insert_path Requirements: - The test is intended to be executed in interactive mode (with -Interactive parameter) in order to complete the az login command when MFA is required. - The EntraID user must have the role \"Storage Account Contributor\", or a role with similar permissions. Execution options: Defined by the input field execution_option - insert_code: This option (1) downloads the existing funciton code into a tmp file, (2) injects the code from code_to_insert_path at the beginning of the file, and (3) uploads the tampered file to the targeted Azure Function code (Azure File Share File). - replace_file: This option uploads the function code defined in code_to_insert_path to the targeted Azure Function code (Azure File Share File).","supportedPlatforms":["iaas:azure"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1529","name":"System Shutdown/Reboot","tactic":"TA0040","tactics":["TA0040"],"atomicTests":[{"id":"T1529-1","name":"Shutdown System - Windows","description":"This test shuts down a Windows system.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1529-2","name":"Restart System - Windows","description":"This test restarts a Windows system.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1529-3","name":"Restart System via `shutdown` - FreeBSD/macOS/Linux","description":"This test restarts a FreeBSD/macOS/Linux system.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1529-4","name":"Shutdown System via `shutdown` - FreeBSD/macOS/Linux","description":"This test shuts down a FreeBSD/macOS/Linux system using a halt.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1529-5","name":"Restart System via `reboot` - FreeBSD/macOS/Linux","description":"This test restarts a FreeBSD/macOS/Linux system via `reboot`.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1529-6","name":"Shutdown System via `halt` - FreeBSD/Linux","description":"This test shuts down a FreeBSD/Linux system using `halt`.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1529-7","name":"Reboot System via `halt` - FreeBSD","description":"This test restarts a FreeBSD system using `halt`.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1529-8","name":"Reboot System via `halt` - Linux","description":"This test restarts a Linux system using `halt`.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1529-9","name":"Shutdown System via `poweroff` - FreeBSD/Linux","description":"This test shuts down a FreeBSD/Linux system using `poweroff`.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1529-10","name":"Reboot System via `poweroff` - FreeBSD","description":"This test restarts a FreeBSD system using `poweroff`.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1529-11","name":"Reboot System via `poweroff` - Linux","description":"This test restarts a Linux system using `poweroff`.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1529-12","name":"Logoff System - Windows","description":"This test performs a Windows system logoff as seen in [dcrat backdoor capabilities](https://www.mandiant.com/resources/analyzing-dark-crystal-rat-backdoor)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1529-13","name":"ESXi - Terminates VMs using pkill","description":"In VMWARE ESXi, process names starting with vmx are associated with running VMs. An adversary can use the pkill command to kill all processes with a prefix vmx. [Reference](https://www.crowdstrike.com/blog/hypervisor-jackpotting-ecrime-actors-increase-targeting-of-esxi-servers/)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1529-14","name":"ESXi - Avoslocker enumerates VMs and forcefully kills VMs","description":"Avoslocker malware has inbuilt functionality to enumerate the VM instances and uses the esxcli command to forcefully power off them. [Reference](https://blogs.vmware.com/security/2022/02/avoslocker-modern-linux-ransomware-threats.html)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1529-15","name":"ESXi - vim-cmd Used to Power Off VMs","description":"Adversaries may power off VMs to facilitate the deployment of ransomware payloads. [Reference](https://lolesxi-project.github.io/LOLESXi/lolesxi/Binaries/vim-cmd/#power%20off%20vm)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1529-16","name":"Abuse of Linux Magic System Request Key for Reboot","description":"adversaries with root or sufficient privileges to silently manipulate or destabilize a system. By writing to /proc/sysrq-trigger, they can forced to reboot.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1530","name":"Data from Cloud Storage Object","tactic":"TA0009","tactics":["TA0009"],"atomicTests":[{"id":"T1530-1","name":"AWS - Scan for Anonymous Access to S3","description":"Upon successful execution, this test will test for anonymous access to AWS S3 buckets and dumps all the files to a local folder.","supportedPlatforms":["iaas:aws"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1530-2","name":"Azure - Dump Azure Storage Account Objects via Azure CLI","description":"This test dumps the content of the storage account objects present in the file defined in file_shares_csv_file_path. Note that this file is created in the atomic test T1619 \"Azure - Enumerate Storage Account Objects via Key-based authentication using Azure CLI\". When created manually, it must contain the columns \"ResourceGroup\",\"StorageAccountName\", \"FileShareName\", \"ContainerName\", \"BlobName\". Requirements: - The test is intended to be executed in interactive mode (with -Interactive parameter) in order to complete the az login command when MFA is required. - The EntraID user must have the role \"Storage Account Contributor\", or a role with similar permissions.","supportedPlatforms":["iaas:azure"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1531","name":"Account Access Removal","tactic":"TA0040","tactics":["TA0040"],"atomicTests":[{"id":"T1531-1","name":"Change User Password - Windows","description":"Changes the user password to hinder access attempts. Seen in use by LockerGoga. Upon execution, log into the user account \"AtomicAdministrator\" with the password \"HuHuHUHoHo283283\".","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1531-2","name":"Delete User - Windows","description":"Deletes a user account to prevent access. Upon execution, run the command \"net user\" to verify that the new \"AtomicUser\" account was deleted.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1531-3","name":"Remove Account From Domain Admin Group","description":"This test will remove an account from the domain admins group","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1531-4","name":"Change User Password via passwd","description":"This test changes the user password to hinder access to the account using passwd utility.","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1531-5","name":"Delete User via dscl utility","description":"This test deletes the user account using the dscl utility.","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1531-6","name":"Delete User via sysadminctl utility","description":"This test deletes the user account using the sysadminctl utility.","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1531-7","name":"Azure AD - Delete user via Azure AD PowerShell","description":"Deletes a user in Azure AD. Adversaries may interrupt availability of system and network resources by inhibiting access to accounts utilized by legitimate users. Accounts may be deleted, locked, or manipulated (excluding changed credentials) to remove access to accounts.","supportedPlatforms":["azure-ad"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1531-8","name":"Azure AD - Delete user via Azure CLI","description":"Deletes a user in Azure AD. Adversaries may interrupt availability of system and network resources by inhibiting access to accounts utilized by legitimate users. Accounts may be deleted, locked, or manipulated (excluding changed credentials) to remove access to accounts.","supportedPlatforms":["azure-ad"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1539","name":"Steal Web Session Cookie","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1539-1","name":"Steal Firefox Cookies (Windows)","description":"This test queries Firefox's cookies.sqlite database to steal the cookie data contained within it, similar to Zloader/Zbot's cookie theft function. Note: If Firefox is running, the process will be killed to ensure that the DB file isn't locked. See https://www.malwarebytes.com/resources/files/2020/05/the-silent-night-zloader-zbot_final.pdf.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1539-2","name":"Steal Chrome Cookies (Windows)","description":"This test queries Chrome's SQLite database to steal the encrypted cookie data, designed to function similarly to Zloader/Zbot's cookie theft function. Once an adversary obtains the encrypted cookie info, they could go on to decrypt the encrypted value, potentially allowing for session theft. Note: If Chrome is running, the process will be killed to ensure that the DB file isn't locked. See https://www.malwarebytes.com/resources/files/2020/05/the-silent-night-zloader-zbot_final.pdf.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1539-3","name":"Steal Chrome Cookies via Remote Debugging (Mac)","description":"The remote debugging functionality in Chrome can be used by malware for post-exploitation activities to obtain cookies without requiring keychain access. By initiating Chrome with a remote debug port, an attacker can sidestep encryption and employ Chrome's own mechanisms to access cookies. If successful, this test will output a list of cookies. Note: Chrome processes will be killed during this test. See https://posts.specterops.io/hands-in-the-cookie-jar-dumping-cookies-with-chromiums-remote-debugger-port-34c4f468844e","supportedPlatforms":["macos"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1539-4","name":"Steal Chrome v127+ cookies via Remote Debugging (Windows)","description":"Chrome v127+ uses app-bound encryption to protect cookies. This test bypasses that protection to obtain the cookies. If successful, the test outputs cookie values to the console. Note: Will stop any instances of Chrome already running Adapted from https://embracethered.com/blog/posts/2024/cookie-theft-in-2024-and-what-todo","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1539-5","name":"Copy Safari BinaryCookies files using AppleScript","description":"This command will copy Safari BinaryCookies files using AppleScript as seen in Atomic Stealer.","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1542.001","name":"Pre-OS Boot: System Firmware","tactic":"TA0003","tactics":["TA0003"],"atomicTests":[{"id":"T1542.001-1","name":"UEFI Persistence via Wpbbin.exe File Creation","description":"Creates Wpbbin.exe in %systemroot%. This technique can be used for UEFI-based pre-OS boot persistence mechanisms. - https://grzegorztworek.medium.com/using-uefi-to-inject-executable-files-into-bitlocker-protected-drives-8ff4ca59c94c - http://download.microsoft.com/download/8/a/2/8a2fb72d-9b96-4e2d-a559-4a27cf905a80/windows-platform-binary-table.docx - https://github.com/tandasat/WPBT-Builder","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1543.001","name":"Create or Modify System Process: Launch Agent","tactic":"TA0003","tactics":["TA0003","TA0004"],"atomicTests":[{"id":"T1543.001-1","name":"Launch Agent","description":"Create a plist and execute it","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1543.001-2","name":"Event Monitor Daemon Persistence","description":"This test adds persistence via a plist to execute via the macOS Event Monitor Daemon.","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1543.001-3","name":"Launch Agent - Root Directory","description":"Create a plist and execute it","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1543.002","name":"Create or Modify System Process: SysV/Systemd Service","tactic":"TA0003","tactics":["TA0003","TA0004"],"atomicTests":[{"id":"T1543.002-1","name":"Create Systemd Service","description":"This test creates a Systemd service unit file and enables it as a service.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1543.002-2","name":"Create SysV Service","description":"This test creates a SysV service unit file and enables it as a service.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1543.002-3","name":"Create Systemd Service file,  Enable the service , Modify and Reload the service.","description":"This test creates a systemd service unit file and enables it to autostart on boot. Once service is created and enabled, it also modifies this same service file showcasing both Creation and Modification of system process.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1543.004","name":"Create or Modify System Process: Launch Daemon","tactic":"TA0003","tactics":["TA0003","TA0004"],"atomicTests":[{"id":"T1543.004-1","name":"Launch Daemon","description":"Utilize LaunchDaemon to launch `Hello World`","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1546","name":"Event Triggered Execution","tactic":"TA0004","tactics":["TA0004","TA0003"],"atomicTests":[{"id":"T1546-1","name":"Persistence with Custom AutodialDLL","description":"The DLL pointed to by the AutodialDLL registry key is loaded every time a process connects to the internet. Attackers can gain persistent code execution by setting this key to a DLL of their choice. The sample dll provided, AltWinSock2DLL, will launch the notepad process. Starting and stopping a web browser such as MS Edge or Chrome should result in the dll executing. [Blog](https://www.mdsec.co.uk/2022/10/autodialdlling-your-way/)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1546-2","name":"HKLM - Persistence using CommandProcessor AutoRun key (With Elevation)","description":"An adversary may abuse the CommandProcessor AutoRun registry key to persist. Every time cmd.exe is executed, the command defined in the AutoRun key also gets executed. [reference](https://devblogs.microsoft.com/oldnewthing/20071121-00/?p=24433)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1546-3","name":"HKCU - Persistence using CommandProcessor AutoRun key (Without Elevation)","description":"An adversary may abuse the CommandProcessor AutoRun registry key to persist. Every time cmd.exe is executed, the command defined in the AutoRun key also gets executed. [reference](https://devblogs.microsoft.com/oldnewthing/20071121-00/?p=24433)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1546-4","name":"WMI Invoke-CimMethod Start Process","description":"The following Atomic will create a New-CimSession on a remote endpoint and start a process usnig Invoke-CimMethod. This is a novel way to perform lateral movement or to start a remote process. This does require WinRM to be enabled. The account performing the run will also need to be elevated. A successful execution will stdout that the process started. On the remote endpoint, wmiprvse.exe will spawn the given process.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1546-5","name":"Adding custom debugger for Windows Error Reporting","description":"When applications hang, the Windows Error Reporting framework allows us to attach a debugger, if it is set up in the Registry. Adding executable of choice will let the executable to auto-execute when during any application crash due to functioning of WER framework","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1546-6","name":"Load custom DLL on mstsc execution","description":"Adding ClxDllPath under Terminal Server Client subkey of HKLM hive with a path to custom DLL allows for DLL loading during execution of mstsc.exe","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1546-7","name":"Persistence using automatic execution of custom DLL during RDP session","description":"When remote desktop session is accepted, the system queries the key it queries the Registry key:HKLM\\SYSTEM\\CurrentControlSet\\Control\\Terminal Server\\AddIns\\TestDVCPlugin. If such key exists, the OS will attempt to read the Path value underneath.Once the Path is read, the DLL that it points to will be loaded via LoadLibrary.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1546-8","name":"Persistence via ErrorHandler.cmd script execution","description":"Create persistence by triggering script within ErrorHandler.cmd upon the execution of specific binaries within the oobe directory. Upon test execution, Setup.exe will be executed to further execute script within ErrorHandlercmd to launch Notepad.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1546-9","name":"Persistence using STARTUP-PATH in MS-WORD","description":"When Word starts, it searches for the registry key HKCU\\Software\\Microsoft\\Office\\<version>\\Word\\Options\\STARTUP-PATH and if it exists, it will treat it as a user specific start-up folder and load the contents of the folder with file extensions of .wll,.lnk,.dotm,.dot,.dotx The registry key can be abused to load malware from the mentioned path. Reboot might be required.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1546.001","name":"Event Triggered Execution: Change Default File Association","tactic":"TA0004","tactics":["TA0004","TA0003"],"atomicTests":[{"id":"T1546.001-1","name":"Change Default File Association","description":"Change Default File Association From cmd.exe of hta to notepad. Upon successful execution, cmd.exe will change the file association of .hta to notepad.exe.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1546.002","name":"Event Triggered Execution: Screensaver","tactic":"TA0004","tactics":["TA0004","TA0003"],"atomicTests":[{"id":"T1546.002-1","name":"Set Arbitrary Binary as Screensaver","description":"This test copies a binary into the Windows System32 folder and sets it as the screensaver so it will execute for persistence. Requires a reboot and logon.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1546.003","name":"Event Triggered Execution: Windows Management Instrumentation Event Subscription","tactic":"TA0004","tactics":["TA0004","TA0003"],"atomicTests":[{"id":"T1546.003-1","name":"Persistence via WMI Event Subscription - CommandLineEventConsumer","description":"Run from an administrator powershell window. After running, reboot the victim machine. After it has been online for 4 minutes you should see notepad.exe running as SYSTEM. Code references https://gist.github.com/mattifestation/7fe1df7ca2f08cbfa3d067def00c01af https://github.com/EmpireProject/Empire/blob/master/data/module_source/persistence/Persistence.psm1#L545","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1546.003-2","name":"Persistence via WMI Event Subscription - ActiveScriptEventConsumer","description":"Run from an administrator powershell window. After running, reboot the victim machine. After it has been online for 4 minutes you should see notepad.exe running as SYSTEM. Code references https://gist.github.com/mgreen27/ef726db0baac5623dc7f76bfa0fc494c","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1546.003-3","name":"Windows MOFComp.exe Load MOF File","description":"The following Atomic will utilize MOFComp.exe to load a local MOF file. The Managed Object Format (MOF) compiler parses a file containing MOF statements and adds the classes and class instances defined in the file to the WMI repository. To query for the class:  gwmi __eventfilter -namespace root\\subscription A successful execution will add the class to WMI root namespace. Reference: https://pentestlab.blog/2020/01/21/persistence-wmi-event-subscription/ and https://thedfirreport.com/2022/07/11/select-xmrig-from-sqlserver/.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1546.004","name":"Event Triggered Execution: .bash_profile .bashrc and .shrc","tactic":"TA0004","tactics":["TA0004","TA0003"],"atomicTests":[{"id":"T1546.004-1","name":"Add command to .bash_profile","description":"Adds a command to the .bash_profile file of the current user","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1546.004-2","name":"Add command to .bashrc","description":"Adds a command to the .bashrc file of the current user","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1546.004-3","name":"Add command to .shrc","description":"Adds a command to the .shrc file of the current user","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1546.004-4","name":"Append to the system shell profile","description":"An adversary may wish to establish persistence by executing malicious commands from the systems /etc/profile every time \"any\" user logs in.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1546.004-5","name":"Append commands user shell profile","description":"An adversary may wish to establish persistence by executing malicious commands from the users ~/.profile every time the \"user\" logs in.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1546.004-6","name":"System shell profile scripts","description":"An adversary may wish to establish persistence by adding commands into any of the script files in the /etc/profile.d/ directory, which are executed every time \"any\" user logs in.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1546.004-7","name":"Create/Append to .bash_logout","description":"The Bash shell runs ~/.bash_logout \"if it exists\" to run commands on user logout. An adversary may create or append to a .bash_logout to clear history, start processes etc. Note the ~/.bash_logout is only run if you explicitly exit or log out of an \"interactive login shell session\" i.e. via the console, SSH, /bin/bash -l or su -l <username>. This test creates the art user, logs in, creates a .bash_logout which will echo some text into the art.txt file on logout and logs out and the /home/art/art.txt is created.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1546.005","name":"Event Triggered Execution: Trap","tactic":"TA0004","tactics":["TA0004","TA0003"],"atomicTests":[{"id":"T1546.005-1","name":"Trap EXIT","description":"Launch bash shell with command arg to create TRAP on EXIT. The trap executes script that writes to /tmp/art-fish.txt","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1546.005-2","name":"Trap EXIT (freebsd)","description":"Launch bash shell with command arg to create TRAP on EXIT. The trap executes script that writes to /tmp/art-fish.txt","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1546.005-3","name":"Trap SIGINT","description":"Launch bash shell with command arg to create TRAP on SIGINT (CTRL+C), then send SIGINT signal. The trap executes script that writes to /tmp/art-fish.txt","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1546.005-4","name":"Trap SIGINT (freebsd)","description":"Launch bash shell with command arg to create TRAP on SIGINT (CTRL+C), then send SIGINT signal. The trap executes script that writes to /tmp/art-fish.txt","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1546.007","name":"Event Triggered Execution: Netsh Helper DLL","tactic":"TA0004","tactics":["TA0004","TA0003"],"atomicTests":[{"id":"T1546.007-1","name":"Netsh Helper DLL Registration","description":"You can register a \"helper dll\" with Netsh as a persistance mechanism. The code in the dll is executed every time netsh.exe is called. The NetshHelper.dll provided with the atomic will simply launch notepad when netsh.exe is run. [Blog](https://htmlpreview.github.io/?https://github.com/MatthewDemaske/blogbackup/blob/master/netshell.html) [Sample DLL code](https://github.com/outflanknl/NetshHelperBeacon)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1546.008","name":"Event Triggered Execution: Accessibility Features","tactic":"TA0004","tactics":["TA0004","TA0003"],"atomicTests":[{"id":"T1546.008-1","name":"Attaches Command Prompt as a Debugger to a List of Target Processes","description":"Attaches cmd.exe to a list of processes. Configure your own Input arguments to a different executable or list of executables. Upon successful execution, powershell will modify the registry and swap osk.exe with cmd.exe.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1546.008-2","name":"Replace binary of sticky keys","description":"Replace sticky keys binary (sethc.exe) with cmd.exe","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1546.008-3","name":"Create Symbolic Link From osk.exe to cmd.exe","description":"Replace accessiblity executable with cmd.exe to provide elevated command prompt from login screen without logging in.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1546.008-4","name":"Atbroker.exe (AT) Executes Arbitrary Command via Registry Key","description":"Executes code specified in the registry for a new AT (Assistive Technologies).","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1546.008-5","name":"Auto-start application on user logon","description":"Executes code specified in the registry on new user logon session automatically by registration of new AT and modification of configuration value. This test will register new AT named malware_test with code for cmd.exe and add a configuration value for the code to be run during user logon session.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1546.008-6","name":"Replace utilman.exe (Ease of Access Binary) with cmd.exe","description":"Replace utilman.exe (Ease of Access binary) with cmd.exe. This allows the user to launch an elevated command prompt by clicking the Ease of Access button on the login screen.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1546.008-7","name":"Replace Magnify.exe (Magnifier binary) with cmd.exe","description":"Replace Magnify.exe (Magnifier binary) with cmd.exe. This allows the user to launch an elevated command prompt by toggling on the Magnifier from the Accessibility menu on the login screen.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1546.008-8","name":"Replace Narrator.exe (Narrator binary) with cmd.exe","description":"Replace Narrator.exe (Narrator binary) with cmd.exe. This allows the user to launch an elevated command prompt by toggling on the Narrator button from the Accessibility menu on the login screen.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1546.008-9","name":"Replace DisplaySwitch.exe (Display Switcher binary) with cmd.exe","description":"Replace DisplaySwitch.exe (Display Switcher binary) with cmd.exe. This allows the user to launch an elevated command prompt by pressing the Windows Key + P on the login screen.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1546.008-10","name":"Replace AtBroker.exe (App Switcher binary) with cmd.exe","description":"Replace AtBroker.exe (App Switcher binary) with cmd.exe. This allows the user to launch an elevated command prompt from the login screen by locking and then unlocking the computer after toggling on any of the accessibility tools in the Accessibility menu.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1546.009","name":"Event Triggered Execution: AppCert DLLs","tactic":"TA0004","tactics":["TA0004","TA0003"],"atomicTests":[{"id":"T1546.009-1","name":"Create registry persistence via AppCert DLL","description":"Creates a new 'AtomicTest' value pointing to an AppCert DLL in the AppCertDlls registry key. Once the computer restarted, the DLL will be loaded in multiple processes and write an 'AtomicTest.txt' file in C:\\Users\\Public\\ to validate that the DLL executed succesfully. Reference: https://skanthak.homepage.t-online.de/appcert.html","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1546.010","name":"Event Triggered Execution: AppInit DLLs","tactic":"TA0004","tactics":["TA0004","TA0003"],"atomicTests":[{"id":"T1546.010-1","name":"Install AppInit Shim","description":"AppInit_DLLs is a mechanism that allows an arbitrary list of DLLs to be loaded into each user mode process on the system. Upon succesfully execution, you will see the message \"The operation completed successfully.\" Each time the DLL is loaded, you will see a message box with a message of \"Install AppInit Shim DLL was called!\" appear. This will happen regularly as your computer starts up various applications and may in fact drive you crazy. A reliable way to make the message box appear and verify the AppInit Dlls are loading is to start the notepad application. Be sure to run the cleanup commands afterwards so you don't keep getting message boxes showing up. Note: If secure boot is enabled, this technique will not work. https://docs.microsoft.com/en-us/windows/win32/dlls/secure-boot-and-appinit-dlls","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1546.011","name":"Event Triggered Execution: Application Shimming","tactic":"TA0004","tactics":["TA0004","TA0003"],"atomicTests":[{"id":"T1546.011-1","name":"Application Shim Installation","description":"Install a shim database. This technique is used for privilege escalation and bypassing user access control. Upon execution, \"Installation of AtomicShim complete.\" will be displayed. To verify the shim behavior, run the AtomicTest.exe from the <PathToAtomicsFolder>\\\\T1546.011\\\\bin directory. You should see a message box appear with \"Atomic Shim DLL Test!\" as defined in the AtomicTest.dll. To better understand what is happening, review the source code files is the <PathToAtomicsFolder>\\\\T1546.011\\\\src directory.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1546.011-2","name":"New shim database files created in the default shim database directory","description":"Upon execution, check the \"C:\\Windows\\apppatch\\Custom\\\" folder for the new shim database https://www.fireeye.com/blog/threat-research/2017/05/fin7-shim-databases-persistence.html","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1546.011-3","name":"Registry key creation and/or modification events for SDB","description":"Create registry keys in locations where fin7 typically places SDB patches. Upon execution, output will be displayed describing the registry keys that were created. These keys can also be viewed using the Registry Editor. https://www.fireeye.com/blog/threat-research/2017/05/fin7-shim-databases-persistence.html","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1546.012","name":"Event Triggered Execution: Image File Execution Options Injection","tactic":"TA0004","tactics":["TA0004","TA0003"],"atomicTests":[{"id":"T1546.012-1","name":"IFEO Add Debugger","description":"Leverage Global Flags Settings","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1546.012-2","name":"IFEO Global Flags","description":"Leverage Global Flags Settings","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1546.012-3","name":"GlobalFlags in Image File Execution Options","description":"The following Atomic Test will create a GlobalFlag key under Image File Execution Options, also a SilentProcessExit Key with ReportingMode and MonitorProcess values. This test is similar to a recent CanaryToken that will generate an EventCode 3000 in the Application log when a command, whoami.exe for example, is executed. Upon running Whoami.exe, a command shell will spawn and start calc.exe based on the MonitorProcess value. Upon successful execution, powershell will modify the registry and spawn calc.exe. An event 3000 will generate in the Application log.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1546.013","name":"Event Triggered Execution: PowerShell Profile","tactic":"TA0004","tactics":["TA0004","TA0003"],"atomicTests":[{"id":"T1546.013-1","name":"Append malicious start-process cmdlet","description":"Appends a start process cmdlet to the current user's powershell profile pofile that points to a malicious executable. Upon execution, calc.exe will be launched.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1546.014","name":"Event Triggered Execution: Emond","tactic":"TA0004","tactics":["TA0004","TA0003"],"atomicTests":[{"id":"T1546.014-1","name":"Persistance with Event Monitor - emond","description":"Establish persistence via a rule run by OSX's emond (Event Monitor) daemon at startup, based on https://posts.specterops.io/leveraging-emond-on-macos-for-persistence-a040a2785124","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1546.015","name":"Event Triggered Execution: Component Object Model Hijacking","tactic":"TA0004","tactics":["TA0004","TA0003"],"atomicTests":[{"id":"T1546.015-1","name":"COM Hijacking - InprocServer32","description":"This test uses PowerShell to hijack a reference to a Component Object Model by creating registry values under InprocServer32 key in the HKCU hive then calling the Class ID to be executed via rundll32.exe. Reference: https://bohops.com/2018/06/28/abusing-com-registry-structure-clsid-localserver32-inprocserver32/","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1546.015-2","name":"Powershell Execute COM Object","description":"Use the PowerShell to execute COM CLSID object. Reference: https://pentestlab.blog/2020/05/20/persistence-com-hijacking/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1546.015-3","name":"COM Hijacking with RunDLL32 (Local Server Switch)","description":"This test uses PowerShell to hijack a reference to a Component Object Model by creating registry values under InprocServer32 key in the HKCU hive then calling the Class ID to be executed via \"rundll32.exe -localserver [clsid]\". This method is generally used as an alternative to 'rundll32.exe -sta [clsid]' to execute dll's while evading detection. Reference: https://www.hexacorn.com/blog/2020/02/13/run-lola-bin-run/ Upon successful execution of this test with the default options, whenever certain apps are opened (for example, Notepad), a calculator window will also be opened.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1546.015-4","name":"COM hijacking via TreatAs","description":"This test first create a custom CLSID class pointing to the Windows Script Component runtime DLL. This DLL looks for the ScriptletURL key to get the location of the script to execute. Then, it hijacks the CLSID for the Work Folders Logon Synchronization to establish persistence on user logon by creating the 'TreatAs' with the malicious CLSID as default value. The test is validated by running 'rundll32.exe -sta \"AtomicTest\"' to avoid logging out. References: https://youtu.be/3gz1QmiMhss?t=1251 https://github.com/enigma0x3/windows-operating-system-archaeology","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1546.018","name":"Event Triggered Execution: Python Startup Hooks","tactic":"TA0003","tactics":["TA0003","TA0004"],"atomicTests":[{"id":"T1546.018-1","name":"Python Startup Hook - atomic_hook.pth (Windows)","description":"Executes code by placing a .pth file in the site-packages directory. Supports python.exe and python3.exe via input arguments.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1546.018-2","name":"Python Startup Hook - usercustomize.py (Windows)","description":"Executes code via usercustomize.py. This is a per-user persistence mechanism that does not require Administrative privileges.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1546.018-3","name":"Python Startup Hook - atomic_hook.pth (Linux)","description":"Executes code by creating atomic_hook.pth in the site-packages directory. This script runs automatically for every user on the system when Python starts.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1546.018-4","name":"Python Startup Hook - atomic_hook.pth (macOS)","description":"Creates a Python startup hook using a .pth file inside a virtual environment on macOS.","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1546.018-5","name":"Python Startup Hook - usercustomize.py (Linux / MacOS)","description":"Executes code via usercustomize.py. This is a per-user persistence mechanism that does not require root privileges.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1547","name":"Boot or Logon Autostart Execution","tactic":"TA0003","tactics":["TA0003","TA0004"],"atomicTests":[{"id":"T1547-1","name":"Add a driver","description":"Install a driver via pnputil.exe lolbin","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1547-2","name":"Driver Installation Using pnputil.exe","description":"pnputil.exe is a native command-line utility in Windows to install drivers, this can be abused by to install malicious drivers. Ref: https://lolbas-project.github.io/lolbas/Binaries/Pnputil/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1547-3","name":"Leverage Virtual Channels to execute custom DLL during successful RDP session","description":"Virtual Channels can be leveraged to alter RDP behavior using dedicated Addins.The mechanism is implemented using DLLs which can be executed during RDP session automatically. The DLLs are loaded in the host system only after successful connection is established with the remote system. Once the test is run, amsi.dll will be loaded on the host system during successful RDP session. Blog :https://learn.microsoft.com/en-us/windows/win32/termserv/terminal-services-virtual-channels?redirectedfrom=MSDN","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1547.002","name":"Authentication Package","tactic":"TA0003","tactics":["TA0003","TA0004"],"atomicTests":[{"id":"T1547.002-1","name":"Authentication Package","description":"Establishes persistence using a custom authentication package for the Local Security Authority (LSA). After a reboot, Notepad.exe will be executed as child process of lsass.exe. Payload source code: https://github.com/tr4cefl0w/payloads/tree/master/T1547.002/package [Related blog](https://pentestlab.blog/2019/10/21/persistence-security-support-provider/)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1547.003","name":"Time Providers","tactic":"TA0003","tactics":["TA0003","TA0004"],"atomicTests":[{"id":"T1547.003-1","name":"Create a new time provider","description":"Establishes persistence by creating a new time provider registry key under HKEY_LOCAL_MACHINE\\SYSTEM\\CurrentControlSet\\Services\\W32Time\\TimeProvider. The new time provider will point to a DLL which will be loaded after the w32time service is started. The DLL will then create the file AtomicTest.txt in C:\\Users\\Public\\ as validation that the test is successful. Payload source code: https://github.com/tr4cefl0w/payloads/tree/master/T1547.003/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1547.003-2","name":"Edit an existing time provider","description":"Establishes persistence by editing the NtpServer time provider registry key under HKEY_LOCAL_MACHINE\\SYSTEM\\CurrentControlSet\\Services\\W32Time\\TimeProvider. The time provider will point to a DLL which will be loaded after the w32time service is started. The DLL will then create the file AtomicTest.txt in C:\\Users\\Public\\ as validation that the test is successful. Payload source code: https://github.com/tr4cefl0w/payloads/tree/master/T1547.003/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1547.004","name":"Boot or Logon Autostart Execution: Winlogon Helper DLL","tactic":"TA0003","tactics":["TA0003","TA0004"],"atomicTests":[{"id":"T1547.004-1","name":"Winlogon Shell Key Persistence - PowerShell","description":"PowerShell code to set Winlogon shell key to execute a binary at logon along with explorer.exe. Upon successful execution, PowerShell will modify a registry value to execute cmd.exe upon logon/logoff.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1547.004-2","name":"Winlogon Userinit Key Persistence - PowerShell","description":"PowerShell code to set Winlogon userinit key to execute a binary at logon along with userinit.exe. Upon successful execution, PowerShell will modify a registry value to execute cmd.exe upon logon/logoff.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1547.004-3","name":"Winlogon Notify Key Logon Persistence - PowerShell","description":"PowerShell code to set Winlogon Notify key to execute a notification package DLL at logon. Upon successful execution, PowerShell will modify a registry value to execute atomicNotificationPackage.dll upon logon. Please note that Winlogon Notifications have been removed as of Windows Vista / Windows Server 2008 and that this test thus only applies to erlier versions of Windows.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1547.004-4","name":"Winlogon HKLM Shell Key Persistence - PowerShell","description":"PowerShell code to set Winlogon shell key to execute a binary at logon along with explorer.exe. Upon successful execution, PowerShell will modify a registry value to execute cmd.exe upon logon/logoff.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1547.004-5","name":"Winlogon HKLM Userinit Key Persistence - PowerShell","description":"PowerShell code to set Winlogon userinit key to execute a binary at logon along with userinit.exe. Upon successful execution, PowerShell will modify a registry value to execute cmd.exe upon logon/logoff.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1547.005","name":"Boot or Logon Autostart Execution: Security Support Provider","tactic":"TA0003","tactics":["TA0003","TA0004"],"atomicTests":[{"id":"T1547.005-1","name":"Modify HKLM:\\System\\CurrentControlSet\\Control\\Lsa Security Support Provider configuration in registry","description":"Add a value to a Windows registry Security Support Provider pointing to a payload .dll which will normally need to be copied in the system32 folder. A common DLL used with this techquite is the minilib.dll from mimikatz, see https://pentestlab.blog/2019/10/21/persistence-security-support-provider/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1547.005-2","name":"Modify HKLM:\\System\\CurrentControlSet\\Control\\Lsa\\OSConfig Security Support Provider configuration in registry","description":"Add a value to a Windows registry SSP key, simulating an adversarial modification of those keys.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1547.006","name":"Boot or Logon Autostart Execution: Kernel Modules and Extensions","tactic":"TA0003","tactics":["TA0003","TA0004"],"atomicTests":[{"id":"T1547.006-1","name":"Linux - Load Kernel Module via insmod","description":"This test uses the insmod command to load a kernel module for Linux.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1547.006-2","name":"MacOS - Load Kernel Module via kextload and kmutil","description":"This test uses the kextload and kmutil commands to load and unload a MacOS kernel module.","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1547.006-3","name":"MacOS - Load Kernel Module via KextManagerLoadKextWithURL()","description":"This test uses the IOKit API to load a kernel module for macOS. Harcoded to use SoftRAID kext","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1547.006-4","name":"Snake Malware Kernel Driver Comadmin","description":"The following Atomic Test will write an file, comadmin.dat, to disk. From the report, Snake's installer drops the kernel driver and a custom DLL which is used to load the driver into a single AES encrypted file on disk. Typically, this file is named \u201ccomadmin.dat\u201d and is stored in the %windows%\\system32\\Com directory. This Atomic Test will write a hardcoded named file to disk in the com directory named comadmin.dat. [Snake Malware - CISA](https://media.defense.gov/2023/May/09/2003218554/-1/-1/0/JOINT_CSA_HUNTING_RU_INTEL_SNAKE_MALWARE_20230509.PDF)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1547.007","name":"Boot or Logon Autostart Execution: Re-opened Applications","tactic":"TA0003","tactics":["TA0003","TA0004"],"atomicTests":[{"id":"T1547.007-1","name":"Copy in loginwindow.plist for Re-Opened Applications","description":"Copy in new loginwindow.plist to launch Calculator.","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1547.007-2","name":"Re-Opened Applications using LoginHook","description":"Mac Defaults [Reference](https://developer.apple.com/library/content/documentation/MacOSX/Conceptual/BPSystemStartup/Chapters/CustomLogin.html)","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1547.007-3","name":"Append to existing loginwindow for Re-Opened Applications","description":"Appends an entry to launch Calculator hidden loginwindow.*.plist for next login. Note that the change may not result in the added Calculator program launching on next user login. It may depend on which version of macOS you are running on.","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1547.008","name":"Boot or Logon Autostart Execution: LSASS Driver","tactic":"TA0003","tactics":["TA0003","TA0004"],"atomicTests":[{"id":"T1547.008-1","name":"Modify Registry to load Arbitrary DLL into LSASS - LsaDbExtPt","description":"The following Atomic will modify an undocumented registry key that may be abused to load a arbitrary DLL into LSASS. Upon execution, the registry key will be modified and a value will contain the path to the DLL. Reference: https://blog.xpnsec.com/exploring-mimikatz-part-1/ and source https://github.com/oxfemale/LogonCredentialsSteal Note that if any LSA based protection is enabled, this will most likely not be successful with LSASS.exe loading the DLL.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1547.009","name":"Boot or Logon Autostart Execution: Shortcut Modification","tactic":"TA0003","tactics":["TA0003","TA0004"],"atomicTests":[{"id":"T1547.009-1","name":"Shortcut Modification","description":"This test to simulate shortcut modification and then execute. example shortcut (*.lnk , .url) strings check with powershell; gci -path \"C:\\Users\" -recurse -include *.url -ea SilentlyContinue | Select-String -Pattern \"exe\" | FL. Upon execution, calc.exe will be launched.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1547.009-2","name":"Create shortcut to cmd in startup folders","description":"LNK file to launch CMD placed in startup folder. Upon execution, open File Explorer and browse to \"%APPDATA%\\Microsoft\\Windows\\Start Menu\\Programs\\Startup\\\" to view the new shortcut.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1547.010","name":"Boot or Logon Autostart Execution: Port Monitors","tactic":"TA0003","tactics":["TA0003","TA0004"],"atomicTests":[{"id":"T1547.010-1","name":"Add Port Monitor persistence in Registry","description":"Add key-value pair to a Windows Port Monitor registry. On the subsequent reboot DLL will be execute under spoolsv with NT AUTHORITY/SYSTEM privilege.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1547.012","name":"Boot or Logon Autostart Execution: Print Processors","tactic":"TA0003","tactics":["TA0003","TA0004"],"atomicTests":[{"id":"T1547.012-1","name":"Print Processors","description":"Establishes persistence by creating a new print processor registry key under HKEY_LOCAL_MACHINE\\SYSTEM\\CurrentControlSet\\Control\\Print\\Environments\\Windows x64\\Print Processors. The new print processor will point to a DLL which will be loaded by the spooler service after a reboot. The DLL will then create the file AtomicTest.txt in C:\\Users\\Public\\ as validation that the test is successful. Note: The test assumes a x64 Windows operating system. The payload source code is based on a blog post by stmxcsr: [https://stmxcsr.com/persistence/print-processor.html](https://stmxcsr.com/persistence/print-processor.html)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1547.014","name":"Active Setup","tactic":"TA0003","tactics":["TA0003","TA0004"],"atomicTests":[{"id":"T1547.014-1","name":"HKLM - Add atomic_test key to launch executable as part of user setup","description":"This test will create an \"atomic_test\" key under 'HKLM:\\SOFTWARE\\Microsoft\\Active Setup\\Installed Components' to launch calc by configuring an active setup executable and forcing to run active setup using the \"runonce.exe /AlternateShellStartup\" command. Without the \"runonce.exe /AlternateShellStartup\" command it would run during the next logon for each user. Note: If you logout before running the cleanup command, you will be required to go through the OOBE (out-of-box experience) setup sequence to log back in. The payload will only run once unless the cleanup command is run in between tests. [Active Setup Explained](https://helgeklein.com/blog/active-setup-explained/)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1547.014-2","name":"HKLM - Add malicious StubPath value to existing Active Setup Entry","description":"This test will add a StubPath entry to the Active Setup native registry key associated with 'Internet Explorer Core Fonts' (UUID {C9E9A340-D1F1-11D0-821E-444553540600}) Said key doesn't have a StubPath value by default, by adding one it will launch calc by forcing to run active setup using runonce.exe /AlternateShellStartup. Without the last command it will normally run on next user logon. Note: this test will only run once successfully if no cleanup command is run in between test.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1547.014-3","name":"HKLM - re-execute 'Internet Explorer Core Fonts' StubPath payload by decreasing version number","description":"This test will decrease the version number of the 'Internet Explorer Core Fonts' (UUID {C9E9A340-D1F1-11D0-821E-444553540600}) registry key for the current user, which will force the StubPath payload (if set) to execute.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1547.015","name":"Boot or Logon Autostart Execution: Login Items","tactic":"TA0003","tactics":["TA0003","TA0004"],"atomicTests":[{"id":"T1547.015-1","name":"Persistence by modifying Windows Terminal profile","description":"Modify Windows Terminal settings.json file to gain persistence. [Twitter Post](https://twitter.com/nas_bench/status/1550836225652686848)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true},{"id":"T1547.015-2","name":"Add macOS LoginItem using Applescript","description":"Runs osascript on a file to create new LoginItem for current user. NOTE: Will popup dialog prompting user to Allow or Deny Terminal.app to control \"System Events\" Therefore, it can't be automated until the TCC is granted. The login item launches Safari.app when user logs in, but there is a cleanup script to remove it as well. In addition to the `osascript` Process Events, file modification events to `/Users/*/Library/Application Support/com.apple.backgroundtaskmanagementagent/backgrounditems.btm` should be seen.","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1548.001","name":"Abuse Elevation Control Mechanism: Setuid and Setgid","tactic":"TA0004","tactics":["TA0004"],"atomicTests":[{"id":"T1548.001-1","name":"Make and modify binary from C source","description":"Make, change owner, and change file attributes on a C source code file","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1548.001-2","name":"Make and modify binary from C source (freebsd)","description":"Make, change owner, and change file attributes on a C source code file","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1548.001-3","name":"Set a SetUID flag on file","description":"This test sets the SetUID flag on a file in FreeBSD.","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1548.001-4","name":"Set a SetUID flag on file (freebsd)","description":"This test sets the SetUID flag on a file in FreeBSD.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1548.001-5","name":"Set a SetGID flag on file","description":"This test sets the SetGID flag on a file in Linux and macOS.","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1548.001-6","name":"Set a SetGID flag on file (freebsd)","description":"This test sets the SetGID flag on a file in FreeBSD.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1548.001-7","name":"Make and modify capabilities of a binary","description":"Make and modify [capabilities](https://man7.org/linux/man-pages/man7/capabilities.7.html) of a C source code file. The binary doesn't have to modify the UID, but the binary is given the capability to arbitrarily modify it at any time with `setuid(0)`. Without being owned by root, the binary can set the UID to 0.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1548.001-8","name":"Provide the SetUID capability to a file","description":"This test gives a file the capability to set UID without using flags.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1548.001-9","name":"Do reconnaissance for files that have the setuid bit set","description":"This test simulates a command that can be run to enumerate files that have the setuid bit set","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1548.001-10","name":"Do reconnaissance for files that have the setgid bit set","description":"This test simulates a command that can be run to enumerate files that have the setgid bit set","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1548.003","name":"Abuse Elevation Control Mechanism: Sudo and Sudo Caching","tactic":"TA0004","tactics":["TA0004"],"atomicTests":[{"id":"T1548.003-1","name":"Sudo usage","description":"Common Sudo enumeration methods.","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1548.003-2","name":"Sudo usage (freebsd)","description":"Common Sudo enumeration methods.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1548.003-3","name":"Unlimited sudo cache timeout","description":"Sets sudo caching timestamp_timeout to a value for unlimited. This is dangerous to modify without using 'visudo', do not do this on a production system.","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1548.003-4","name":"Unlimited sudo cache timeout (freebsd)","description":"Sets sudo caching timestamp_timeout to a value for unlimited. This is dangerous to modify without using 'visudo', do not do this on a production system.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1548.003-5","name":"Disable tty_tickets for sudo caching","description":"Sets sudo caching tty_tickets value to disabled. This is dangerous to modify without using 'visudo', do not do this on a production system.","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1548.003-6","name":"Disable tty_tickets for sudo caching (freebsd)","description":"Sets sudo caching tty_tickets value to disabled. This is dangerous to modify without using 'visudo', do not do this on a production system.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1550.002","name":"Use Alternate Authentication Material: Pass the Hash","tactic":"TA0008","tactics":["TA0008"],"atomicTests":[{"id":"T1550.002-1","name":"Mimikatz Pass the Hash","description":"Note: must dump hashes first [Reference](https://github.com/gentilkiwi/mimikatz/wiki/module-~-sekurlsa#pth)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1550.002-2","name":"crackmapexec Pass the Hash","description":"command execute with crackmapexec","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1550.002-3","name":"Invoke-WMIExec Pass the Hash","description":"Use Invoke-WMIExec to Pass the Hash Note: must dump hashes first [Reference](https://github.com/gentilkiwi/mimikatz/wiki/module-~-sekurlsa#pth)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1550.003","name":"Use Alternate Authentication Material: Pass the Ticket","tactic":"TA0008","tactics":["TA0008"],"atomicTests":[{"id":"T1550.003-1","name":"Mimikatz Kerberos Ticket Attack","description":"Similar to PTH, but attacking Kerberos","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1550.003-2","name":"Rubeus Kerberos Pass The Ticket","description":"Requesting a TGT on a remote system and retrieving it locally before requesting a service ticket with it. This is a Pass-The-Ticket attack because the TGT is obtained on the remote system, then used from a different machine (local). PsExec is used to execute commands on the remote system, and the \"C$\" admin share is used to retrieve the TGT, so the current user must have admin rights remotely and other PsExec prerequisites must be met.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1552","name":"Unsecured Credentials","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1552-1","name":"AWS - Retrieve EC2 Password Data using stratus","description":"This atomic runs an API call GetPasswordData from a role that does not have permission to do so. This simulates an attacker attempting to retrieve RDP passwords on a high number of Windows EC2 instances. This atomic test leverages a tool called stratus-red-team built by DataDog (https://github.com/DataDog/stratus-red-team). Stratus Red Team is a self-contained binary. You can use it to easily detonate offensive attack techniques against a live cloud environment. Ref: https://stratus-red-team.cloud/attack-techniques/AWS/aws.credential-access.ec2-get-password-data/","supportedPlatforms":["linux","macos","iaas:aws"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1552-2","name":"Search for Passwords in Powershell History","description":"Find passwords in the powershell history files Searching for following strings: \"password\", \"-p\", \"key\", \"pwd\", \"pass\"","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1552.001","name":"Unsecured Credentials: Credentials In Files","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1552.001-1","name":"Find AWS credentials","description":"Find local AWS credentials from file, defaults to using / as the look path.","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1552.001-2","name":"Extract Browser and System credentials with LaZagne","description":"[LaZagne Source](https://github.com/AlessandroZ/LaZagne)","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1552.001-3","name":"Extract passwords with grep","description":"Extracting credentials from files","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1552.001-4","name":"Extracting passwords with findstr","description":"Extracting Credentials from Files. Upon execution, the contents of files that contain the word \"password\" will be displayed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1552.001-5","name":"Access unattend.xml","description":"Attempts to access unattend.xml, where credentials are commonly stored, within the Panther directory where installation logs are stored. If these files exist, their contents will be displayed. They are used to store credentials/answers during the unattended windows install process.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1552.001-6","name":"Find and Access Github Credentials","description":"This test looks for .netrc files (which stores github credentials in clear text )and dumps its contents if found.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1552.001-7","name":"WinPwn - sensitivefiles","description":"Search for sensitive files on this local system using the SensitiveFiles function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1552.001-8","name":"WinPwn - Snaffler","description":"Check Domain Network-Shares for cleartext passwords using Snaffler function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1552.001-9","name":"WinPwn - powershellsensitive","description":"Check Powershell event logs for credentials or other sensitive information via winpwn powershellsensitive function.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1552.001-10","name":"WinPwn - passhunt","description":"Search for Passwords on this system using passhunt via WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1552.001-11","name":"WinPwn - SessionGopher","description":"Launches SessionGopher on this system via WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1552.001-12","name":"WinPwn - Loot local Credentials - AWS, Microsoft Azure, and Google Compute credentials","description":"Loot local Credentials - AWS, Microsoft Azure, and Google Compute credentials technique via function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1552.001-13","name":"List Credential Files via PowerShell","description":"Via PowerShell,list files where credentials are stored in Windows Credential Manager","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1552.001-14","name":"List Credential Files via Command Prompt","description":"Via Command Prompt,list files where credentials are stored in Windows Credential Manager","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1552.001-15","name":"Find Azure credentials","description":"Find local Azure credentials from file, defaults to using / as the look path.","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1552.001-16","name":"Find GCP credentials","description":"Find local Google Cloud Platform credentials from file, defaults to using / as the look path.","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1552.001-17","name":"Find OCI credentials","description":"Find local Oracle cloud credentials from file, defaults to using / as the look path.","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1552.002","name":"Unsecured Credentials: Credentials in Registry","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1552.002-1","name":"Enumeration for Credentials in Registry","description":"Queries to enumerate for credentials in the Registry. Upon execution, any registry key containing the word \"password\" will be displayed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1552.002-2","name":"Enumeration for PuTTY Credentials in Registry","description":"Queries to enumerate for PuTTY credentials in the Registry. PuTTY must be installed for this test to work. If any registry entries are found, they will be displayed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1552.003","name":"Unsecured Credentials: Bash History","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1552.003-1","name":"Search Through Bash History","description":"Search through bash history for specifice commands we want to capture","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1552.003-2","name":"Search Through sh History","description":"Search through sh history for specifice commands we want to capture","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1552.004","name":"Unsecured Credentials: Private Keys","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1552.004-1","name":"Private Keys","description":"Find private keys on the Windows file system. File extensions include: .key, .pgp, .gpg, .ppk., .p12, .pem, pfx, .cer, .p7b, .asc","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1552.004-2","name":"Discover Private SSH Keys","description":"Discover private SSH keys on a FreeBSD, macOS or Linux system.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1552.004-3","name":"Copy Private SSH Keys with CP","description":"Copy private SSH keys on a Linux system to a staging folder using the `cp` command.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1552.004-4","name":"Copy Private SSH Keys with CP (freebsd)","description":"Copy private SSH keys on a FreeBSD system to a staging folder using the `cp` command.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1552.004-5","name":"Copy Private SSH Keys with rsync","description":"Copy private SSH keys on a Linux or macOS system to a staging folder using the `rsync` command.","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1552.004-6","name":"Copy Private SSH Keys with rsync (freebsd)","description":"Copy private SSH keys on a FreeBSD system to a staging folder using the `rsync` command.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1552.004-7","name":"Copy the users GnuPG directory with rsync","description":"Copy the users GnuPG (.gnupg) directory on a Mac or Linux system to a staging folder using the `rsync` command.","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1552.004-8","name":"Copy the users GnuPG directory with rsync (freebsd)","description":"Copy the users GnuPG (.gnupg) directory on a FreeBSD system to a staging folder using the `rsync` command.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1552.004-9","name":"ADFS token signing and encryption certificates theft - Local","description":"Retrieve ADFS token signing and encrypting certificates. This is a precursor to the Golden SAML attack (T1606.002). You must be signed in as Administrator on an ADFS server. Based on https://o365blog.com/post/adfs/ and https://github.com/fireeye/ADFSDump.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1552.004-10","name":"ADFS token signing and encryption certificates theft - Remote","description":"Retrieve ADFS token signing and encrypting certificates. This is a precursor to the Golden SAML attack (T1606.002). You must be signed in as a Domain Administrators user on a domain-joined computer. Based on https://o365blog.com/post/adfs/ and https://github.com/fireeye/ADFSDump.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1552.004-11","name":"CertUtil ExportPFX","description":"The following Atomic test simulates adding a generic non-malicious certificate to the Root certificate store. This behavior generates a registry modification that adds the cloned root CA certificate in the keys outlined in the blog. In addition, this Atomic utilizes CertUtil to export the PFX (ExportPFX), similar to what was seen in the Golden SAML attack. Keys will look like - \\SystemCertificates\\CA\\Certificates or \\SystemCertificates\\Root\\Certificates Reference: https://posts.specterops.io/code-signing-certificate-cloning-attacks-and-defenses-6f98657fc6ec Reference: https://www.splunk.com/en_us/blog/security/a-golden-saml-journey-solarwinds-continued.html","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1552.004-12","name":"Export Root Certificate with Export-PFXCertificate","description":"Creates a Root certificate and exports it with Export-PFXCertificate PowerShell Cmdlet. Upon a successful attempt, this will write a pfx to disk and utilize the Cmdlet Export-PFXCertificate.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1552.004-13","name":"Export Root Certificate with Export-Certificate","description":"Creates a Root certificate and exports it with Export-Certificate PowerShell Cmdlet. Upon a successful attempt, this will write a pfx to disk and utilize the Cmdlet Export-Certificate.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1552.004-14","name":"Export Certificates with Mimikatz","description":"The following Atomic test will utilize Mimikatz to extract the certificates from the local system My store. This tool is available at https://github.com/gentilkiwi/mimikatz and can be obtained using the get-prereq_commands. A successful attempt will stdout the certificates and write multiple .pfx and .der files to disk.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1552.005","name":"Unsecured Credentials: Cloud Instance Metadata API","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1552.005-1","name":"Azure - Search Azure AD User Attributes for Passwords","description":"This test uses the MSOnline Powershell module to retrieve all user attributes for a specified account, which can sometimes contain unsecured credentials. Upon successful execution, this test will scan all user attributes for any strings containing \"password\". Those unsecured credentials will be output to a text file, as well as the account that they are associated with and the user attribute in which they were found. See: https://github.com/dafthack/CloudPentestCheatsheets/blob/master/cheatsheets/Azure.md","supportedPlatforms":["azure-ad"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1552.005-2","name":"Azure - Dump Azure Instance Metadata from Virtual Machines","description":"This test invokes a web request to the default Instance Metadata API of 169.254.169.254 in order to dump the data contained within it to a file. See: https://www.sans.org/blog/cloud-instance-metadata-services-imds-/","supportedPlatforms":["iaas:azure"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1552.006","name":"Unsecured Credentials: Group Policy Preferences","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1552.006-1","name":"GPP Passwords (findstr)","description":"Look for the encrypted cpassword value within Group Policy Preference files on the Domain Con
