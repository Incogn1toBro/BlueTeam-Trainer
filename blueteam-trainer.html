 attempt to query for computer objects with the UserAccountControl property 'TRUSTED_FOR_DELEGATION' (0x80000;524288) set More Information - https://shenaniganslabs.io/2019/01/28/Wagging-the-Dog.html#when-the-stars-align-unconstrained-delegation-leads-to-rce Prerequisite: AD RSAT PowerShell module is needed and it must run under a domain user","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1087.002-11","name":"Get-DomainUser with PowerView","description":"Utilizing PowerView, run Get-DomainUser to identify the domain users. Upon execution, Users within the domain will be listed.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1087.002-12","name":"Enumerate Active Directory Users with ADSISearcher","description":"The following Atomic test will utilize ADSISearcher to enumerate users within Active Directory. Upon successful execution a listing of users will output with their paths in AD. Reference: https://devblogs.microsoft.com/scripting/use-the-powershell-adsisearcher-type-accelerator-to-search-active-directory/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1087.002-13","name":"Enumerate Linked Policies In ADSISearcher Discovery","description":"The following Atomic test will utilize ADSISearcher to enumerate organizational unit within Active Directory. Upon successful execution a listing of users will output with their paths in AD. Reference: https://medium.com/@pentesttas/discover-hidden-gpo-s-on-active-directory-using-ps-adsi-a284b6814c81","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1087.002-14","name":"Enumerate Root Domain linked policies Discovery","description":"The following Atomic test will utilize ADSISearcher to enumerate root domain unit within Active Directory. Upon successful execution a listing of users will output with their paths in AD. Reference: https://medium.com/@pentesttas/discover-hidden-gpo-s-on-active-directory-using-ps-adsi-a284b6814c81","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1087.002-15","name":"WinPwn - generaldomaininfo","description":"Gathers general domain information using the generaldomaininfo function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1087.002-16","name":"Kerbrute - userenum","description":"Enumerates active directory usernames using the userenum function of Kerbrute","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1087.002-17","name":"Wevtutil - Discover NTLM Users Remote","description":"This test discovers users who have authenticated against a Domain Controller via NTLM. This is done remotely via wmic and captures the event code 4776 from the domain controller and stores the ouput in C:\\temp. [Reference](https://www.reliaquest.com/blog/socgholish-fakeupdates/)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1087.002-18","name":"Suspicious LAPS Attributes Query with Get-ADComputer all properties","description":"This test executes LDAP query using powershell command Get-ADComputer and lists all the properties including Microsoft LAPS attributes ms-mcs-AdmPwd and ms-mcs-AdmPwdExpirationTime","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1087.002-19","name":"Suspicious LAPS Attributes Query with Get-ADComputer ms-Mcs-AdmPwd property","description":"This test executes LDAP query using powershell command Get-ADComputer and lists Microsoft LAPS attributes ms-mcs-AdmPwd and ms-mcs-AdmPwdExpirationTime","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1087.002-20","name":"Suspicious LAPS Attributes Query with Get-ADComputer all properties and SearchScope","description":"This test executes LDAP query using powershell command Get-ADComputer with SearchScope as subtree and lists all the properties including Microsoft LAPS attributes ms-mcs-AdmPwd and ms-mcs-AdmPwdExpirationTime","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1087.002-21","name":"Suspicious LAPS Attributes Query with adfind all properties","description":"This test executes LDAP query using adfind command and lists all the attributes including Microsoft LAPS attributes ms-mcs-AdmPwd and ms-mcs-AdmPwdExpirationTime","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1087.002-22","name":"Suspicious LAPS Attributes Query with adfind ms-Mcs-AdmPwd","description":"This test executes LDAP query using adfind command and lists Microsoft LAPS attributes ms-mcs-AdmPwd and ms-mcs-AdmPwdExpirationTime","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1087.002-23","name":"Active Directory Domain Search","description":"Output information from LDAPSearch. LDAP Password is the admin-user password on Active Directory","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1087.002-24","name":"Account Enumeration with LDAPDomainDump","description":"This test uses LDAPDomainDump to perform account enumeration on a domain. [Reference](https://securityonline.info/ldapdomaindump-active-directory-information-dumper-via-ldap/)","supportedPlatforms":["linux"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1090.001","name":"Proxy: Internal Proxy","tactic":"TA0011","tactics":["TA0011"],"atomicTests":[{"id":"T1090.001-1","name":"Connection Proxy","description":"Enable traffic redirection. Note that this test may conflict with pre-existing system configuration.","supportedPlatforms":["linux","macos"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true},{"id":"T1090.001-2","name":"Connection Proxy for macOS UI","description":"Enable traffic redirection on macOS UI (not terminal). The test will modify and enable the \"Web Proxy\" and \"Secure Web Proxy\" settings  in System Preferences => Network => Advanced => Proxies for the specified network interface. Note that this test may conflict with pre-existing system configuration.","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1090.001-3","name":"portproxy reg key","description":"Adds a registry key to set up a proxy on the endpoint at HKEY_LOCAL_MACHINE\\SYSTEM\\CurrentControlSet\\Services\\PortProxy\\v4tov4 Upon execution there will be a new proxy entry in netsh netsh interface portproxy show all","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1090.003","name":"Proxy: Multi-hop Proxy","tactic":"TA0011","tactics":["TA0011"],"atomicTests":[{"id":"T1090.003-1","name":"Psiphon","description":"Psiphon 3 is a circumvention tool from Psiphon Inc. that utilizes VPN, SSH and HTTP Proxy technology to provide you with uncensored access to Internet. This process will launch Psiphon 3 and establish a connection. Shortly after it will be shut down via process kill commands. More information can be found about Psiphon using the following urls http://s3.amazonaws.com/0ubz-2q11-gi9y/en.html https://psiphon.ca/faq.html","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1090.003-2","name":"Tor Proxy Usage - Windows","description":"This test is designed to launch the tor proxy service, which is what is utilized in the background by the Tor Browser and other applications with add-ons in order to provide onion routing functionality. Upon successful execution, the tor proxy will be launched, run for 60 seconds, and then exit.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1090.003-3","name":"Tor Proxy Usage - Debian/Ubuntu/FreeBSD","description":"This test is designed to launch the tor proxy service, which is what is utilized in the background by the Tor Browser and other applications with add-ons in order to provide onion routing functionality. Upon successful execution, the tor proxy service will be launched.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1090.003-4","name":"Tor Proxy Usage - MacOS","description":"This test is designed to launch the tor proxy service, which is what is utilized in the background by the Tor Browser and other applications with add-ons in order to provide onion routing functionality. Upon successful execution, the tor proxy service will be launched.","supportedPlatforms":["macos"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1091","name":"Replication Through Removable Media","tactic":"TA0008","tactics":["TA0008","TA0001"],"atomicTests":[{"id":"T1091-1","name":"USB Malware Spread Simulation","description":"Simulates an adversary copying malware to all connected removable drives.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1095","name":"Non-Application Layer Protocol","tactic":"TA0011","tactics":["TA0011"],"atomicTests":[{"id":"T1095-1","name":"ICMP C2","description":"This will attempt to  start C2 Session Using ICMP. For information on how to set up the listener refer to the following blog: https://www.blackhillsinfosec.com/how-to-c2-over-icmp/","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1095-2","name":"Netcat C2","description":"Start C2 Session Using Ncat To start the listener on a Linux device, type the following: nc -l -p <port>","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1095-3","name":"Powercat C2","description":"Start C2 Session Using Powercat To start the listener on a Linux device, type the following: nc -l -p <port>","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1095-4","name":"Linux ICMP Reverse Shell using icmp-cnc","description":"ICMP C2 (Command and Control) utilizes the Internet Control Message Protocol (ICMP), traditionally used for network diagnostics, as a covert communication channel for attackers. By using ICMP, adversaries can send commands, exfiltrate data, or maintain access to compromised systems without triggering network detection systems. This method allows attackers to communicate and control compromised devices while remaining undetected. For more details, check this blog: [ICMP Reverse Shell Blog](https://cryptsus.com/blog/icmp-reverse-shell.html) **Important Notes:** - Use `[icmp-cnc]` for the C2 server (Attacker) and `[icmpdoor]` for the C2 client (Victim). - Binaries work on Ubuntu 22.04.5 LTS; for CentOS Stream or other, use the Python file from the GitHub link [https://github.com/krabelize/icmpdoor]. - Root access is required.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1098","name":"Account Manipulation","tactic":"TA0003","tactics":["TA0003","TA0004"],"atomicTests":[{"id":"T1098-1","name":"Admin Account Manipulate","description":"Manipulate Admin Account Name","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1098-2","name":"Domain Account and Group Manipulate","description":"Create a random atr-nnnnnnnn account and add it to a domain group (by default, Domain Admins). The quickest way to run it is against a domain controller, using `-Session` of `Invoke-AtomicTest`. Alternatively, you need to install PS Module ActiveDirectory (in prereqs) and run the script with appropriare AD privileges to create the user and alter the group. Automatic installation of the dependency requires an elevated session, and is unlikely to work with Powershell Core (untested). If you consider running this test against a production Active Directory, the good practise is to create a dedicated service account whose delegation is given onto a dedicated OU for user creation and deletion, as well as delegated as group manager of the target group. Example: `Invoke-AtomicTest -Session $session 'T1098' -TestNames \"Domain Account and Group Manipulate\" -InputArgs @{\"group\" = \"DNSAdmins\" }`","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1098-3","name":"AWS - Create a group and add a user to that group","description":"Adversaries create AWS group, add users to specific to that group to elevate their privileges to gain more accesss","supportedPlatforms":["iaas:aws"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1098-4","name":"Azure AD - adding user to Azure AD role","description":"The adversaries want to add user to some Azure AD role. Threat actor may be interested primarily in highly privileged roles, e.g. Global Administrator, Application Administrator, Privileged Authentication Administrator (this role can reset Global Administrator password!). By default, the role Global Reader is assigned to the user principal in this test. The account you use to run the PowerShell command should have Privileged Role Administrator or Global Administrator role in your Azure AD. Detection hint - check Activity \"Add member to role\" in Azure AD Audit Logs. In targer you will also see User as a type.","supportedPlatforms":["azure-ad"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1098-5","name":"Azure AD - adding service principal to Azure AD role","description":"The adversaries want to add service principal to some Azure AD role. Threat actor may be interested primarily in highly privileged roles, e.g. Global Administrator, Application Administrator, Privileged Authentication Administrator (this role can reset Global Administrator password!). By default, the role Global Reader is assigned to service principal in this test. The account you use to run the PowerShell command should have Privileged Role Administrator or Global Administrator role in your Azure AD. Detection hint - check Activity \"Add member to role\" in Azure AD Audit Logs. In targer you will also see Service Principal as a type.","supportedPlatforms":["azure-ad"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1098-6","name":"Azure - adding user to Azure role in subscription","description":"The adversaries want to add user to some Azure role, also called Azure resource role. Threat actor may be interested primarily in highly privileged roles, e.g. Owner, Contributor. By default, the role Reader is assigned to user in this test. New-AzRoleAssignment cmdlet could be also use to assign user/service principal to resource, resource group and management group. The account you use to run the PowerShell command must have Microsoft.Authorization/roleAssignments/write (e.g. such as User Access Administrator or Owner) and the Azure Active Directory Graph Directory.Read.All and Microsoft Graph Directory.Read.All permissions. Detection hint - check Operation Name \"Create role assignment\" in subscriptions Activity Logs.","supportedPlatforms":["iaas:azure"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1098-7","name":"Azure - adding service principal to Azure role in subscription","description":"The adversaries want to add service principal to some Azure role, also called Azure resource role. Threat actor may be interested primarily in highly privileged roles, e.g. Owner, Contributor. By default, the role Reader is assigned to service principal in this test. New-AzRoleAssignment cmdlet could be also use to assign user/service principal to resource, resource group and management group. The account you use to run the PowerShell command must have Microsoft.Authorization/roleAssignments/write (e.g. such as User Access Administrator or Owner) and the Azure Active Directory Graph Directory.Read.All and Microsoft Graph Directory.Read.All permissions. Detection hint - check Operation Name \"Create role assignment\" in subscriptions Activity Logs.","supportedPlatforms":["iaas:azure"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1098-8","name":"Azure AD - adding permission to application","description":"The adversaries want to add permission to newly created application. Application could be then used for persistence or for further operation in the attacked infrastructure. Permissions like AppRoleAssignment.ReadWrite.All or RoleManagement.ReadWrite.Directory in particular can be a valuable target for a threat actor. This technique will create a new app, with the provided name, and give it the provided permission. But if you prefer to add credentials to an existing app, replace in the code: \"Get-AzureADApplication\" instead of \"New-AzureADServicePrincipal\". The DirectoryRecommendations.Read.All permissions has been selected as the default. The account you use to run the PowerShell command should have Global Administrator/Application Administrator/Cloud Application Administrator role in your Azure AD. Detection hint - check Operation Name \"Add app role assignment to service principal\" in subscriptions Activity Logs. You can also take a look at the materials: https://learnsentinel.blog/2022/01/04/azuread-privesc-sentinel/ https://github.com/reprise99/Sentinel-Queries https://docs.google.com/presentation/d/1AWx1w0Xcq8ENvOmSjAJswEgEio-il09QWZlGg9PbHqE/edit#slide=id.g10460eb209c_0_2766 https://gist.github.com/andyrobbins/7c3dd62e6ed8678c97df9565ff3523fb","supportedPlatforms":["azure-ad"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1098-9","name":"Password Change on Directory Service Restore Mode (DSRM) Account","description":"Change the password on the Directory Service Restore Mode (DSRM) account using ntdsutil by syncing to existing account","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1098-10","name":"Domain Password Policy Check: Short Password","description":"Attempt to change the password of the current domain user in order to check password policy. Ideally, you would only run this atomic test to verify that your password policy is blocking the use of the new password. If the password is succesfully changed to the new password, the credential file will be updated to reflect the new password.  You can then run the atomic manually and specify a new password of your choosing, however the password policy will likely prevent you from setting the password back to what it was.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1098-11","name":"Domain Password Policy Check: No Number in Password","description":"Attempt to change the password of the current domain user in order to check password policy. Ideally, you would only run this atomic test to verify that your password policy is blocking the use of the new password. If the password is succesfully changed to the new password, the credential file will be updated to reflect the new password. You can then run the atomic manually and specify a new password of your choosing, however the password policy will likely prevent you from setting the password back to what it was.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1098-12","name":"Domain Password Policy Check: No Special Character in Password","description":"Attempt to change the password of the current domain user in order to check password policy. Ideally, you would only run this atomic test to verify that your password policy is blocking the use of the new password. If the password is succesfully changed to the new password, the credential file will be updated to reflect the new password. You can then run the atomic manually and specify a new password of your choosing, however the password policy will likely prevent you from setting the password back to what it was.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1098-13","name":"Domain Password Policy Check: No Uppercase Character in Password","description":"Attempt to change the password of the current domain user in order to check password policy. Ideally, you would only run this atomic test to verify that your password policy is blocking the use of the new password. If the password is succesfully changed to the new password, the credential file will be updated to reflect the new password. You can then run the atomic manually and specify a new password of your choosing, however the password policy will likely prevent you from setting the password back to what it was.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1098-14","name":"Domain Password Policy Check: No Lowercase Character in Password","description":"Attempt to change the password of the current domain user in order to check password policy. Ideally, you would only run this atomic test to verify that your password policy is blocking the use of the new password. If the password is succesfully changed to the new password, the credential file will be updated to reflect the new password. You can then run the atomic manually and specify a new password of your choosing, however the password policy will likely prevent you from setting the password back to what it was.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1098-15","name":"Domain Password Policy Check: Only Two Character Classes","description":"Attempt to change the password of the current domain user in order to check password policy. Ideally, you would only run this atomic test to verify that your password policy is blocking the use of the new password. If the password is succesfully changed to the new password, the credential file will be updated to reflect the new password. You can then run the atomic manually and specify a new password of your choosing, however the password policy will likely prevent you from setting the password back to what it was.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1098-16","name":"Domain Password Policy Check: Common Password Use","description":"Attempt to change the password of the current domain user in order to check password policy. Ideally, you would only run this atomic test to verify that your password policy is blocking the use of the new password. If the password is succesfully changed to the new password, the credential file will be updated to reflect the new password. You can then run the atomic manually and specify a new password of your choosing, however the password policy will likely prevent you from setting the password back to what it was.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1098-17","name":"GCP - Delete Service Account Key","description":"This Atomic will: - Create a service account - Create a service account key, - Store the result of retrieving a single key for that service account as a variable - Pass that variable for deletion - Delete the service account The idea for this Atomic came from a Rule published by the Elastic team. Identifies the deletion of an Identity and Access Management (IAM) service account key in Google Cloud Platform (GCP). Each service account is associated with two sets of public/private RSA key pairs that are used to authenticate. If a key is deleted, the application will no longer be able to access Google Cloud resources using that key. A security best practice is to rotate your service account keys regularly. Reference: https://github.com/elastic/detection-rules/blob/main/rules/integrations/gcp/impact_gcp_storage_bucket_deleted.toml","supportedPlatforms":["iaas:gcp"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1098.001","name":"Account Manipulation: Additional Cloud Credentials","tactic":"TA0003","tactics":["TA0003","TA0004"],"atomicTests":[{"id":"T1098.001-1","name":"Azure AD Application Hijacking - Service Principal","description":"Add a certificate to an Application through its Service Principal. The certificate can then be used to authenticate as the application. This can be used for persistence, and also for privilege escalation by benefiting from the Application's rights. An account with high-enough Azure AD privileges is needed, such as Global Administrator or Application Administrator. The account authentication must be without MFA.","supportedPlatforms":["azure-ad"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1098.001-2","name":"Azure AD Application Hijacking - App Registration","description":"Add a certificate to an Application through its App Registration. The certificate can then be used to authenticate as the application. This can be used for persistence, and also for privilege escalation by benefiting from the Application's rights. An account with high-enough Azure AD privileges is needed, such as Global Administrator or Application Administrator. The account authentication must be without MFA.","supportedPlatforms":["azure-ad"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1098.001-3","name":"AWS - Create Access Key and Secret Key","description":"Adversaries create their own new access and secret keys to programatically interact with AWS environment, which is already compromised","supportedPlatforms":["iaas:aws"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1098.002","name":"Account Manipulation: Additional Email Delegate Permissions","tactic":"TA0003","tactics":["TA0003","TA0004"],"atomicTests":[{"id":"T1098.002-1","name":"EXO - Full access mailbox permission granted to a user","description":"Give a nominated user, full mailbox delegation access of another user. This can be used by an adversary to maintain persistent access to a target's mailbox in M365.","supportedPlatforms":["office-365"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1098.003","name":"Account Manipulation: Additional Cloud Roles","tactic":"TA0003","tactics":["TA0003","TA0004"],"atomicTests":[{"id":"T1098.003-1","name":"Azure AD - Add Company Administrator Role to a user","description":"Add an existing Azure user account the Company Administrator Role.","supportedPlatforms":["azure-ad"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1098.003-2","name":"Simulate - Post BEC persistence via user password reset followed by user added to company administrator role","description":"This test looks at simulating the an adversary described in the following blog post. It involves resetting the password of a normal user and adding to the company administrator role within M365. Reference: https://www.huntress.com/blog/business-email-compromise-via-azure-administrative-privileges","supportedPlatforms":["azure-ad"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1098.004","name":"SSH Authorized Keys","tactic":"TA0003","tactics":["TA0003","TA0004"],"atomicTests":[{"id":"T1098.004-1","name":"Modify SSH Authorized Keys","description":"Modify contents of <user-home>/.ssh/authorized_keys to maintain persistence on victim host. If the user is able to save the same contents in the authorized_keys file, it shows user can modify the file.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1105","name":"Ingress Tool Transfer","tactic":"TA0011","tactics":["TA0011"],"atomicTests":[{"id":"T1105-1","name":"rsync remote file copy (push)","description":"Utilize rsync to perform a remote file copy (push)","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1105-2","name":"rsync remote file copy (pull)","description":"Utilize rsync to perform a remote file copy (pull)","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1105-3","name":"scp remote file copy (push)","description":"Utilize scp to perform a remote file copy (push)","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1105-4","name":"scp remote file copy (pull)","description":"Utilize scp to perform a remote file copy (pull)","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1105-5","name":"sftp remote file copy (push)","description":"Utilize sftp to perform a remote file copy (push)","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1105-6","name":"sftp remote file copy (pull)","description":"Utilize sftp to perform a remote file copy (pull)","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1105-7","name":"certutil download (urlcache)","description":"Use certutil -urlcache argument to download a file from the web. Note - /urlcache also works!","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1105-8","name":"certutil download (verifyctl)","description":"Use certutil -verifyctl argument to download a file from the web. Note - /verifyctl also works!","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1105-9","name":"Windows - BITSAdmin BITS Download","description":"This test uses BITSAdmin.exe to schedule a BITS job for the download of a file. This technique is used by Qbot malware to download payloads.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1105-10","name":"Windows - PowerShell Download","description":"This test uses PowerShell to download a payload. This technique is used by multiple adversaries and malware families.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1105-11","name":"OSTAP Worming Activity","description":"OSTap copies itself in a specfic way to shares and secondary drives. This emulates the activity.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1105-12","name":"svchost writing a file to a UNC path","description":"svchost.exe writing a non-Microsoft Office file to a file with a UNC path. Upon successful execution, this will rename cmd.exe as svchost.exe and move it to `c:\\`, then execute svchost.exe with output to a txt file.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1105-13","name":"Download a File with Windows Defender MpCmdRun.exe","description":"Uses Windows Defender MpCmdRun.exe to download a file from the internet (must have version 4.18 installed). The input arguments \"remote_file\" and \"local_path\" can be used to specify the download URL and the name of the output file. By default, the test downloads the Atomic Red Team license file to the temp directory. More info and how to find your version can be found here https://lolbas-project.github.io/lolbas/Binaries/MpCmdRun/","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true},{"id":"T1105-14","name":"whois file download","description":"Download a remote file using the whois utility","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1105-15","name":"File Download via PowerShell","description":"Use PowerShell to download and write an arbitrary file from the internet. Example is from the 2021 Threat Detection Report by Red Canary.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1105-16","name":"File download with finger.exe on Windows","description":"Simulate a file download using finger.exe. Connect to localhost by default, use custom input argument to test finger connecting to an external server. Because this is being tested on the localhost, you should not be expecting a successful connection https://www.exploit-db.com/exploits/48815 https://www.bleepingcomputer.com/news/security/windows-10-finger-command-can-be-abused-to-download-or-steal-files/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1105-17","name":"Download a file with IMEWDBLD.exe","description":"Use IMEWDBLD.exe (built-in to windows) to download a file. This will throw an error for an invalid dictionary file. Downloaded files can be found in \"%LocalAppData%\\Microsoft\\Windows\\INetCache\\<8_RANDOM_ALNUM_CHARS>/<FILENAME>[1].<EXTENSION>\" or `%LocalAppData%\\Microsoft\\Windows\\INetCache\\IE\\<8_RANDOM_ALNUM_CHARS>/<FILENAME>[1].<EXTENSION>. Run \"Get-ChildItem -Path C:\\Users\\<USERNAME>\\AppData\\Local\\Microsoft\\Windows\\INetCache\\ -Include <FILENAME>* -Recurse -Force -File -ErrorAction SilentlyContinue\" without quotes and adding the correct username and file name to locate the file.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1105-18","name":"Curl Download File","description":"The following Atomic utilizes native curl.exe, or downloads it if not installed, to download a remote DLL and output to a number of directories to simulate malicious behavior. Expected output will include whether the file downloaded successfully or not.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1105-19","name":"Curl Upload File","description":"The following Atomic utilizes native curl.exe, or downloads it if not installed, to upload a txt file to simulate data exfiltration Expected output will include whether the file uploaded successfully or not.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1105-20","name":"Download a file with Microsoft Connection Manager Auto-Download","description":"Uses the cmdl32 to download arbitrary file from the internet. The cmdl32 package is allowed to install the profile used to launch the VPN connection. However, the config is modified to download the arbitary file. The issue of cmdl32.exe detecting and deleting the payload by identifying it as not a VPN Servers profile is avoided by setting a temporary TMP folder and denying the delete permission to all files for the user. Upon successful execution the test will open calculator and Notepad executable for 10 seconds. reference: https://twitter.com/ElliotKillick/status/1455897435063074824 https://github.com/LOLBAS-Project/LOLBAS/pull/151 https://lolbas-project.github.io/lolbas/Binaries/Cmdl32/ https://strontic.github.io/xcyclopedia/library/cmdl32.exe-FA1D5B8802FFF4A85B6F52A52C871BBB.html","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1105-21","name":"MAZE Propagation Script","description":"This test simulates MAZE ransomware's propogation script that searches through a list of computers, tests connectivity to them, and copies a binary file to the Windows\\Temp directory of each one. Upon successful execution, a specified binary file will attempt to be copied to each online machine, a list of the online machines, as well as a list of offline machines will be output to a specified location. Reference: https://www.fireeye.com/blog/threat-research/2020/05/tactics-techniques-procedures-associated-with-maze-ransomware-incidents.html","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1105-22","name":"Printer Migration Command-Line Tool UNC share folder into a zip file","description":"Create a ZIP file from a folder in a remote drive","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1105-23","name":"Lolbas replace.exe use to copy file","description":"Copy file.cab to destination Reference: https://lolbas-project.github.io/lolbas/Binaries/Replace/","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1105-24","name":"Lolbas replace.exe use to copy UNC file","description":"Copy UNC file to destination Reference: https://lolbas-project.github.io/lolbas/Binaries/Replace/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1105-25","name":"certreq download","description":"Use certreq to download a file from the web","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1105-26","name":"Download a file using wscript","description":"Use wscript to run a local VisualBasic file to download a remote file","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1105-27","name":"Linux Download File and Run","description":"Utilize linux Curl to download a remote file, chmod +x it and run it.","supportedPlatforms":["linux"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1105-28","name":"Nimgrab - Transfer Files","description":"Use nimgrab.exe to download a file from the web.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1105-29","name":"iwr or Invoke Web-Request download","description":"Use 'iwr' or \"Invoke-WebRequest\" -URI argument to download a file from the web. Note: without -URI also works in some versions.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1105-30","name":"Arbitrary file download using the Notepad++ GUP.exe binary","description":"GUP is an open source signed binary used by Notepad++ for software updates, and can be used to download arbitrary files(.zip) from internet/github. [Reference](https://x.com/nas_bench/status/1535322182863179776?s=20) Upon execution, a sample zip file will be downloaded to C:\\Temp\\Sample folder","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1105-31","name":"File download via nscurl","description":"Use nscurl to download and write a file/payload from the internet. -k = Disable certificate checking -o = Output destination","supportedPlatforms":["macos"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1105-32","name":"File Download with Sqlcmd.exe","description":"One of the windows packages 'Sqlcmd.exe' can be abused to download malicious files from C2 servers This Atomic will exhibit the similar behavior by downloading a sample zip file from src directory of this Technique folder via GitHub URL","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1105-33","name":"Remote File Copy using PSCP","description":"Copy a staged file using PSCP.exe to a public target location.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1105-34","name":"Windows push file using scp.exe","description":"This test simulates pushing files using SCP on a Windows environment.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1105-35","name":"Windows pull file using scp.exe","description":"This test simulates pulling files using SCP on a Windows environment.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1105-36","name":"Windows push file using sftp.exe","description":"This test simulates pushing files using SFTP on a Windows environment.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1105-37","name":"Windows pull file using sftp.exe","description":"This test simulates pulling files using SFTP on a Windows environment.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1105-38","name":"Download a file with OneDrive Standalone Updater","description":"Uses OneDrive Standalone Updater to download a file from a specified URL by setting up the required registry keys. This technique can be used to download files without executing anomalous executables. Reference: https://lolbas-project.github.io/lolbas/Binaries/OneDriveStandaloneUpdater/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1105-39","name":"Curl Insecure Connection from a Pod","description":"Launches an Ubuntu pod, installs curl, and executes curl with insecure flags (-k/--insecure) against a target URL. The pod is automatically deleted after execution.","supportedPlatforms":["containers"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1106","name":"Native API","tactic":"TA0002","tactics":["TA0002"],"atomicTests":[{"id":"T1106-1","name":"Execution through API - CreateProcess","description":"Execute program by leveraging Win32 API's. By default, this will launch calc.exe from the command prompt.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1106-2","name":"WinPwn - Get SYSTEM shell - Pop System Shell using CreateProcess technique","description":"Get SYSTEM shell - Pop System Shell using CreateProcess technique via function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1106-3","name":"WinPwn - Get SYSTEM shell - Bind System Shell using CreateProcess technique","description":"Get SYSTEM shell - Bind System Shell using CreateProcess technique via function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1106-4","name":"WinPwn - Get SYSTEM shell - Pop System Shell using NamedPipe Impersonation technique","description":"Get SYSTEM shell - Pop System Shell using NamedPipe Impersonation technique via function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1106-5","name":"Run Shellcode via Syscall in Go","description":"Runs shellcode in the current running process via a syscall. Steps taken with this technique 1. Allocate memory for the shellcode with VirtualAlloc setting the page permissions to Read/Write 2. Use the RtlCopyMemory macro to copy the shellcode to the allocated memory space 3. Change the memory page permissions to Execute/Read with VirtualProtect 4. Use syscall to execute the entrypoint of the shellcode - PoC Credit: (https://github.com/Ne0nd0g/go-shellcode#syscall)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1110.001","name":"Brute Force: Password Guessing","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1110.001-1","name":"Brute Force Credentials of single Active Directory domain users via SMB","description":"Attempts to brute force a single Active Directory account by testing connectivity to the IPC$ share on a domain controller","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1110.001-2","name":"Brute Force Credentials of single Active Directory domain user via LDAP against domain controller (NTLM or Kerberos)","description":"Attempt to brute force Active Directory domain user on a domain controller, via LDAP, with NTLM or Kerberos","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1110.001-3","name":"Brute Force Credentials of single Azure AD user","description":"Attempt to brute force Azure AD user via AzureAD powershell module.","supportedPlatforms":["azure-ad"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1110.001-4","name":"Password Brute User using Kerbrute Tool","description":"Bruteforce a single user's password from a wordlist","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1110.001-5","name":"SUDO Brute Force - Debian","description":"An adversary may find themselves on a box (e.g. via ssh key auth, with no password) with a user that has sudo'ers privileges, but they do not know the users password. Normally, failed attempts to access root will not cause the root account to become locked, to prevent denial-of-service. This functionality enables an attacker to undertake a local brute force password guessing attack without locking out the root user. This test creates the \"art\" user with a password of \"password123\", logs in, downloads and executes the sudo_bruteforce.sh which brute force guesses the password, then deletes the user","supportedPlatforms":["linux"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true},{"id":"T1110.001-6","name":"SUDO Brute Force - Redhat","description":"An adversary may find themselves on a box (e.g. via ssh key auth, with no password) with a user that has sudo'ers privileges, but they do not know the users password. Normally, failed attempts to access root will not cause the root account to become locked, to prevent denial-of-service. This functionality enables an attacker to undertake a local brute force password guessing attack without locking out the root user. This test creates the \"art\" user with a password of \"password123\", logs in, downloads and executes the sudo_bruteforce.sh which brute force guesses the password, then deletes the user","supportedPlatforms":["linux"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true},{"id":"T1110.001-7","name":"SUDO Brute Force - FreeBSD","description":"An adversary may find themselves on a box (e.g. via ssh key auth, with no password) with a user that has sudo'ers privileges, but they do not know the users password. Normally, failed attempts to access root will not cause the root account to become locked, to prevent denial-of-service. This functionality enables an attacker to undertake a local brute force password guessing attack without locking out the root user. This test creates the \"art\" user with a password of \"password123\", logs in, downloads and executes the sudo_bruteforce.sh which brute force guesses the password, then deletes the user","supportedPlatforms":["linux"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true},{"id":"T1110.001-8","name":"ESXi - Brute Force Until Account Lockout","description":"An adversary may attempt to brute force the password of privilleged account for privilege escalation. In the process, the TA may lock the account, which can be used for detection. [Reference](https://news.sophos.com/en-us/2022/07/14/blackcat-ransomware-attacks-not-merely-a-byproduct-of-bad-luck/#:~:text=A%20ransomware%20group%20attacking%20large,internal%20systems%20after%20establishing%20a)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1110.002","name":"Brute Force: Password Cracking","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1110.002-1","name":"Password Cracking with Hashcat","description":"Execute Hashcat.exe with provided SAM file from registry of Windows and Password list to crack against","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1110.003","name":"Brute Force: Password Spraying","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1110.003-1","name":"Password Spray all Domain Users","description":"CAUTION! Be very careful to not exceed the password lockout threshold for users in the domain by running this test too frequently. This atomic attempts to map the IPC$ share on one of the Domain Controllers using a password of Spring2020 for each user in the %temp%\\users.txt list. Any successful authentications will be printed to the screen with a message like \"[*] username:password\", whereas a failed auth will simply print a period. Use the input arguments to specify your own password to use for the password spray. Use the get_prereq_command's to create a list of all domain users in the temp directory called users.txt. See the \"Windows FOR Loop Password Spraying Made Easy\" blog by @OrOneEqualsOne for more details on how these spray commands work. https://medium.com/walmartlabs/windows-for-loop-password-spraying-made-easy-c8cd4ebb86b5","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1110.003-2","name":"Password Spray (DomainPasswordSpray)","description":"Perform a domain password spray using the DomainPasswordSpray tool. It will try a single password against all users in the domain https://github.com/dafthack/DomainPasswordSpray","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1110.003-3","name":"Password spray all Active Directory domain users with a single password via LDAP against domain controller (NTLM or Kerberos)","description":"Attempt to brute force all Active Directory domain users with a single password (called \"password spraying\") on a domain controller, via LDAP, with NTLM or Kerberos Prerequisite: AD RSAT PowerShell module is needed and it must run under a domain user (to fetch the list of all domain users)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1110.003-4","name":"Password spray all Azure AD users with a single password","description":"Attempt to brute force all Azure AD users with a single password (called \"password spraying\") via AzureAD Powershell module. Valid credentials are only needed to fetch the list of Azure AD users.","supportedPlatforms":["azure-ad"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1110.003-5","name":"WinPwn - DomainPasswordSpray Attacks","description":"DomainPasswordSpray Attacks technique via function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1110.003-6","name":"Password Spray Invoke-DomainPasswordSpray Light","description":"Perform a domain password spray using the same core method of the [DomainPasswordSpray tool](https://github.com/dafthack/DomainPasswordSpray) but without all the extra code that makes the script get blocked by many AVs. This atomic test will attempt a single password against all users in a password list at $env:Temp\\usersdpsLight.txt. You can create this file manually or with the automated prereq_command. The prereq_command will limit the user list to 200 users by default to help you avoid massive account lockout.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1110.003-7","name":"Password Spray Microsoft Online Accounts with MSOLSpray (Azure/O365)","description":"This test attempts to brute force a list of Microsoft Online (Azure/O365) users with a single password via the MSOLSpray Powershell module.","supportedPlatforms":["azure-ad"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1110.003-8","name":"Password Spray using Kerbrute Tool","description":"Test a single password against a list of users","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1110.003-9","name":"AWS - Password Spray an AWS using GoAWSConsoleSpray","description":"GoAWSConsoleSpray is a tool that can be used to spray AWS IAM Console Credentials in order to identify a valid login for a user account built by WhiteOakSecurity. For more details reagrding the tool, check - https://www.whiteoaksecurity.com/blog/goawsconsolespray-password-spraying-tool/","supportedPlatforms":["iaas:aws"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1110.004","name":"Brute Force: Credential Stuffing","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1110.004-1","name":"SSH Credential Stuffing From Linux","description":"Using username,password combination from a password dump to login over SSH.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1110.004-2","name":"SSH Credential Stuffing From MacOS","description":"Using username,password combination from a password dump to login over SSH.","supportedPlatforms":["macos"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1110.004-3","name":"SSH Credential Stuffing From FreeBSD","description":"Using username,password combination from a password dump to login over SSH.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1110.004-4","name":"Brute Force:Credential Stuffing using Kerbrute Tool","description":"Will read username and password combos from a file or stdin (format username:password) and perform a bruteforce attack","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1112","name":"Modify Registry","tactic":"TA0003","tactics":["TA0003"],"atomicTests":[{"id":"T1112-1","name":"Modify Registry of Current User Profile - cmd","description":"Modify the registry of the currently logged in user using reg.exe via cmd console. Upon execution, the message \"The operation completed successfully.\" will be displayed. Additionally, open Registry Editor to view the new entry in HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Explorer\\Advanced.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-2","name":"Modify Registry of Local Machine - cmd","description":"Modify the Local Machine registry RUN key to change Windows Defender executable that should be ran on startup.  This should only be possible when CMD is ran as Administrative rights. Upon execution, the message \"The operation completed successfully.\" will be displayed. Additionally, open Registry Editor to view the modified entry in HKLM\\Software\\Microsoft\\Windows\\CurrentVersion\\Run.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-3","name":"Modify registry to store logon credentials","description":"Sets registry key that will tell windows to store plaintext passwords (making the system vulnerable to clear text / cleartext password dumping). Upon execution, the message \"The operation completed successfully.\" will be displayed. Additionally, open Registry Editor to view the modified entry in HKLM\\SYSTEM\\CurrentControlSet\\Control\\SecurityProviders\\WDigest.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-4","name":"Use Powershell to Modify registry to store logon credentials","description":"Sets registry key using Powershell that will tell windows to store plaintext passwords (making the system vulnerable to clear text / cleartext password dumping). Open Registry Editor to view the modified entry in HKLM\\SYSTEM\\CurrentControlSet\\Control\\SecurityProviders\\WDigest.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-5","name":"Add domain to Trusted sites Zone","description":"Attackers may add a domain to the trusted site zone to bypass defenses. Doing this enables attacks such as c2 over office365. Upon execution, details of the new registry entries will be displayed. Additionally, open Registry Editor to view the modified entry in HKCU:\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Internet Settings\\ZoneMap\\. https://www.blackhat.com/docs/us-17/wednesday/us-17-Dods-Infecting-The-Enterprise-Abusing-Office365-Powershell-For-Covert-C2.pdf","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-6","name":"Javascript in registry","description":"Upon execution, a javascript block will be placed in the registry for persistence. Additionally, open Registry Editor to view the modified entry in HKCU:\\Software\\Microsoft\\Windows\\CurrentVersion\\Internet Settings.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-7","name":"Change Powershell Execution Policy to Bypass","description":"Attackers need to change the powershell execution policy in order to run their malicious powershell scripts. They can either specify it during the execution of the powershell script or change the registry value for it.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-8","name":"BlackByte Ransomware Registry Changes - CMD","description":"This task recreates the steps taken by BlackByte ransomware before it worms to other machines.  See \"Preparing to Worm\" section: https://redcanary.com/blog/blackbyte-ransomware/ The steps are as follows: <ol> <li>1. Elevate Local Privilege by disabling UAC Remote Restrictions<\/li> <li>2. Enable OS to share network connections between different privilege levels<\/li> <li>3. Enable long path values for file paths, names, and namespaces to ensure encryption of all file names and paths<\/li> <\/ol> The registry keys and their respective values will be created upon successful execution.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-9","name":"BlackByte Ransomware Registry Changes - Powershell","description":"This task recreates the steps taken by BlackByte ransomware before it worms to other machines via Powershell.  See \"Preparing to Worm\" section: https://redcanary.com/blog/blackbyte-ransomware/ The steps are as follows: <ol> <li>1. Elevate Local Privilege by disabling UAC Remote Restrictions<\/li> <li>2. Enable OS to share network connections between different privilege levels<\/li> <li>3. Enable long path values for file paths, names, and namespaces to ensure encryption of all file names and paths<\/li> <\/ol> The registry keys and their respective values will be created upon successful execution.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-10","name":"Disable Windows Registry Tool","description":"Modify the registry of the currently logged in user using reg.exe via cmd console to disable the windows registry tool to prevent user modifying registry entry. See example how Agent Tesla malware abuses this technique: https://any.run/report/ea4ea08407d4ee72e009103a3b77e5a09412b722fdef67315ea63f22011152af/a866d7b1-c236-4f26-a391-5ae32213dfc4#registry","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-11","name":"Disable Windows CMD application","description":"Modify the registry of the currently logged in user using reg.exe via cmd console to disable the windows CMD application. See example how Agent Tesla malware abuses this technique: https://any.run/report/ea4ea08407d4ee72e009103a3b77e5a09412b722fdef67315ea63f22011152af/a866d7b1-c236-4f26-a391-5ae32213dfc4#registry","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-12","name":"Disable Windows Task Manager application","description":"Modify the registry of the currently logged in user using reg.exe via cmd console to disable the windows task manager application. See example how Agent Tesla malware abuses this technique: https://any.run/report/ea4ea08407d4ee72e009103a3b77e5a09412b722fdef67315ea63f22011152af/a866d7b1-c236-4f26-a391-5ae32213dfc4#registry","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-13","name":"Disable Windows Notification Center","description":"Modify the registry of the currently logged in user using reg.exe via cmd console to disable the windows notification center. See how remcos rat abuses this technique- https://tccontre.blogspot.com/2020/01/remcos-rat-evading-windows-defender-av.html","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-14","name":"Disable Windows Shutdown Button","description":"Modify the registry of the currently logged in user using reg.exe via cmd console to disable the windows shutdown button. See how ransomware abuses this technique- https://www.trendmicro.com/vinfo/us/threat-encyclopedia/malware/ransom.msil.screenlocker.a/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-15","name":"Disable Windows LogOff Button","description":"Modify the registry of the currently logged in user using reg.exe via cmd console to disable the windows logoff button. See how ransomware abuses this technique- https://www.trendmicro.com/vinfo/be/threat-encyclopedia/search/js_noclose.e/2","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-16","name":"Disable Windows Change Password Feature","description":"Modify the registry of the currently logged in user using reg.exe via cmd console to disable the windows change password feature. See how ransomware abuses this technique- https://www.trendmicro.com/vinfo/us/threat-encyclopedia/malware/ransom_heartbleed.thdobah","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-17","name":"Disable Windows Lock Workstation Feature","description":"Modify the registry of the currently via cmd console to remove security and maintenance icon Group Policy. Take note that some Group Policy changes might require a restart to take effect. See how ransomware abuses this technique- https://www.virustotal.com/gui/file/2d7855bf6470aa323edf2949b54ce2a04d9e38770f1322c3d0420c2303178d91/details","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-29","name":"Windows HideSCANetwork Group Policy Feature","description":"Modify the registry of the currently logged in user using reg.exe via cmd console to remove the networking icon Group Policy. Take note that some Group Policy changes might require a restart to take effect. See how ransomware abuses this technique- https://www.virustotal.com/gui/file/2d7855bf6470aa323edf2949b54ce2a04d9e38770f1322c3d0420c2303178d91/details","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-30","name":"Windows HideSCAPower Group Policy Feature","description":"Modify the registry of the currently logged in user using reg.exe via cmd console to remove the battery icon Group Policy. Take note that some Group Policy changes might require a restart to take effect. See how ransomware abuses this technique- https://www.virustotal.com/gui/file/2d7855bf6470aa323edf2949b54ce2a04d9e38770f1322c3d0420c2303178d91/details","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-31","name":"Windows HideSCAVolume Group Policy Feature","description":"Modify the registry of the currently logged in user using reg.exe via cmd console to remove the volume icon Group Policy. Take note that some Group Policy changes might require a restart to take effect.. See how ransomware abuses this technique- https://www.virustotal.com/gui/file/2d7855bf6470aa323edf2949b54ce2a04d9e38770f1322c3d0420c2303178d91/details","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-32","name":"Windows Modify Show Compress Color And Info Tip Registry","description":"Modify the registry of the currently logged in user using reg.exe via cmd console to show compress color and show tips feature. See how hermeticwiper uses this technique - https://www.splunk.com/en_us/blog/security/detecting-hermeticwiper.html","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-33","name":"Windows Powershell Logging Disabled","description":"Modify the registry of the currently logged in user using reg.exe via cmd console to disable Powershell Module Logging, Script Block Logging, Transcription and Script Execution see https://admx.help/?Category=Windows_10_2016&Policy=Microsoft.Policies.PowerShell::EnableModuleLogging","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-34","name":"Windows Add Registry Value to Load Service in Safe Mode without Network","description":"Modify the registry to allow a driver, service, to persist in Safe Mode. see https://redcanary.com/blog/tracking-driver-inventory-to-expose-rootkits/ and https://blog.didierstevens.com/2007/03/26/playing-with-safe-mode/ for further details. Adding a subkey to Minimal with the name of your service and a default value set to Service, makes that your service will be started when you boot into Safe Mode without networking. The same applies for the Network subkey.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-35","name":"Windows Add Registry Value to Load Service in Safe Mode with Network","description":"Modify the registry to allow a driver, service, to persist in Safe Mode with networking. see https://redcanary.com/blog/tracking-driver-inventory-to-expose-rootkits/ and https://blog.didierstevens.com/2007/03/26/playing-with-safe-mode/ for further details. Adding a subkey to Netowrk with the name of your service and a default value set to Service, makes that your service will be started when you boot into Safe Mode with networking.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-36","name":"Disable Windows Toast Notifications","description":"Modify the registry of the currently logged in user using reg.exe via cmd console to disable the windows toast notification. See how azorult malware abuses this technique- https://app.any.run/tasks/a6f2ffe2-e6e2-4396-ae2e-04ea0143f2d8/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-37","name":"Disable Windows Security Center Notifications","description":"Modify the registry of the currently logged in user using reg.exe via cmd console to disable the windows security center notification. See how azorult malware abuses this technique- https://app.any.run/tasks/a6f2ffe2-e6e2-4396-ae2e-04ea0143f2d8/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-38","name":"Suppress Win Defender Notifications","description":"Modify the registry of the currently logged in user using reg.exe via cmd console to suppress the windows defender notification. See how azorult malware abuses this technique- https://app.any.run/tasks/a6f2ffe2-e6e2-4396-ae2e-04ea0143f2d8/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-39","name":"Allow RDP Remote Assistance Feature","description":"Modify the registry of the currently logged in user using reg.exe via cmd console to allow rdp remote assistance feature. This feature allow specific user to rdp connect on the targeted machine. See how azorult malware abuses this technique- https://app.any.run/tasks/a6f2ffe2-e6e2-4396-ae2e-04ea0143f2d8/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-40","name":"NetWire RAT Registry Key Creation","description":"NetWire continues to create its home key (HKCU\\SOFTWARE\\NetWire) as well as adding it into the auto-run group in the victim\u2019s registry. See how NetWire malware - https://app.any.run/tasks/41ecdbde-4997-4301-a350-0270448b4c8f/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-41","name":"Ursnif Malware Registry Key Creation","description":"Ursnif downloads additional modules from the C&C server and saves these in the registry folder HKEY_CURRENT_USER\\Software\\AppDataLow\\Software\\Microsoft\\ More information - https://blog.trendmicro.com/trendlabs-security-intelligence/phishing-campaign-uses-hijacked-emails-to-deliver-ursnif-by-replying-to-ongoing-threads/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-42","name":"Terminal Server Client Connection History Cleared","description":"The built-in Windows Remote Desktop Connection (RDP) client (mstsc.exe) saves the remote computer name (or IP address) and the username that is used to login after each successful connection to the remote computer","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1112-43","name":"Disable Windows Error Reporting Settings","description":"Modify the registry of the currently logged in user using reg.exe via cmd console to disable windows error reporting settings. This Windows feature allow the use to report bug, errors, failure or problems encounter in specific application or process. See how azorult malware abuses this technique- https://app.any.run/tasks/a6f2ffe2-e6e2-4396-ae2e-04ea0143f2d8/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-44","name":"DisallowRun Execution Of Certain Applications","description":"Modify the registry of the currently logged in user using reg.exe via cmd console to prevent user running specific computer programs that could aid them in manually removing malware or detecting it using security product.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-45","name":"Enabling Restricted Admin Mode via Command_Prompt","description":"Enabling Restricted Admin Mode via Command_Prompt,enables an attacker to perform a pass-the-hash attack using RDP. See [Passing the Hash with Remote Desktop](https://www.kali.org/blog/passing-hash-remote-desktop/)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-46","name":"Mimic Ransomware - Enable Multiple User Sessions","description":"This test emulates Mimic ransomware's ability to enable multiple user sessions by modifying the AllowMultipleTSSessions value within the Winlogon registry key. See [Mimic Ransomware Overview] (https://www.trendmicro.com/en_us/research/23/a/new-mimic-ransomware-abuses-everything-apis-for-its-encryption-p.html)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-47","name":"Mimic Ransomware - Allow Multiple RDP Sessions per User","description":"This test emulates Mimic ransomware's ability to enable multiple RDP sessions per user by modifying the fSingleSessionPerUser value within the Terminal Server registry key. See [Mimic Ransomware Overview] (https://www.trendmicro.com/en_us/research/23/a/new-mimic-ransomware-abuses-everything-apis-for-its-encryption-p.html)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-48","name":"Event Viewer Registry Modification - Redirection URL","description":"Modify event viewer registry values to alter the behavior of the online help redirection. Upon opening an event in event viewer and attempting to view the help page for the event, it will open the URL or execute the program defined in the redirection URL registry entry.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-49","name":"Event Viewer Registry Modification - Redirection Program","description":"Modify event viewer registry values to alter the behavior of the online help redirection. Upon opening an event in event viewer and attempting to view the help page for the event, it will execute the program defined in the redirection program registry entry.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-50","name":"Enabling Remote Desktop Protocol via Remote Registry","description":"Enabling RDP through remote registry.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-51","name":"Disable Win Defender Notification","description":"Disable Win Defender Notification. Redline is using this to disable this win defender feature.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-52","name":"Disable Windows OS Auto Update","description":"Disable Auto Update Windows OS feature. Redline is using this as part of its defense evasion.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-53","name":"Disable Windows Auto Reboot for current logon user","description":"Disable Windows Auto Reboot for current logon user. Redline is using this as part of its defense evasion.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-54","name":"Windows Auto Update Option to Notify before download","description":"Windows Auto Update Option to Notify before download. Redline is using this as part of its defense evasion.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-55","name":"Do Not Connect To Win Update","description":"Do Not Connect To Win Update. Redline is using this as part of its defense evasion.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-56","name":"Tamper Win Defender Protection","description":"Tamper Win Defender Protection. RedLine Stealer is executing another component file to modify this win defender feature in registry. Take note that this modification might not be enough to disable this feature but can be a good indicator of malicious process that tries to tamper this Win Defender feature settings.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-57","name":"Snake Malware Registry Blob","description":"The following Atomic Test creates a registry blob in HKLM:\\SOFTWARE\\Classes\\.wav\\OpenWithProgIds, which is related to Snake Malware. Per the report, upon execution, Snake's WerFault.exe will attempt to decrypt an encrypted blob within the Windows registry that is typically found at HKLM:\\SOFTWARE\\Classes\\.wav\\OpenWithProgIds. The encrypted data includes the AES key, IV, and path that is used to find and decrypt the file containing Snake's kernel driver and kernel driver loader.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-58","name":"Allow Simultaneous Download Registry","description":"A registry modification to allow Simultaneous download in the system.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-59","name":"Modify Internet Zone Protocol Defaults in Current User Registry - cmd","description":"This test simulates an adversary modifying the Internet Zone Protocol Defaults in the registry of the currently logged-in user using the reg.exe utility via the command prompt. Such modifications can be indicative of an adversary trying to weaken browser security settings. Upon execution, if successful, the message \"The operation completed successfully.\" will be displayed. To verify the effects of the test: 1. Open the Registry Editor (regedit.exe). 2. Navigate to \"HKEY_CURRENT_USER\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Internet Settings\\ZoneMap\\ProtocolDefaults\". 3. Check for the presence of the \"http\" and \"https\" DWORD values set to `0`. Or run: ```batch reg query \"HKEY_CURRENT_USER\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Internet Settings\\ZoneMap\\ProtocolDefaults\" ```","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-60","name":"Modify Internet Zone Protocol Defaults in Current User Registry - PowerShell","description":"This test simulates an adversary modifying the Internet Zone Protocol Defaults in the registry of the currently logged-in user using PowerShell. Such modifications can be indicative of an adversary attempting to weaken browser security settings. To verify the effects of the test: 1. Open the Registry Editor (regedit.exe). 2. Navigate to \"HKEY_CURRENT_USER\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Internet Settings\\ZoneMap\\ProtocolDefaults\". 3. Check for the presence of the \"http\" and \"https\" DWORD values set to `0`. Or run: ```powershell Get-ItemProperty -Path 'HKCU:\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Internet Settings\\ZoneMap\\ProtocolDefaults' | Select-Object http,https ```","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-61","name":"Activities To Disable Secondary Authentication Detected By Modified Registry Value.","description":"Detect the disable secondary authentication activities that adversary attempt to bypass MFA and to get the unauthorized access to the system or sensitive data. See the related article (https://admx.help/?Category=Windows_10_2016&Policy=Microsoft.Policies.SecondaryAuthenticationFactor::MSSecondaryAuthFactor_AllowSecondaryAuthenticationDevice).","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-62","name":"Activities To Disable Microsoft [FIDO Aka Fast IDentity Online] Authentication Detected By Modified Registry Value.","description":"Detect the Microsoft FIDO authentication disable activities that adversary attempt to gains access to login credentials (e.g., passwords), they may be able to impersonate the user and access sensitive accounts or data and also increases the risk of falling victim to phishing attacks. See the related article (https://admx.help/?Category=Windows_10_2016&Policy=Microsoft.Policies.FidoAuthentication::AllowFidoDeviceSignon).","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-63","name":"Scarab Ransomware Defense Evasion Activities","description":"Scarab Ransomware defense evasion activities that can abuse the registry values to modify the settings of the Credential Security Support Provider to overcome potential RDP connection issues. [Scarab Ransomware Article](https://www.welivesecurity.com/en/eset-research/scarabs-colon-izing-vulnerable-servers/)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-64","name":"Disable Remote Desktop Anti-Alias Setting Through Registry","description":"A modification registry to disable RDP anti-alias settings. This technique was seen in DarkGate malware as part of its installation","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-65","name":"Disable Remote Desktop Security Settings Through Registry","description":"A modification registry to disable RDP security settings. This technique was seen in DarkGate malware as part of its installation","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-66","name":"Disabling ShowUI Settings of Windows Error Reporting (WER)","description":"A modification registry to disable ShowUI settings of Windows Er
