ror Report. This registry setting can influence the behavior of error reporting dialogs or prompt box. This technique was seen in DarkGate malware as part of its installation.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-67","name":"Enable Proxy Settings","description":"A modification registry to enable proxy settings. This technique was seen in DarkGate malware as part of its installation.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-68","name":"Set-Up Proxy Server","description":"A modification registry to setup proxy server. This technique was seen in DarkGate malware as part of its installation.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-69","name":"RDP Authentication Level Override","description":"A modification registry to override RDP Authentication Level. This technique was seen in DarkGate malware as part of its installation.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-70","name":"Enable RDP via Registry (fDenyTSConnections)","description":"Modify the registry value of fDenyTSConnections to allow incoming RDP connections. This activity has been observed by multiple ransomware groups, including Hive ransomware. [Reference](https://www.rapid7.com/blog/post/2023/01/11/increasing-the-sting-of-hive-ransomware/)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-71","name":"Disable Windows Prefetch Through Registry","description":"Modify the registry of the machine to disable prefetch. Disabling prefetch will remove one artifact for evidence of application execution. Restart is required post modification","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-72","name":"Setting Shadow key in Registry for RDP Shadowing","description":"Microsoft Remote Desktop Protocol (RDP) supports a \u201cshadowing\u201d feature and RDP is available in all Windows Server Operating Systems and the business editions of end-user Windows versions. In order to use the RDP shadowing feature, the Remote Desktop Services (TermService) service needs to be running (which it does by default), a rule needs to be enabled in the Windows Firewall and in case of stealth reasons, a setting needs to be configured to not prompt the user for permission when they are being shadowed. In order to configure RDP shadowing session in a quiet mode.  The registry of a remote system can be updated using several protocols, depending on the accessible ports and configuration of the services listening on those ports. Our aim is to set the Shadow value in HKLM\\Software\\Policies\\Microsoft\\Windows NT\\Terminal Services on the remote machine to 2, which allows us to both view and control the session without the user being informed. [Reference](https://blog.bitsadmin.com/spying-on-users-using-rdp-shadowing)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-73","name":"Flush Shimcache","description":"The ShimCache is a component in Windows operating systems that stores information about recently executed applications. It is used by the operating system to speed up the launching process of applications. The ShimCache is also used by IR teams and Forensic teams. Forensic investigators can use the ShimCache to determine which programs have been executed on a system, even if they have been deleted or their logs have been cleared.Reference : https://blueteamops.medium.com/shimcache-flush-89daff28d15e","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-74","name":"Disable Windows Remote Desktop Protocol","description":"Modify the registry of the machine to disable remote desktop protocol.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-75","name":"Enforce Smart Card Authentication Through Registry","description":"Enforce Smart Card Authentication Through Registry","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-76","name":"Requires the BitLocker PIN for Pre-boot authentication","description":"Requires the BitLocker PIN for Pre-boot authentication","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-77","name":"Modify EnableBDEWithNoTPM Registry entry","description":"Allow BitLocker without a compatible TPM (requires a password)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-78","name":"Modify UseTPM Registry entry","description":"Use Trusted Platform Module (TPM) for Bitlocker tool","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-79","name":"Modify UseTPMPIN Registry entry","description":"Allow startup PIN with TPM for Bitlocker tool","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-80","name":"Modify UseTPMKey Registry entry","description":"Allow startup key with TPM for Bitlocker tool","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-81","name":"Modify UseTPMKeyPIN Registry entry","description":"Allow startup key and PIN with TPM for Bitlocker tool","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-82","name":"Modify EnableNonTPM Registry entry","description":"Allow Bitlocker without TPM for Bitlocker tool","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-83","name":"Modify UsePartialEncryptionKey Registry entry","description":"Allow startup key with TPM for Bitlocker tool","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-84","name":"Modify UsePIN Registry entry","description":"Allow startup PIN with TPM for Bitlocker tool","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-85","name":"Abusing Windows TelemetryController Registry Key for Persistence","description":"The Windows Compatibility Telemetry system makes use of the CompatTelRunner.exe binary to run a variety of telemetry tasks. It relies on the registry for instructions on which commands to run. It will run any arbitrary command without restriction of location or type. Blog :https://www.trustedsec.com/blog/abusing-windows-telemetry-for-persistence","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-86","name":"Modify RDP-Tcp Initial Program Registry Entry","description":"If the fInheritInitialProgram value is set to 1, the exe indicated in the InitialProgram value is automatically started on RDP connection. Once the test commands are run, notepad will execute automatically on new RDP connection","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-87","name":"Abusing MyComputer Disk Cleanup Path for Persistence","description":"Replacing the registry settings with custom executable will end up with the replacement programs being executed at the time OS will decide to kick off the respective activity","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-88","name":"Abusing MyComputer Disk Fragmentation Path for Persistence","description":"Replacing the registry settings with custom executable will end up with the replacement programs being executed at the time OS will decide to kick off the respective activity","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-89","name":"Abusing MyComputer Disk Backup Path for Persistence","description":"Replacing the registry settings with custom executable will end up with the replacement programs being executed at the time OS will decide to kick off the respective activity","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1112-90","name":"Adding custom paths for application execution","description":"As per Microsoft,the entries found under App Paths are used primarily to map an application\u2019s executable file name to that file\u2019s fully qualified path and to pre-pend information to the PATH environment variable on a per-application, per-process basis. The path can be modified to load a custom application of choice. Post the registry changes of this test, when someone tries to manually run msedge.exe via StartMenu/Run window , notepad will be launched.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1113","name":"Screen Capture","tactic":"TA0009","tactics":["TA0009"],"atomicTests":[{"id":"T1113-1","name":"Screencapture","description":"Use screencapture command to collect a full desktop screenshot","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1113-2","name":"Screencapture (silent)","description":"Use screencapture command to collect a full desktop screenshot","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1113-3","name":"X Windows Capture","description":"Use xwd command to collect a full desktop screenshot and review file with xwud","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1113-4","name":"X Windows Capture (freebsd)","description":"Use xwd command to collect a full desktop screenshot and review file with xwud","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1113-5","name":"Capture Linux Desktop using Import Tool","description":"Use import command from ImageMagick to collect a full desktop screenshot","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1113-6","name":"Capture Linux Desktop using Import Tool (freebsd)","description":"Use import command from ImageMagick to collect a full desktop screenshot","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1113-7","name":"Windows Screencapture","description":"Use Psr.exe binary to collect screenshots of user display. Test will do left mouse click to simulate user behaviour","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1113-8","name":"Windows Screen Capture (CopyFromScreen)","description":"Take a screen capture of the desktop through a call to the [Graphics.CopyFromScreen] .NET API. [Graphics.CopyFromScreen]: https://docs.microsoft.com/en-us/dotnet/api/system.drawing.graphics.copyfromscreen","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1113-9","name":"Windows Recall Feature Enabled - DisableAIDataAnalysis Value Deleted","description":"Detects the enabling of the Windows Recall feature via registry manipulation. Windows Recall can be enabled by deleting the existing \"DisableAIDataAnalysis\" registry value. Adversaries may enable Windows Recall as part of post-exploitation discovery and collection activities. This rule assumes that Recall is already explicitly disabled on the host, and subsequently enabled by the adversary. - https://learn.microsoft.com/en-us/windows/client-management/manage-recall - https://learn.microsoft.com/en-us/windows/client-management/mdm/policy-csp-windowsai#disableaidataanalysis","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1113-10","name":"RDP Bitmap Cache Extraction via bmc-tools","description":"Simulates an attacker extracting the RDP bitmap cache using the ANSSI \"bmc-tools.py\" script. This test requires valid RDP bitmap cache files to exist on the system (usually created after an outgoing RDP connection is made).","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1114.001","name":"Email Collection: Local Email Collection","tactic":"TA0009","tactics":["TA0009"],"atomicTests":[{"id":"T1114.001-1","name":"Email Collection with PowerShell Get-Inbox","description":"Search through local Outlook installation, extract mail, compress the contents, and saves everything to a directory for later exfiltration. Successful execution will produce stdout message stating \"Please be patient, this may take some time...\". Upon completion, final output will be a mail.csv file. Note: Outlook is required, but no email account necessary to produce artifacts.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1114.002","name":"Email Collection: Remote Email Collection","tactic":"TA0009","tactics":["TA0009"],"atomicTests":[{"id":"T1114.002-1","name":"Office365 - Remote Mail Collected","description":"Create and register an entra application that downloads emails from a tenant's Office 365 mailboxes using the Microsoft Graph API app-only access. This can be used by an adversary to collect an organization's sensitive information.","supportedPlatforms":["office-365"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1114.003","name":"Email Collection: Email Forwarding Rule","tactic":"TA0009","tactics":["TA0009"],"atomicTests":[{"id":"T1114.003-1","name":"Office365 - Email Forwarding","description":"Creates a new Inbox Rule to forward emails to an external user via the \"ForwardTo\" property of the New-InboxRule Powershell cmdlet.","supportedPlatforms":["office-365"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1115","name":"Clipboard Data","tactic":"TA0009","tactics":["TA0009"],"atomicTests":[{"id":"T1115-1","name":"Utilize Clipboard to store or execute commands from","description":"Add data to clipboard to copy off or execute commands from.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1115-2","name":"Execute Commands from Clipboard using PowerShell","description":"Utilize PowerShell to echo a command to clipboard and execute it","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1115-3","name":"Execute commands from clipboard","description":"Echo a command to clipboard and execute it","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1115-4","name":"Collect Clipboard Data via VBA","description":"This module copies the data stored in the user's clipboard and writes it to a file, $env:TEMP\\atomic_T1115_clipboard_data.txt","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true},{"id":"T1115-5","name":"Add or copy content to clipboard with xClip","description":"Utilize Linux Xclip to copy history and place in clipboard then output to a history.txt file. Successful execution will capture history and output to a file on disk.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1119","name":"Automated Collection","tactic":"TA0009","tactics":["TA0009"],"atomicTests":[{"id":"T1119-1","name":"Automated Collection Command Prompt","description":"Automated Collection. Upon execution, check the users temp directory (%temp%) for the folder T1119_command_prompt_collection to see what was collected.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1119-2","name":"Automated Collection PowerShell","description":"Automated Collection. Upon execution, check the users temp directory (%temp%) for the folder T1119_powershell_collection to see what was collected.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1119-3","name":"Recon information for export with PowerShell","description":"collect information for exfiltration. Upon execution, check the users temp directory (%temp%) for files T1119_*.txt to see what was collected.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1119-4","name":"Recon information for export with Command Prompt","description":"collect information for exfiltration. Upon execution, check the users temp directory (%temp%) for files T1119_*.txt to see what was collected.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1120","name":"Peripheral Device Discovery","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1120-1","name":"Win32_PnPEntity Hardware Inventory","description":"Perform peripheral device discovery using Get-WMIObject Win32_PnPEntity","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1120-2","name":"WinPwn - printercheck","description":"Search for printers / potential vulns using printercheck function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1120-3","name":"Peripheral Device Discovery via fsutil","description":"Performs pheripheral device discovery utilizing fsutil to list all drives.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1120-4","name":"Get Printer Device List via PowerShell Command","description":"This test uses PowerShell to list printers on a Windows system, demonstrating a discovery technique attackers might use to gather details on connected devices. Using Get-Printer, they can view information on all available printers, identifying potential devices for further targeting.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1123","name":"Audio Capture","tactic":"TA0009","tactics":["TA0009"],"atomicTests":[{"id":"T1123-1","name":"using device audio capture commandlet","description":"Uses AudioDeviceCmdlets to set the default recording device and simulate audio capture. Module repo: [AudioDeviceCmdlets](https://github.com/frgnca/AudioDeviceCmdlets)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1123-2","name":"Registry artefact when application use microphone","description":"[can-you-track-processes-accessing-the-camera-and-microphone](https://svch0st.medium.com/can-you-track-processes-accessing-the-camera-and-microphone-7e6885b37072)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1123-3","name":"using Quicktime Player","description":"Use AppleScript to get Quicktime Player to record an audio file from the default microphone. Should create a non-empty m4a file with sound from the microphone. - requires Automation permissions but no additional microphone permissions - saves file in /tmp by default. Other locations likely to require more permissions.","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1124","name":"System Time Discovery","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1124-1","name":"System Time Discovery","description":"Identify the system time. Upon execution, the local computer system time and timezone will be displayed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1124-2","name":"System Time Discovery - PowerShell","description":"Identify the system time via PowerShell. Upon execution, the system time will be displayed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1124-3","name":"System Time Discovery in FreeBSD/macOS","description":"Identify system time. Upon execution, the local computer system time and timezone will be displayed.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1124-4","name":"System Time Discovery W32tm as a Delay","description":"identifies DCRat delay time tactics using w32tm. https://research.splunk.com/endpoint/b2cc69e7-11ba-42dc-a269-59c069a48870/ https://blogs.blackberry.com/en/2022/05/dirty-deeds-done-dirt-cheap-russian-rat-offers-backdoor-bargains","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1124-5","name":"System Time with Windows time Command","description":"Displays the current system time via the Windows builtin time command: https://learn.microsoft.com/en-us/windows-server/administration/windows-commands/time Recently observed in use in the wild during an incident involving Ursnif malware: https://github.com/The-DFIR-Report/Sigma-Rules/blob/dc72f0b557fc63347379be0a33439788256761c8/rules/windows/process_creation/proc_creation_win_system_time_lookup.yml https://thedfirreport.com/2023/01/09/unwrapping-ursnifs-gifts/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1124-6","name":"Discover System Time Zone via Registry","description":"Identify the Operating System Time Zone via registry with the reg.exe command. Upon execution, the system Time Zone will be shown.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1125","name":"Video Capture","tactic":"TA0009","tactics":["TA0009"],"atomicTests":[{"id":"T1125-1","name":"Registry artefact when application use webcam","description":"[can-you-track-processes-accessing-the-camera-and-microphone](https://svch0st.medium.com/can-you-track-processes-accessing-the-camera-and-microphone-7e6885b37072)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1127","name":"Trusted Developer Utilities Proxy Execution","tactic":"TA0002","tactics":["TA0002"],"atomicTests":[{"id":"T1127-1","name":"Lolbin Jsc.exe compile javascript to exe","description":"Use jsc.exe to compile javascript code stored in scriptfile.js and output scriptfile.exe. https://lolbas-project.github.io/lolbas/Binaries/Jsc/ https://www.phpied.com/make-your-javascript-a-windows-exe/","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1127-2","name":"Lolbin Jsc.exe compile javascript to dll","description":"Use jsc.exe to compile javascript code stored in Library.js and output Library.dll. https://lolbas-project.github.io/lolbas/Binaries/Jsc/ https://www.phpied.com/make-your-javascript-a-windows-exe/","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1127.001","name":"Trusted Developer Utilities Proxy Execution: MSBuild","tactic":"TA0002","tactics":["TA0002"],"atomicTests":[{"id":"T1127.001-1","name":"MSBuild Bypass Using Inline Tasks (C#)","description":"Executes the code in a project file using msbuild.exe. The default C# project example file (T1127.001.csproj) will simply print \"Hello From a Code Fragment\" and \"Hello From a Class.\" to the screen.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1127.001-2","name":"MSBuild Bypass Using Inline Tasks (VB)","description":"Executes the code in a project file using msbuild.exe. The default Visual Basic example file (vb.xml) will simply print \"Hello from a Visual Basic inline task!\" to the screen.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1129","name":"Server Software Component","tactic":"TA0002","tactics":["TA0002"],"atomicTests":[{"id":"T1129-1","name":"ESXi - Install a custom VIB on an ESXi host","description":"An adversary can maintain persistence within an ESXi host by installing malicious vSphere Installation Bundles (VIBs). [Reference](https://www.mandiant.com/resources/blog/esxi-hypervisors-malware-persistence)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1132.001","name":"Data Encoding: Standard Encoding","tactic":"TA0011","tactics":["TA0011"],"atomicTests":[{"id":"T1132.001-1","name":"Base64 Encoded data.","description":"Utilizing a common technique for posting base64 encoded data.","supportedPlatforms":["macos","linux"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1132.001-2","name":"Base64 Encoded data (freebsd)","description":"Utilizing a common technique for posting base64 encoded data.","supportedPlatforms":["linux"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true},{"id":"T1132.001-3","name":"XOR Encoded data.","description":"XOR encodes the data with a XOR key. Reference - https://gist.github.com/loadenmb/8254cee0f0287b896a05dcdc8a30042f","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1133","name":"External Remote Services","tactic":"TA0003","tactics":["TA0003","TA0001"],"atomicTests":[{"id":"T1133-1","name":"Running Chrome VPN Extensions via the Registry 2 vpn extension","description":"Running Chrome VPN Extensions via the Registry install 2 vpn extension, please see \"T1133\\src\\list of vpn extension.txt\" to view complete list","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1134.001","name":"Access Token Manipulation: Token Impersonation/Theft","tactic":"TA0004","tactics":["TA0004"],"atomicTests":[{"id":"T1134.001-1","name":"Named pipe client impersonation","description":"Uses PowerShell and Empire's [GetSystem module](https://github.com/BC-SECURITY/Empire/blob/v3.4.0/data/module_source/privesc/Get-System.ps1). The script creates a named pipe, and a service that writes to that named pipe. When the service connects to the named pipe, the script impersonates its security context. When executed successfully, the test displays the domain and name of the account it's impersonating (local SYSTEM). Reference: https://blog.cobaltstrike.com/2014/04/02/what-happens-when-i-type-getsystem/","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1134.001-2","name":"`SeDebugPrivilege` token duplication","description":"Uses PowerShell and Empire's [GetSystem module](https://github.com/BC-SECURITY/Empire/blob/v3.4.0/data/module_source/privesc/Get-System.ps1). The script uses `SeDebugPrivilege` to obtain, duplicate and impersonate the token of a another process. When executed successfully, the test displays the domain and name of the account it's impersonating (local SYSTEM).","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1134.001-3","name":"Launch NSudo Executable","description":"Launches the NSudo executable for a short period of time and then exits. NSudo download observed after maldoc execution. NSudo is a system management tool for advanced users to launch programs with full privileges.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1134.001-4","name":"Bad Potato","description":"https://github.com/BeichenDream/BadPotato Privilege escalation using named pipe connections","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1134.001-5","name":"Juicy Potato","description":"This Atomic utilizes Juicy Potato to obtain privilege escalation. Upon successful execution of this test, a vulnerable CLSID will be used to execute a process with system permissions. This tactic has been previously observed in SnapMC Ransomware, amongst numerous other campaigns. [Reference](https://blog.fox-it.com/2021/10/11/snapmc-skips-ransomware-steals-data/)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1134.002","name":"Create Process with Token","tactic":"TA0004","tactics":["TA0004"],"atomicTests":[{"id":"T1134.002-1","name":"Access Token Manipulation","description":"This Action demonstrates how an access token for a specific program can spawn another program under a different owner. Adversaries can leverage access tokens to run programs under a different user not only to achieve privilege escalation but also to evade detection by blending in with normal user activity. This Action will query all processes and list the process name and owner.It will then make a copy of an existing token to create a new instance of cmd.exe","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1134.002-2","name":"WinPwn - Get SYSTEM shell - Pop System Shell using Token Manipulation technique","description":"Get SYSTEM shell - Pop System Shell using Token Manipulation technique via function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1134.004","name":"Access Token Manipulation: Parent PID Spoofing","tactic":"TA0004","tactics":["TA0004"],"atomicTests":[{"id":"T1134.004-1","name":"Parent PID Spoofing using PowerShell","description":"This test uses PowerShell to replicates how Cobalt Strike does ppid spoofing and masquerade a spawned process. Upon execution, \"Process C:\\Program Files\\Internet Explorer\\iexplore.exe is spawned with pid ####\" will be displayed and calc.exe will be launched. Credit to In Ming Loh (https://github.com/countercept/ppid-spoofing/blob/master/PPID-Spoof.ps1)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1134.004-2","name":"Parent PID Spoofing - Spawn from Current Process","description":"Spawns a powershell.exe process as a child of the current process.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1134.004-3","name":"Parent PID Spoofing - Spawn from Specified Process","description":"Spawns a notepad.exe process as a child of the current process.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1134.004-4","name":"Parent PID Spoofing - Spawn from svchost.exe","description":"Spawnd a process as a child of the first accessible svchost.exe process.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1134.004-5","name":"Parent PID Spoofing - Spawn from New Process","description":"Creates a notepad.exe process and then spawns a powershell.exe process as a child of it.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1134.005","name":"Access Token Manipulation: SID-History Injection","tactic":"TA0004","tactics":["TA0004"],"atomicTests":[{"id":"T1134.005-1","name":"Injection SID-History with mimikatz","description":"Adversaries may use SID-History Injection to escalate privileges and bypass access controls. Must be run on domain controller","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1135","name":"Network Share Discovery","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1135-1","name":"Network Share Discovery","description":"Network Share Discovery","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1135-2","name":"Network Share Discovery - linux","description":"Network Share Discovery using smbstatus","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1135-3","name":"Network Share Discovery - FreeBSD","description":"Network Share Discovery using smbstatus","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1135-4","name":"Network Share Discovery command prompt","description":"Network Share Discovery utilizing the command prompt. The computer name variable may need to be modified to point to a different host Upon execution available network shares will be displayed in the powershell session","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1135-5","name":"Network Share Discovery PowerShell","description":"Network Share Discovery utilizing PowerShell. The computer name variable may need to be modified to point to a different host Upon execution, available network shares will be displayed in the powershell session","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1135-6","name":"View available share drives","description":"View information about all of the resources that are shared on the local computer Upon execution, available share drives will be displayed in the powershell session","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1135-7","name":"Share Discovery with PowerView","description":"Enumerate Domain Shares the current user has access. Upon execution, progress info about each share being scanned will be displayed.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true},{"id":"T1135-8","name":"PowerView ShareFinder","description":"PowerView is a PowerShell tool to gain network situational awareness on Windows domains. ShareFinder finds (non-standard) shares on machines in the domain.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1135-9","name":"WinPwn - shareenumeration","description":"Network share enumeration using the shareenumeration function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1135-10","name":"Network Share Discovery via dir command","description":"Network Share Discovery utilizing the dir command prompt. The computer ip variable may need to be modified to point to a different host ip Upon execution available network shares will be displayed in the commandline session","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1135-11","name":"Enumerate All Network Shares with SharpShares","description":"SharpShares is a command line tool that can be integrated with Cobalt Strike's execute-assembly module, allowing for the enumeration of network shares. This technique has been utilized by various ransomware groups, including BianLian. [Reference](https://www.cisa.gov/news-events/cybersecurity-advisories/aa23-136a)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1135-12","name":"Enumerate All Network Shares with Snaffler","description":"Snaffler is an open-source tool that has been used by various threat groups, including Scattered Spider/Muddled Libra, to enumerate accessible shares and credential-containing files within a domain. [Reference](https://unit42.paloaltonetworks.com/muddled-libra/)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1136.001","name":"Create Account: Local Account","tactic":"TA0003","tactics":["TA0003"],"atomicTests":[{"id":"T1136.001-1","name":"Create a user account on a Linux system","description":"Create a user via useradd","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1136.001-2","name":"Create a user account on a FreeBSD system","description":"Create a user via pw","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1136.001-3","name":"Create a user account on a MacOS system","description":"Creates a user on a MacOS system with dscl","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1136.001-4","name":"Create a new user in a command prompt","description":"Creates a new user in a command prompt. Upon execution, \"The command completed successfully.\" will be displayed. To verify the new account, run \"net user\" in powershell or CMD and observe that there is a new user named \"T1136.001_CMD\"","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1136.001-5","name":"Create a new user in PowerShell","description":"Creates a new user in PowerShell. Upon execution, details about the new account will be displayed in the powershell session. To verify the new account, run \"net user\" in powershell or CMD and observe that there is a new user named \"T1136.001_PowerShell\"","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1136.001-6","name":"Create a new user in Linux with `root` UID and GID.","description":"Creates a new user in Linux and adds the user to the `root` group. This technique was used by adversaries during the Butter attack campaign.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1136.001-7","name":"Create a new user in FreeBSD with `root` GID.","description":"Creates a new user in FreeBSD and adds the user to the `root` group. This technique was used by adversaries during the Butter attack campaign.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1136.001-8","name":"Create a new Windows admin user","description":"Creates a new admin user in a command prompt.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1136.001-9","name":"Create a new Windows admin user via .NET","description":"Creates a new admin user in a powershell session without using net.exe","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1136.001-10","name":"Create a Linux user via kubectl in a Pod","description":"Launches a short-lived Alpine pod and creates a Linux user inside the pod. The pod is automatically deleted after execution.","supportedPlatforms":["containers"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1136.002","name":"Create Account: Domain Account","tactic":"TA0003","tactics":["TA0003"],"atomicTests":[{"id":"T1136.002-1","name":"Create a new Windows domain admin user","description":"Creates a new domain admin user in a command prompt.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1136.002-2","name":"Create a new account similar to ANONYMOUS LOGON","description":"Create a new account similar to ANONYMOUS LOGON in a command prompt.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1136.002-3","name":"Create a new Domain Account using PowerShell","description":"Creates a new Domain User using the credentials of the Current User","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1136.002-4","name":"Active Directory Create Admin Account","description":"Use Admin Credentials to Create A Domain Admin Account","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1136.002-5","name":"Active Directory Create User Account (Non-elevated)","description":"Use Admin Credentials to Create A Normal Account (as means of entry)","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1136.003","name":"Create Account: Cloud Account","tactic":"TA0003","tactics":["TA0003"],"atomicTests":[{"id":"T1136.003-1","name":"AWS - Create a new IAM user","description":"Creates a new IAM user in AWS. Upon successful creation, a new user will be created. Adversaries create new IAM users so that their malicious activity do not interupt the normal functions of the compromised users and can remain undetected for a long time","supportedPlatforms":["iaas:aws"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1136.003-2","name":"Azure AD - Create a new user","description":"Creates a new user in Azure AD. Upon successful creation, a new user will be created. Adversaries create new users so that their malicious activity does not interrupt the normal functions of the compromised users and can remain undetected for a long time.","supportedPlatforms":["azure-ad"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1136.003-3","name":"Azure AD - Create a new user via Azure CLI","description":"Creates a new user in Azure AD via the Azure CLI. Upon successful creation, a new user will be created. Adversaries create new users so that their malicious activity does not interrupt the normal functions of the compromised users and can remain undetected for a long time.","supportedPlatforms":["azure-ad"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1137","name":"Office Application Startup","tactic":"TA0003","tactics":["TA0003"],"atomicTests":[{"id":"T1137-1","name":"Office Application Startup - Outlook as a C2","description":"As outlined in MDSEC's Blog post https://www.mdsec.co.uk/2020/11/a-fresh-outlook-on-mail-based-persistence/ it is possible to use Outlook Macro as a way to achieve persistance and execute arbitrary commands. This transform Outlook into a C2. Too achieve this two things must happened on the syste - The macro security registry value must be set to '1' - A file called VbaProject.OTM must be created in the Outlook Folder.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1137.001","name":"Office Application Startup: Office Template Macros.","tactic":"TA0003","tactics":["TA0003"],"atomicTests":[{"id":"T1137.001-1","name":"Injecting a Macro into the Word Normal.dotm Template for Persistence via PowerShell","description":"Injects a Macro in the Word default template \"Normal.dotm\" and makes it execute each time that Word is opened. In this test, the Macro creates a sheduled task to open Calc.exe every evening.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1137.002","name":"Office Application Startup: Office Test","tactic":"TA0003","tactics":["TA0003"],"atomicTests":[{"id":"T1137.002-1","name":"Office Application Startup Test Persistence (HKCU)","description":"Office Test Registry location exists that allows a user to specify an arbitrary DLL that will be executed every time an Office application is started. Key is used for debugging purposes. Not created by default & exist in HKCU & HKLM hives.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1137.004","name":"Office Application Startup: Outlook Home Page","tactic":"TA0003","tactics":["TA0003"],"atomicTests":[{"id":"T1137.004-1","name":"Install Outlook Home Page Persistence","description":"This test simulates persistence being added to a host via the Outlook Home Page functionality. This causes Outlook to retrieve URL containing a malicious payload every time the targeted folder is viewed. Triggering the payload requires manually opening Outlook and viewing the targetted folder (e.g. Inbox).","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1137.005","name":"Office Application Startup: Outlook Rules","tactic":"TA0003","tactics":["TA0003"],"atomicTests":[{"id":"T1137.005-1","name":"Outlook Rule - Subject Trigger with DeletePermanently Action via COM Object","description":"Creates a malicious Outlook rule via the COM object that permanently deletes emails when an email with a specific subject keyword arrives. Simulates adversary persistence via Outlook Rules (T1137.005). Uses DeletePermanently action as it does not require a resolved Exchange folder unlike MoveToFolder. NOTE: olRuleActionStartApplication cannot be created programmatically per Microsoft's Rules object model - DeletePermanently is used as the supported equivalent that generates the same rule-creation artefact. NOTE: This test MUST be run from a non-elevated (standard user) PowerShell session. Outlook COM fails with 0x80080005 when invoked as Administrator.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1137.005-2","name":"Outlook Rule - Sender Address Trigger with DeletePermanently Action via COM Object","description":"Creates an Outlook rule via COM that permanently deletes emails received from a specific sender address. Adversaries use sender-based triggers to make rules appear more legitimate (e.g. disguised as a filter for a specific colleague). Tests a different rule condition path through the COM object model. Uses DeletePermanently as it does not require a resolved Exchange folder unlike MoveToFolder. NOTE: This test MUST be run from a non-elevated (standard user) PowerShell session. Outlook COM fails with 0x80080005 when invoked as Administrator.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1137.005-3","name":"Outlook Rule - Auto-Forward Emails to External Address via COM Object","description":"Creates an Outlook rule that automatically forwards all received emails to an external address. Simulates Business Email Compromise (BEC) and insider threat scenarios where adversaries establish forwarding rules to exfiltrate mail. One of the most commonly observed real-world abuses of Outlook rules. Detected by Exchange mail flow anomalies and Microsoft Secure Score forwarding alerts. NOTE: No actual email is forwarded during this test - the rule is created but a trigger email is not sent. Run cleanup immediately after verification. NOTE: This test MUST be run from a non-elevated (standard user) PowerShell session. Outlook COM fails with 0x80080005 when invoked as Administrator.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1137.005-4","name":"Outlook Rules - Enumerate Existing Rules via PowerShell COM Object","description":"Enumerates all Outlook rules configured on the local profile using the PowerShell COM object. Simulates the discovery phase where an adversary audits existing rules before implanting their own, or where a threat actor tool such as Ruler lists rules to understand the environment. This enumeration should itself generate telemetry - use it to validate that your monitoring catches PowerShell spawning Outlook COM for recon purposes. NOTE: This test MUST be run from a non-elevated (standard user) PowerShell session. Outlook COM fails with 0x80080005 when invoked as Administrator.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1137.005-5","name":"Outlook Rule - Create Rule with Obfuscated Blank Name (MAPI Evasion)","description":"Creates an Outlook rule with a zero-width space as its display name, making it appear blank and invisible in the standard Outlook Rules UI. Simulates the hidden inbox rule technique documented by Damian Pfammatter (2018) and referenced in MITRE ATT&CK T1137.005 - adversaries use MAPI editors or Ruler to blank PR_RULE_MSG_NAME so the rule does not appear during casual rule auditing. Tests whether monitoring catches rules that are invisible in the Outlook GUI but detectable via MFCMapi or Get-InboxRule on Exchange. Uses PlaySound action as RunApplication cannot be created programmatically per Microsoft's Rules object model. NOTE: This test MUST be run from a non-elevated (standard user) PowerShell session. Outlook COM fails with 0x80080005 when invoked as Administrator. NOTE: Script is written to a temp file before execution to prevent the ART executor's quote-wrapping from mangling the zero-width space bytes.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1137.006","name":"Office Application Startup: Add-ins","tactic":"TA0003","tactics":["TA0003"],"atomicTests":[{"id":"T1137.006-1","name":"Code Executed Via Excel Add-in File (XLL)","description":"Loads an XLL file using the excel add-ins library. This causes excel to launch Notepad.exe as a child process. This atomic test does not include persistent code execution as you would typically see when this is implemented in malware.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1137.006-2","name":"Persistent Code Execution Via Excel Add-in File (XLL)","description":"Creates an Excel Add-in file (XLL) and sets a registry key to make it run automatically when Excel is started The sample XLL provided launches the notepad as a proof-of-concept for persistent execution from Office.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1137.006-3","name":"Persistent Code Execution Via Word Add-in File (WLL)","description":"Creates a Word Add-in file (WLL) which runs automatically when Word is started The sample WLL provided launches the notepad as a proof-of-concept for persistent execution from Office. Successfully tested on 32-bit Office 2016. Not successful from microsoft 365 version of Office.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1137.006-4","name":"Persistent Code Execution Via Excel VBA Add-in File (XLAM)","description":"Creates an Excel VBA Add-in file (XLAM) which runs automatically when Excel is started The sample XLAM provided launches the notepad as a proof-of-concept for persistent execution from Office.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1137.006-5","name":"Persistent Code Execution Via PowerPoint VBA Add-in File (PPAM)","description":"Creates a PowerPoint VBA Add-in file (PPAM) which runs automatically when PowerPoint is started The sample PPA provided launches the notepad as a proof-of-concept for persistent execution from Office.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1140","name":"Deobfuscate/Decode Files or Information","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1140-1","name":"Deobfuscate/Decode Files Or Information","description":"Encode/Decode executable Upon execution a file named T1140_calc_decoded.exe will be placed in the temp folder","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1140-2","name":"Certutil Rename and Decode","description":"Rename certutil and decode a file. This is in reference to latest research by FireEye [here](https://www.fireeye.com/blog/threat-research/2018/09/apt10-targeting-japanese-corporations-using-updated-ttps.html)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1140-3","name":"Base64 decoding with Python","description":"Use Python to decode a base64-encoded text string and echo it to the console","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1140-4","name":"Base64 decoding with Perl","description":"Use Perl to decode a base64-encoded text string and echo it to the console","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1140-5","name":"Base64 decoding with shell utilities","description":"Use common shell utilities to decode a base64-encoded text string and echo it to the console","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1140-6","name":"Base64 decoding with shell utilities (freebsd)","description":"Use common shell utilities to decode a base64-encoded text string and echo it to the console","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1140-7","name":"FreeBSD b64encode Shebang in CLI","description":"Using b64decode shell scripts that have Shebang in them. This is commonly how attackers obfuscate passing and executing a shell script. Seen [here](https://www.trendmicro.com/pl_pl/research/20/i/the-evolution-of-malicious-shell-scripts.html) by TrendMicro, as well as [LinPEAS](https://github.com/carlospolop/PEASS-ng/tree/master/linPEAS). Also a there is a great Sigma rule [here](https://github.com/SigmaHQ/sigma/blob/master/rules/linux/process_creation/proc_creation_lnx_base64_shebang_cli.yml) for it.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1140-8","name":"Hex decoding with shell utilities","description":"Use common shell utilities to decode a hex-encoded text string and echo it to the console","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1140-9","name":"Linux Base64 Encoded Shebang in CLI","description":"Using Linux Base64 Encoded shell scripts that have Shebang in them. This is commonly how attackers obfuscate passing and executing a shell script. Seen [here](https://www.trendmicro.com/pl_pl/research/20/i/the-evolution-of-malicious-shell-scripts.html) by TrendMicro, as well as [LinPEAS](https://github.com/carlospolop/PEASS-ng/tree/master/linPEAS). Also a there is a great Sigma rule [here](https://github.com/SigmaHQ/sigma/blob/master/rules/linux/process_creation/proc_creation_lnx_base64_shebang_cli.yml) for it.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1140-10","name":"XOR decoding and command execution using Python","description":"An adversary can obfuscate malicious commands or payloads using XOR and execute them on the victim's machine. This test uses Python to decode and execute commands on the machine.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1140-11","name":"Expand CAB with expand.exe","description":"Uses expand.exe to extract a file from a CAB created locally. This simulates adversarial use of expand on cabinet archives. Upon success, art-expand-source.txt is extracted next to the CAB.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1176","name":"Browser Extensions","tactic":"TA0003","tactics":["TA0003"],"atomicTests":[{"id":"T1176-1","name":"Chrome/Chromium (Developer Mode)","description":"Turn on Chrome/Chromium developer mode and Load Extension found in the src directory","supportedPlatforms":["linux","windows","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1176-2","name":"Firefox","description":"Create a file called test.wma, with the duration of 30 seconds","supportedPlatforms":["linux","windows","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1176-3","name":"Edge Chromium Addon - VPN","description":"Adversaries may use VPN extensions in an attempt to hide traffic sent from a compromised host. This will install one (of many) available VPNS in the Edge add-on store.","supportedPlatforms":["windows","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1176-4","name":"Google Chrome Load Unpacked Extension With Command Line","description":"This test loads an unpacked extension in Google Chrome with the `--load-extension` parameter. This technique was previously used by the Grandoreiro malware to load a malicious extension that would capture the browsing history, steal cookies and other user information. Other malwares also leverage this technique to hijack searches, steal passwords, inject ads, and more. References: https://attack.mitre.org/techniques/T1176/ https://securityintelligence.com/posts/grandoreiro-malware-now-targeting-banks-in-spain/","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1187","name":"Forced Authentication","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1187-1","name":"PetitPotam","description":"This module runs the Windows executable of PetitPotam in order to coerce authentication for a remote system.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1187-2","name":"WinPwn - PowerSharpPack - Retrieving NTLM Hashes without Touching LSASS","description":"PowerSharpPack - Retrieving NTLM Hashes without Touching LSASS technique via function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1187-3","name":"Trigger an authenticated RPC call to a target server with no Sign flag set","description":"RpcPing command can be used to trigger an authenticated RPC call to the target server (/s) that could be relayed to a privileged resource (Sign flag not Set) Ref: https://twitter.com/splinter_code/status/1421144623678988298","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1195","name":"Supply Chain Compromise","tactic":"TA0001","tactics":["TA0001"],"atomicTests":[{"id":"T1195-1","name":"Octopus Scanner Malware Open Source Supply Chain","description":"This test simulates an adversary Octopus drop the RAT dropper ExplorerSync.db [octopus-scanner-malware-open-source-supply-chain](https://securitylab.github.com/research/octopus-scanner-malware-open-source-supply-chain/) [the-supreme-backdoor-factory](https://www.dfir.it/blog/2019/02/26/the-supreme-backdoor-factory/)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1195.002","name":"Compromise Software Supply Chain","tactic":"TA0001","tactics":["TA0001"],"atomicTests":[{"id":"T1195.002-1","name":"Simulate npm package installation on a Linux system","description":"Launches a short\u2011lived Kubernetes pod using the Node 18 image, initializes a minimal npm project in /tmp/test, and installs the specified npm package without audit/fund/package\u2011lock options, simulating potentially suspicious package retrieval (e.g., typosquatting/dependency confusion) from within a container. The pod is deleted after execution.","supportedPlatforms":["containers","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1197","name":"BITS Jobs","tactic":"TA0003","tactics":["TA0003","TA0002"],"atomicTests":[{"id":"T1197-1","name":"Bitsadmin Download (cmd)","description":"This test simulates an adversary leveraging bitsadmin.exe to download and execute a payload","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1197-2","name":"Bitsadmin Download (PowerShell)","description":"This test simulates an adversary leveraging bitsadmin.exe to download and execute a payload leveraging PowerShell Upon execution you will find a github markdown file downloaded to the Temp directory","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1197-3","name":"Persist, Download, & Execute","description":"This test simulates an adversary leveraging bitsadmin.exe to schedule a BITS transferand execute a payload in multiple steps. Note that in this test, the file executed is not the one downloaded. The downloading of a random file is simply the trigger for getting bitsdamin to run an executable. This has the interesting side effect of causing the executable (e.g. notepad) to run with an Initiating Process of \"svchost.exe\" and an Initiating Process Command Line of \"svchost.exe -k netsvcs -p -s BITS\" This job will remain in the BITS queue until complete or for up to 90 days by default if not removed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1197-4","name":"Bits download using desktopimgdownldr.exe (cmd)","description":"This test simulates using desktopimgdownldr.exe to download a malicious file instead of a desktop or lockscreen background img. The process that actually makes the TCP connection and creates the file on the disk is a svchost process (\u201c-k netsvc -p -s BITS\u201d) and not desktopimgdownldr.exe. See https://labs.sentinelone.com/living-off-windows-land-a-new-native-file-downldr/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1201","name":"Password Policy Discovery","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1201-1","name":"Examine password complexity policy - Ubuntu","description":"Lists the password complexity policy to console on Ubuntu Linux.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1201-2","name":"Examine password complexity policy - FreeBSD","description":"Lists the password complexity policy to console on FreeBSD.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1201-3","name":"Examine password complexity policy - CentOS/RHEL 7.x","description":"Lists the password complexity policy to console on CentOS/RHEL 7.x Linux.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1201-4","name":"Examine password complexity policy - CentOS/RHEL 6.x","description":"Lists the password complexity policy to console on CentOS/RHEL 6.x Linux.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1201-5","name":"Examine password expiration policy - All Linux","description":"Lists the password expiration policy to console on CentOS/RHEL/Ubuntu.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1201-6","name":"Examine local password policy - Windows","description":"Lists the local password policy to console on Windows.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1201-7","name":"Examine domain password policy - Windows","description":"Lists the domain password policy to console on Windows.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1201-8","name":"Examine password policy - macOS","description":"Lists the password policy to console on macOS.","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1201-9","name":"Get-DomainPolicy with PowerView","description":"Utilizing PowerView, run Get-DomainPolicy to return the default domain policy or the domain controller policy for the current domain or a specified domain/domain controller.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1201-10","name":"Enumerate Active Directory Password Policy with get-addefaultdomainpasswordpolicy","description":"The following Atomic test will utilize get-addefaultdomainpasswordpolicy to enumerate domain password policy. Upon successful execution a listing of the policy implemented will display. Reference: https://docs.microsoft.com/en-us/powershell/module/activedirectory/get-addefaultdomainpasswordpolicy?view=windowsserver2022-ps","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1201-11","name":"Use of SecEdit.exe to export the local security policy (including the password policy)","description":"SecEdit.exe can be used to export the current local security policy applied to a host. [Reference](https://blueteamops.medium.com/secedit-and-i-know-it-595056dee53d)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1201-12","name":"Examine AWS Password Policy","description":"This atomic test will display details about the password policy for the current AWS account.","supportedPlatforms":["iaas:aws"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1202","name":"Indirect Command Execution","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1202-1","name":"Indirect Command Execution - pcalua.exe","description":"The Program Compatibility Assistant (pcalua.exe) may invoke the execution of programs and commands from a Command-Line Interface. [Reference](https://twitter.com/KyleHanslovan/status/912659279806640128) Upon execution, calc.exe should open","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1202-2","name":"Indirect Command Execution - forfiles.exe","description":"forfiles.exe may invoke the execution of programs and commands from a Command-Line Interface. [Reference](https://github.com/LOLBAS-Project/LOLBAS/blob/master/yml/OSBinaries/Forfiles.yml) \"This is basically saying for each occurrence of notepad.exe in c:\\windows\\system32 run calc.exe\" Upon execution calc.exe will be opened.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1202-3","name":"Indirect Command Execution - conhost.exe","description":"conhost.exe refers to a host process for the console window. It provide an interface between command prompt and Windows explorer. Executing it through command line can create process ancestry anomalies [Reference] (http://www.hexacorn.com/blog/2020/05/25/how-to-con-your-host/)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1202-4","name":"Indirect Command Execution - Scriptrunner.exe","description":"The \"ScriptRunner.exe\" binary can be abused to proxy execution through it and bypass possible whitelisting. Upon test execution, calc.exe should open Reference: https://x.com/NickTyrer/status/914234924655312896","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1202-5","name":"Indirect Command Execution - RunMRU Dialog","description":"Simulates execution of commands via the Windows Run dialog (Win+R) by programmatically opening the Run dialog, copying a command to clipboard, and automating the paste and execution. This generates artifacts in the RunMRU registry key, which is commonly abused by threat actors to execute malicious commands disguised as CAPTCHA verification steps. Upon execution, a test PowerShell command will be executed through the Run dialog.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1204.002","name":"User Execution: Malicious File","tactic":"TA0002","tactics":["TA0002"],"atomicTests":[{"id":"T1204.002-1","name":"OSTap Style Macro Execution","description":"This Test uses a VBA macro to create and execute #{jse_path} with cscript.exe. Upon execution, the .jse file launches wscript.exe. Execution is handled by [Invoke-MalDoc](https://github.com/redcanaryco/invoke-atomicredteam/blob/master/Public/Invoke-MalDoc.ps1) to load and execute VBA code into Excel or Word documents. This is a known execution chain observed by the OSTap downloader commonly used in TrickBot campaigns. References: https://www.computerweekly.com/news/252470091/TrickBot-Trojan-switches-to-stealthy-Ostap-downloader","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true},{"id":"T1204.002-2","name":"OSTap Payload Download","description":"Uses cscript //E:jscript to download a file","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1204.002-3","name":"Maldoc choice flags command execution","description":"This Test uses a VBA macro to execute cmd with flags observed in recent maldoc and 2nd stage downloaders. Upon execution, CMD will be launched. Execution is handled by [Invoke-MalDoc](https://github.com/redcanaryco/invoke-atomicredteam/blob/master/Public/Invoke-MalDoc.ps1) to load and execute VBA code into Excel or Word documents.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true},{"id":"T1204.002-4","name":"OSTAP JS version","description":"Malicious JavaScript executing CMD which spawns wscript.exe //e:jscript Execution is handled by [Invoke-MalDoc](https://github.com/redcanaryco/invoke-atomicredteam/blob/master/Public/Invoke-MalDoc.ps1) to load and execute VBA code into Excel or Word documents.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true},{"id":"T1204.002-5","name":"Office launching .bat file from AppData","description":"Microsoft Office creating then launching a .bat script from an AppData directory. The .bat file launches calc.exe when opened.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true},{"id":"T1204.002-6","name":"Excel 4 Macro","description":"This module creates an Excel 4 Macro (XLM) enabled spreadsheet and executes it. The XLM will first write a \"malicious\" VBS file to %TEMP%, then execute this file. The VBS will download Process Explorer to the same directory (%TEMP%) and exec. A note regarding this module. By default, this module will pull the current username from the system and places it into the macro. If you'd like to utilize the \"=GET.WORKSPACE(26)\" method, that many maldoc authors use, you will need to ensure that the User Name associated with Excel matches that of the local system. This username can be found under Files -> Options -> Username","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1204.002-7","name":"Headless Chrome code execution via VBA","description":"This module uses Google Chrome combined with ScriptControl to achieve code execution. It spawns a local webserver hosting our malicious payload. Headless Google Chrome will then reach out to this webserver and pull down the script and execute it. By default the payload will execute calc.exe on the system.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true},{"id":"T1204.002-8","name":"Potentially Unwanted Applications (PUA)","description":"The Potentially Unwanted Applications (PUA) protection feature in antivirus software can identify and block PUAs from downloading and installing on endpoints in your network. These applications are not considered viruses, malware, or other types of threats, but might perform actions on endpoints that adversely affect their performance or use. This file is similar to EICAR test virus file, but is considered a Potentially Unwanted Application (PUA) instead of a VIRUS (i.e. not actually malicious, but is flagged as it to verify anti-pua protection).","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1204.002-9","name":"Office Generic Payload Download","description":"This Test uses a VBA macro to launch Powershell which will download a file from a user defined web server. Required input agruments are c2_domain and file_name Execution is handled by [Invoke-MalDoc](https://raw.githubusercontent.com/redcanaryco/atomic-red-team/master/atomics/T1204.002/src/Invoke-MalDoc.ps1) to load and execute VBA code into Excel or Word documents. Example for c2 server located at 127.0.0.1 for the file test.txt which is nested below the parent directory in the tests/my-test folder Example input args for file in root directory c2-domain = 127.0.0.1, file-name = test.txt","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true},{"id":"T1204.002-10","name":"LNK Payload Download","description":"This lnk files invokes powershell to download putty from the internet and opens the file. https://twitter.com/ankit_anubhav/status/1518932941090410496","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1204.002-11","name":"Mirror Blast Emulation","description":"Emulates the JS -> MSI chain of the MirrorBlast T505 campaign by executing an xlsm file designed. Requires the 32 bit version of Office to run. [MirrorBlast Campaign Analysis](https://blog.morphisec.com/explosive-new-mirrorblast-campaign-targets-financial-companies)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1204.002-12","name":"ClickFix Campaign - Abuse RunMRU to Launch mshta via PowerShell","description":"Simulates a ClickFix-style campaign by adding a malicious entry to the RunMRU registry key that launches `mshta.exe` with a remote payload. This technique relies on user interaction (Win+R + Enter) to trigger execution. Used in social engineering campaigns that aim to bypass traditional startup methods. Reference: https://www.netskope.com/blog/lumma-stealer-fake-captchas-new-techniques-to-evade-detection","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1204.002-13","name":"Simulate Click-Fix via Downloaded BAT File","description":"Simulates user execution of a BAT file downloaded from the Atomic Red Team GitHub repository.This test represents T1204.002 - User Execution via Malicious File.The BAT file performs harmless terminal output to simulate a \"fix\" operation.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1204.003","name":"User Execution: Malicious Image","tactic":"TA0002","tactics":["TA0002"],"atomicTests":[{"id":"T1204.003-1","name":"Malicious Execution from Mounted ISO Image","description":"Adversaries may rely on a user running a malicious image to facilitate execution","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1207","name":"Rogue Domain Controller","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1207-1","name":"DCShadow (Active Directory)","description":"Use Mimikatz DCShadow method to simulate behavior of an Active Directory Domain Controller and edit protected attribute. [DCShadow](https://www.dcshadow.com/) [Additional Reference](http://www.labofapenetrationtester.com/2018/04/dcshadow.html) It will set the badPwdCount attribute of the target user (user/machine account) to 9999. You can check after with: Get-ADObject -LDAPFilter '(samaccountname=<user>)' -Properties badpwdcount | select-object -ExpandProperty badpwdcount Need SYSTEM privileges locally (automatically obtained via PsExec, so running as admin is sufficient), and Domain Admin remotely. The easiest is to run elevated and as a Domain Admin user.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1216","name":"Signed Script Proxy Execution","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1216-1","name":"SyncAppvPublishingServer Signed Script PowerShell Command Execution","description":"Executes the signed SyncAppvPublishingServer script with options to execute an arbitrary PowerShell command. Upon execution, calc.exe will be launched.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1216-2","name":"manage-bde.wsf Signed Script Command Execution","description":"Executes the signe
