/* ========================================================================
   Blue Team Trainer — Design System
   ========================================================================
   Aesthetic: dense functional UI for live forensics work.
   Reference: Bloomberg Terminal, Datadog, Sentry, Wireshark, htop.
   ========================================================================*/

/* ---- Typography ---- */

@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');

:root {
  /* Type stacks - Plex first, system fallback for offline */
  --font-ui: 'IBM Plex Sans', -apple-system, 'Segoe UI', Roboto, sans-serif;
  --font-mono: 'IBM Plex Mono', 'JetBrains Mono', 'SF Mono', Consolas, monospace;

  /* ---- Color tokens ---- */
  /* Background tiers — near-black, not pure black, with subtle elevation */
  --bg-0: #0a0c10;          /* page background */
  --bg-1: #11141a;          /* surface (panels, cards) */
  --bg-2: #181c24;          /* elevated (hover, active surface) */
  --bg-3: #1f242e;          /* most prominent surface */

  /* Borders - barely visible, used sparingly */
  --border-faint: #1c2027;
  --border: #262b35;
  --border-strong: #353c47;

  /* Text - off-white scale */
  --text: #e8e6e0;          /* primary text */
  --text-muted: #9aa0aa;    /* secondary text */
  --text-faint: #4f5560;    /* tertiary, disabled */

  /* Single brand accent — amber, used sparingly */
  --accent: #ffb000;        /* signature amber, for "live"/"active"/"now" */
  --accent-soft: rgba(255, 176, 0, 0.12);
  --accent-line: rgba(255, 176, 0, 0.45);

  /* Status colors — desaturated, terminal-style */
  --ok: #5cc983;            /* less neon than typical green */
  --ok-soft: rgba(92, 201, 131, 0.12);
  --warn: #d4a73a;
  --warn-soft: rgba(212, 167, 58, 0.12);
  --err: #e25c5c;           /* warm red, not Bootstrap red */
  --err-soft: rgba(226, 92, 92, 0.10);

  /* Tactic colors — chosen for distinguishability, not vibrancy */
  --tactic-recon: #7a9cc6;
  --tactic-resource: #9580c2;
  --tactic-initial: #cc6464;
  --tactic-execution: #d4904a;
  --tactic-persistence: #c9a84a;
  --tactic-privesc: #9bbf6e;
  --tactic-defense: #6b95cc;
  --tactic-credential: #b07cc4;
  --tactic-discovery: #6fa8c4;
  --tactic-lateral: #c277a3;
  --tactic-collection: #5fb5a5;
  --tactic-c2: #d6837e;
  --tactic-exfil: #a78fc7;
  --tactic-impact: #c46969;

  /* Sizing */
  --radius: 4px;
  --radius-sm: 3px;
  --radius-lg: 6px;
}

/* ---- Reset / base ---- */

* { box-sizing: border-box; }

html, body, #root {
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
  background: var(--bg-0);
  overflow: hidden;
}

body {
  font-family: var(--font-ui);
  font-size: 13px;
  line-height: 1.45;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: 'cv11', 'ss01';
}

button {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
}

input {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
  background: none;
  border: none;
  outline: none;
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

code {
  font-family: var(--font-mono);
  font-size: 0.92em;
  background: var(--bg-1);
  padding: 1px 6px;
  border-radius: var(--radius-sm);
}

pre {
  font-family: var(--font-mono);
  margin: 0;
}

/* Selection */
::selection { background: var(--accent-soft); color: var(--text); }

/* Scrollbars - thin, dark */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--bg-0); }
::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 5px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

/* ========================================================================
   Layout primitives
   ========================================================================*/

.app {
  height: 100vh;
  width: 100vw;
  display: flex;
  flex-direction: column;
  background: var(--bg-0);
  color: var(--text);
  overflow: hidden;
}

.app-body {
  flex: 1;
  overflow: hidden;
  display: flex;
}

.view {
  flex: 1;
  overflow: auto;
  padding: 24px 32px;
}

/* ========================================================================
   Header / top status bar
   ========================================================================*/

.header {
  display: flex;
  align-items: center;
  padding: 0 16px;
  height: 44px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-1);
  flex-shrink: 0;
  gap: 16px;
}

.header-brand {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  margin-right: 6px;
}
.header-brand-name {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 1.5px;
  line-height: 1;
}
.header-brand-meta {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-faint);
  letter-spacing: 0.4px;
  margin-top: 4px;
  line-height: 1;
}

.header-nav {
  display: flex;
  gap: 4px;
}

.nav-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  border-radius: var(--radius);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  color: var(--text-muted);
  border: 1px solid transparent;
  transition: color 0.1s, background 0.1s;
}
.nav-btn:hover { color: var(--text); background: var(--bg-2); }
.nav-btn.active {
  color: var(--accent);
  background: var(--accent-soft);
  border-color: var(--accent-line);
}

.nav-badge {
  background: var(--text-faint);
  color: var(--bg-0);
  border-radius: 8px;
  font-size: 9px;
  padding: 1px 6px;
  font-weight: 700;
  font-family: var(--font-mono);
  line-height: 1.4;
}
.nav-btn.active .nav-badge { background: var(--accent); color: var(--bg-0); }

.header-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }

.icon-btn {
  padding: 5px 10px;
  border-radius: var(--radius);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  border: 1px solid var(--border);
  transition: all 0.1s;
}
.icon-btn:hover { color: var(--text); border-color: var(--border-strong); }
.icon-btn.active {
  color: var(--accent);
  background: var(--accent-soft);
  border-color: var(--accent-line);
}

/* ========================================================================
   Settings strip
   ========================================================================*/

.settings-strip {
  background: var(--bg-1);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  flex-shrink: 0;
  display: flex;
  gap: 20px;
  align-items: center;
  flex-wrap: wrap;
}
.settings-field {
  display: flex;
  align-items: center;
  gap: 8px;
}
.settings-label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-faint);
  font-weight: 600;
  letter-spacing: 0.6px;
  text-transform: uppercase;
}
.settings-input {
  background: var(--bg-0);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 4px 10px;
  font-size: 12px;
  border-radius: var(--radius);
  font-family: var(--font-mono);
  width: 240px;
}
.settings-input:focus { border-color: var(--accent-line); }

.mode-pill {
  padding: 4px 10px;
  border-radius: var(--radius);
  font-size: 10px;
  font-weight: 700;
  font-family: var(--font-mono);
  letter-spacing: 0.5px;
  border: 1px solid;
}
.mode-pill.mock { color: var(--warn); background: var(--warn-soft); border-color: var(--warn); }
.mode-pill.live { color: var(--ok); background: var(--ok-soft); border-color: var(--ok); }

/* ========================================================================
   Breadcrumb
   ========================================================================*/

.breadcrumb {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 16px;
}
.breadcrumb-sep { color: var(--text-faint); }
.breadcrumb-link { color: var(--text-muted); transition: color 0.1s; }
.breadcrumb-link:hover { color: var(--text); }

/* ========================================================================
   Page heading
   ========================================================================*/

.page-head {
  margin-bottom: 18px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.page-head-id {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.8px;
  margin-bottom: 4px;
}
.page-head-title {
  margin: 0 0 6px;
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.3px;
  color: var(--text);
}
.page-head-meta {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  display: flex;
  gap: 12px;
  align-items: center;
}

/* ========================================================================
   Tactics grid (landing view)
   ========================================================================*/

.landing-intro {
  margin-bottom: 24px;
}
.landing-intro h1 {
  margin: 0;
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.2px;
}
.landing-intro p {
  margin: 6px 0 0;
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.5;
}

.landing-controls {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.search-input {
  flex: 1;
  min-width: 240px;
  background: var(--bg-1);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 14px;
  border-radius: var(--radius);
  font-size: 12px;
}
.search-input:focus { border-color: var(--accent-line); }
.search-input::placeholder { color: var(--text-faint); }

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.3px;
}
.checkbox-row input { cursor: pointer; }

.search-results-panel {
  margin-bottom: 24px;
  padding: 14px;
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
}
.search-results-label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-faint);
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.search-result-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  text-align: left;
  font-size: 12px;
  margin-bottom: 4px;
  transition: all 0.1s;
}
.search-result-row:hover {
  background: var(--bg-2);
  border-color: var(--border-strong);
}

.tactic-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
}

.tactic-card {
  position: relative;
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-left: 3px solid var(--tactic-color, var(--text-muted));
  border-radius: var(--radius);
  padding: 14px 16px;
  text-align: left;
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-height: 100px;
  transition: background 0.12s, border-color 0.12s;
}
.tactic-card:hover {
  background: var(--bg-2);
  border-color: var(--border-strong);
  border-left-color: var(--tactic-color, var(--text-muted));
}
.tactic-card[disabled] { opacity: 0.35; cursor: not-allowed; }

.tactic-card-id {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.8px;
  color: var(--tactic-color, var(--text-muted));
}
.tactic-card-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.1px;
}
.tactic-card-counts {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  margin-top: auto;
  display: flex;
  align-items: center;
  gap: 10px;
}
.tactic-card-curated {
  color: var(--accent);
  display: inline-flex;
  align-items: center;
  gap: 3px;
}

/* ========================================================================
   Filter bar (technique list)
   ========================================================================*/

.filter-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
  margin-bottom: 14px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}

.pill-group {
  display: flex;
  gap: 3px;
  align-items: center;
}
.pill-group-label {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-faint);
  font-weight: 700;
  letter-spacing: 0.7px;
  text-transform: uppercase;
  margin-right: 4px;
}
.pill {
  padding: 4px 10px;
  border-radius: var(--radius);
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  border: 1px solid var(--border);
  background: var(--bg-1);
  letter-spacing: 0.3px;
  transition: all 0.1s;
}
.pill:hover { color: var(--text); border-color: var(--border-strong); }
.pill.active {
  color: var(--accent);
  background: var(--accent-soft);
  border-color: var(--accent-line);
}

.filter-input {
  flex: 1;
  min-width: 160px;
  background: var(--bg-1);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 12px;
  border-radius: var(--radius);
  font-size: 12px;
}
.filter-input:focus { border-color: var(--accent-line); }

.result-count {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-faint);
  margin-bottom: 8px;
  letter-spacing: 0.3px;
}

/* ========================================================================
   Technique list rows
   ========================================================================*/

.tech-rows {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.tech-row {
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: all 0.1s;
}
.tech-row:hover {
  background: var(--bg-2);
  border-color: var(--accent-line);
}
.tech-star {
  color: var(--accent);
  font-size: 13px;
  width: 14px;
  text-align: center;
  flex-shrink: 0;
}
.tech-star.empty { color: transparent; }
.tech-id {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  min-width: 100px;
  flex-shrink: 0;
}
.tech-name {
  flex: 1;
  font-size: 13px;
  font-weight: 500;
}
.tech-meta {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-faint);
  flex-shrink: 0;
}
.tech-arrow { color: var(--text-faint); font-size: 14px; flex-shrink: 0; }

/* ========================================================================
   Badges
   ========================================================================*/

.badge {
  display: inline-block;
  padding: 1px 7px;
  border-radius: var(--radius-sm);
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.4px;
  text-transform: uppercase;
  border: 1px solid;
  white-space: nowrap;
  line-height: 1.6;
}
.badge.tactic { font-size: 10px; padding: 2px 8px; }
.badge.platform { font-size: 9px; text-transform: lowercase; padding: 1px 5px; }
.badge.platform-extra {
  font-size: 9px;
  color: var(--text-faint);
  font-family: var(--font-mono);
  font-weight: 600;
}

.badge.connectivity-offline {
  color: var(--ok);
  background: var(--ok-soft);
  border-color: var(--ok);
}
.badge.connectivity-staged {
  color: var(--warn);
  background: var(--warn-soft);
  border-color: var(--warn);
}
.badge.connectivity-online {
  color: var(--err);
  background: var(--err-soft);
  border-color: var(--err);
}

.badge.prereq {
  color: var(--tactic-credential);
  background: rgba(176, 124, 196, 0.10);
  border-color: rgba(176, 124, 196, 0.45);
}

.platform-row {
  display: inline-flex;
  gap: 4px;
  align-items: center;
}

/* ========================================================================
   Detail view
   ========================================================================*/

.detail-head-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}
.detail-head-star {
  color: var(--accent);
  font-size: 16px;
}

.detail-tabs {
  display: flex;
  gap: 0;
  margin-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.detail-tab {
  padding: 8px 16px;
  border-bottom: 2px solid transparent;
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: -1px;
  transition: color 0.1s, border-color 0.1s;
}
.detail-tab:hover:not(:disabled) { color: var(--text); }
.detail-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}
.detail-tab:disabled { color: var(--text-faint); cursor: not-allowed; }

.tests-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.test-card {
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
}
.test-card-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}
.test-card-id {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-faint);
  font-weight: 600;
  letter-spacing: 0.3px;
}
.test-card-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
}
.test-card-desc {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.55;
  margin-bottom: 12px;
}
.test-card-actions {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.btn {
  padding: 6px 14px;
  border-radius: var(--radius);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
  border: 1px solid;
  transition: all 0.1s;
}
.btn:disabled { cursor: not-allowed; opacity: 0.5; }

.btn-detonate {
  color: var(--err);
  background: var(--err-soft);
  border-color: var(--err);
  text-transform: uppercase;
  letter-spacing: 0.8px;
}
.btn-detonate:hover:not(:disabled) {
  background: rgba(226, 92, 92, 0.18);
}
.btn-detonate.detonating {
  color: var(--warn);
  background: var(--warn-soft);
  border-color: var(--warn);
}

.btn-secondary {
  color: var(--text-muted);
  background: var(--bg-1);
  border-color: var(--border);
}
.btn-secondary:hover:not(:disabled) {
  color: var(--text);
  border-color: var(--border-strong);
}
.btn-secondary.in-chain { color: var(--ok); border-color: var(--ok); }

.btn-tertiary {
  color: var(--text-muted);
  border-color: transparent;
  background: transparent;
}
.btn-tertiary:hover:not(:disabled) { color: var(--text); background: var(--bg-2); }

/* ========================================================================
   Code blocks
   ========================================================================*/

.code-block {
  background: var(--bg-0);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
}
.code-block-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-1);
}
.code-block-lang {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
}
.code-block-lang.splunk { color: var(--warn); }
.code-block-lang.vql { color: var(--tactic-collection); }
.code-block-lang.powershell { color: var(--tactic-defense); }
.code-block-copy {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  padding: 2px 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  letter-spacing: 0.4px;
}
.code-block-copy:hover { color: var(--text); border-color: var(--border-strong); }
.code-block-copy.copied { color: var(--accent); border-color: var(--accent); }
.code-block pre {
  padding: 12px 14px;
  font-size: 12px;
  line-height: 1.6;
  color: var(--text);
  overflow-x: auto;
  white-space: pre;
}

/* ========================================================================
   Empty / placeholder states
   ========================================================================*/

.placeholder {
  padding: 28px;
  text-align: left;
  color: var(--text-muted);
  font-size: 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg-1);
  line-height: 1.6;
}
.placeholder-title {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text);
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.empty {
  padding: 32px;
  text-align: center;
  color: var(--text-faint);
  font-size: 12px;
  border: 1px dashed var(--border);
  border-radius: var(--radius);
}

/* ========================================================================
   Scenarios
   ========================================================================*/

.scenario-controls {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}

.chain-item {
  display: flex;
  gap: 10px;
  margin-bottom: 8px;
}
.chain-rail {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 8px;
}
.chain-rail-line {
  width: 1px;
  flex: 1;
  background: var(--border);
  min-height: 16px;
  margin: 4px 0;
}
.chain-card {
  flex: 1;
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
}
.chain-card.running { border-color: var(--warn); }
.chain-card.complete { border-color: var(--ok); }
.chain-card.failed { border-color: var(--err); }

.chain-card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
.chain-card-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-mono);
}
.chain-card-step {
  font-size: 10px;
  color: var(--text-faint);
  font-weight: 700;
}
.chain-card-actions { display: flex; gap: 4px; }

.chain-action-btn {
  padding: 2px 7px;
  border-radius: var(--radius-sm);
  font-size: 10px;
  color: var(--text-muted);
  border: 1px solid var(--border);
}
.chain-action-btn:disabled { color: var(--text-faint); border-color: var(--border-faint); cursor: not-allowed; }
.chain-action-btn.danger { color: var(--err); }
.chain-action-btn:hover:not(:disabled) { color: var(--text); border-color: var(--border-strong); }

.chain-controls {
  display: flex;
  gap: 6px;
  margin-top: 16px;
}

.dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-right: 6px;
}
.dot.pending { background: var(--text-faint); }
.dot.running {
  background: var(--warn);
  animation: pulse 1.4s ease-in-out infinite;
}
.dot.complete { background: var(--ok); }
.dot.failed { background: var(--err); }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.35; }
}

/* ========================================================================
   Session log
   ========================================================================*/

.log-entry {
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 4px;
}
.log-entry.success { border-left: 2px solid var(--ok); }
.log-entry.failed { border-left: 2px solid var(--err); }

.log-entry-head {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 12px;
  width: 100%;
  text-align: left;
}
.log-time {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-faint);
  min-width: 70px;
}
.log-tid {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  min-width: 100px;
}
.log-name { flex: 1; font-size: 12px; }
.log-name-tech { color: var(--text); }
.log-name-test { color: var(--text-muted); margin-left: 8px; }
.log-duration {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-faint);
}
.log-status {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.6px;
}
.log-status.success { color: var(--ok); }
.log-status.failed { color: var(--err); }
.log-expand { color: var(--text-faint); font-size: 11px; width: 12px; text-align: center; }

.log-output {
  border-top: 1px solid var(--border);
  background: var(--bg-0);
  padding: 12px;
}
.log-stream-label {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.8px;
  margin-bottom: 4px;
  text-transform: uppercase;
}
.log-stream-label.stdout { color: var(--ok); }
.log-stream-label.stderr { color: var(--err); }
.log-stream {
  margin: 0 0 12px;
  padding: 10px 12px;
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text);
  white-space: pre-wrap;
  max-height: 280px;
  overflow: auto;
  line-height: 1.55;
}
.log-stream.stderr { color: var(--err); border-color: var(--err); }

/* ========================================================================
   Boot / loading screens
   ========================================================================*/

.boot-screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  background: var(--bg-0);
  font-family: var(--font-mono);
}
.boot-screen-name {
  color: var(--accent);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
}
.boot-screen-status {
  color: var(--text-faint);
  font-size: 10px;
  letter-spacing: 1.5px;
}
.boot-cursor {
  display: inline-block;
  width: 8px;
  height: 13px;
  background: var(--accent);
  margin-left: 4px;
  animation: blink 1s step-end infinite;
  vertical-align: text-bottom;
}
@keyframes blink {
  0%, 50% { opacity: 1; }
  50.01%, 100% { opacity: 0; }
}

.boot-error {
  max-width: 540px;
  padding: 20px 24px;
  background: var(--err-soft);
  border: 1px solid var(--err);
  border-radius: var(--radius);
  color: var(--err);
  font-size: 11px;
  line-height: 1.6;
  display: none;
  text-align: left;
  font-family: var(--font-mono);
}

/* Empty data view (no techniques.json yet) */
.empty-data {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.empty-data-card {
  max-width: 520px;
  padding: 32px;
}
.empty-data-label {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.2px;
  color: var(--warn);
  margin-bottom: 14px;
}
.empty-data-body {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.7;
  margin-bottom: 18px;
}
.empty-data-cmd {
  margin: 0;
  padding: 14px 18px;
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--accent);
}
.empty-data-foot {
  font-size: 12px;
  color: var(--text-faint);
  margin-top: 14px;
  line-height: 1.6;
}

/* ========================================================================
   Skeleton (loading) shimmer
   ========================================================================*/

.skeleton {
  background: linear-gradient(
    90deg,
    var(--bg-1) 0%,
    var(--bg-2) 50%,
    var(--bg-1) 100%
  );
  background-size: 200% 100%;
  animation: shimmer 1.4s linear infinite;
  border-radius: var(--radius-sm);
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ========================================================================
   Utility
   ========================================================================*/

.hidden { display: none !important; }
.text-muted { color: var(--text-muted); }
.text-faint { color: var(--text-faint); }
.mono { font-family: var(--font-mono); }

  </style>
</head>

  <script>

    window.__BTT_TECHNIQUES__ = {"_meta":{"source":"redcanaryco/atomic-red-team","tactic_source":"mitre/cti enterprise-attack","tactics":{"TA0043":"Reconnaissance","TA0042":"Resource Development","TA0001":"Initial Access","TA0002":"Execution","TA0003":"Persistence","TA0004":"Privilege Escalation","TA0005":"Defense Evasion","TA0006":"Credential Access","TA0007":"Discovery","TA0008":"Lateral Movement","TA0009":"Collection","TA0011":"Command and Control","TA0010":"Exfiltration","TA0040":"Impact"},"technique_count":331,"test_count":1790,"curated_count":18,"merged_total":331},"techniques":[{"id":"T1003.001","name":"OS Credential Dumping: LSASS Memory","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1003.001-1","name":"Dump LSASS.exe Memory using ProcDump","description":"The memory of lsass.exe is often dumped for offline credential theft attacks. This can be achieved with Sysinternals ProcDump. Upon successful execution, you should see the following file created c:\\windows\\temp\\lsass_dump.dmp. If you see a message saying \"procdump.exe is not recognized as an internal or external command\", try using the  get-prereq_commands to download and install the ProcDump tool first.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1003.001-2","name":"Dump LSASS.exe Memory using comsvcs.dll","description":"The memory of lsass.exe is often dumped for offline credential theft attacks. This can be achieved with a built-in dll. Upon successful execution, you should see the following file created $env:TEMP\\lsass-comsvcs.dmp.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1003.001-3","name":"Dump LSASS.exe Memory using direct system calls and API unhooking","description":"The memory of lsass.exe is often dumped for offline credential theft attacks. This can be achieved using direct system calls and API unhooking in an effort to avoid detection. https://github.com/outflanknl/Dumpert https://outflank.nl/blog/2019/06/19/red-team-tactics-combining-direct-system-calls-and-srdi-to-bypass-av-edr/ Upon successful execution, you should see the following file created C:\\\\windows\\\\temp\\\\dumpert.dmp. If you see a message saying \\\"The system cannot find the path specified.\\\", try using the  get-prereq_commands to download the  tool first.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1003.001-4","name":"Dump LSASS.exe Memory using NanoDump","description":"The NanoDump tool uses syscalls and an invalid dump signature to avoid detection. https://github.com/helpsystems/nanodump Upon successful execution, you should find the nanondump.dmp file in the temp directory","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1003.001-5","name":"Dump LSASS.exe Memory using Windows Task Manager","description":"The memory of lsass.exe is often dumped for offline credential theft attacks. This can be achieved with the Windows Task Manager and administrative permissions.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1003.001-6","name":"Offline Credential Theft With Mimikatz","description":"The memory of lsass.exe is often dumped for offline credential theft attacks. Adversaries commonly perform this offline analysis with Mimikatz. This tool is available at https://github.com/gentilkiwi/mimikatz and can be obtained using the get-prereq_commands.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1003.001-7","name":"LSASS read with pypykatz","description":"Parses secrets hidden in the LSASS process with python. Similar to mimikatz's sekurlsa:: Python 3 must be installed, use the get_prereq_command's to meet the prerequisites for this test. Successful execution of this test will display multiple usernames and passwords/hashes to the screen. Will create a Python virtual environment within the External Payloads folder that can be deleted manually post test execution.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1003.001-8","name":"Dump LSASS.exe Memory using Out-Minidump.ps1","description":"The memory of lsass.exe is often dumped for offline credential theft attacks. This test leverages a pure powershell implementation that leverages the MiniDumpWriteDump Win32 API call. Upon successful execution, you should see the following file created $env:TEMP\\lsass_*.dmp. Author of Out-Minidump: Matthew Graeber (@mattifestation)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1003.001-9","name":"Create Mini Dump of LSASS.exe using ProcDump","description":"The memory of lsass.exe is often dumped for offline credential theft attacks. This can be achieved with Sysinternals ProcDump. This particular method uses -mm to produce a mini dump of lsass.exe Upon successful execution, you should see the following file created c:\\windows\\temp\\lsass_dump.dmp. If you see a message saying \"procdump.exe is not recognized as an internal or external command\", try using the  get-prereq_commands to download and install the ProcDump tool first.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1003.001-10","name":"Powershell Mimikatz","description":"Dumps credentials from memory via Powershell by invoking a remote mimikatz script. If Mimikatz runs successfully you will see several usernames and hashes output to the screen. Common failures include seeing an \\\"access denied\\\" error which results when Anti-Virus blocks execution. Or, if you try to run the test without the required administrative privileges you will see this error near the bottom of the output to the screen \"ERROR kuhl_m_sekurlsa_acquireLSA\"","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1003.001-11","name":"Dump LSASS with createdump.exe from .Net v5","description":"Use createdump executable from .NET to create an LSASS dump. [Reference](https://twitter.com/bopin2020/status/1366400799199272960?s=20)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1003.001-12","name":"Dump LSASS.exe using imported Microsoft DLLs","description":"The memory of lsass.exe is often dumped for offline credential theft attacks. This can be achieved by importing built-in DLLs and calling exported functions. Xordump will re-read the resulting minidump file and delete it immediately to avoid brittle EDR detections that signature lsass minidump files. Upon successful execution, you should see the following file created $env:TEMP\\lsass-xordump.t1003.001.dmp.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1003.001-13","name":"Dump LSASS.exe using lolbin rdrleakdiag.exe","description":"The memory of lsass.exe is often dumped for offline credential theft attacks. This can be achieved with lolbin rdrleakdiag.exe. Upon successful execution, you should see the following files created, $env:TEMP\\minidump_<PID>.dmp and  $env:TEMP\\results_<PID>.hlk.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1003.001-14","name":"Dump LSASS.exe Memory through Silent Process Exit","description":"WerFault.exe (Windows Error Reporting process that handles process crashes) can be abused to create a memory dump of lsass.exe, in a directory of your choice. This method relies on a mechanism introduced in Windows 7 called Silent Process Exit, which provides the ability to trigger specific actions for a monitored process in one of two scenarios; either the process terminates itself by calling ExitProcess(), or another process terminates it via the TerminateProcess() API. The major advantage of this technique is that it does not cause lsass.exe to crash, and since WerFault.exe is used to create file dumps all the time (not just lsass.exe), this method provides the added advantage of going undetected. WerFault.exe is a process known for dumping every crashing process, from an attacker standpoint this is appealing as their illicit credential extraction will appear benign because from a defender\u2019s viewpoint it\u2019s within the realm of normal activity. Upon successful execution, you should find the dump file in directory of your choice or \"%temp%\\SilentProcessExit\" by default.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":true,"huntPack":{"splunk":["index=sysmon EventCode=10 TargetImage=\"*\\\\lsass.exe\"\n  GrantedAccess IN (\"0x1010\",\"0x1038\",\"0x1410\",\"0x40\",\"0x1FFFFF\")\n| table _time, Computer, SourceImage, TargetImage, GrantedAccess, User","index=sysmon EventCode=1\n  Image IN (\"*\\\\procdump.exe\",\"*\\\\procdump64.exe\") CommandLine=\"*lsass*\"\n| table _time, Computer, User, CommandLine"],"vql":["SELECT * FROM Artifact.Windows.Memory.ProcessHandles(\n  ProcessRegex=\"lsass\")\nWHERE GrantedAccess =~ \"(0x1010|0x1038|0x1410|0x1FFFFF)\"","SELECT * FROM Artifact.Windows.Detection.Yara.Process(\n  ProcessRegex=\"lsass\",\n  YaraRule=\"rule mimikatz { strings: $a = \"mimikatz\" nocase condition: $a }\")"],"powershell":["Get-WinEvent -FilterHashtable @{LogName='Microsoft-Windows-Sysmon/Operational'; Id=10} |\n  Where-Object {$_.Message -match 'lsass.exe'} |\n  Select-Object TimeCreated, Message | Format-List","Get-WinEvent -FilterHashtable @{LogName='Security'; Id=4656} |\n  Where-Object {$_.Message -match 'lsass.exe'} |\n  Select-Object TimeCreated, Message | Format-List"]}},{"id":"T1016","name":"System Network Configuration Discovery","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1016-1","name":"System Network Configuration Discovery on Windows","description":"Identify network configuration information Upon successful execution, cmd.exe will spawn multiple commands to list network configuration settings. Output will be via stdout.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1016-2","name":"List Windows Firewall Rules","description":"Enumerates Windows Firewall Rules using netsh. Upon successful execution, cmd.exe will spawn netsh.exe to list firewall rules. Output will be via stdout.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1016-3","name":"System Network Configuration Discovery","description":"Identify network configuration information. Upon successful execution, sh will spawn multiple commands and output will be via stdout.","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1016-4","name":"System Network Configuration Discovery (TrickBot Style)","description":"Identify network configuration information as seen by Trickbot and described here https://www.sneakymonkey.net/2019/10/29/trickbot-analysis-part-ii/ Upon successful execution, cmd.exe will spawn `ipconfig /all`, `net config workstation`, `net view /all /domain`, `nltest /domain_trusts`. Output will be via stdout.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1016-5","name":"List Open Egress Ports","description":"This is to test for what ports are open outbound.  The technique used was taken from the following blog: https://www.blackhillsinfosec.com/poking-holes-in-the-firewall-egress-testing-with-allports-exposed/ Upon successful execution, powershell will read top-128.txt (ports) and contact each port to confirm if open or not. Output will be to Desktop\\open-ports.txt.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1016-6","name":"Adfind - Enumerate Active Directory Subnet Objects","description":"Adfind tool can be used for reconnaissance in an Active directory environment. This example has been documented by ransomware actors enumerating Active Directory Subnet Objects reference- http://www.joeware.net/freetools/tools/adfind/, https://www.fireeye.com/blog/threat-research/2019/04/pick-six-intercepting-a-fin6-intrusion.html","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1016-7","name":"Qakbot Recon","description":"A list of commands known to be performed by Qakbot for recon purposes","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1016-8","name":"List macOS Firewall Rules","description":"\"This will test if the macOS firewall is enabled and/or show what rules are configured. Must be run with elevated privileges. Upon successful execution, these commands will output various information about the firewall configuration, including status and specific port/protocol blocks or allows. Using `defaults`, additional arguments can be added to see filtered details, such as `globalstate` for global configuration (\\\"Is it on or off?\\\"), `firewall` for common application allow rules, and `explicitauths` for specific rules configured by the user. Using `socketfilterfw`, flags such as --getglobalstate or --listapps can be used for similar filtering. At least one flag is required to send parseable output to standard out.","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1016-9","name":"DNS Server Discovery Using nslookup","description":"Identify System domain dns controller on an endpoint using nslookup ldap query. This tool is being abused by qakbot malware to gather information on the domain controller of the targeted or compromised host. reference https://securelist.com/qakbot-technical-analysis/103931/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":true,"huntPack":{"splunk":["index=sysmon EventCode=1\n  Image IN (\"*\\\\ipconfig.exe\",\"*\\\\netstat.exe\",\"*\\\\arp.exe\",\"*\\\\net.exe\",\"*\\\\nslookup.exe\")\n| table _time, Computer, User, Image, CommandLine, ParentImage"],"vql":["SELECT * FROM Artifact.Windows.Network.Netstat()\nWHERE Status = \"ESTABLISHED\"","SELECT * FROM Artifact.Windows.Network.ArpCache()"],"powershell":["Get-NetIPConfiguration | Select-Object InterfaceAlias, IPv4Address, IPv4DefaultGateway, DNSServer | Format-List","Get-NetTCPConnection | Where-Object {$_.State -eq 'Established'} |\n  ForEach-Object { $proc = Get-Process -Id $_.OwningProcess -EA SilentlyContinue\n    [PSCustomObject]@{ Process=$proc.Name; PID=$_.OwningProcess\n      Remote=\"$($_.RemoteAddress):$($_.RemotePort)\" } } | Format-Table"]}},{"id":"T1021.001","name":"Remote Services: Remote Desktop Protocol","tactic":"TA0008","tactics":["TA0008"],"atomicTests":[{"id":"T1021.001-1","name":"RDP to DomainController","description":"Attempt an RDP session via Remote Desktop Application to a DomainController.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1021.001-2","name":"Changing RDP Port to Non Standard Port via Powershell","description":"Changing RDP Port to Non Standard Port via Powershell","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1021.001-3","name":"Changing RDP Port to Non Standard Port via Command_Prompt","description":"Changing RDP Port to Non Standard Port via Command_Prompt","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1021.001-4","name":"Disable NLA for RDP via Command Prompt","description":"Disables network-level authentication (NLA) for RDP by changing a registry key via Command Prompt Disabling NLA for RDP can allow remote user interaction with the Windows sign-in screen prior to authentication. According to Microsoft, Flax Typhoon actors used this technique implementation to achieve persistence on victim systems: https://www.microsoft.com/en-us/security/blog/2023/08/24/flax-typhoon-using-legitimate-software-to-quietly-access-taiwanese-organizations/ See also: https://github.com/EmpireProject/Empire/blob/master/lib/modules/powershell/management/enable_rdp.py","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":true,"huntPack":{"splunk":["index=wineventlog EventCode=4624 LogonType=10\n| table _time, ComputerName, TargetUserName, IpAddress, LogonType","index=wineventlog EventCode=4778\n| table _time, ComputerName, AccountName, ClientName, ClientAddress"],"vql":["SELECT * FROM Artifact.Windows.EventLogs.EvtxHunter(\n  EvtxGlob=\"**\\\\Security.evtx\", IdRegex=\"4624\")\nWHERE LogonType = \"10\"","SELECT * FROM Artifact.Windows.Network.Netstat()\nWHERE RemotePort = \"3389\""],"powershell":["Get-WinEvent -FilterHashtable @{LogName='Security'; Id=4624} |\n  Where-Object {$_.Message -match 'Logon Type:\\s+10'} |\n  Select-Object TimeCreated, Message | Format-List","Get-WinEvent -LogName 'Microsoft-Windows-TerminalServices-RemoteConnectionManager/Operational' |\n  Where-Object {$_.Id -eq 1149} |\n  Select-Object TimeCreated, Message | Format-List"]}},{"id":"T1021.002","name":"Remote Services: SMB/Windows Admin Shares","tactic":"TA0008","tactics":["TA0008"],"atomicTests":[{"id":"T1021.002-1","name":"Map admin share","description":"Connecting To Remote Shares","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1021.002-2","name":"Map Admin Share PowerShell","description":"Map Admin share utilizing PowerShell","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1021.002-3","name":"Copy and Execute File with PsExec","description":"Copies a file to a remote host and executes it using PsExec. Requires the download of PsExec from [https://docs.microsoft.com/en-us/sysinternals/downloads/psexec](https://docs.microsoft.com/en-us/sysinternals/downloads/psexec).","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1021.002-4","name":"Execute command writing output to local Admin Share","description":"Executes a command, writing the output to a local Admin Share. This technique is used by post-exploitation frameworks.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":true,"huntPack":{"splunk":["index=wineventlog EventCode=5140\n  ShareName IN (\"*\\\\ADMIN$\",\"*\\\\C$\",\"*\\\\IPC$\")\n| table _time, ComputerName, SubjectUserName, ShareName, IpAddress","index=wineventlog EventCode=7045\n| rex field=Message \"Service Name:\\\\s+(?P<svc>[^\\\\n]+)\"\n| table _time, ComputerName, svc, Message"],"vql":["SELECT * FROM Artifact.Windows.EventLogs.EvtxHunter(\n  EvtxGlob=\"**\\\\Security.evtx\", IdRegex=\"5140\")\nWHERE ShareName =~ \"(ADMIN|C)\\\\$\"","SELECT * FROM Artifact.Windows.System.Services()\nWHERE StartMode = \"Manual\" AND State = \"Running\""],"powershell":["Get-WinEvent -FilterHashtable @{LogName='Security'; Id=5140} |\n  Where-Object {$_.Message -match 'ADMIN\\$|C\\$'} |\n  Select-Object TimeCreated, Message | Format-List","Get-SmbOpenFile | Select-Object ClientComputerName, ClientUserName, Path | Format-Table"]}},{"id":"T1048.003","name":"Exfiltration Over Alternative Protocol: Exfiltration Over Unencrypted/Obfuscated Non-C2 Protocol","tactic":"TA0010","tactics":["TA0010"],"atomicTests":[{"id":"T1048.003-1","name":"Exfiltration Over Alternative Protocol - HTTP","description":"A firewall rule (ipfw,pf,iptables or firewalld) will be needed to allow exfiltration on port 1337. Upon successful execution, sh will be used to make a directory (/tmp/victim-staging-area), write a txt file, and host the directory with Python on port 1337, to be later downloaded.","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1048.003-2","name":"Exfiltration Over Alternative Protocol - ICMP","description":"Exfiltration of specified file over ICMP protocol. Upon successful execution, powershell will utilize ping (icmp) to exfiltrate notepad.exe to a remote address (default 127.0.0.1). Results will be via stdout.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1048.003-3","name":"Exfiltration Over Alternative Protocol - DNS","description":"Exfiltration of specified file over DNS protocol.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1048.003-4","name":"Exfiltration Over Alternative Protocol - HTTP","description":"Exfiltration of specified file over HTTP. Upon successful execution, powershell will invoke web request using POST method to exfiltrate notepad.exe to a remote address (default http://127.0.0.1). Results will be via stdout.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1048.003-5","name":"Exfiltration Over Alternative Protocol - SMTP","description":"Exfiltration of specified file over SMTP. Upon successful execution, powershell will send an email with attached file to exfiltrate to a remote address. Results will be via stdout.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1048.003-6","name":"MAZE FTP Upload","description":"This test simulates MAZE's ransomware's ability to exfiltrate data via FTP. Upon successful execution, all 7z files within the %windir%\\temp directory will be uploaded to a remote FTP server. Reference: https://www.mandiant.com/resources/tactics-techniques-procedures-associated-with-maze-ransomware-incidents","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1048.003-7","name":"Exfiltration Over Alternative Protocol - FTP - Rclone","description":"Rclone may be used by an adversary to exfiltrate data to a publicly hosted FTP server. [Reference](https://thedfirreport.com/2021/03/29/sodinokibi-aka-revil-ransomware/)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1048.003-8","name":"Python3 http.server","description":"An adversary may use the python3 standard library module http.server to exfiltrate data. This test checks if python3 is available and if so, creates a HTTP server on port 9090, captures the PID, sleeps for 10 seconds, then kills the PID and unsets the $PID variable.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":true,"huntPack":{"splunk":["index=sysmon EventCode=3 DestinationPort IN (20, 21, 69)\n| table _time, Computer, User, Image, DestinationIp, DestinationPort","index=sysmon EventCode=1\n  Image=\"*\\\\certutil.exe\" CommandLine IN (\"*-encode*\",\"*-decode*\",\"*-urlcache*\")\n| table _time, Computer, User, CommandLine"],"vql":["SELECT * FROM Artifact.Windows.Network.Netstat()\nWHERE RemotePort IN (\"20\",\"21\",\"69\")","SELECT * FROM Artifact.Windows.System.Pslist()\nWHERE CommandLine =~ \"(?i)certutil.*(encode|decode|urlcache)\""],"powershell":["Get-NetTCPConnection |\n  Where-Object {$_.RemotePort -in @(20,21)} |\n  ForEach-Object { $proc = Get-Process -Id $_.OwningProcess -EA SilentlyContinue\n    [PSCustomObject]@{Process=$proc.Name; RemoteIP=$_.RemoteAddress} } | Format-Table","Get-WinEvent -FilterHashtable @{LogName='Security'; Id=4688} |\n  Where-Object {$_.Message -match 'certutil.*(encode|urlcache)'} |\n  Select-Object TimeCreated, Message | Format-List"]}},{"id":"T1053.005","name":"Scheduled Task/Job: Scheduled Task","tactic":"TA0003","tactics":["TA0002","TA0003","TA0004"],"atomicTests":[{"id":"T1053.005-1","name":"Scheduled Task Startup Script","description":"Run an exe on user logon or system startup.  Upon execution, success messages will be displayed for the two scheduled tasks. To view the tasks, open the Task Scheduler and look in the Active Tasks pane.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1053.005-2","name":"Scheduled task Local","description":"Upon successful execution, cmd.exe will create a scheduled task to spawn cmd.exe at 20:10.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1053.005-3","name":"Scheduled task Remote","description":"Create a task on a remote system. Upon successful execution, cmd.exe will create a scheduled task to spawn cmd.exe at 20:10 on a remote endpoint.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1053.005-4","name":"Powershell Cmdlet Scheduled Task","description":"Create an atomic scheduled task that leverages native powershell cmdlets. Upon successful execution, powershell.exe will create a scheduled task to spawn cmd.exe at 20:10.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1053.005-5","name":"Task Scheduler via VBA","description":"This module utilizes the Windows API to schedule a task for code execution (notepad.exe). The task scheduler will execute \"notepad.exe\" within 30 - 40 seconds after this module has run","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true},{"id":"T1053.005-6","name":"WMI Invoke-CimMethod Scheduled Task","description":"Create an scheduled task that executes notepad.exe after user login from XML by leveraging WMI class PS_ScheduledTask. Does the same thing as Register-ScheduledTask cmdlet behind the scenes.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1053.005-7","name":"Scheduled Task Executing Base64 Encoded Commands From Registry","description":"A Base64 Encoded command will be stored in the registry (ping 127.0.0.1) and then a scheduled task will be created. The scheduled task will launch powershell to decode and run the command in the registry daily. This is a persistence mechanism recently seen in use by Qakbot. [Additiona Information](https://thedfirreport.com/2022/02/07/qbot-likes-to-move-it-move-it/)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1053.005-8","name":"Import XML Schedule Task with Hidden Attribute","description":"Create an scheduled task that executes calc.exe after user login from XML that contains hidden setting attribute. This technique was seen several times in tricbot malware and also with the targetted attack campaigne the industroyer2.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1053.005-9","name":"PowerShell Modify A Scheduled Task","description":"Create a scheduled task with an action and modify the action to do something else. The initial idea is to showcase Microsoft Windows TaskScheduler Operational log modification of an action on a Task already registered. It will first be created to spawn cmd.exe, but modified to run notepad.exe. Upon successful execution, powershell.exe will create a scheduled task and modify the action.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1053.005-10","name":"Scheduled Task (\"Ghost Task\") via Registry Key Manipulation","description":"Create a scheduled task through manipulation of registry keys. This procedure is implemented using the [GhostTask](https://github.com/netero1010/GhostTask) utility. By manipulating registry keys under HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Schedule\\TaskCache\\Tree, the tool creates user-specified scheduled tasks without a corresponding Windows Event 4698, which is logged when scheduled tasks are created through conventional means. This requires a download of the GhostTask binary, which must be run as NT Authority\\SYSTEM. Upon successful execution of this test, a scheduled task will be set to run at logon which launches notepad.exe or runs a user-specified command. For further exploration of this procedure and guidance for hunting and detection, see [Hunting G-G-G-GhostTasks!](https://medium.com/p/154b50ab6a78).","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1053.005-11","name":"Scheduled Task Persistence via CompMgmt.msc","description":"Adds persistence by abusing `compmgmt.msc` via a scheduled task. When the Computer Management console is opened, it will run a malicious payload (in this case, `calc.exe`). This technique abuses scheduled tasks and registry modifications to hijack legitimate system processes.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1053.005-12","name":"Scheduled Task Persistence via Eventviewer.msc","description":"Adds persistence by abusing `eventviewer.msc` via a scheduled task. When the eventviewer console is opened, it will run a malicious payload (in this case, `calc.exe`).","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":true,"huntPack":{"splunk":["index=sysmon EventCode=1 Image=\"*\\\\schtasks.exe\" CommandLine=\"*/create*\"\n| table _time, Computer, User, CommandLine","index=wineventlog EventCode IN (4698, 4702)\n| rex field=Message \"Task Name:\\\\s+(?P<task>[^\\\\n]+)\"\n| table _time, ComputerName, EventCode, task, Message"],"vql":["SELECT * FROM Artifact.Windows.System.ScheduledTasks()\nWHERE Enabled = \"true\"\n  AND (Command =~ \"(?i)(powershell|cmd|wscript|mshta|rundll32)\"\n    OR WorkingDirectory =~ \"(?i)(temp|appdata|public)\")"],"powershell":["Get-ScheduledTask | Where-Object {$_.State -ne 'Disabled'} |\n  Select-Object TaskName, TaskPath, State,\n    @{N='Execute';E={$_.Actions.Execute}},\n    @{N='Trigger';E={$_.Triggers.CimClass.CimClassName}} |\n  Format-List","Get-WinEvent -LogName 'Microsoft-Windows-TaskScheduler/Operational' |\n  Where-Object {$_.Id -in @(106,129,200)} |\n  Select-Object TimeCreated, Id, Message | Format-List"]}},{"id":"T1055.001","name":"Process Injection: Dynamic-link Library Injection","tactic":"TA0005","tactics":["TA0004"],"atomicTests":[{"id":"T1055.001-1","name":"Process Injection via mavinject.exe","description":"Windows 10 Utility To Inject DLLS. Upon successful execution, powershell.exe will download T1055.dll to disk. Powershell will then spawn mavinject.exe to perform process injection in T1055.dll. With default arguments, expect to see a MessageBox, with notepad's icon in taskbar.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1055.001-2","name":"WinPwn - Get SYSTEM shell - Bind System Shell using UsoClient DLL load technique","description":"Get SYSTEM shell - Bind System Shell using UsoClient DLL load technique via function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false}],"curated":true,"huntPack":{"splunk":["index=sysmon EventCode=8\n| table _time, Computer, SourceImage, TargetImage, StartAddress, StartFunction","index=sysmon EventCode=1 Image=\"*\\\\mavinject.exe\"\n| table _time, Computer, User, CommandLine"],"vql":["SELECT * FROM Artifact.Windows.Memory.InjectedThreads()","SELECT * FROM Artifact.Windows.System.Pslist()\nWHERE CommandLine =~ \"(?i)mavinject\""],"powershell":["Get-WinEvent -FilterHashtable @{LogName='Microsoft-Windows-Sysmon/Operational'; Id=8} |\n  Select-Object TimeCreated, Message | Format-List","Get-Process | ForEach-Object {\n  $p = $_\n  try { $p.Modules |\n    Where-Object {$_.FileName -notmatch '(?i)(system32|syswow64|program files)'} |\n    Select-Object @{N='Process';E={$p.Name}},@{N='PID';E={$p.Id}},FileName\n  } catch {}\n} | Format-List"]}},{"id":"T1059.001","name":"Command and Scripting Interpreter: PowerShell","tactic":"TA0002","tactics":["TA0002"],"atomicTests":[{"id":"T1059.001-1","name":"Mimikatz","description":"Download Mimikatz and dump credentials. Upon execution, mimikatz dump details and password hashes will be displayed.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1059.001-2","name":"Run BloodHound from local disk","description":"Upon execution SharpHound will be downloaded to disk, imported and executed. It will set up collection methods, run and then compress and store the data to the temp directory on the machine. If system is unable to contact a domain, proper execution will not occur. Successful execution will produce stdout message stating \"SharpHound Enumeration Completed\". Upon completion, final output will be a *BloodHound.zip file.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1059.001-3","name":"Run Bloodhound from Memory using Download Cradle","description":"Upon execution SharpHound will load into memory and execute against a domain. It will set up collection methods, run and then compress and store the data to the temp directory. If system is unable to contact a domain, proper execution will not occur. Successful execution will produce stdout message stating \"SharpHound Enumeration Completed\". Upon completion, final output will be a *BloodHound.zip file.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1059.001-4","name":"Mimikatz - Cradlecraft PsSendKeys","description":"Run mimikatz via PsSendKeys. Upon execution, automated actions will take place to open file explorer, open notepad and input code, then mimikatz dump info will be displayed.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1059.001-5","name":"Invoke-AppPathBypass","description":"Note: Windows 10 only. Upon execution windows backup and restore window will be opened. Bypass is based on: https://enigma0x3.net/2017/03/14/bypassing-uac-using-app-paths/","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1059.001-6","name":"Powershell MsXml COM object - with prompt","description":"Powershell MsXml COM object. Not proxy aware, removing cache although does not appear to write to those locations. Upon execution, \"Download Cradle test success!\" will be displayed. Provided by https://github.com/mgreen27/mgreen27.github.io","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1059.001-7","name":"Powershell XML requests","description":"Powershell xml download request. Upon execution, \"Download Cradle test success!\" will be dispalyed. Provided by https://github.com/mgreen27/mgreen27.github.io","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1059.001-8","name":"Powershell invoke mshta.exe download","description":"Powershell invoke mshta to download payload. Upon execution, a new PowerShell window will be opened which will display \"Download Cradle test success!\". Provided by https://github.com/mgreen27/mgreen27.github.io","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1059.001-9","name":"Powershell Invoke-DownloadCradle","description":"Provided by https://github.com/mgreen27/mgreen27.github.io Invoke-DownloadCradle is used to generate Network and Endpoint artifacts.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1059.001-10","name":"PowerShell Fileless Script Execution","description":"Execution of a PowerShell payload from the Windows Registry similar to that seen in fileless malware infections. Upon exection, open \"C:\\Windows\\Temp\" and verify that art-marker.txt is in the folder.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1059.001-11","name":"NTFS Alternate Data Stream Access","description":"Creates a file with an alternate data stream and simulates executing that hidden code/file. Upon execution, \"Stream Data Executed\" will be displayed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1059.001-12","name":"PowerShell Session Creation and Use","description":"Connect to a remote powershell session and interact with the host. Upon execution, network test info and 'T1086 PowerShell Session Creation and Use' will be displayed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1059.001-13","name":"ATHPowerShellCommandLineParameter -Command parameter variations","description":"Executes powershell.exe with variations of the -Command parameter","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1059.001-14","name":"ATHPowerShellCommandLineParameter -Command parameter variations with encoded arguments","description":"Executes powershell.exe with variations of the -Command parameter with encoded arguments supplied","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1059.001-15","name":"ATHPowerShellCommandLineParameter -EncodedCommand parameter variations","description":"Executes powershell.exe with variations of the -EncodedCommand parameter","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1059.001-16","name":"ATHPowerShellCommandLineParameter -EncodedCommand parameter variations with encoded arguments","description":"Executes powershell.exe with variations of the -EncodedCommand parameter with encoded arguments supplied","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1059.001-17","name":"PowerShell Command Execution","description":"Use of obfuscated PowerShell to execute an arbitrary command; outputs \"Hello, from PowerShell!\". Example is from the 2021 Threat Detection Report by Red Canary.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1059.001-18","name":"PowerShell Invoke Known Malicious Cmdlets","description":"Powershell execution of known Malicious PowerShell Cmdlets","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1059.001-19","name":"PowerUp Invoke-AllChecks","description":"Check for privilege escalation paths using PowerUp from PowerShellMafia","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1059.001-20","name":"Abuse Nslookup with DNS Records","description":"Red teamer's avoid IEX and Invoke-WebRequest in your PowerShell commands. Instead, host a text record with a payload to compromise hosts. [reference](https://twitter.com/jstrosch/status/1237382986557001729)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1059.001-21","name":"SOAPHound - Dump BloodHound Data","description":"Dump BloodHound data using SOAPHound. Upon execution, BloodHound data will be dumped and stored in the specified output directory. src: https://github.com/FalconForceTeam/SOAPHound","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1059.001-22","name":"SOAPHound - Build Cache","description":"Build cache using SOAPHound. Upon execution, a cache will be built and stored in the specified cache filename. src: https://github.com/FalconForceTeam/SOAPHound","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":true,"huntPack":{"splunk":["index=sysmon EventCode=1 Image=\"*\\\\powershell.exe\"\n| eval encoded=if(match(CommandLine,\"(?i)-e(nc(odedcommand)?)? \"),\"YES\",\"NO\")\n| table _time, Computer, User, CommandLine, encoded\n| sort - encoded","index=wineventlog source=\"WinEventLog:Microsoft-Windows-PowerShell/Operational\" EventCode=4104\n  Message IN (\"*Invoke-Expression*\",\"*DownloadString*\",\"*EncodedCommand*\",\"*AmsiScanBuffer*\")\n| rex field=Message \"ScriptBlock text = (?P<script>.+?)\\n\"\n| table _time, Computer, User, script"],"vql":["SELECT * FROM Artifact.Windows.EventLogs.PowerShell.ScriptBlock()\nWHERE Script =~ \"(?i)(invoke-expression|iex|downloadstring|encodedcommand|amsiscan|reflection.assembly)\"","SELECT * FROM Artifact.Windows.System.Pslist()\nWHERE Name =~ \"powershell.exe\"\n  AND CommandLine =~ \"(?i)(-enc|-e |encodedcommand|-nop|-noni|bypass)\""],"powershell":["Get-WinEvent -LogName 'Microsoft-Windows-PowerShell/Operational' |\n  Where-Object { $_.Id -eq 4104 -and\n    $_.Message -match 'EncodedCommand|DownloadString|Invoke-Expression|AmsiScan' } |\n  Select-Object TimeCreated, @{N='Script';E={$_.Message -replace '.*ScriptBlock text = ',''\n    -replace '\\n.*',''}} | Format-List","Get-WinEvent -FilterHashtable @{LogName='Security'; Id=4688} |\n  Where-Object {$_.Message -match 'powershell.exe.{0,100}-e'} |\n  Select-Object TimeCreated, Message | Format-List"]}},{"id":"T1059.003","name":"Command and Scripting Interpreter: Windows Command Shell","tactic":"TA0002","tactics":["TA0002"],"atomicTests":[{"id":"T1059.003-1","name":"Create and Execute Batch Script","description":"Creates and executes a simple batch script. Upon execution, CMD will briefly launch to run the batch script then close again.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1059.003-2","name":"Writes text to a file and displays it.","description":"Writes text to a file and display the results. This test is intended to emulate the dropping of a malicious file to disk.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1059.003-3","name":"Suspicious Execution via Windows Command Shell","description":"Command line executed via suspicious invocation. Example is from the 2021 Threat Detection Report by Red Canary.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1059.003-4","name":"Simulate BlackByte Ransomware Print Bombing","description":"This test attempts to open a file a specified number of times in Wordpad, then prints the contents. It is designed to mimic BlackByte ransomware's print bombing technique, where tree.dll, which contains the ransom note, is opened in Wordpad 75 times and then printed. See https://redcanary.com/blog/blackbyte-ransomware/.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1059.003-5","name":"Command Prompt read contents from CMD file and execute","description":"Simulate Raspberry Robin using the \"standard-in\" command prompt feature cmd `/R <` to read and execute a file via cmd.exe See https://redcanary.com/blog/raspberry-robin/.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1059.003-6","name":"Command prompt writing script to file then executes it","description":"Simulate DarkGate malware's second stage by writing a VBscript to disk directly from the command prompt then executing it. The script will execute 'whoami' then exit.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":true,"huntPack":{"splunk":["index=sysmon EventCode=1\n  ParentImage IN (\"*\\\\winword.exe\",\"*\\\\excel.exe\",\"*\\\\outlook.exe\")\n  Image=\"*\\\\cmd.exe\"\n| table _time, Computer, User, ParentImage, CommandLine","index=sysmon EventCode=1 Image=\"*\\\\cmd.exe\"\n| stats count by Computer, User, ParentImage\n| where count > 10\n| sort - count"],"vql":["SELECT * FROM Artifact.Windows.System.Pslist()\nWHERE Name =~ \"cmd.exe\"\n  AND ParentName =~ \"(?i)(WINWORD|EXCEL|OUTLOOK|mshta|wscript).exe\""],"powershell":["Get-WinEvent -FilterHashtable @{LogName='Security'; Id=4688} |\n  Where-Object {$_.Message -match 'cmd.exe' -and\n    $_.Message -match 'WINWORD.EXE|EXCEL.EXE|OUTLOOK.EXE'} |\n  Select-Object TimeCreated, Message | Format-List"]}},{"id":"T1069.002","name":"Permission Groups Discovery: Domain Groups","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1069.002-1","name":"Basic Permission Groups Discovery Windows (Domain)","description":"Basic Permission Groups Discovery for Windows. This test will display some errors if run on a computer not connected to a domain. Upon execution, domain information will be displayed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1069.002-2","name":"Permission Groups Discovery PowerShell (Domain)","description":"Permission Groups Discovery utilizing PowerShell. This test will display some errors if run on a computer not connected to a domain. Upon execution, domain information will be displayed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1069.002-3","name":"Elevated group enumeration using net group (Domain)","description":"Runs \"net group\" command including command aliases and loose typing to simulate enumeration/discovery of high value domain groups. This test will display some errors if run on a computer not connected to a domain. Upon execution, domain information will be displayed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1069.002-4","name":"Find machines where user has local admin access (PowerView)","description":"Find machines where user has local admin access (PowerView). Upon execution, progress and info about each host in the domain being scanned will be displayed.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1069.002-5","name":"Find local admins on all machines in domain (PowerView)","description":"Enumerates members of the local Administrators groups across all machines in the domain. Upon execution, information about each machine will be displayed.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1069.002-6","name":"Find Local Admins via Group Policy (PowerView)","description":"takes a computer and determines who has admin rights over it through GPO enumeration. Upon execution, information about the machine will be displayed.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1069.002-7","name":"Enumerate Users Not Requiring Pre Auth (ASRepRoast)","description":"When successful, accounts that do not require kerberos pre-auth will be returned","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1069.002-8","name":"Adfind - Query Active Directory Groups","description":"Adfind tool can be used for reconnaissance in an Active directory environment. This example has been documented by ransomware actors enumerating Active Directory Groups reference- http://www.joeware.net/freetools/tools/adfind/, https://www.fireeye.com/blog/threat-research/2019/04/pick-six-intercepting-a-fin6-intrusion.html","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1069.002-9","name":"Enumerate Active Directory Groups with Get-AdGroup","description":"The following Atomic test will utilize Get-AdGroup to enumerate groups within Active Directory. Upon successful execution a listing of groups will output with their paths in AD. Reference: https://docs.microsoft.com/en-us/powershell/module/activedirectory/get-adgroup?view=windowsserver2022-ps","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1069.002-10","name":"Enumerate Active Directory Groups with ADSISearcher","description":"The following Atomic test will utilize ADSISearcher to enumerate groups within Active Directory. Upon successful execution a listing of groups will output with their paths in AD. Reference: https://devblogs.microsoft.com/scripting/use-the-powershell-adsisearcher-type-accelerator-to-search-active-directory/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1069.002-11","name":"Get-ADUser Enumeration using UserAccountControl flags (AS-REP Roasting)","description":"When successful, accounts that do not require kerberos pre-auth will be returned. Reference: https://m0chan.github.io/2019/07/31/How-To-Attack-Kerberos-101.html","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1069.002-12","name":"Get-DomainGroupMember with PowerView","description":"Utilizing PowerView, run Get-DomainGroupMember to identify domain users. Upon execution, progress and info about groups within the domain being scanned will be displayed.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1069.002-13","name":"Get-DomainGroup with PowerView","description":"Utilizing PowerView, run Get-DomainGroup to identify the domain groups. Upon execution, Groups within the domain will be listed.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1069.002-14","name":"Active Directory Enumeration with LDIFDE","description":"Output information from Active Directory to a specified file. [Ldifde](https://learn.microsoft.com/en-us/previous-versions/windows/it-pro/windows-server-2012-R2-and-2012/cc731033(v=ws.11)) is a CLI tool for creating, modifying and deleting directory objects. The test is derived from the CISA Report on Voly Typhoon. Reference: https://media.defense.gov/2023/May/24/2003229517/-1/-1/0/CSA_Living_off_the_Land.PDF","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1069.002-15","name":"Active Directory Domain Search Using LDAP - Linux (Ubuntu)/macOS","description":"Output information from LDAPSearch. LDAP Password is the admin-user password on Active Directory","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":true,"huntPack":{"splunk":["index=sysmon EventCode=1\n  Image=\"*\\\\net.exe\" CommandLine IN (\"*group*\",\"*localgroup*\")\n| table _time, Computer, User, CommandLine","index=wineventlog EventCode IN (4798, 4799)\n| table _time, ComputerName, SubjectUserName, TargetUserName, Message"],"vql":["SELECT * FROM Artifact.Windows.System.Pslist()\nWHERE CommandLine =~ \"(?i)net.*(group|localgroup).*(domain admins|enterprise admins|administrators)\""],"powershell":["Get-WinEvent -FilterHashtable @{LogName='Security'; Id=4798} |\n  Select-Object TimeCreated, Message | Format-List","# Enumerate high-value groups (run as analyst on domain system)\nGet-ADGroupMember \"Domain Admins\" -Recursive |\n  Select-Object Name, SamAccountName, ObjectClass | Format-Table"]}},{"id":"T1071.001","name":"Application Layer Protocol: Web Protocols","tactic":"TA0011","tactics":["TA0011"],"atomicTests":[{"id":"T1071.001-1","name":"Malicious User Agents - Powershell","description":"This test simulates an infected host beaconing to command and control. Upon execution, no output will be displayed. Use an application such as Wireshark to record the session and observe user agent strings and responses. Inspired by APTSimulator - https://github.com/NextronSystems/APTSimulator/blob/master/test-sets/command-and-control/malicious-user-agents.bat","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1071.001-2","name":"Malicious User Agents - CMD","description":"This test simulates an infected host beaconing to command and control. Upon execution, no out put will be displayed. Use an application such as Wireshark to record t
