he session and observe user agent strings and responses. Inspired by APTSimulator - https://github.com/NextronSystems/APTSimulator/blob/master/test-sets/command-and-control/malicious-user-agents.bat","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true},{"id":"T1071.001-3","name":"Malicious User Agents - Nix","description":"This test simulates an infected host beaconing to command and control. Inspired by APTSimulator - https://github.com/NextronSystems/APTSimulator/blob/master/test-sets/command-and-control/malicious-user-agents.bat","supportedPlatforms":["linux","macos"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false}],"curated":true,"huntPack":{"splunk":["index=sysmon EventCode=3\n  DestinationPort IN (80, 443, 8080, 8443)\n  Image!=\"*\\\\chrome.exe\" Image!=\"*\\\\firefox.exe\" Image!=\"*\\\\msedge.exe\"\n| stats count, dc(DestinationIp) as uniq_ips, avg(DestinationPort) as avg_port\n    by Image, Computer\n| sort - count","index=proxy sourcetype=web_traffic\n| stats count, stdev(bytes) as jitter, avg(bytes) as avg_bytes\n    by src_ip, dest_ip, dest_port\n| where jitter < 200 AND count > 30\n| sort - count"],"vql":["SELECT * FROM Artifact.Windows.Network.Netstat()\nWHERE RemotePort IN (\"80\",\"443\",\"8080\",\"8443\")\n  AND NOT Process =~ \"(?i)(chrome|firefox|edge|svchost|MicrosoftEdge).exe\"","SELECT * FROM Artifact.Windows.System.DNSCache()\nWHERE NOT Answer =~ \"(?i)(microsoft|windows|google|akamai|cloudflare|cdn)\""],"powershell":["Get-NetTCPConnection -State Established |\n  Where-Object {$_.RemotePort -in @(80,443,8080,8443)} |\n  ForEach-Object { $proc = Get-Process -Id $_.OwningProcess -EA SilentlyContinue\n    [PSCustomObject]@{ Process=$proc.Name; PID=$_.OwningProcess\n      Remote=\"$($_.RemoteAddress):$($_.RemotePort)\" } } |\n  Where-Object {$_.Process -notmatch '(?i)(chrome|firefox|edge|svchost)'} | Format-Table","Get-DnsClientCache |\n  Where-Object {$_.Data -notmatch '(?i)(microsoft|windows|google|akamai|cloudflare)'} |\n  Select-Object Name, Data, TimeToLive | Format-Table"]}},{"id":"T1082","name":"System Information Discovery","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1082-1","name":"System Information Discovery","description":"Identify System Info. Upon execution, system info and time info will be displayed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-2","name":"System Information Discovery","description":"Identify System Info","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-3","name":"List OS Information","description":"Identify System Info","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-4","name":"Linux VM Check via Hardware","description":"Identify virtual machine hardware. This technique is used by the Pupy RAT and other malware.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-5","name":"Linux VM Check via Kernel Modules","description":"Identify virtual machine guest kernel modules. This technique is used by the Pupy RAT and other malware.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-6","name":"FreeBSD VM Check via Kernel Modules","description":"Identify virtual machine host kernel modules.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-7","name":"Hostname Discovery (Windows)","description":"Identify system hostname for Windows. Upon execution, the hostname of the device will be displayed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-8","name":"Hostname Discovery","description":"Identify system hostname for FreeBSD, Linux and macOS systems.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-9","name":"Windows MachineGUID Discovery","description":"Identify the Windows MachineGUID value for a system. Upon execution, the machine GUID will be displayed from registry.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-10","name":"Griffon Recon","description":"This script emulates the reconnaissance script seen in used by Griffon and was modified by security researcher Kirk Sayre in order simply print the recon results to the screen as opposed to exfiltrating them. [Script](https://gist.github.com/kirk-sayre-work/7cb5bf4e2c7c77fa5684ddc17053f1e5). For more information see also [https://malpedia.caad.fkie.fraunhofer.de/details/js.griffon](https://malpedia.caad.fkie.fraunhofer.de/details/js.griffon) and [https://attack.mitre.org/software/S0417/](https://attack.mitre.org/software/S0417/)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1082-11","name":"Environment variables discovery on windows","description":"Identify all environment variables. Upon execution, environments variables and your path info will be displayed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-12","name":"Environment variables discovery on freebsd, macos and linux","description":"Identify all environment variables. Upon execution, environments variables and your path info will be displayed.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-13","name":"Show System Integrity Protection status (MacOS)","description":"Read and Display System Intergrety Protection status. csrutil is commonly used by malware and post-exploitation tools to determine whether certain files and directories on the system are writable or not.","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-14","name":"WinPwn - winPEAS","description":"Discover Local Privilege Escalation possibilities using winPEAS function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-15","name":"WinPwn - itm4nprivesc","description":"Discover Local Privilege Escalation possibilities using itm4nprivesc function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-16","name":"WinPwn - Powersploits privesc checks","description":"Powersploits privesc checks using oldchecks function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-17","name":"WinPwn - General privesc checks","description":"General privesc checks using the otherchecks function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-18","name":"WinPwn - GeneralRecon","description":"Collect general computer informations via GeneralRecon function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-19","name":"WinPwn - Morerecon","description":"Gathers local system information using the Morerecon function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-20","name":"WinPwn - RBCD-Check","description":"Search for Resource-Based Constrained Delegation attack paths using RBCD-Check function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-21","name":"WinPwn - PowerSharpPack - Watson searching for missing windows patches","description":"PowerSharpPack - Watson searching for missing windows patches  technique via function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-22","name":"WinPwn - PowerSharpPack - Sharpup checking common Privesc vectors","description":"PowerSharpPack - Sharpup checking common Privesc vectors technique via function of WinPwn - Takes several minutes to complete.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-23","name":"WinPwn - PowerSharpPack - Seatbelt","description":"PowerSharpPack - Seatbelt technique via function of WinPwn. [Seatbelt](https://github.com/GhostPack/Seatbelt) is a C# project that performs a number of security oriented host-survey \"safety checks\" relevant from both offensive and defensive security perspectives.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-24","name":"Azure Security Scan with SkyArk","description":"Upon successful execution, this test will utilize a valid read-only Azure AD user's credentials to conduct a security scan and determine what users exist in a given tenant, as well as identify any admin users. Once the test is complete, a folder will be output to the temp directory that contains 3 csv files which provide info on the discovered users. See https://github.com/cyberark/SkyArk","supportedPlatforms":["azure-ad"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1082-25","name":"Linux List Kernel Modules","description":"Enumerate kernel modules installed 3 different ways. Upon successful execution stdout will display kernel modules installed on host 2 times, followed by list of modules matching 'vmw' if present.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-26","name":"FreeBSD List Kernel Modules","description":"Enumerate kernel modules loaded. Upon successful execution stdout will display kernel modules loaded, followed by list of modules matching 'vmm' if present.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-27","name":"System Information Discovery with WMIC","description":"Identify system information with the WMI command-line (WMIC) utility. Upon execution, various system information will be displayed, including: OS, CPU, GPU, and disk drive names; memory capacity; display resolution; and baseboard, BIOS, and GPU driver products/versions. https://nwgat.ninja/getting-system-information-with-wmic-on-windows/ Elements of this test were observed in the wild used by Aurora Stealer in late 2022 and early 2023, as highlighted in public reporting: https://blog.sekoia.io/aurora-a-rising-stealer-flying-under-the-radar https://blog.cyble.com/2023/01/18/aurora-a-stealer-using-shapeshifting-tactics/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-28","name":"System Information Discovery","description":"The script gathernetworkinfo.vbs is employed to collect system information such as the operating system, DNS details, firewall configuration, etc. Outputs are stored in c:\\Windows\\System32\\config or c:\\Windows\\System32\\reg. https://www.verboon.info/2011/06/the-gathernetworkinfo-vbs-script/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-29","name":"Check computer location","description":"Looks up country code configured in the registry, likely geofence. Upon execution, country code info will be displayed. - https://tria.ge/210111-eaz8mqhgh6/behavioral1","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-30","name":"BIOS Information Discovery through Registry","description":"Looks up for BIOS information in the registry. BIOS information is often read in order to detect sandboxing environments.  Upon execution, BIOS information will be displayed. - https://tria.ge/210111-eaz8mqhgh6/behavioral1 - https://evasions.checkpoint.com/techniques/registry.html","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-31","name":"ESXi - VM Discovery using ESXCLI","description":"An adversary will using ESXCLI to enumerate the Virtual Machines on the host prior to executing power off routine. [Reference](https://www.crowdstrike.com/blog/hypervisor-jackpotting-ecrime-actors-increase-targeting-of-esxi-servers/)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1082-32","name":"ESXi - Darkside system information discovery","description":"Darkside ransomware utilises various ESXCLI commands to obtain information about the ESXi Host. [Reference](https://www.trendmicro.com/en_ph/research/21/e/darkside-linux-vms-targeted.html)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1082-33","name":"sysctl to gather macOS hardware info","description":"Gets the macOS hardware information, which can be used to determine whether the target macOS host is running on a physical or virtual machine. sysctl can be used to gather interesting macOS host data, including hardware information, memory size, logical cpu information, etc.","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-34","name":"operating system discovery","description":"operating system discovery using get-ciminstance https://petri.com/getting-operating-system-information-powershell/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-35","name":"Check OS version via \"ver\" command","description":"Ver command shows information about os version.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-36","name":"Display volume shadow copies with \"vssadmin\"","description":"The command shows all available volume shadow copies, along with their creation time and location.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-37","name":"Identify System Locale and Regional Settings with PowerShell","description":"This action demonstrates how an attacker might gather a system's region and language settings using PowerShell, which could aid in profiling the machine's location and user language preferences. The command outputs system locale details to a temporary file for further analysis.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-38","name":"Enumerate Available Drives via gdr","description":"This test simulates an attacker attempting to list the available drives on the system to gather data about file storage locations.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-39","name":"Discover OS Product Name via Registry","description":"Identify the Operating System Product Name via registry with the reg.exe command. Upon execution, the OS Product Name will be displayed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1082-40","name":"Discover OS Build Number via Registry","description":"Identify the Operating System Build Number via registry with the reg.exe command. Upon execution, the OS Build Number will be displayed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":true,"huntPack":{"splunk":["index=sysmon EventCode=1\n  Image IN (\"*\\\\systeminfo.exe\",\"*\\\\wmic.exe\",\"*\\\\msinfo32.exe\")\n| table _time, Computer, User, Image, CommandLine, ParentImage"],"vql":["SELECT * FROM Artifact.Generic.System.Info()","SELECT * FROM Artifact.Windows.System.Pslist()\nWHERE Name =~ \"(?i)(systeminfo|wmic|msinfo32).exe\""],"powershell":["Get-ComputerInfo | Select-Object WindowsProductName, OsVersion, CsName,\n  CsDomain, CsManufacturer, BiosVersion | Format-List","Get-WinEvent -FilterHashtable @{LogName='Security'; Id=4688} |\n  Where-Object {$_.Message -match '(systeminfo|wmic).exe'} |\n  Select-Object TimeCreated, Message | Format-List"]}},{"id":"T1486","name":"Data Encrypted for Impact","tactic":"TA0040","tactics":["TA0040"],"atomicTests":[{"id":"T1486-1","name":"Encrypt files using gpg (FreeBSD/Linux)","description":"Uses gpg to encrypt a file","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1486-2","name":"Encrypt files using 7z (FreeBSD/Linux)","description":"Uses 7z to encrypt a file","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1486-3","name":"Encrypt files using ccrypt (FreeBSD/Linux)","description":"Attempts to encrypt data on target systems as root to simulate an interruption authentication to target system. If root permissions are not available then attempts to encrypt data within user's home directory.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1486-4","name":"Encrypt files using openssl (FreeBSD/Linux)","description":"Uses openssl to encrypt a file","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1486-5","name":"PureLocker Ransom Note","description":"building the IOC (YOUR_FILES.txt) for the PureLocker ransomware https://www.bleepingcomputer.com/news/security/purelocker-ransomware-can-lock-files-on-windows-linux-and-macos/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1486-6","name":"Encrypt files using 7z utility - macOS","description":"This test encrypts the file(s) using the 7z utility","supportedPlatforms":["macos"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1486-7","name":"Encrypt files using openssl utility - macOS","description":"This test encrypts the file(s) using the openssl utility","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1486-8","name":"Data Encrypted with GPG4Win","description":"Gpg4win is a Windows tool (also called Kleopatra which is the preferred certificate manager) that uses email and file encryption packages for symmetric encryption. It is used by attackers to encrypt disks. User will need to add pass phrase to encrypt file as automation is not allowed under newer versions.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1486-9","name":"Data Encrypt Using DiskCryptor","description":"DiskCryptor, an open source encryption utility, can be exploited by adversaries for encrypting all disk partitions, including system partitions. This tool was identified in a ransomware campaign, as reported on https://thedfirreport.com/2021/11/15/exchange-exploit-leads-to-domain-wide-ransomware/. The documentation for DiskCryptor can be found at https://github.com/DavidXanatos/DiskCryptor. During the installation process, running dcrypt.exe starts the encryption console. It's important to note that a system reboot is necessary as part of the installation.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1486-10","name":"Akira Ransomware drop Files with .akira Extension and Ransomnote","description":"Dropping 100 files with random content and .akira File Extension and the Akira Ransomnote to c:\\","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false}],"curated":true,"huntPack":{"splunk":["index=sysmon EventCode=1\n  Image IN (\"*\\\\vssadmin.exe\",\"*\\\\bcdedit.exe\",\"*\\\\wbadmin.exe\")\n  CommandLine IN (\"*delete*shadows*\",\"*recoveryenabled*\",\"*delete*catalog*\")\n| table _time, Computer, User, Image, CommandLine","index=sysmon EventCode=11\n| stats count by Computer, Image\n| where count > 500\n| sort - count"],"vql":["SELECT * FROM Artifact.Windows.Forensics.Prefetch()\nWHERE Executable =~ \"(?i)(vssadmin|bcdedit|wbadmin|cipher)\"\n  AND Arguments =~ \"(?i)(delete|recoveryenabled|catalog)\"","SELECT count(FullPath) as total, split(FullPath,\".\")[-1] as ext\nFROM glob(globs=\"C:\\\\Users\\\\**\\\\*\")\nGROUP BY ext\nORDER BY total DESC LIMIT 30"],"powershell":["Get-WinEvent -FilterHashtable @{LogName='Security'; Id=4688} |\n  Where-Object {$_.Message -match 'vssadmin.*delete|bcdedit.*recoveryenabled|wbadmin.*delete'} |\n  Select-Object TimeCreated, Message | Format-List","# Look for mass file modification events\nGet-WinEvent -FilterHashtable @{LogName='Microsoft-Windows-Sysmon/Operational'; Id=2} |\n  Group-Object { $_.TimeCreated.ToString(\"HH:mm\") } |\n  Sort-Object Count -Descending | Select-Object -First 10 Name, Count | Format-Table"]}},{"id":"T1543.003","name":"Create or Modify System Process: Windows Service","tactic":"TA0003","tactics":["TA0003","TA0004"],"atomicTests":[{"id":"T1543.003-1","name":"Modify Fax service to run PowerShell","description":"This test will temporarily modify the service Fax by changing the binPath to PowerShell and will then revert the binPath change, restoring Fax to its original state. Upon successful execution, cmd will modify the binpath for `Fax` to spawn powershell. Powershell will then spawn.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1543.003-2","name":"Service Installation CMD","description":"Download an executable from github and start it as a service. Upon successful execution, powershell will download `AtomicService.exe` from github. cmd.exe will spawn sc.exe which will create and start the service. Results will output via stdout.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1543.003-3","name":"Service Installation PowerShell","description":"Installs A Local Service via PowerShell. Upon successful execution, powershell will download `AtomicService.exe` from github. Powershell will then use `New-Service` and `Start-Service` to start service. Results will be displayed.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1543.003-4","name":"TinyTurla backdoor service w64time","description":"It's running Dll as service to emulate the TinyTurla backdoor [Related Talos Blog](https://blog.talosintelligence.com/2021/09/tinyturla.html)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1543.003-5","name":"Remote Service Installation CMD","description":"Download an executable from github and start it as a service on a remote endpoint Upon successful execution, powershell will download `AtomicService.exe` from github. cmd.exe will spawn sc.exe which will create and start the service. Results will output via stdout.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1543.003-6","name":"Modify Service to Run Arbitrary Binary (Powershell)","description":"This test will use PowerShell to temporarily modify a service to run an arbitrary executable by changing its binary path and will then revert the binary path change, restoring the service to its original state. This technique was previously observed through SnapMC's use of Powerspolit's invoke-serviceabuse function. [Reference](https://blog.fox-it.com/2021/10/11/snapmc-skips-ransomware-steals-data/)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":true,"huntPack":{"splunk":["index=sysmon EventCode=1 Image=\"*\\\\sc.exe\" CommandLine=\"*create*\"\n| table _time, Computer, User, CommandLine","index=wineventlog EventCode=7045\n| table _time, ComputerName, Message\n| rex field=Message \"Service Name:\\\\s+(?P<svc>[^\\\\n]+)\"\n| rex field=Message \"Service File Name:\\\\s+(?P<path>[^\\\\n]+)\""],"vql":["SELECT * FROM Artifact.Windows.System.Services()\nWHERE StartMode = \"auto\"\n  AND (PathName =~ \"(?i)(temp|appdata|users\\\\public)\"\n    OR NOT PathName =~ \"(?i)(windows|program files)\")"],"powershell":["Get-WinEvent -FilterHashtable @{LogName='System'; Id=7045} |\n  Select-Object TimeCreated, Message | Format-List","Get-Service | Where-Object {$_.Status -eq 'Running'} |\n  ForEach-Object { $svc = $_\n    $bin = (Get-WmiObject Win32_Service -Filter \"Name='$($svc.Name)'\").PathName\n    [PSCustomObject]@{Name=$svc.Name; Binary=$bin} } |\n  Where-Object {$_.Binary -match 'temp|appdata|public'} | Format-List"]}},{"id":"T1547.001","name":"Boot or Logon Autostart Execution: Registry Run Keys / Startup Folder","tactic":"TA0003","tactics":["TA0003","TA0004"],"atomicTests":[{"id":"T1547.001-1","name":"Reg Key Run","description":"Run Key Persistence Upon successful execution, cmd.exe will modify the registry by adding \\\"Atomic Red Team\\\" to the Run key. Output will be via stdout.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1547.001-2","name":"Reg Key RunOnce","description":"RunOnce Key Persistence. Upon successful execution, cmd.exe will modify the registry to load AtomicRedTeam.dll to RunOnceEx. Output will be via stdout.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1547.001-3","name":"PowerShell Registry RunOnce","description":"RunOnce Key Persistence via PowerShell Upon successful execution, a new entry will be added to the runonce item in the registry.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1547.001-4","name":"Suspicious vbs file run from startup Folder","description":"vbs files can be placed in and ran from the startup folder to maintain persistance. Upon execution, \"T1547.001 Hello, World VBS!\" will be displayed twice. Additionally, the new files can be viewed in the \"$env:APPDATA\\Microsoft\\Windows\\Start Menu\\Programs\\Startup\" folder and will also run when the computer is restarted and the user logs in.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1547.001-5","name":"Suspicious jse file run from startup Folder","description":"jse files can be placed in and ran from the startup folder to maintain persistance. Upon execution, \"T1547.001 Hello, World JSE!\" will be displayed twice. Additionally, the new files can be viewed in the \"$env:APPDATA\\Microsoft\\Windows\\Start Menu\\Programs\\Startup\" folder and will also run when the computer is restarted and the user logs in.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1547.001-6","name":"Suspicious bat file run from startup Folder","description":"bat files can be placed in and executed from the startup folder to maintain persistance Upon execution, cmd will be run and immediately closed. Additionally, the new files can be viewed in the \"$env:APPDATA\\Microsoft\\Windows\\Start Menu\\Programs\\Startup\" folder and will also run when the computer is restarted and the user logs in.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1547.001-7","name":"Add Executable Shortcut Link to User Startup Folder","description":"Adds a non-malicious executable shortcut link to the current users startup directory. Test can be verified by going to the users startup directory and checking if the shortcut link exists.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1547.001-8","name":"Add persistance via Recycle bin","description":"Add a persistance via Recycle bin [vxunderground](https://github.com/vxunderground/VXUG-Papers/blob/main/The%20Persistence%20Series/Persistence%20via%20Recycle%20Bin/Persistence_via_Recycle_Bin.pdf) User have to clic on the recycle bin to lauch the payload (here calc)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1547.001-9","name":"SystemBC Malware-as-a-Service Registry","description":"This Atomic will create a registry key called socks5_powershell for persistance access https://medium.com/walmartglobaltech/systembc-powershell-version-68c9aad0f85c","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1547.001-10","name":"Change Startup Folder - HKLM Modify User Shell Folders Common Startup Value","description":"This test will modify the HKEY_LOCAL_MACHINE\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Explorer\\User Shell Folders -V \"Common Startup\" value to point to a new startup folder where a payload could be stored to launch at boot.  *successful execution requires system restart","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1547.001-11","name":"Change Startup Folder - HKCU Modify User Shell Folders Startup Value","description":"This test will modify the HKEY_CURRENT_USER\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Explorer\\User Shell Folders  -V \"Startup\" value to point to a new startup folder where a payload could be stored to launch at boot.  *successful execution requires system restart","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1547.001-12","name":"HKCU - Policy Settings Explorer Run Key","description":"This test will create a new value under HKEY_CURRENT_USER\\Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\Explorer\\Run to launch calc.exe on boot. *Requires reboot","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1547.001-13","name":"HKLM - Policy Settings Explorer Run Key","description":"This test will create a HKEY_LOCAL_MACHINE\\Software\\Microsoft\\Windows\\CurrentVersion\\Policies\\Explorer\\Run key value to launch calc.exe on boot. *Requires reboot","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1547.001-14","name":"HKLM - Append Command to Winlogon Userinit KEY Value","description":"This test will append a command to the  HKEY_LOCAL_MACHINE\\Software\\Microsoft\\Windows NT\\CurrentVersion\\Winlogon\\Userinit value to launch calc.exe on boot. * Requires reboot","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1547.001-15","name":"HKLM - Modify default System Shell - Winlogon Shell KEY Value","description":"This test change the default value of HKEY_LOCAL_MACHINE\\Software\\Microsoft\\Windows NT\\CurrentVersion\\Winlogon\\Shell from \"explorer.exe\" to the full path of \"C:\\Windows\\explorer.exe\" to log a change to the key's default value without breaking boot sequence. An atacker will alternatively replace this with a custom shell.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1547.001-16","name":"secedit used to create a Run key in the HKLM Hive","description":"secedit allows to manipulate the HKLM hive of the Windows registry. This test creates a Run key with the keyname calc having calc.exe as the value in the HKLM hive. [Reference](https://blueteamops.medium.com/secedit-and-i-know-it-595056dee53d)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1547.001-17","name":"Modify BootExecute Value","description":"This test modifies the BootExecute registry value to \"autocheck autoche *\", which can be used to simulate an adversary's attempt to tamper with the system's boot process. Reference - https://www.welivesecurity.com/wp-content/uploads/2018/09/ESET-LoJax.pdf NOTE that by not saving the correct value, you may inhibit your system from booting properly. Only run on a test system. There is a reg export before running the Atomic.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1547.001-18","name":"Allowing custom application to execute during new RDP logon session","description":"When a users logs in to a computer via RDP,Windows will search for the key in HKLM\\SYSTEM\\CurrentControlSet\\Control\\Terminal Server\\Wds\\rdpwd registry By default, rdpclip is the value stored. An attacker with administrator privileges can alter the value stored to allow for the custom application to execute during RDP login session.The test will allow running cal rather rdpclip when a user logs in via RDP","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1547.001-19","name":"Creating Boot Verification Program Key for application execution during successful boot","description":"Microsoft allows users to define a custom boot verification program for those situations by creating the registry key \u201cHKLM\\System\\CurrentControlSet\\Control\\BootVerificationProgram\u201d and setting the value of ImagePath to the path of boot verification program.Threat Actor can abuse by creating this registry key and providing a malicious application to be executed during successful boot","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1547.001-20","name":"Add persistence via Windows Context Menu","description":"This atomic test add persistence taking advantage of the  Windows Context Menu [Hexacorn](https://www.hexacorn.com/blog/2018/07/29/beyond-good-ol-run-key-part-82/) User have to right click on the main screen or in the white space of the opened folder (e.g. Size Modify).","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":true,"huntPack":{"splunk":["index=sysmon EventCode=13\n  TargetObject IN (\"*\\\\CurrentVersion\\\\Run\\\\*\",\"*\\\\CurrentVersion\\\\RunOnce\\\\*\")\n| table _time, Computer, User, TargetObject, Details, Image","index=sysmon EventCode=11\n  TargetFilename=\"*\\\\Start Menu\\\\Programs\\\\Startup\\\\*\"\n| table _time, Computer, User, TargetFilename, Image"],"vql":["SELECT * FROM Artifact.Windows.Sys.StartupItems()","SELECT * FROM Artifact.Windows.Registry.NTUser(\n  KeyGlob=\"SOFTWARE\\\\Microsoft\\\\Windows\\\\CurrentVersion\\\\Run**\")"],"powershell":["Get-ItemProperty \"HKCU:\\Software\\Microsoft\\Windows\\CurrentVersion\\Run\" | Format-List\nGet-ItemProperty \"HKLM:\\Software\\Microsoft\\Windows\\CurrentVersion\\Run\" | Format-List","Get-ChildItem \"$env:APPDATA\\Microsoft\\Windows\\Start Menu\\Programs\\Startup\\\" |\n  Select-Object FullName, LastWriteTime, Length"]}},{"id":"T1548.002","name":"Abuse Elevation Control Mechanism: Bypass User Account Control","tactic":"TA0004","tactics":["TA0004"],"atomicTests":[{"id":"T1548.002-1","name":"Bypass UAC using Event Viewer (cmd)","description":"Bypasses User Account Control using Event Viewer and a relevant Windows Registry modification. More information here - https://enigma0x3.net/2016/08/15/fileless-uac-bypass-using-eventvwr-exe-and-registry-hijacking/ Upon execution command prompt should be launched with administrative privileges.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1548.002-2","name":"Bypass UAC using Event Viewer (PowerShell)","description":"PowerShell code to bypass User Account Control using Event Viewer and a relevant Windows Registry modification. More information here - https://enigma0x3.net/2016/08/15/fileless-uac-bypass-using-eventvwr-exe-and-registry-hijacking/ Upon execution command prompt should be launched with administrative privalages","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1548.002-3","name":"Bypass UAC using Fodhelper","description":"Bypasses User Account Control using the Windows 10 Features on Demand Helper (fodhelper.exe). Requires Windows 10. Upon execution, \"The operation completed successfully.\" will be shown twice and command prompt will be opened.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1548.002-4","name":"Bypass UAC using Fodhelper - PowerShell","description":"PowerShell code to bypass User Account Control using the Windows 10 Features on Demand Helper (fodhelper.exe). Requires Windows 10. Upon execution command prompt will be opened.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1548.002-5","name":"Bypass UAC using ComputerDefaults (PowerShell)","description":"PowerShell code to bypass User Account Control using ComputerDefaults.exe on Windows 10 Upon execution administrative command prompt should open","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1548.002-6","name":"Bypass UAC by Mocking Trusted Directories","description":"Creates a fake \"trusted directory\" and copies a binary to bypass UAC. The UAC bypass may not work on fully patched systems Upon execution the directory structure should exist if the system is patched, if unpatched Microsoft Management Console should launch","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1548.002-7","name":"Bypass UAC using sdclt DelegateExecute","description":"Bypasses User Account Control using a fileless method, registry only. Upon successful execution, sdclt.exe will spawn cmd.exe to spawn notepad.exe [Reference - sevagas.com](http://blog.sevagas.com/?Yet-another-sdclt-UAC-bypass) Adapted from [MITRE ATT&CK Evals](https://github.com/mitre-attack/attack-arsenal/blob/66650cebd33b9a1e180f7b31261da1789cdceb66/adversary_emulation/APT29/CALDERA_DIY/evals/payloads/stepFourteen_bypassUAC.ps1)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1548.002-8","name":"Disable UAC using reg.exe","description":"Disable User Account Conrol (UAC) using the builtin tool reg.exe by changing its registry key HKLM\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Policies\\System\\EnableLUA from 1 to 0","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1548.002-9","name":"Bypass UAC using SilentCleanup task","description":"Bypass UAC using SilentCleanup task on Windows 8-10 using bat file from https://www.reddit.com/r/hacking/comments/ajtrws/bypassing_highest_uac_level_windows_810/ There is an auto-elevated task called SilentCleanup located in %windir%\\system32\\cleanmgr.exe This can be abused to elevate any file with Administrator privileges without prompting UAC (even highest level). For example, we can set the windir registry kye to: \"cmd /k REM \" And forcefully run SilentCleanup task: schtasks /run /tn \\Microsoft\\Windows\\DiskCleanup\\SilentCleanup /I REM will tell it to ignore everything after %windir% and treat it just as a NOTE. Therefore just executing cmd with admin privs.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1548.002-10","name":"UACME Bypass Method 23","description":"Executes User Account Control Bypass according to the methods listed below. Upon successful execution you should see event viewer load and two administrative command prompts. Note: The cleanup_command's which kill the spawned cmd and event viewer processes only work if run as admin. Author: Leo Davidson derivative Type:\tDll Hijack Method: IFileOperation Target:\t\\system32\\pkgmgr.exe Component: DismCore.dll Implementation:\tucmDismMethod UCM Method:\tUacMethodDISM https://github.com/hfiref0x/UACME","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1548.002-11","name":"UACME Bypass Method 31","description":"Executes User Account Control Bypass according to the methods listed below. Upon successful execution you should see event viewer load and two administrative command prompts. Note: The cleanup_command's which kill the spawned cmd and event viewer processes only work if run as admin. Author: Enigma0x3 Type:\tShell API Method: Registry key manipulation Target:\t\\system32\\sdclt.exe Component: Attacker defined Implementation:\tucmSdcltIsolatedCommandMethod UCM Method:\tUacMethodShellSdclt https://github.com/hfiref0x/UACME","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1548.002-12","name":"UACME Bypass Method 33","description":"Executes User Account Control Bypass according to the methods listed below. Upon successful execution you should see event viewer load and two administrative command prompts. Note: The cleanup_command's which kill the spawned cmd and event viewer processes only work if run as admin. Author: winscripting.blog Type:\tShell API Method: Registry key manipulation Target:\t\\system32\\fodhelper.exe Component:\tAttacker defined Implementation:\tucmShellRegModMethod UCM Method:\tUacMethodMsSettings2 https://github.com/hfiref0x/UACME","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1548.002-13","name":"UACME Bypass Method 34","description":"Executes User Account Control Bypass according to the methods listed below. Upon successful execution you should see event viewer load and two administrative command prompts. Note: The cleanup_command's which kill the spawned cmd and event viewer processes only work if run as admin. Author: James Forshaw Type:\tShell API Method: Environment variables expansion Target:\t\\system32\\svchost.exe via \\system32\\schtasks.exe Component:\tAttacker defined Implementation:\tucmDiskCleanupEnvironmentVariable UCM Method:\tUacMethodDiskSilentCleanup https://github.com/hfiref0x/UACME","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1548.002-14","name":"UACME Bypass Method 39","description":"Executes User Account Control Bypass according to the methods listed below. Upon successful execution you should see event viewer load and two administrative command prompts. Note: The cleanup_command's which kill the spawned cmd and event viewer processes only work if run as admin. Author: Stefan Kanthak Type:\tDll Hijack Method: .NET Code Profiler Target:\t\\system32\\mmc.exe Component:\tAttacker defined Implementation:\tucmCorProfilerMethod UCM Method:\tUacMethodCorProfiler https://github.com/hfiref0x/UACME","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1548.002-15","name":"UACME Bypass Method 56","description":"Executes User Account Control Bypass according to the methods listed below. Upon successful execution you should see event viewer load and two administrative command prompts. Note: The cleanup_command's which kill the spawned cmd and event viewer processes only work if run as admin. Author: Hashim Jawad Type:\tShell API Method: Registry key manipulation Target:\t\\system32\\WSReset.exe Component:\tAttacker defined Implementation:\tucmShellRegModMethod UCM Method:\tUacMethodShellWSReset https://github.com/hfiref0x/UACME","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1548.002-16","name":"UACME Bypass Method 59","description":"Executes User Account Control Bypass according to the methods listed below. Upon successful execution you should see event viewer load and two administrative command prompts. Note: The cleanup_command's which kill the spawned cmd and event viewer processes only work if run as admin. Author: James Forshaw Type:\tAppInfo ALPC Method: RAiLaunchAdminProcess and DebugObject Target:\tAttacker defined Component:\tAttacker defined Implementation:\tucmDebugObjectMethod UCM Method:\tUacMethodDebugObject https://github.com/hfiref0x/UACME","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1548.002-17","name":"UACME Bypass Method 61","description":"Executes User Account Control Bypass according to the methods listed below. Upon successful execution you should see event viewer load and two administrative command prompts. Note: The cleanup_command's which kill the spawned cmd and event viewer processes only work if run as admin. Author: Enigma0x3/bytecode77 derivative by Nassim Asrir Type:\tShell API Method: Registry key manipulation Target:\t\\system32\\slui.exe, \\system32\\changepk.exe Component:\tAttacker defined Implementation:\tucmShellRegModMethod UCM Method:\tUacMethodDebugObject https://github.com/hfiref0x/UACME","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1548.002-18","name":"WinPwn - UAC Magic","description":"UAC bypass using Magic technique via function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1548.002-19","name":"WinPwn - UAC Bypass ccmstp technique","description":"UAC bypass using ccmstp technique via function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1548.002-20","name":"WinPwn - UAC Bypass DiskCleanup technique","description":"UAC bypass using DiskCleanup technique via function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1548.002-21","name":"WinPwn - UAC Bypass DccwBypassUAC technique","description":"UAC Bypass DccwBypassUAC technique via function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1548.002-22","name":"Disable UAC admin consent prompt via ConsentPromptBehaviorAdmin registry key","description":"Disable User Account Conrol (UAC) for admin by setting the registry key HKLM\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Policies\\System\\ConsentPromptBehaviorAdmin to 0. [MedusaLocker Ransomware](https://cloudsek.com/technical-analysis-of-medusalocker-ransomware/), [Purple Fox Rootkit](https://blogs.blackberry.com/en/2022/01/threat-thursday-purple-fox-rootkit), [Avaddon Ransomware](https://blogs.blackberry.com/en/2021/06/threat-thursday-avaddon-ransomware-uses-ddos-attacks-as-triple-threat)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1548.002-23","name":"UAC Bypass with WSReset Registry Modification","description":"The following UAC bypass is focused on a registry key under \"HKCU:\\Software\\Classes\\AppX82a6gwre4fdg3bt635tn5ctqjf8msdd2\\Shell\\open\\command\" that will trigger a command once wsreset.exe runs. This bypass is limited to Windows 10 1803/1809 and may not run on Server platforms. The registry mod is where interest will be. If successful, the command to run will spawn off wsreset.exe. [UAC Bypass in Windows 10 Store Binary](https://0x1.gitlab.io/exploit/UAC-Bypass-in-Windows-10-Store-Binary/)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1548.002-24","name":"Disable UAC - Switch to the secure desktop when prompting for elevation via registry key","description":"User Account Control (UAC) is a security mechanism for limiting the elevation of privileges, including administrative accounts, unless authorized. This setting ensures that the elevation prompt is only used in secure desktop mode. Disable User Account Conrol (UAC) for secure desktop by setting the registry key HKLM\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Policies\\System\\PromptOnSecureDesktop to 0.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1548.002-25","name":"Disable UAC notification via registry keys","description":"This atomic regarding UACDisableNotify pertains to the notification behavior of UAC. UAC is a critical security feature in Windows that prevents unauthorized changes to the operating system. It prompts the user for permission or an administrator password before allowing actions that could affect the system's operation or change settings that affect other users. The BlotchyQuasar RAT defense evasion activities that the adversary to disable UAC notifications makes it easier for malware and malicious software to execute with elevated privileges. [Article](https://securityintelligence.com/x-force/x-force-hive0129-targeting-financial-institutions-latam-banking-trojan/)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1548.002-26","name":"Disable ConsentPromptBehaviorAdmin via registry keys","description":"This atomic regarding setting ConsentPromptBehaviorAdmin to 0 configures the UAC so that it does not prompt for consent or credentials when actions requiring elevated privileges are performed by users in the administrators group. This means that any operation that would normally trigger a UAC prompt will proceed automatically without user interaction.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1548.002-27","name":"UAC bypassed by Utilizing ProgIDs registry.","description":"This atomic designed to simulate the UAC bypassed made by ValleyRAT by adding customized ProgIDs registry entry.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":true,"huntPack":{"splunk":["index=sysmon EventCode=13\n  TargetObject IN (\"*\\\\ms-settings\\\\shell\\\\open\\\\command*\",\"*\\\\mscfile\\\\shell\\\\open\\\\command*\")\n| table _time, Computer, User, Image, TargetObject, Details","index=sysmon EventCode=1\n  Image IN (\"*\\\\eventvwr.exe\",\"*\\\\fodhelper.exe\")\n  IntegrityLevel=\"High\"\n| table _time, Computer, User, Image, ParentImage, CommandLine"],"vql":["SELECT * FROM Artifact.Windows.Registry.NTUser(\n  KeyGlob=\"SOFTWARE\\\\Classes\\\\ms-settings\\\\shell\\\\open\\\\command**\")","SELECT * FROM Artifact.Windows.System.Pslist()\nWHERE Name =~ \"(?i)(eventvwr|fodhelper|sdclt|cmstp).exe\""],"powershell":["Get-ItemProperty \"HKCU:\\Software\\Classes\\ms-settings\\shell\\open\\command\" -EA SilentlyContinue | Format-List\nGet-ItemProperty \"HKCU:\\Software\\Classes\\mscfile\\shell\\open\\command\" -EA SilentlyContinue | Format-List","Get-WinEvent -FilterHashtable @{LogName='Security'; Id=4688} |\n  Where-Object {$_.Message -match '(eventvwr|fodhelper|sdclt).exe'} |\n  Select-Object TimeCreated, Message | Format-List"]}},{"id":"T1558.003","name":"Steal or Forge Kerberos Tickets: Kerberoasting","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1558.003-1","name":"Request for service tickets","description":"This test uses the Powershell Empire Module: Invoke-Kerberoast.ps1 The following are further sources and credits for this attack: [Kerberoasting Without Mimikatz source] (https://www.harmj0y.net/blog/powershell/kerberoasting-without-mimikatz/) [Invoke-Kerberoast source] (https://powersploit.readthedocs.io/en/latest/Recon/Invoke-Kerberoast/) when executed successfully , the test displays available services with their hashes. If the testing domain doesn't have any service principal name configured, there is no output","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true},{"id":"T1558.003-2","name":"Rubeus kerberoast","description":"Information on the Rubeus tool and it's creators found here: https://github.com/GhostPack/Rubeus#asreproast This build targets .NET 4.5.  If targeting a different version you will need to compile Rubeus","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1558.003-3","name":"Extract all accounts in use as SPN using setspn","description":"The following test will utilize setspn to extract the Service Principal Names. This behavior is typically used during a kerberos or silver ticket attack. A successful execution will output all the SPNs for the related domain.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1558.003-4","name":"Request A Single Ticket via PowerShell","description":"The following test will utilize native PowerShell Identity modules to query the domain to extract the Service Principal Names for a single computer. This behavior is typically used during a kerberos or silver ticket attack. A successful execution will output the SPNs for the endpoint in question.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1558.003-5","name":"Request All Tickets via PowerShell","description":"The following test will utilize native PowerShell Identity modules to query the domain to extract allthe Service Principal Names. This behavior is typically used during a kerberos or silver ticket attack. A successful execution will output the SPNs for the domain in question.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1558.003-6","name":"WinPwn - Kerberoasting","description":"Kerberoasting technique via function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1558.003-7","name":"WinPwn - PowerSharpPack - Kerberoasting Using Rubeus","description":"PowerSharpPack - Kerberoasting Using Rubeus technique via function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false}],"curated":true,"huntPack":{"splunk":["index=wineventlog EventCode=4769\n  TicketEncryptionType=\"0x17\" TicketOptions=\"0x40810000\"\n| stats count by TargetUserName, ServiceName, ClientAddress\n| sort - count","index=wineventlog EventCode=4769 TicketEncryptionType=\"0x17\"\n| where ServiceName!=\"krbtgt\" AND NOT ServiceName=\"*$\"\n| table _time, ComputerName, TargetUserName, ServiceName, ClientAddress"],"vql":["SELECT * FROM Artifact.Windows.EventLogs.EvtxHunter(\n  EvtxGlob=\"**\\\\Security.evtx\", IdRegex=\"4769\")\nWHERE TicketEncryptionType = \"0x17\"\n  AND NOT ServiceName =~ \"(krbtgt|\\\\$)\""],"powershell":["Get-WinEvent -FilterHashtable @{LogName='Security'; Id=4769} |\n  Where-Object {$_.Message -match 'Ticket Encryption Type:\\s+0x17'} |\n  Select-Object TimeCreated, Message | Format-List","# Identify kerberoastable accounts (run on DC)\nGet-ADUser -Filter {ServicePrincipalName -ne \"$null\" -and Enabled -eq $true} |\n  Select-Object Name, SamAccountName, ServicePrincipalName | Format-Table"]}},{"id":"T1566.001","name":"Phishing: Spearphishing Attachment","tactic":"TA0002","tactics":["TA0001"],"atomicTests":[{"id":"T1566.001-1","name":"Download Macro-Enabled Phishing Attachment","description":"This atomic test downloads a macro enabled document from the Atomic Red Team GitHub repository, simulating an end user clicking a phishing link to download the file. The file \"PhishingAttachment.xlsm\" is downloaded to the %temp% directory.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1566.001-2","name":"Word spawned a command shell and used an IP address in the command line","description":"Word spawning a command prompt then running a command with an IP address in the command line is an indicator of malicious activity. Upon execution, CMD will be launched and ping 8.8.8.8.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true}],"curated":true,"huntPack":{"splunk":["index=sysmon EventCode=1\n  Image=\"*\\\\WINWORD.EXE\" OR Image=\"*\\\\EXCEL.EXE\"\n| where match(CommandLine, \"(?i)(cmd|powershell|wscript|cscript)\")\n| table _time, Computer, User, Image, CommandLine","index=sysmon EventCode=1\n  ParentImage IN (\"*\\\\WINWORD.EXE\",\"*\\\\EXCEL.EXE\",\"*\\\\OUTLOOK.EXE\")\n  Image IN (\"*\\\\cmd.exe\",\"*\\\\powershell.exe\",\"*\\\\wscript.exe\",\"*\\\\mshta.exe\")\n| table _time, Computer, User, ParentImage, Image, CommandLine"],"vql":["SELECT * FROM Artifact.Windows.EventLogs.EvtxHunter(\n  EvtxGlob=\"**\\\\*.evtx\", IdRegex=\"4688\")\nWHERE NewProcessName =~ \"(?i)(WINWORD|EXCEL|OUTLOOK).EXE\"","SELECT * FROM Artifact.Windows.System.Pslist()\nWHERE ParentName =~ \"(?i)(WINWORD|EXCEL|OUTLOOK).EXE\"\n  AND Name =~ \"(?i)(cmd|powershell|wscript|cscript).exe\""],"powershell":["Get-WinEvent -FilterHashtable @{LogName='Microsoft-Windows-Sysmon/Operational'; Id=1} |\n  Where-Object { $_.Message -match 'WINWORD.EXE|EXCEL.EXE' -and\n    $_.Message -match 'powershell|cmd|wscript' } |\n  Select-Object TimeCreated, Message | Format-List","Get-ChildItem \"$env:APPDATA\\Microsoft\\Office\\Recent\\\" |\n  Sort-Object LastWriteTime -Descending |\n  Select-Object -First 20 FullName, LastWriteTime"]}},{"id":"T1001.002","name":"Data Obfuscation via Steganography","tactic":"TA0011","tactics":["TA0011"],"atomicTests":[{"id":"T1001.002-1","name":"Steganographic Tarball Embedding","description":"This atomic test, named \"Steganographic Tarball Embedding\", simulates the technique of data obfuscation via steganography by embedding a tar archive file (tarball) within an image. The test begins by ensuring the availability of the image file and the tarball file containing data . It then generates random passwords and saves them to a file. Subsequently, the tarball file is created, containing the passwords file. The test executor command reads the contents of the image file and the tarball file as byte arrays and appends them together to form a new image file. This process effectively embeds the tarball file within the image, utilizing steganography techniques for data obfuscation. This atomic test simulates the technique of data obfuscation via steganography, enabling attackers to clandestinely transfer files across systems undetected. By embedding the tarball file within the image, adversaries can obscure their activities, facilitating covert communication and data exfiltration.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1001.002-2","name":"Embedded Script in Image Execution via Extract-Invoke-PSImage","description":"This atomic test demonstrates the technique of data obfuscation via steganography, where a PowerShell script is concealed within an image file. The PowerShell script is embedded using steganography techniques, making it undetectable by traditional security measures. The script is hidden within the pixels of the image, enabling attackers to covertly transfer and execute malicious code across systems. The test begins by ensuring the availability of the malicious image file and the Extract-Invoke-PSImage script. The test proceeds to extract the hidden PowerShell script (decoded.ps1) from the image file using the Extract-Invoke-PSImage tool. The extracted script is then decoded from base64 encoding and saved as a separate PowerShell (textExtraction.ps1). Consequently, the textExtraction.ps1 script is executed. In the case of this atomic test, the malicious image file which is downloaded has the powershell command Start-Process notepad embedded within in base64. This is done to emulate an attackers behaviour in the case they were to execute malware embedded within the image file.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1001.002-3","name":"Execute Embedded Script in Image via Steganography","description":"This atomic test demonstrates the execution of an embedded script in an image file using steganography techniques. The script is first encoded in base64 and then embedded within the pixels of the image. The modified image is created, and the script is extracted and executed on the target system.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1003","name":"OS Credential Dumping","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1003-1","name":"Gsecdump","description":"Dump credentials from memory using Gsecdump. Upon successful execution, you should see domain\\username's followed by two 32 character hashes. If you see output that says \"compat: error: failed to create child process\", execution was likely blocked by Anti-Virus. You will receive only error output if you do not run this test from an elevated context (run as administrator) If you see a message saying \"The system cannot find the path specified\", try using the get-prereq_commands to download and install Gsecdump first.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1003-2","name":"Credential Dumping with NPPSpy","description":"Changes ProviderOrder Registry Key Parameter and creates Key for NPPSpy. After user's logging in cleartext password is saved in C:\\NPPSpy.txt. Clean up deletes the files and reverses Registry changes. NPPSpy Source: https://github.com/gtworek/PSBits/tree/master/PasswordStealing/NPPSpy","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1003-3","name":"Dump svchost.exe to gather RDP credentials","description":"The svchost.exe contains the RDP plain-text credentials. Source: https://www.n00py.io/2021/05/dumping-plaintext-rdp-credentials-from-svchost-exe/ Upon successful execution, you should see the following file created $env:TEMP\\svchost-exe.dmp.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1003-4","name":"Retrieve Microsoft IIS Service Account Credentials Using AppCmd (using list)","description":"AppCmd.exe is a command line utility which is used for managing an IIS web server. The list command within the tool reveals the service account credentials configured for the webserver. An adversary may use these credentials for other malicious purposes. [Reference](https://twitter.com/0gtweet/status/1588815661085917186?cxt=HHwWhIDUyaDbzYwsAAAA)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1003-5","name":"Retrieve Microsoft IIS Service Account Credentials Using AppCmd (using config)","description":"AppCmd.exe is a command line utility which is used for managing an IIS web server. The config command within the tool reveals the service account credentials configured for the webserver. An adversary may use these credentials for other malicious purposes. [Reference](https://twitter.com/0gtweet/status/1588815661085917186?cxt=HHwWhIDUyaDbzYwsAAAA)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1003-6","name":"Dump Credential Manager using keymgr.dll and rundll32.exe","description":"This test executes the exported function `KRShowKeyMgr` located in `keymgr.dll` using `rundll32.exe`. It opens a window that allows to export stored Windows credentials from the credential manager to a file (`.crd` by default). The file can then be retrieved and imported on an attacker-controlled computer to list the credentials get the passwords. The only limitation is that it requires a CTRL+ALT+DELETE input from the attacker, which can be achieve multiple ways (e.g. a custom implant with remote control capabilities, enabling RDP, etc.). Reference: https://twitter.com/0gtweet/status/1415671356239216653","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1003-7","name":"Send NTLM Hash with RPC Test Connection","description":"RpcPing command can be used to send an RPC test connection to the target server (-s) and force the NTLM hash to be sent in the process. Ref: https://twitter.com/vysecurity/status/974806438316072960","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1003.002","name":"OS Credential Dumping: Security Account Manager","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1003.002-1","name":"Registry dump of SAM, creds, and secrets","description":"Local SAM (SAM & System), cached credentials (System & Security) and LSA secrets (System & Security) can be enumerated via three registry keys. Then processed locally using https://github.com/Neohapsis/creddump7 Upon successful execution of this test, you will find three files named, sam, system and security in the %temp% directory.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1003.002-2","name":"Registry parse with pypykatz","description":"Parses registry hives to obtain stored credentials. Will create a Python virtual environment within the External Payloads folder that can be deleted manually post test execution.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1003.002-3","name":"esentutl.exe SAM copy","description":"Copy the SAM hive using the esentutl.exe utility This can also be used to copy other files and hives like SYSTEM, NTUSER.dat etc.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1003.002-4","name":"PowerDump Hashes and Usernames from Registry","description":"Executes a hashdump by reading the hashes from the registry.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1003.002-5","name":"dump volume shadow copy hives with certutil","description":"Dump hives from volume shadow copies with the certutil utility, exploiting a vulnerability known as \"HiveNightmare\" or \"SeriousSAM\". This can be done with a non-admin user account. [CVE-2021-36934](https://cve.mitre.org/cgi-bin/cvename.cgi?name=CVE-2021-36934)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1003.002-6","name":"dump volume shadow copy hives with System.IO.File","description":"Dump hives from volume shadow copies with System.IO.File. [CVE-2021-36934](https://cve.mitre.org/cgi-bin/cvename.cgi?name=CVE-2021-36934)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1003.002-7","name":"WinPwn - Loot local Credentials - Dump SAM-File for NTLM Hashes","description":"Loot local Credentials - Dump SAM-File for NTLM Hashes technique via function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1003.002-8","name":"Dumping of SAM, creds, and secrets(Reg Export)","description":"Local SAM (SAM & System), cached credentials (System & Security) and LSA secrets (System & Security) can be enumerated via three registry keys. Used reg export to execute this behavior Upon successful execution of this test, you will find three files named, sam, system and security in the %temp% directory.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1003.003","name":"OS Credential Dumping: NTDS","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1003.003-1","name":"Create Volume Shadow Copy with vssadmin","description":"This test is intended to be run on a domain Controller. The Active Directory database NTDS.dit may be dumped by copying it from a Volume Shadow Copy.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1003.003-2","name":"Copy NTDS.dit from Volume Shadow Copy","description":"This test is intended to be run on a domain Controller. The Active Directory database NTDS.dit may be dumped by copying it from a Volume Shadow Copy. This test requires steps taken in the test \"Create Volume Shadow Copy with vssadmin\". A successful test also requires the export of the SYSTEM Registry hive. This test must be executed on a Windows Domain Controller.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1003.003-3","name":"Dump Active Directory Database with NTDSUtil","description":"This test is intended to be run on a domain Controller. The Active Directory database NTDS.dit may be dumped using NTDSUtil for offline credential theft attacks. This capability uses the \"IFM\" or \"Install From Media\" backup functionality that allows Active Directory restoration or installation of subsequent domain controllers without the need of network-based replication. Upon successful completion, you will find a copy of the ntds.dit file in the C:\\Windows\\Temp directory.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1003.003-4","name":"Create Volume Shadow Copy with WMI","description":"This test is intended to be run on a domain Controller. The Active Directory database NTDS.dit may be dumped by copying it from a Volume Shadow Copy.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1003.003-5","name":"Create Volume Shadow Copy remotely with WMI","description":"This test is intended to be run from a remote workstation with domain admin context. The Active Directory database NTDS.dit may be dumped by copying it from a Volume Shadow Copy.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1003.003-6","name":"Create Volume Shadow Copy remotely (WMI) with esentutl","description":"This test is intended to be run from a remote workstation with domain admin context. The Active Directory database NTDS.dit may be dumped by copying it from a Volume Shadow Copy created with esentutl.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1003.003-7","name":"Create Volume Shadow Copy with Powershell","description":"This test is intended to be run on a domain Controller. The Active Directory database NTDS.dit may be dumped by copying it from a Volume Shadow Copy.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1003.003-8","name":"Create Symlink to Volume Shadow Copy","description":"This test is intended to be run on a domain Controller. The Active Directory database NTDS.dit may be dumped by creating a symlink to Volume Shadow Copy.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1003.003-9","name":"Create Volume Shadow Copy with diskshadow","description":"This test is intended to be run on a domain controller An alternative to using vssadmin to create a Volume Shadow Copy for extracting ntds.dit","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1003.003-10","name":"Copy NTDS in low level NTFS acquisition via MFT parsing","description":"This test is intended to be run on a domain Controller. UnderlayCopy is a PowerShell utility for low-level NTFS acquisition and dumping protected, locked system artifacts (for example: SAM, SYSTEM, NTDS.dit, registry hives, and other files that are normally inaccessible while Windows is running).","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1003.003-11","name":"Copy NTDS in low level NTFS acquisition via fsutil","description":"This test is intended to be run on a domain Controller. UnderlayCopy is a PowerShell utility for low-level NTFS acquisition and dumping protected, locked system artifacts (for example: SAM, SYSTEM, NTDS.dit, registry hives, and other files that are normally inaccessible while Windows is running).","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1003.004","name":"OS Credential Dumping: LSA Secrets","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1003.004-1","name":"Dumping LSA Secrets","description":"Dump secrets key from Windows registry When successful, the dumped file will be written to $env:Temp\\secrets. Attackers may use the secrets key to assist with extracting passwords and enumerating other sensitive system information. https://pentestlab.blog/2018/04/04/dumping-clear-text-credentials/#:~:text=LSA%20Secrets%20is%20a%20registry,host%2C%20local%20security%20policy%20etc.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1003.004-2","name":"Dump Kerberos Tickets from LSA using dumper.ps1","description":"This tool allows you to dump Kerberos tickets from the LSA cache. Implemented via Add-Type. If the tool is run as a privileged user, it will automatically obtain NT AUTHORITY\\SYSTEM privileges and then dump all tickets. If the tool is run as a non-privileged user, it will only dump tickets from the current logon session. Ref: https://github.com/MzHmO/PowershellKerberos/ Author of dumper.ps1: Michael Zhmaylo (@MzHmO)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1003.005","name":"OS Credential Dumping: Cached Domain Credentials","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1003.005-1","name":"Cached Credential Dump via Cmdkey","description":"List credentials currently stored on the host via the built-in Windows utility cmdkey.exe Credentials listed with Cmdkey only pertain to the current user Passwords will not be displayed once they are stored https://docs.microsoft.com/en-us/windows-server/administration/windows-commands/cmdkey https://www.peew.pw/blog/2017/11/26/exploring-cmdkey-an-edge-case-for-privilege-escalation","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1003.006","name":"OS Credential Dumping: DCSync","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1003.006-1","name":"DCSync (Active Directory)","description":"Active Directory attack allowing retrieval of account information without accessing memory or retrieving the NTDS database. Works against a remote Windows Domain Controller using the replication protocol. Privileges required: domain admin or domain controller account (by default), or any other account with required rights. [Reference](https://adsecurity.org/?p=1729)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1003.006-2","name":"Run DSInternals Get-ADReplAccount","description":"The following Atomic will run Get-ADReplAccount from DSInternals. Upon successful execution, domain and credentials will appear in stdout. [Reference](https://www.crowdstrike.com/blog/observations-from-the-stellarparticle-campaign/) CrowdStrike StellarParticle. https://www.dsinternals.com/en/retrieving-active-directory-passwords-remotely/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1003.007","name":"OS Credential Dumping: Proc Filesystem","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1003.007-1","name":"Dump individual process memory with sh (Local)","description":"Using `/proc/$PID/mem`, where $PID is the target process ID, use shell utilities to copy process memory to an external file so it can be searched or exfiltrated later.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1003.007-2","name":"Dump individual process memory with sh on FreeBSD (Local)","description":"Using `/proc/$PID/mem`, where $PID is the target process ID, use shell utilities to copy process memory to an external file so it can be searched or exfiltrated later. On FreeBSD procfs must be mounted.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1003.007-3","name":"Dump individual process memory with Python (Local)","description":"Using `/proc/$PID/mem`, where $PID is the target process ID, use a Python script to copy a process's heap memory to an external file so it can be searched or exfiltrated later. On FreeBSD procfs must be mounted.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1003.007-4","name":"Capture Passwords with MimiPenguin","description":"MimiPenguin is a tool inspired by MimiKatz that targets Linux systems affected by CVE-2018-20781 (Ubuntu-based distros and certain versions of GNOME Keyring). Upon successful execution on an affected system, MimiPenguin will retrieve passwords from memory and output them to a specified file. See https://cve.mitre.org/cgi-bin/cvename.cgi?name=CVE-2018-20781. See https://www.tecmint.com/mimipenguin-hack-login-passwords-of-linux-users/#:~:text=Mimipenguin%20is%20a%20free%20and,tested%20on%20various%20Linux%20distributions.","supportedPlatforms":["linux"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1003.008","name":"OS Credential Dumping: /etc/passwd, /etc/master.passwd and /etc/shadow","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1003.008-1","name":"Access /etc/shadow (Local)","description":"/etc/shadow file is accessed in Linux environments","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1003.008-2","name":"Access /etc/master.passwd (Local)","description":"/etc/master.passwd file is accessed in FreeBSD environments","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1003.008-3","name":"Access /etc/passwd (Local)","description":"/etc/passwd file is accessed in FreeBSD and Linux environments","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1003.008-4","name":"Access /etc/{shadow,passwd,master.passwd} with a standard bin that's not cat","description":"Dump /etc/passwd, /etc/master.passwd and /etc/shadow using ed","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1003.008-5","name":"Access /etc/{shadow,passwd,master.passwd} with shell builtins","description":"Dump /etc/passwd, /etc/master.passwd and /etc/shadow using sh builtins","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1005","name":"Data from Local System","tactic":"TA0009","tactics":["TA0009"],"atomicTests":[{"id":"T1005-1","name":"Search files of interest and save them to a single zip file (Windows)","description":"This test searches for files of certain extensions and saves them to a single zip file prior to extraction.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1005-2","name":"Find and dump sqlite databases (Linux)","description":"An adversary may know/assume that the user of a system uses sqlite databases which contain interest and sensitive data. In this test we download two databases and a sqlite dump script, then run a find command to find & dump the database content.","supportedPlatforms":["linux"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true},{"id":"T1005-3","name":"Copy Apple Notes database files using AppleScript","description":"This command will copy Apple Notes database files using AppleScript as seen in Atomic Stealer.","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1006","name":"Direct Volume Access","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1006-1","name":"Read volume boot sector via DOS device path (PowerShell)","description":"This test uses PowerShell to open a handle on the drive volume via the `\\\\.\\` [DOS device path specifier](https://docs.microsoft.com/en-us/dotnet/standard/io/file-path-formats#dos-device-paths) and perform direct access read of the first few bytes of the volume. On success, a hex dump of the first 11 bytes of the volume is displayed. For a NTFS volume, it should correspond to the following sequence ([NTFS partition boot sector](https://en.wikipedia.org/wiki/NTFS#Partition_Boot_Sector_(VBR))): ``` 00 01 02 03 04 05 06 07 08 09 0A 0B
