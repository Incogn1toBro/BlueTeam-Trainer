false},{"id":"T1217-5","name":"List Google Chrome / Opera Bookmarks on Windows with powershell","description":"Searches for Google Chrome's and Opera's Bookmarks file (on Windows distributions) that contains bookmarks. Upon execution, paths that contain bookmark files will be displayed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1217-6","name":"List Google Chrome / Edge Chromium Bookmarks on Windows with command prompt","description":"Searches for Google Chromes's and Edge Chromium's Bookmarks file (on Windows distributions) that contains bookmarks. Upon execution, paths that contain bookmark files will be displayed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1217-7","name":"List Mozilla Firefox bookmarks on Windows with command prompt","description":"Searches for Mozilla Firefox bookmarks file (on Windows distributions) that contains bookmarks in a SQLITE database. Upon execution, paths that contain bookmark files will be displayed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1217-8","name":"List Internet Explorer Bookmarks using the command prompt","description":"This test will list the bookmarks for Internet Explorer that are found in the Favorites folder","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1217-9","name":"List Safari Bookmarks on MacOS","description":"This test searches for Safari's Bookmarks file (on macOS) and lists any found instances to a text file.","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1217-10","name":"Extract Edge Browsing History","description":"This test will extract Microsoft Edge browser's history of current user","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1217-11","name":"Extract chrome Browsing History","description":"This test will extract browsing history of the chrome user","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1218","name":"Signed Binary Proxy Execution","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1218-1","name":"mavinject - Inject DLL into running process","description":"Injects arbitrary DLL into running process specified by process ID. Requires Windows 10.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1218-2","name":"Register-CimProvider - Execute evil dll","description":"Execute arbitrary dll. Requires at least Windows 8/2012. Also note this dll can be served up via SMB","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1218-3","name":"InfDefaultInstall.exe .inf Execution","description":"Test execution of a .inf using InfDefaultInstall.exe Reference: https://github.com/LOLBAS-Project/LOLBAS/blob/master/yml/OSBinaries/Infdefaultinstall.yml","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1218-4","name":"ProtocolHandler.exe Downloaded a Suspicious File","description":"Emulates attack via documents through protocol handler in Microsoft Office.  On successful execution you should see Microsoft Word launch a blank file.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1218-5","name":"Microsoft.Workflow.Compiler.exe Payload Execution","description":"Emulates attack with Microsoft.Workflow.Compiler.exe running a .Net assembly that launches calc.exe","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1218-6","name":"Renamed Microsoft.Workflow.Compiler.exe Payload Executions","description":"Emulates attack with a renamed Microsoft.Workflow.Compiler.exe running a .Net assembly that launches calc.exe","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1218-7","name":"Invoke-ATHRemoteFXvGPUDisablementCommand base test","description":"RemoteFXvGPUDisablement.exe is an abusable, signed PowerShell host executable that was introduced in Windows 10 and Server 2019 (OS Build 17763.1339). One of the PowerShell functions called by RemoteFXvGPUDisablement.exe is Get-VMRemoteFXPhysicalVideoAdapter, a part of the Hyper-V module. This atomic test influences RemoteFXvGPUDisablement.exe to execute custom PowerShell code by using a technique referred to as \"PowerShell module load-order hijacking\" where a module containing, in this case, an implementation of the Get-VMRemoteFXPhysicalVideoAdapter is loaded first by way of introducing a temporary module into the first directory listed in the %PSModulePath% environment variable or within a user-specified module directory outside of %PSModulePath%. Upon execution the temporary module is deleted. Invoke-ATHRemoteFXvGPUDisablementCommand is used in this test to demonstrate how a PowerShell host executable can be directed to user-supplied PowerShell code without needing to supply anything at the command-line. PowerShell code execution is triggered when supplying the \"Disable\" argument to RemoteFXvGPUDisablement.exe. The Invoke-ATHRemoteFXvGPUDisablementCommand function outputs all relevant execution-related artifacts. Reference: https://github.com/redcanaryco/AtomicTestHarnesses/blob/master/TestHarnesses/T1218_SignedBinaryProxyExecution/InvokeRemoteFXvGPUDisablementCommand.ps1","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1218-8","name":"DiskShadow Command Execution","description":"Emulates attack with a DiskShadow.exe (LOLBIN installed by default on Windows) being used to execute arbitrary commands Reference: https://bohops.com/2018/03/26/diskshadow-the-return-of-vss-evasion-persistence-and-active-directory-database-extraction/","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1218-9","name":"Load Arbitrary DLL via Wuauclt (Windows Update Client)","description":"This test uses Wuauclt to load an arbitrary DLL. Upon execution with the default inputs, calculator.exe will be launched. See https://dtm.uk/wuauclt/","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1218-10","name":"Lolbin Gpscript logon option","description":"Executes logon scripts configured in Group Policy. https://lolbas-project.github.io/lolbas/Binaries/Gpscript/ https://oddvar.moe/2018/04/27/gpscript-exe-another-lolbin-to-the-list/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1218-11","name":"Lolbin Gpscript startup option","description":"Executes startup scripts configured in Group Policy https://lolbas-project.github.io/lolbas/Binaries/Gpscript/ https://oddvar.moe/2018/04/27/gpscript-exe-another-lolbin-to-the-list/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1218-12","name":"Lolbas ie4uinit.exe use as proxy","description":"Executes commands from a specially prepared ie4uinit.inf file. Poc from : https://bohops.com/2018/03/10/leveraging-inf-sct-fetch-execute-techniques-for-bypass-evasion-persistence-part-2/ Reference: https://lolbas-project.github.io/lolbas/Binaries/Ie4uinit/","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1218-13","name":"LOLBAS CustomShellHost to Spawn Process","description":"This test simulates an adversary copying `customshellhost.exe` and `calc.exe` from `C:\\windows\\system32\\` to `C:\\temp\\`, renaming `calc.exe` to `explorer.exe`. Upon execution, customshellhost.exe will spawn calc.exe. Note this will only work on Windows 10 or 11. [LOLBAS](https://lolbas-project.github.io/lolbas/Binaries/CustomShellHost/) [BishopFox](https://bishopfox.com/blog/edr-bypass-with-lolbins)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1218-14","name":"Provlaunch.exe Executes Arbitrary Command via Registry Key","description":"Provlaunch.exe executes a command defined in the Registry. This test will create the necessary registry keys and values, then run provlaunch.exe to execute an arbitrary command. - https://twitter.com/0gtweet/status/1674399582162153472 - https://lolbas-project.github.io/lolbas/Binaries/Provlaunch/ Registry keys are deleted after successful execution.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1218-15","name":"LOLBAS Msedge to Spawn Process","description":"Executes a process under a trusted Microsoft signed binary,mseddge. This test will spawn \"calc.exe\" as a child process of msedge.exe - https://lolbas-project.github.io/lolbas/Binaries/Msedge/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1218-16","name":"System Binary Proxy Execution - Wlrmdr Lolbin","description":"Use wlrmdr(Windows Logon Reminder executable) as a proxy binary to evade defensive countermeasures","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1218.001","name":"Signed Binary Proxy Execution: Compiled HTML File","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1218.001-1","name":"Compiled HTML Help Local Payload","description":"Uses hh.exe to execute a local compiled HTML Help payload. Upon execution calc.exe will open","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1218.001-2","name":"Compiled HTML Help Remote Payload","description":"Uses hh.exe to execute a remote compiled HTML Help payload. Upon execution displays an error saying the file cannot be open","supportedPlatforms":["windows"],"offlineCa ary leveraging control.exe Upon execution calc.exe will be launched","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1218.003","name":"Signed Binary Proxy Execution: CMSTP","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1218.003-1","name":"CMSTP Executing Remote Scriptlet","description":"Adversaries may supply CMSTP.exe with INF files infected with malicious commands","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1218.003-2","name":"CMSTP Executing UAC Bypass","description":"Adversaries may invoke cmd.exe (or other malicious commands) by embedding them in the RunPreSetupCommandsSection of an INF file","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1218.004","name":"Signed Binary Proxy Execution: InstallUtil","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1218.004-1","name":"CheckIfInstallable method call","description":"Executes the CheckIfInstallable class constructor runner instead of executing InstallUtil. Upon execution, the InstallUtil test harness will be executed. If no output is displayed the test executed successfuly.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1218.004-2","name":"InstallHelper method call","description":"Executes the InstallHelper class constructor runner instead of executing InstallUtil. Upon execution, no output will be displayed if the test executed successfuly.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1218.004-3","name":"InstallUtil class constructor method call","description":"Executes the installer assembly class constructor. Upon execution, version information will be displayed the .NET framework install utility.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":tr  msiexec.exe","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1218.007-5","name":"WMI Win32_Product Class - Execute Local MSI file with embedded JScript","description":"Executes an MSI containing embedded JScript code using the WMI Win32_Product class","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1218.007-6","name":"WMI Win32_Product Class - Execute Local MSI file with embedded VBScript","description":"Executes an MSI containing embedded VBScript code using the WMI Win32_Product class","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1218.007-7","name":"WMI Win32_Product Class - Execute Local MSI file with an embedded DLL","description":"Executes an MSI containing an embedded DLL using the WMI Win32_Product class","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1218.007-8","name":"WMI Win32_Product Class - Execute Local MSI file with an embedded EXE","description":"Executes an MSI containing an embedded EXE using the WMI Win32_Product class","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1218.007-9","name":"Msiexec.exe - Execute the DllRegisterServer function of a DLL","description":"Loads a DLL into msiexec.exe and calls its DllRegisterServer function. Note: the DLL included in the \"bin\" folder is only built for 64-bit, so this won't work on a 32-bit OS.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1218.007-10","name":"Msiexec.exe - Execute the DllUnregisterServer function of a DLL","description":"Loads a DLL into msiexec.exe and calls its DllUnregisterServer function. Note: the DLL included in the \"bin\" folder is only built for 64-bit, so this won't work on a 32-bit OS.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1218.007-11","name":"Msiexec.exe - Execute Remote MSI file","description":"Execute arbitrary MSI file retrieved remotely. Less commonly seen in application installation, commonly seen in malware execution. The MSI executes a built-in JScript payload that launches powershell.exe.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1218.008","name":"Signed Binary Proxy Execution: Odbcconf","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1218.008-1","name":"Odbcconf.exe - Execute Arbitrary DLL","description":"Execute arbitrary DLL file stored locally.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1218.008-2","name":"Odbcconf.exe - Load Response File","description":"Execute arbitrary response file that will spawn PowerShell.exe. Source files: https://github.com/woanware/application-restriction-bypasses","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1218.009","name":"Signed Binary Proxy Execution: Regsvcs/Regasm","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1218.009-1","name":"Regasm Uninstall Method Call Test","description":"Executes the Uninstall Method, No Admin Rights Required. Upon execution, \"I shouldn't really execute either.\" will be displayed.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1218.009-2","name":"Regsvcs Uninstall Method Call Test","description":"Executes the Uninstall Method, No Admin Rights Required, Requires SNK. Upon execution, \"I shouldn't really execute\" will be displayed along with other information about the assembly being installed.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1218.010","name":"Signed Binary Proxy Execution: Regsvr32","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1218.010-1","name":"Regsvr32 local COM scriptlet execution","description":"Regsvr32.exe is a command-line program used to register and unregister OLE controls. Upon execution, calc.exe will be launched.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1218.010-2","name":"Regsvr32 remote COM scriptlet execution","description":"Regsvr32.exe is a command-line program used to register and unregister OLE controls. This test may be blocked by windows defender; disable windows defender real-time protection to fix it. Upon execution, calc.exe will be launched.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1218.010-3","name":"Regsvr32 local DLL execution","description":"Regsvr32.exe is a command-line program used to register and unregister OLE controls. Upon execution, calc.exe will be launched.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1218.010-4","name":"Regsvr32 Registering Non DLL","description":"Replicating observed Gozi maldoc behavior registering a dll with an altered extension","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1218.010-5","name":"Regsvr32 Silent DLL Install Call DllRegisterServer","description":"Regsvr32.exe is a command-line program used to register and unregister OLE controls. Normally, an install is executed with /n to prevent calling DllRegisterServer.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1218.011","name":"Signed Binary Proxy Execution: Rundll32","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1218.011-1","name":"Rundll32 execute JavaScript Remote Payload With GetObject","description":"Test execution of a remote script using rundll32.exe. Upon execution notepad.exe will be opened. This has been used by Win32/Poweliks malware and works as described [here](https://www.stormshield.com/news/poweliks-command-line-confusion/) Note: The GetObject function is no longer supported in Internet Explorer v9 (2011) and later so this technique would only work where very old versions of IE are installed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1218.011-2","name":"Rundll32 execute VBscript command","description":"Test execution of a command using rundll32.exe and VBscript in a similar manner to the JavaScript test. Technique documented by Hexacorn- http://www.hexacorn.com/blog/2019/10/29/rundll32-with-a-vbscript-protocol/ Upon execution calc.exe will be launched","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1218.011-3","name":"Rundll32 execute VBscript command using Ordinal number","description":"Test execution of a command using rundll32.exe and VBscript in a similar manner to the JavaScript test. Technique documented by Hexacorn- http://www.hexacorn.com/blog/2019/10/29/rundll32-with-a-vbscript-protocol/ Upon execution calc.exe will be launched","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1218.011-4","name":"Rundll32 advpack.dll Execution","description":"Test execution of a command using rundll32.exe with advpack.dll. Reference: https://github.com/LOLBAS-Project/LOLBAS/blob/master/yml/OSLibraries/Advpack.yml Upon execution calc.exe will be launched","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1218.011-5","name":"Rundll32 ieadvpack.dll Execution","description":"Test execution of a command using rundll32.exe with ieadvpack.dll. Upon execution calc.exe will be launched Reference: https://github.com/LOLBAS-Project/LOLBAS/blob/master/yml/OSLibraries/Ieadvpack.yml","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1218.011-6","name":"Rundll32 syssetup.dll Execution","description":"Test execution of a command using rundll32.exe with syssetup.dll. Upon execution, a window saying \"installation failed\" will be opened Reference: https://github.com/LOLBAS-Project/LOLBAS/blob/master/yml/OSLibraries/Syssetup.yml","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1218.011-7","name":"Rundll32 setupapi.dll Execution","description":"Test execution of a command using rundll32.exe with setupapi.dll. Upon execution, a windows saying \"installation failed\" will be opened Reference: https://github.com/LOLBAS-Project/LOLBAS/blob/master/yml/OSLibraries/Setupapi.yml","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1218.011-8","name":"Execution of HTA and VBS Files using Rundll32 and URL.dll","description":"IcedID uses this TTP as follows: rundll32.exe url.dll,OpenURL %PUBLIC%\\index.hta Trickbot uses this TTP as follows: rundll32.exe URL.dll,FileProtocolHandler C:\\\\..\\\\Detail\\\\akteullen.vbs In this atomic, the sample hta file opens the calculator and the vbs file shows a message dialog with \"rundll32 spawned wscript\"","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1218.011-9","name":"Launches an executable using Rundll32 and pcwutl.dll","description":"Executes the LaunchApplication function in pcwutl.dll to proxy execution of an executable.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1218.011-10","name":"Execution of non-dll using rundll32.exe","description":"Rundll32.exe running non-dll","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1218.011-11","name":"Rundll32 with Ordinal Value","description":"Rundll32.exe loading dll using ordinal value #2 to DLLRegisterServer. Upon successful execution, Calc.exe will spawn.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1218.011-12","name":"Rundll32 with Control_RunDLL","description":"Rundll32.exe loading dll with 'control_rundll' within the command-line, loading a .cpl or another file type related to CVE-2021-40444.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1218.011-13","name":"Rundll32 with desk.cpl","description":"Rundll32.exe loading an executable renamed as .scr using desk.cpl Reference: - [LOLBAS - Libraries/Desk](https://lolbas-project.github.io/lolbas/Libraries/Desk/) SIGMA rules: - [SCR File Write Event](https://github.com/SigmaHQ/sigma/blob/b53f08b081e0a50099be9b9e8eced82097fdbaf2/rules/windows/file_event/file_event_win_new_src_file.yml) - [Rundll32 InstallScreenSaver Execution](https://github.com/SigmaHQ/sigma/blob/b53f08b081e0a50099be9b9e8eced82097fdbaf2/rules/windows/process_creation/proc_creation_win_lolbin_rundll32_installscreensaver.yml)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1218.011-14","name":"Running DLL with .init extension and function","description":"This test, based on common Gamarue tradecraft, consists of a DLL file with a .init extension being run by rundll32.exe. When this DLL file's 'krnl' function is called, it launches a Windows pop-up. DLL created with the AtomicTestHarnesses Portable Executable Builder script.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1218.011-15","name":"Rundll32 execute command via FileProtocolHandler","description":"Test execution of a command using rundll32.exe and the FileProtocolHandler technique. Upon execution, calc.exe will be launched. This technique is documented by Levan Abesadze - https://medium.com/@Wolverineisstillalive/system-binary-proxy-execution-rundll32-bypass-method-790871e1f2b7","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1218.011-16","name":"Rundll32 execute payload by calling RouteTheCall","description":"Launch an executable payload by calling RouteTheCall. Test execution of a command using rundll32.exe to execute a payload{calc.exe} by calling RouteTheCall. Upon execution, calc.exe will be launched. Reference: https://github.com/LOLBAS-Project/LOLBAS/blob/master/yml/OSLibraries/Zipfldr.yml","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1219","name":"Remote Access Software","tactic":"TA0011","tactics":["TA0011"],"atomicTests":[{"id":"T1219-1","name":"TeamViewer Files Detected Test on Windows","description":"An adversary may attempt to trick the user into downloading teamviewer and using this to maintain access to the machine. Download of TeamViewer installer will be at the destination location when sucessfully executed.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1219-2","name":"AnyDesk Files Detected Test on Windows","description":"An adversary may attempt to trick the user into downloading AnyDesk and use to establish C2. Download of AnyDesk installer will be at the destination location and ran when sucessfully executed.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1219-3","name":"LogMeIn Files Detected Test on Windows","description":"An adversary may attempt to trick the user into downloading LogMeIn and use to establish C2. Download of LogMeIn installer will be at the destination location and ran when sucessfully executed.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1219-4","name":"GoToAssist Files Detected Test on Windows","description":"An adversary may attempt to trick the user into downloading GoToAssist and use to establish C2. Download of GoToAssist installer will be at the destination location and ran when sucessfully executed.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1219-5","name":"ScreenConnect Application Download and Install on Windows","description":"An adversary may attempt to trick the user into downloading ScreenConnect for use as a C2 channel. Download of ScreenConnect installer will be in the Downloads directory. Msiexec will be used to quietly insall ScreenConnect.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1219-6","name":"Ammyy Admin Software Execution","description":"An adversary may attempt to trick the user into downloading Ammyy Admin Remote Desktop Software for use as a C2 channel. Upon successful execution, Ammyy Admin will be executed.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1219-7","name":"RemotePC Software Execution","description":"An adversary may attempt to trick the user into downloading RemotePC Software for use as a C2 channel. Upon successful execution, RemotePC will be executed.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1219-8","name":"NetSupport - RAT Execution","description":"A recent trend by threat actors, once a foothold is established, maintain long term persistence using third party remote services such as NetSupport to provide the operator with access to the network using legitimate services.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1219-9","name":"UltraViewer - RAT Execution","description":"A recent trend by threat actors, once a foothold is established, maintain long term persistence using third party remote services such as UltraViewer to provide the operator with access to the network using legitimate services.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1219-10","name":"UltraVNC Execution","description":"An adversary may attempt to trick the user into downloading UltraVNC for use as a C2 channel. Upon successful execution, UltraVNC will be executed.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1219-11","name":"MSP360 Connect Execution","description":"An adversary may attempt to trick the user into downloading MSP360 Connect for use as a C2 channel. Upon successful execution, MSP360 Connect will be executed.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1219-12","name":"RustDesk Files Detected Test on Windows","description":"An adversary may attempt to trick the user into downloading RustDesk and use this to maintain access to the machine. Download of RustDesk installer will be at the destination location when successfully executed.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1219-13","name":"Splashtop Execution","description":"An adversary may attempt to trick the user into downloading Splashtop for use as a C2 channel. Upon successful execution, Splashtop will be executed.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1219-14","name":"Splashtop Streamer Execution","description":"An adversary may attempt to use Splashtop Streamer to gain unattended remote interactive access. Upon successful execution, Splashtop streamer will be executed.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1219-15","name":"Microsoft App Quick Assist Execution","description":"An adversary may attempt to trick a user into executing Microsoft Quick Assist Microsoft Store app and connect to the user's machine.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1220","name":"XSL Script Processing","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1220-1","name":"MSXSL Bypass using local files","description":"Executes the code specified within a XSL script tag during XSL transformation using a local payload. Requires download of MSXSL. No longer available from Microsoft. (Available via Internet Archive https://web.archive.org/web/20200825011623/https://www.microsoft.com/en-us/download/details.aspx?id=21714 ) Open Calculator.exe when test successfully executed, while AV turned off.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1220-2","name":"MSXSL Bypass using remote files","description":"Executes the code specified within a XSL script tag during XSL transformation using a remote payload. Requires download of MSXSL.exe. No longer available from Microsoft. (Available via Internet Archive https://web.archive.org/web/20200825011623/https://www.microsoft.com/en-us/download/details.aspx?id=21714 ) Open Calculator.exe when test successfully executed, while AV turned off.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1220-3","name":"WMIC bypass using local XSL file","description":"Executes the code specified within a XSL script using a local payload.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1220-4","name":"WMIC bypass using remote XSL file","description":"Executes the code specified within a XSL script using a remote payload. Open Calculator.exe when test successfully executed, while AV turned off.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1221","name":"Template Injection","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1221-1","name":"WINWORD Remote Template Injection","description":"Open a .docx file that loads a remote .dotm macro enabled template from https://github.com/redcanaryco/atomic-red-team/tree/master/atomics/T1221/src/opencalc.dotm Executes the code specified within the .dotm template. Requires download of WINWORD found in Microsoft Ofiice at Microsoft: https://www.microsoft.com/en-us/download/office.aspx. Default docs file opens Calculator.exe when test sucessfully executed, while AV turned off.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1222","name":"File and Directory Permissions Modification","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1222-1","name":"Enable Local and Remote Symbolic Links via fsutil","description":"Use fsutil to enable both \u2018remote to local\u2019 and \u2018remote to remote\u2019 symbolic links. This allows access to files from local shortcuts with local or remote paths. [reference](https://symantec-enterprise-blogs.security.com/threat-intelligence/noberus-blackcat-alphv-rust-ransomware/)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1222-2","name":"Enable Local and Remote Symbolic Links via reg.exe","description":"Use reg.exe to enable both \u2018remote to local\u2019 and \u2018remote to remote\u2019 symbolic links. This allows access to files from local shortcuts with local or remote paths. [reference](https://symantec-enterprise-blogs.security.com/threat-intelligence/noberus-blackcat-alphv-rust-ransomware/)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1222-3","name":"Enable Local and Remote Symbolic Links via Powershell","description":"Use Powershell to enable both \u2018remote to local\u2019 and \u2018remote to remote\u2019 symbolic links. This allows access to files from local shortcuts with local or remote paths. [reference](https://symantec-enterprise-blogs.security.com/threat-intelligence/noberus-blackcat-alphv-rust-ransomware/)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1222.001","name":"File and Directory Permissions Modification: Windows File and Directory Permissions Modification","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1222.001-1","name":"Take ownership using takeown utility","description":"Modifies the filesystem permissions of the specified file or folder to take ownership of the object. Upon execution, \"SUCCESS\" will be displayed for the folder and each file inside of it.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1222.001-2","name":"cacls - Grant permission to specified user or group recursively","description":"Modifies the filesystem permissions of the specified folder and contents to allow the specified user or group Full Control. If \"Access is denied\" is displayed it may be because the file or folder doesn't exit. Run the prereq command to create it. Upon successfull execution, \"Successfully processed 3 files\" will be displayed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1222.001-3","name":"attrib - Remove read-only attribute","description":"Removes the read-only attribute from a file or folder using the attrib.exe command. Upon execution, no output will be displayed. Open the file in File Explorer > Right Click - Prperties and observe that the Read Only checkbox is empty.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1222.001-4","name":"attrib - hide file","description":"Attackers leverage an existing Windows binary, attrib.exe, to mark specific files or folder as hidden by using specific flags so that the victim does not see the file.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1222.001-5","name":"Grant Full Access to folder for Everyone - Ryuk Ransomware Style","description":"Invokes the command line similar to that used by Ryuk Ransomware to grant full access to the entire C:\\ drive for Everyone. **icacls \"C:\\*\" /grant Everyone:F /T /C /Q** However, for this atomic we set the permission on C:\\Users\\Public so it completes faster and doesn't irreversibly affect the host. You can set your own path variable to \"C:\\*\" if you prefer.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1222.001-6","name":"SubInAcl Execution","description":"This test simulates an adversary executing the Windows Resource kit utility SubInAcl. This utility was abused by adversaries in the past in order to modify access permissions. Upon execution, a process creation log should be generated indicating successful execution.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1222.002","name":"File and Directory Permissions Modification: FreeBSD, Linux and Mac File and Directory Permissions Modification","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1222.002-1","name":"chmod - Change file or folder mode (numeric mode)","description":"Changes a file or folder's permissions using chmod and a specified numeric mode.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1222.002-2","name":"chmod - Change file or folder mode (symbolic mode)","description":"Changes a file or folder's permissions using chmod and a specified symbolic mode.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1222.002-3","name":"chmod - Change file or folder mode (numeric mode) recursively","description":"Changes a file or folder's permissions recursively using chmod and a specified numeric mode.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1222.002-4","name":"chmod - Change file or folder mode (symbolic mode) recursively","description":"Changes a file or folder's permissions recursively using chmod and a specified symbolic mode.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1222.002-5","name":"chown - Change file or folder ownership and group","description":"Changes a file or folder's ownership and group information using chown.","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1222.002-6","name":"chown - Change file or folder ownership and group recursively","description":"Changes a file or folder's ownership and group information recursively using chown.","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1222.002-7","name":"chown - Change file or folder mode ownership only","description":"Changes a file or folder's ownership only using chown.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1222.002-8","name":"chown - Change file or folder ownership recursively","description":"Changes a file or folder's ownership only recursively using chown.","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1222.002-9","name":"chattr - Remove immutable file attribute","description":"Remove's a file's `immutable` attribute using `chattr`. This technique was used by the threat actor Rocke during the compromise of Linux web servers.","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1222.002-10","name":"chflags - Remove immutable file attribute","description":"Remove's a file's `immutable` attribute using `chflags`. This technique was used by the threat actor Rocke during the compromise of Linux web servers.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1222.002-11","name":"Chmod through c script","description":"chmods a file using a c script","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1222.002-12","name":"Chmod through c script (freebsd)","description":"chmods a file using a c script","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1222.002-13","name":"Chown through c script","description":"chowns a file to root using a c script","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1222.002-14","name":"Chown through c script (freebsd)","description":"chowns a file to root using a c script","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1482","name":"Domain Trust Discovery","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1482-1","name":"Windows - Discover domain trusts with dsquery","description":"Uses the dsquery command to discover domain trusts. Requires the installation of dsquery via Windows RSAT or the Windows Server AD DS role.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1482-2","name":"Windows - Discover domain trusts with nltest","description":"Uses the nltest command to discover domain trusts. Requires the installation of nltest via Windows RSAT or the Windows Server AD DS role. This technique has been used by the Trickbot malware family.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1482-3","name":"Powershell enumerate domains and forests","description":"Use powershell to enumerate AD information. Requires the installation of PowerShell AD admin cmdlets via Windows RSAT or the Windows Server AD DS role.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1482-4","name":"Adfind - Enumerate Active Directory OUs","description":"Adfind tool can be used for reconnaissance in an Active directory environment. This example has been documented by ransomware actors enumerating Active Directory OUs reference- http://www.joeware.net/freetools/tools/adfind/, https://www.fireeye.com/blog/threat-research/2019/04/pick-six-intercepting-a-fin6-intrusion.html","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1482-5","name":"Adfind - Enumerate Active Directory Trusts","description":"Adfind tool can be used for reconnaissance in an Active directory environment. This example has been documented by ransomware actors enumerating Active Directory Trusts reference- http://www.joeware.net/freetools/tools/adfind/, https://www.fireeye.com/blog/threat-research/2019/04/pick-six-intercepting-a-fin6-intrusion.html","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1482-6","name":"Get-DomainTrust with PowerView","description":"Utilizing PowerView, run Get-DomainTrust to identify domain trusts. Upon execution, progress and info about trusts within the domain being scanned will be displayed.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1482-7","name":"Get-ForestTrust with PowerView","description":"Utilizing PowerView, run Get-ForestTrust to identify forest trusts. Upon execution, progress and info about forest trusts within the domain being scanned will be displayed.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1482-8","name":"TruffleSnout - Listing AD Infrastructure","description":"Iterative AD discovery toolkit for offensive operators. Situational awareness and targeted low noise enumeration. Preference for OpSec.- https://github.com/dsnezhkov/TruffleSnout","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1484.001","name":"Domain Policy Modification: Group Policy Modification","tactic":"TA0004","tactics":["TA0004"],"atomicTests":[{"id":"T1484.001-1","name":"LockBit Black - Modify Group policy settings -cmd","description":"An adversary can modify the group policy settings.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1484.001-2","name":"LockBit Black - Modify Group policy settings -Powershell","description":"An adversary modifies group policy settings","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1484.002","name":"Domain Trust Modification","tactic":"TA0004","tactics":["TA0004"],"atomicTests":[{"id":"T1484.002-1","name":"Add Federation to Azure AD","description":"Add a new federated domain to Azure AD using PowerShell. The malicious domain to be federated must be configured beforehand (outside of the scope of this test): 1. Open Azure Portal 2. Add a new \"custom domain name\" 3. Verify the domain by following instructions (i.e. create the requested DNS record)","supportedPlatforms":["azure-ad"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1485","name":"Data Destruction","tactic":"TA0040","tactics":["TA0040"],"atomicTests":[{"id":"T1485-1","name":"Windows - Overwrite file with SysInternals SDelete","description":"Overwrites and deletes a file using SysInternals SDelete. Upon successful execution, \"Files deleted: 1\" will be displayed in the powershell session along with other information about the file that was deleted.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1485-2","name":"FreeBSD/macOS/Linux - Overwrite file with DD","description":"Overwrites and deletes a file using DD. To stop the test, break the command with CTRL/CMD+C.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1485-3","name":"Overwrite deleted data on C drive","description":"RansomEXX malware removes all deleted files using windows built-in cipher.exe to prevent forensic recover. This process is very slow and test execution may timeout. https://www.cybereason.com/blog/cybereason-vs.-ransomexx-ransomware https://support.microsoft.com/en-us/topic/cipher-exe-security-tool-for-the-encrypting-file-system-56c85edd-85cf-ac07-f2f7-ca2d35dab7e4","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1485-4","name":"GCP - Delete Bucket","description":"This Atomic will create a Google Storage Bucket then delete it. The idea for this Atomic came from a Rule published by the Elastic team. Identifies when a Google Cloud Platform (GCP) storage bucket is deleted. An adversary may delete a storage bucket in order to disrupt their target's business operations. This atomic will create a bucket then delete the bucket. Reference: https://github.com/elastic/detection-rules/blob/main/rules/integrations/gcp/impact_gcp_storage_bucket_deleted.toml","supportedPlatforms":["iaas:gcp"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1485-5","name":"ESXi - Delete VM Snapshots","description":"Deletes all snapshots for all Virtual Machines on an ESXi Host [Reference](https://lolesxi-project.github.io/LOLESXi/lolesxi/Binaries/vim-cmd/#inhibit%20recovery)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1489","name":"Service Stop","tactic":"TA0040","tactics":["TA0040"],"atomicTests":[{"id":"T1489-1","name":"Windows - Stop service using Service Controller","description":"Stops a specified service using the sc.exe command. Upon execution, if the spooler service was running infomration will be displayed saying it has changed to a state of STOP_PENDING. If the spooler service was not running \"The service has not been started.\" will be displayed and it can be started by running the cleanup command.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1489-2","name":"Windows - Stop service using net.exe","description":"Stops a specified service using the net.exe command. Upon execution, if the service was running \"The Print Spooler service was stopped successfully.\" will be displayed. If the service was not running, \"The Print Spooler service is not started.\" will be displayed and it can be started by running the cleanup command.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1489-3","name":"Windows - Stop service by killing process","description":"Stops a specified service killng the service's process. This technique was used by WannaCry. Upon execution, if the spoolsv service was running \"SUCCESS: The process \"spoolsv.exe\" with PID 2316 has been terminated.\" will be displayed. If the service was not running \"ERROR: The process \"spoolsv.exe\" not found.\" will be displayed and it can be started by running the cleanup command.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1489-4","name":"Linux - Stop service using systemctl","description":"Stops a specified service using the systemctl command. Upon execution, if the specified service was running, it will change to a state of inactive and it can be restarted by running the cleanup command. You can list all available services with following command: \"systemctl list-units --type=service\"","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1489-5","name":"Linux - Stop service by killing process using killall","description":"Stops a specified service by sending a SIGTERM signal to the linked process using the killall command. Upon execution, if the service's main process was running, it will be terminated. If the service was not running, no process will be found to kill and it can be restarted by running the cleanup command. You can list all available services with following command: \"systemctl list-units --type=service\"","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1489-6","name":"Linux - Stop service by killing process using kill","description":"Stops a specified service by sending a SIGTERM signal to the linked process using the kill command. Upon execution, if the service's main process was running, it will be terminated. If the service was not running, no process will be found to kill and it can be restarted by running the cleanup command. You can list all available services with following command: \"systemctl list-units --type=service\"","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1489-7","name":"Linux - Stop service by killing process using pkill","description":"Stops a specified service by sending a SIGTERM signal to the linked process using pkill. This method is effective when multiple instances of the process may be running. Upon execution, if any instances of the process were running, they will be terminated. If no instances were running, pkill will not find any processes to kill. Stopped service can be restarted by running the cleanup command. You can list all available services with following command: \"systemctl list-units --type=service\"","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1489-8","name":"Abuse of linux magic system request key for Send a SIGTERM to all processes","description":"Adversaries with root or sufficient privileges Send a SIGTERM to all processes, except for init. By writing 'e' to /proc/sysrq-trigger, they can forced kill all processes, except for init.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1490","name":"Inhibit System Recovery","tactic":"TA0040","tactics":["TA0040"],"atomicTests":[{"id":"T1490-1","name":"Windows - Delete Volume Shadow Copies","description":"Deletes Windows Volume Shadow Copies. This technique is used by numerous ransomware families and APT malware such as Olympic Destroyer. Upon execution, if no shadow volumes exist the message \"No items found that satisfy the query.\" will be displayed. If shadow volumes are present, it will delete them without printing output to the screen. This is because the /quiet parameter was passed which also suppresses the y/n confirmation prompt. Shadow copies can only be created on Windows server or Windows 8. https://docs.microsoft.com/en-us/previous-versions/windows/it-pro/windows-server-2012-R2-and-2012/cc788055(v=ws.11)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1490-2","name":"Windows - Delete Volume Shadow Copies via WMI","description":"Deletes Windows Volume Shadow Copies via WMI. This technique is used by numerous ransomware families and APT malware such as Olympic Destroyer.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1490-3","name":"Windows - wbadmin Delete Windows Backup Catalog","description":"Deletes Windows Backup Catalog. This technique is used by numerous ransomware families and APT malware such as Olympic Destroyer. Upon execution, \"The backup catalog has been successfully deleted.\" will be displayed in the PowerShell session.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1490-4","name":"Windows - Disable Windows Recovery Console Repair","description":"Disables repair by the Windows Recovery Console on boot. This technique is used by numerous ransomware families and APT malware such as Olympic Destroyer. Upon execution, \"The operation completed successfully.\" will be displayed in the powershell session.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1490-5","name":"Windows - Delete Volume Shadow Copies via WMI with PowerShell","description":"Deletes Windows Volume Shadow Copies with PowerShell code and Get-WMIObject. This technique is used by numerous ransomware families such as Sodinokibi/REvil. Executes Get-WMIObject. Shadow copies can only be created on Windows server or Windows 8, so upon execution there may be no output displayed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1490-6","name":"Windows - Delete Backup Files","description":"Deletes backup files in a manner similar to Ryuk ransomware. Upon exection, many \"access is denied\" messages will appear as the commands try to delete files from around the system.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1490-7","name":"Windows - wbadmin Delete systemstatebackup","description":"Deletes the Windows systemstatebackup using wbadmin.exe. This technique is used by numerous ransomware families. This may only be successful on server platforms that have Windows Backup enabled.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1490-8","name":"Windows - Disable the SR scheduled task","description":"Use schtasks.exe to disable the System Restore (SR) scheduled task","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1490-9","name":"Disable System Restore Through Registry","description":"Modify the registry of the currently logged in user using reg.exe via cmd console to disable system restore on the computer. See how remcos RAT abuses this technique- https://www.virustotal.com/gui/file/2d7855bf6470aa323edf2949b54ce2a04d9e38770f1322c3d0420c2303178d91/details","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1490-10","name":"Windows - vssadmin Resize Shadowstorage Volume","description":"Adversaries generally try to Resize Shadowstorage Volume using vssadmin.exe to avoid the shadow volumes being made again. This technique is typically found used by adversaries during a ransomware event and a precursor to deleting the shadowstorage.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1490-11","name":"Modify VSS Service Permissions","description":"This atomic test alters the security settings of the Volume Shadow Copy Service (VSS) by modifying its permissions, potentially impacting system recovery operations. The specific permissions set by the command are as follows: - Deny Generic All (GA) permissions to Network Users (NU) - Deny GA permissions to Everyone (WD) - Deny GA permissions to Anonymous (AN) - Allow Full Access (FA) and Generic All (GA) permissions to Everyone (WD) in System ACL (SACL) - Allow Object Inherit and Inherit Only (OIIO) Full Access (FA) and GA permissions to Everyone (WD) in SACL These permissions can significantly restrict VSS functionalities, including backup and restore operations. As such, it is essential to run this test only in a controlled environment with administrative privileges. A cleanup command is provided to reset VSS permissions to a common default configuration, which should be verified against your specific system's configuration. It's crucial to use this cleanup command after testing to ensure the system's backup and recovery capabilities remain functional. Running this test on a production system or critical environment is not recommended without proper precautions and a robust recovery plan.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1490-12","name":"Disable Time Machine","description":"Disables Time Machine which is Apple's automated backup utility software. Attackers can use this to prevent backups from occurring and hinder the victim's ability to recover from any damage.","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1490-13","name":"Windows - Delete Volume Shadow Copies via Diskshadow","description":"Deletes Windows Volume Shadow Copies via Diskshadow binary. This technique is used by numerous ransomware families such as Crytox. The binary is present by default in Windows Server operating systems (since Windows Server 2008). Upon execution, it will delete all shadow copies of the server.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1491.001","name":"Defacement: Internal Defacement","tactic":"TA0040","tactics":["TA0040"],"atomicTests":[{"id":"T1491.001-1","name":"Replace Desktop Wallpaper","description":"Downloads an image from a URL and sets it as the desktop wallpaper.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1491.001-2","name":"Configure LegalNoticeCaption and LegalNoticeText registry keys to display ransom message","description":"Display ransom message to users at system start-up by configuring registry keys HKLM\\SOFTWARE\\Micosoft\\Windows\\CurrentVersion\\Policies\\System\\LegalNoticeCaption and HKLM\\SOFTWARE\\Micosoft\\Windows\\CurrentVersion\\Policies\\System\\LegalNoticeText. [SynAck Ransomware](https://www.trendmicro.com/vinfo/es/security/news/cybercrime-and-digital-threats/synack-ransomware-leverages-process-doppelg-nging-for-evasion-and-infection), [Grief Ransomware](https://redcanary.com/blog/grief-ransomware/), [Maze Ransomware](https://cyware.com/research-and-analysis/maze-ransomware-a-deadly-combination-of-data-theft-and-encryption-to-target-us-organizations-8f27), [Pysa Ransomware](https://www.cybereason.com/blog/research/threat-analysis-report-inside-the-destructive-pysa-ransomware), [Spook Ransomware](https://community.fortinet.com/t5/FortiEDR/Threat-Coverage-How-FortiEDR-protects-against-Spook-Ransomware/ta-p/204226), [DopplePaymer Ransomware](https://www.microsoft.com/en-us/wdsi/threats/malware-encyclopedia-description?Name=Ransom:Win32/Dopplepaymer&threatId=-2147221958), [Reedemer Ransomware](https://blog.cyble.com/2022/07/20/redeemer-ransomware-back-action/), [Kangaroo Ransomware](https://www.bleepingcomputer.com/news/security/the-kangaroo-ransomware-not-only-encrypts-your-data-but-tries-to-lock-you-out-of-windows/)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1491.001-3","name":"ESXi - Change Welcome Message on Direct Console User Interface (DCUI)","description":"Changes the ESXi welcome message to potentially display ransom information. [Reference](https://lolesxi-project.github.io/LOLESXi/lolesxi/Binaries/esxcli/#change%20display%20information)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1491.001-4","name":"Windows - Display a simulated ransom note via Notepad (non-destructive)","description":"Creates a temporary ransom-note text file and opens it in Notepad to simulate ransomware \"note display\" behavior without making destructive changes. SAFE and non-destructive.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1496","name":"Resource Hijacking","tactic":"TA0040","tactics":["TA0040"],"atomicTests":[{"id":"T1496-1","name":"FreeBSD/macOS/Linux - Simulate CPU Load with Yes","description":"This test simulates a high CPU load as you might observe during cryptojacking attacks. End the test by using CTRL/CMD+C to break.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1496-2","name":"Windows - Simulate CPU Load with PowerShell","description":"This test simulates high CPU load using PowerShell, commonly seen in resource hijacking. Spawns background jobs to stress CPU cores for a specified duration.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1497.001","name":"Virtualization/Sandbox Evasion: System Checks","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1497.001-1","name":"Detect Virtualization Environment (Linux)","description":"systemd-detect-virt detects execution in a virtualized environment. At boot, dmesg stores a log if a hypervisor is detected.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1497.001-2","name":"Detect Virtualization Environment (FreeBSD)","description":"Detects execution in a virtualized environment. At boot, dmesg stores a log if a hypervisor is detected.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1497.001-3","name":"Detect Virtualization Environment (Windows)","description":"Windows Management Instrumentation(WMI) objects contains system information which helps to detect virtualization. This command will specifically attempt to get the CurrentTemperature value from this object and will check to see if the attempt results in an error that contains the word supported. This is meant to find the result of Not supported, which is the result if run in a virtual machine","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1497.001-4","name":"Detect Virtualization Environment via ioreg","description":"ioreg contains registry entries for all the device drivers in the system. If it's a virtual machine, one of the device manufacturer will be a Virtualization Software.","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1497.001-5","name":"Detect Virtualization Environment via WMI Manufacturer/Model Listing (Windows)","description":"Windows Management Instrumentation(WMI) objects contain system information which helps to detect virtualization. This test will get the model and manufacturer of the machine to determine if it is a virtual machine, such as through VMware or VirtualBox.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1497.001-6","name":"Detect Virtualization Environment using sysctl (hw.model)","description":"sysctl hw.model will return the model name of the hardware(Macmini8,1, MacBookAir10,1, etc.) in case of native Apple hardware but will return the hypervisor name (VMware7,0). Reference: https://evasions.checkpoint.com/src/MacOS/macos.html#hardware-model","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1497.001-7","name":"Check if System Integrity Protection is enabled","description":"The latest versions of macOS have the System Integrity Protection feature (SIP). If a sandbox uses a non-signed kernel extension for monitoring purposes the, SIP feature must be disabled to load this kind of kernel extension. Malware may check if the SIP is enabled. Reference: https://evasions.checkpoint.com/src/MacOS/macos.html#sip","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1497.001-8","name":"Detect Virtualization Environment using system_profiler","description":"system_profiler provides system hardware and software configuration and the Model Identifier should provide the value similar to (sysctl -n hw.model). We should be able to find whether virtualization is enabled by checking whether the Model Identifier does not contain \"Mac\".","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1497.003","name":"Time Based Evasion","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1497.003-1","name":"Delay execution with ping","description":"Uses the ping command to introduce a delay before executing a malicious payload.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1505.002","name":"Server Software Component: Transport Agent","tactic":"TA0003","tactics":["TA0003"],"atomicTests":[{"id":"T1505.002-1","name":"Install MS Exchange Transport Agent Persistence","description":"Install a Microsoft Exchange Transport Agent for persistence. This requires execution from an Exchange Client Access Server and the creation of a DLL with specific exports. Seen in use by Turla. More details- https://docs.microsoft.com/en-us/exchange/transport-agents-exchange-2013-help","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1505.003","name":"Server Software Component: Web Shell","tactic":"TA0003","tactics":["TA0003"],"atomicTests":[{"id":"T1505.003-1","name":"Web Shell Written to Disk","description":"This test simulates an adversary leveraging Web Shells by simulating the file modification to disk. Idea from APTSimulator. cmd.aspx source - https://github.com/tennc/webshell/blob/master/fuzzdb-webshell/asp/cmd.aspx","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1505.004","name":"IIS Components","tactic":"TA0003","tactics":["TA0003"],"atomicTests":[{"id":"T1505.004-1","name":"Install IIS Module using AppCmd.exe","description":"The following Atomic will utilize AppCmd.exe to install a new IIS Module. IIS must be installed. This atomic utilizes a DLL on disk, but to test further suspiciousness, compile and load [IIS-Raid](https://www.mdsec.co.uk/2020/02/iis-raid-backdooring-iis-using-native-modules/). A successful execution will install a module into IIS using AppCmd.exe. [Managing and installing Modules Reference](https://learn.microsoft.com/en-us/iis/get-started/introduction-to-iis/iis-modules-overview#to-install-a-module-using-appcmdexe) [IIS Modules](https://www.microsoft.com/en-us/security/blog/2022/12/12/iis-modules-the-evolution-of-web-shells-and-how-to-detect-them/)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1505.004-2","name":"Install IIS Module using PowerShell Cmdlet New-WebGlobalModule","description":"The following Atomic will utilize PowerShell Cmdlet New-WebGlobalModule to install a new IIS Module. IIS must be installed. This atomic utilizes a DLL on disk, but to test further suspiciousness, compile and load [IIS-Raid](https://www.mdsec.co.uk/2020/02/iis-raid-backdooring-iis-using-native-modules/). A successful execution will install a module into IIS using New-WebGlobalModule. [Managing IIS Modules with PowerShell](https://learn.microsoft.com/en-us/powershell/module/webadministration/set-webglobalmodule?view=windowsserver2022-ps) [IIS Modules](https://www.microsoft.com/en-us/security/blog/2022/12/12/iis-modules-the-evolution-of-web-shells-and-how-to-detect-them/)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1505.005","name":"Server Software Component: Terminal Services DLL","tactic":"TA0003","tactics":["TA0003"],"atomicTests":[{"id":"T1505.005-1","name":"Simulate Patching termsrv.dll","description":"Simulates patching of termsrv.dll by making a benign change to the file and replacing it with the original afterwards. Before we can make the modifications we need to take ownership of the file and grant ourselves the necessary permissions.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1505.005-2","name":"Modify Terminal Services DLL Path","description":"This atomic test simulates the modification of the ServiceDll value in HKLM\\System\\CurrentControlSet\\services\\TermService\\Parameters. This technique may be leveraged by adversaries to establish persistence by loading a patched version of the DLL containing malicious code.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1518","name":"Software Discovery","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1518-1","name":"Find and Display Internet Explorer Browser Version","description":"Query the registry to determine the version of internet explorer installed on the system. Upon execution, version information about internet explorer will be displayed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1518-2","name":"Applications Installed","description":"Query the registry to determine software and versions installed on the system. Upon execution a table of software name and version information will be displayed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1518-3","name":"Find and Display Safari Browser Version","description":"Adversaries may attempt to get a listing of non-security related software that is installed on the system. Adversaries may use the information from Software Discovery during automated discovery to shape follow-on behaviors","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1518-4","name":"WinPwn - Dotnetsearch","description":"Search for any .NET binary file in a share using the Dotnetsearch function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1518-5","name":"WinPwn - DotNet","description":"Search for .NET Service-Binaries on this system via winpwn dotnet function of WinPwn.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1518-6","name":"WinPwn - powerSQL","description":"Start PowerUpSQL Checks using powerSQL function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1518.001","name":"Software Discovery: Security Software Discovery","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1518.001-1","name":"Security Software Discovery","description":"Methods to identify Security Software on an endpoint when sucessfully executed, the test is going to display running processes, firewall configuration on network profiles and specific security software.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1518.001-2","name":"Security Software Discovery - powershell","description":"Methods to identify Security Software on an endpoint when sucessfully executed, powershell is going to processes related AV products if they are running. Note that, depending on the privilege of current user, get-process | ?{$_.Description -like \"*\"} may not return the processes related to AV products of the check. For instance, only with Administrator right, you can see the process description of McAffee processes. Hence, it is better to use get-process | ?{$_.ProcessName -like \"*\"}, if you know the name of those processes.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1518.001-3","name":"Security Software Discovery - ps (macOS)","description":"Methods to identify Security Software on an endpoint when sucessfully executed, command shell  is going to display AV/Security software it is running.","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1518.001-4","name":"Security Software Discovery - ps (Linux)","description":"Methods to identify Security Software on an endpoint when sucessfully executed, command shell  is going to display AV/Security software it is running.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1518.001-5","name":"Security Software Discovery - pgrep (FreeBSD)","description":"Methods to identify Security Software on an endpoint when sucessfully executed, command shell is going to display AV/Security software it is running.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1518.001-6","name":"Security Software Discovery - Sysmon Service","description":"Discovery of an installed Sysinternals Sysmon service using driver altitude (even if the name is changed). when sucessfully executed, the test is going to display sysmon driver instance if it is installed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1518.001-7","name":"Security Software Discovery - AV Discovery via WMI","description":"Discovery of installed antivirus products via a WMI query. when sucessfully executed, the test is going to display installed AV software.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1518.001-8","name":"Security Software Discovery - AV Discovery via Get-CimInstance and Get-WmiObject cmdlets","description":"Discovery of installed antivirus products via Get-CimInstance and Get-WmiObject cmdlets of powershell. when sucessfully executed, information about installed AV software is displayed..","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1518.001-9","name":"Security Software Discovery - Windows Defender Enumeration","description":"Windows Defender Enumeration via different built-in windows native tools. when sucessfully executed, information about windows defender is displayed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1518.001-10","name":"Security Software Discovery - Windows Firewall Enumeration","description":"Enumerates windows firewall to retrieves firewall rules from the target computer. when sucessfully executed, details of windows firewall is displayed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1518.001-11","name":"Get Windows Defender exclusion settings using WMIC","description":"In this test, a WMIC command is used to probe the local Windows system for the configuration of Windows Defender's exclusions. This command targets the MSFT_MpPreference class within the Windows Management Instrumentation (WMI) namespace, allowing the retrieval of critical settings such as disabled real-time monitoring and specified exclusion paths, file extensions, and processes. Attackers might use this approach to understand what is excluded from antivirus scans, enabling further exploitation.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1526","name":"Cloud Service Discovery","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1526-1","name":"Azure - Dump Subscription Data with MicroBurst","description":"Upon successful execution, this test will enumerate all resources that are contained within a valid Azure subscription. The resources enumerated will display on screen, as well as several csv files and folders will be output to a specified directory, listing what resources were discovered by the script. See https://dev.to/cheahengsoon/enumerating-subscription-information-with-microburst-35a1","supportedPlatforms":["iaas:azure"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1526-2","name":"AWS - Enumerate common cloud services","description":"Upon successful execution, this test will enumerate common resources that are contained within a valid AWS account.","supportedPlatforms":["iaas:aws"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1526-3","name":"Azure - Enumerate common cloud services","description":"Upon successful execution, this test will enumerate common resources that are contained within a valid Azure subscription.","supportedPlatforms":["iaas:azure"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1528","name":"Steal Application Access Token","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1528-1","name":"Azure - Functions code upload - Functions code injection via Blob upload","description":"This test injects code into an Azure Function (RCE). Attack idea/reference: https://orca.security/resources/blog/azure-shared-key-authorization-exploitation/ Similar to T1528 \"Azure - Functions code upload - Functions code injection to retrieve the Functions identity access token\", the depicted code injection scenario tampers the source code of Azure Functions to perform Subscription Privilege Escalation by retrieving the identity access token of an Azure functions instance. In this case, the prepared zip file (underlying package for a Function) is expected to contain the tampered function presented in src/code_to_insert.py. Note that the endpoint https://changeme.net needs to be adapted in your packed function code. Note: - The Azure Function modified in this test must be hosted via Azure Blob storage (Info on storage considerations for Azure Function: https://learn.microsoft.com/en-us/azure/azure-functions/storage-considerations). - For Function code upload to Azure Functions that are hosted via Azure Files in a File Share, refer to T1528 \"Azure - Functions code upload - Functions code injection to retrieve the Functions identity access token\". - The required input fields can be retrieved in a reconnaissance step in test T1619 \"Azure - Enumerate Storage Account Objects via Key-based authentication using Azure CLI\". The code of function apps may be inspected and prepared from the result of test T1530 \"Azure - Dump Azure Storage Account Objects via Azure CLI\". Requirements: - The test is intended to be executed in interactive mode (with -Interactive parameter) in order to complete the az login command when MFA is required. - The EntraID user must have the role \"Storage Account Contributor\", or a role with similar permissions.","supportedPlatforms":["iaas:azure"],"offl
