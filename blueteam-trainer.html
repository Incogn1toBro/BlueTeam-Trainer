ing-a-lazarus-shellcode-execution-method/ - https://twitter.com/_CPResearch_/status/1352310521752662018 - https://blog.securehat.co.uk/process-injection/shellcode-execution-via-enumsystemlocala","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1055-7","name":"Process Injection with Go using EtwpCreateEtwThread WinAPI","description":"Uses EtwpCreateEtwThread function from ntdll.dll to execute shellcode within the application's process. This program loads the DLLs and gets a handle to the used procedures itself instead of using the windows package directly. Steps taken with this technique 1. Allocate memory for the shellcode with VirtualAlloc setting the page permissions to Read/Write 2. Use the RtlCopyMemory macro to copy the shellcode to the allocated memory space 3. Change the memory page permissions to Execute/Read with VirtualProtect 4. Call EtwpCreateEtwThread on shellcode address 5. Call WaitForSingleObject so the program does not end before the shellcode is executed - PoC Credit: (https://github.com/Ne0nd0g/go-shellcode/tree/master#EtwpCreateEtwThread) - References: - https://gist.github.com/TheWover/b2b2e427d3a81659942f4e8b9a978dc3 - https://www.geoffchappell.com/studies/windows/win32/ntdll/api/etw/index.htm","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1055-8","name":"Remote Process Injection with Go using RtlCreateUserThread WinAPI","description":"Executes shellcode in a remote process. Steps taken with this technique 1. Get a handle to the target process 2. Allocate memory for the shellcode with VirtualAllocEx setting the page permissions to Read/Write 3. Use the WriteProcessMemory to copy the shellcode to the allocated memory space in the remote process 4. Change the memory page permissions to Execute/Read with VirtualProtectEx 5. Execute the entrypoint of the shellcode in the remote process with RtlCreateUserThread 6. Close the handle to the remote process - PoC Credit: (https://github.com/Ne0nd0g/go-shellcode/tree/master#rtlcreateuserthread) - References: - https://www.cobaltstrike.com/blog/cobalt-strikes-process-injection-the-details-cobalt-strike","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1055-9","name":"Remote Process Injection with Go using CreateRemoteThread WinAPI","description":"Leverages the Windows CreateRemoteThread function from Kernel32.dll to execute shellocde in a remote process. This application leverages functions from the golang.org/x/sys/windows package, where feasible, like the windows.OpenProcess(). Steps taken with this technique 1. Get a handle to the target process 2. Allocate memory for the shellcode with VirtualAllocEx setting the page permissions to Read/Write 3. Use the WriteProcessMemory to copy the shellcode to the allocated memory space in the remote process 4. Change the memory page permissions to Execute/Read with VirtualProtectEx 5. Execute the entrypoint of the shellcode in the remote process with CreateRemoteThread 6. Close the handle to the remote process - PoC Credit: (https://github.com/Ne0nd0g/go-shellcode#createremotethread) - References: - https://www.ired.team/offensive-security/code-injection-process-injection/process-injection","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1055-10","name":"Remote Process Injection with Go using CreateRemoteThread WinAPI (Natively)","description":"Leverages the Windows CreateRemoteThread function from Kernel32.dll to execute shellcode in a remote process. This program loads the DLLs and gets a handle to the used procedures itself instead of using the windows package directly. 1. Get a handle to the target process 2. Allocate memory for the shellcode with VirtualAllocEx setting the page permissions to Read/Write 3. Use the WriteProcessMemory to copy the shellcode to the allocated memory space in the remote process 4. Change the memory page permissions to Execute/Read with VirtualProtectEx 5. Execute the entrypoint of the shellcode in the remote process with CreateRemoteThread 6. Close the handle to the remote process - PoC Credit: (https://github.com/Ne0nd0g/go-shellcode#createremotethreadnative)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1055-11","name":"Process Injection with Go using CreateThread WinAPI","description":"This program executes shellcode in the current process using the following steps 1. Allocate memory for the shellcode with VirtualAlloc setting the page permissions to Read/Write 2. Use the RtlCopyMemory macro to copy the shellcode to the allocated memory space 3. Change the memory page permissions to Execute/Read with VirtualProtect 4. Call CreateThread on shellcode address 5. Call WaitForSingleObject so the program does not end before the shellcode is executed This program leverages the functions from golang.org/x/sys/windows to call Windows procedures instead of manually loading them - PoC Credit: (https://github.com/Ne0nd0g/go-shellcode#createthread)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1055-12","name":"Process Injection with Go using CreateThread WinAPI (Natively)","description":"This program executes shellcode in the current process using the following steps 1. Allocate memory for the shellcode with VirtualAlloc setting the page permissions to Read/Write 2. Use the RtlCopyMemory macro to copy the shellcode to the allocated memory space 3. Change the memory page permissions to Execute/Read with VirtualProtect 4. Call CreateThread on shellcode address 5. Call WaitForSingleObject so the program does not end before the shellcode is executed This program loads the DLLs and gets a handle to the used procedures itself instead of using the windows package directly. - PoC Credit: (https://github.com/Ne0nd0g/go-shellcode#createthreadnative)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1055-13","name":"UUID custom process Injection","description":"The UUIDs Process Injection code was first introduced by the NCC Group. The code can be stored in UUID forms on the heap and converted back to binary via UuidFromStringA at runtime. In this new custom version of UUID injection, EnumSystemLocalesA is the only API called to execute the code. We used custom UuidToString and UuidFromString implementations to avoid using UuidFromStringA and RPCRT4.dll, thereby eliminating the static signatures. This technique also avoided the use of VirtualAlloc, WriteProcessMemory and CreateThread The injected shellcode will open a message box and a notepad. Reference to NCC Group: https://research.nccgroup.com/2021/01/23/rift-analysing-a-lazarus-shellcode-execution-method/ Concept from: http://ropgadget.com/posts/abusing_win_functions.html","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1055.002","name":"Process Injection: Portable Executable Injection","tactic":"TA0004","tactics":["TA0004"],"atomicTests":[{"id":"T1055.002-1","name":"Portable Executable Injection","description":"This test injects a portable executable into a remote Notepad process memory using Portable Executable Injection and base-address relocation techniques. When successful, a message box will appear with the title \"Warning\" and the content \"Atomic Red Team\" after a few seconds.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1055.003","name":"Thread Execution Hijacking","tactic":"TA0004","tactics":["TA0004"],"atomicTests":[{"id":"T1055.003-1","name":"Thread Execution Hijacking","description":"This test injects a MessageBox shellcode generated by msfvenom in Notepad.exe using Thread Execution Hijacking. When successful, a message box will appear with the \"Atomic Red Team\" caption after one or two seconds.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1055.004","name":"Process Injection: Asynchronous Procedure Call","tactic":"TA0004","tactics":["TA0004"],"atomicTests":[{"id":"T1055.004-1","name":"Process Injection via C#","description":"Process Injection using C# reference: https://github.com/pwndizzle/c-sharp-memory-injection Excercises Five Techniques 1. Process injection 2. ApcInjectionAnyProcess 3. ApcInjectionNewProcess 4. IatInjection 5. ThreadHijack Upon successful execution, cmd.exe will execute T1055.exe, which exercises 5 techniques. Output will be via stdout.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1055.004-2","name":"EarlyBird APC Queue Injection in Go","description":"Creates a process in a suspended state and calls QueueUserAPC WinAPI to add a UserAPC to the child process that points to allocated shellcode. ResumeThread is called which then calls NtTestAlert to execute the created UserAPC which then executes the shellcode. This technique allows for the early execution of shellcode and potentially before AV/EDR can hook functions to support detection. - PoC Credit: (https://github.com/Ne0nd0g/go-shellcode#createprocesswithpipe) - References: - https://www.bleepingcomputer.com/news/security/early-bird-code-injection-technique-helps-malware-stay-undetected/ - https://www.ired.team/offensive-security/code-injection-process-injection/early-bird-apc-queue-code-injection","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1055.004-3","name":"Remote Process Injection with Go using NtQueueApcThreadEx WinAPI","description":"Uses the undocumented NtQueueAPCThreadEx WinAPI to create a \"Special User APC\" in the current thread of the current process to execute shellcode. Since the shellcode is loaded and executed in the current process it is considered local shellcode execution. Steps taken with this technique 1. Allocate memory for the shellcode with VirtualAlloc setting the page permissions to Read/Write 2. Use the RtlCopyMemory macro to copy the shellcode to the allocated memory space 3. Change the memory page permissions to Execute/Read with VirtualProtect 4. Get a handle to the current thread 5. Execute the shellcode in the current thread by creating a Special User APC through the NtQueueApcThreadEx function - PoC Credit: (https://github.com/Ne0nd0g/go-shellcode/tree/master#rtlcreateuserthread) - References: - https://repnz.github.io/posts/apc/user-apc/ - https://docs.rs/ntapi/0.3.1/ntapi/ntpsapi/fn.NtQueueApcThreadEx.html - https://0x00sec.org/t/process-injection-apc-injection/24608 - https://twitter.com/aionescu/status/992264290924032005 - http://www.opening-windows.com/techart_windows_vista_apc_internals2.htm#_Toc229652505","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1055.011","name":"Process Injection: Extra Window Memory Injection","tactic":"TA0004","tactics":["TA0004"],"atomicTests":[{"id":"T1055.011-1","name":"Process Injection via Extra Window Memory (EWM) x64 executable","description":"Hooks functions of main process to inject a payload via Extra Window Memory (EWM) injection technique","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1055.012","name":"Process Injection: Process Hollowing","tactic":"TA0004","tactics":["TA0004"],"atomicTests":[{"id":"T1055.012-1","name":"Process Hollowing using PowerShell","description":"This test uses PowerShell to create a Hollow from a PE on disk with explorer as the parent. Credit to FuzzySecurity (https://github.com/FuzzySecurity/PowerShell-Suite/blob/master/Start-Hollow.ps1)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1055.012-2","name":"RunPE via VBA","description":"This module executes notepad.exe from within the WINWORD.EXE process","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true},{"id":"T1055.012-3","name":"Process Hollowing in Go using CreateProcessW WinAPI","description":"Creates a process in a suspended state, executes shellcode to spawn calc.exe in a child process, and then resumes the original process. - PoC Credit: (https://github.com/Ne0nd0g/go-shellcode#createprocess)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1055.012-4","name":"Process Hollowing in Go using CreateProcessW and CreatePipe WinAPIs (T1055.012)","description":"Create a process in a suspended state, execute shellcode to spawn calc.exe in a child process, and then resume the original process. This test uses the CreatePipe function to create an anonymous pipe that parent and child processes can communicate over. This anonymous pipe allows for the retrieval of output generated from executed shellcode. - PoC Credit: (https://github.com/Ne0nd0g/go-shellcode#createprocesswithpipe)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1055.015","name":"Process Injection: ListPlanting","tactic":"TA0004","tactics":["TA0004"],"atomicTests":[{"id":"T1055.015-1","name":"Process injection ListPlanting","description":"This test injects shellcode into a remote RegEdit process using the ListPlanting technique. ListPlanting exploits Window with ListView control. Code write to memory with NtWriteVirtualMemory. The shellcode is executed via PostMessage. When successful, a message box will appear with the title \"Warning\" and the content \"Atomic Red Team\" after a few seconds. Notepad will open following the appearance of the message box.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1056.001","name":"Input Capture: Keylogging","tactic":"TA0009","tactics":["TA0009","TA0006"],"atomicTests":[{"id":"T1056.001-1","name":"Input Capture","description":"Utilize PowerShell and external resource to capture keystrokes [Payload](https://github.com/redcanaryco/atomic-red-team/blob/master/atomics/T1056.001/src/Get-Keystrokes.ps1) Provided by [PowerSploit](https://github.com/PowerShellMafia/PowerSploit/blob/master/Exfiltration/Get-Keystrokes.ps1) Upon successful execution, Powershell will execute `Get-Keystrokes.ps1` and output to key.log.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1056.001-2","name":"Living off the land Terminal Input Capture on Linux with pam.d","description":"Pluggable Access Module, which is present on all modern Linux systems, generally contains a library called pam_tty_audit.so which logs all keystrokes for the selected users and sends it to audit.log.  All terminal activity on any new logins would then be archived and readable by an adversary with elevated privledges. Passwords hidden by the console can also be logged, with 'log_passwd' as in this example.  If root logging is enabled, then output from any process which is later started by root is also logged, even if this policy is carefully enabled (e.g. 'disable=*' as the initial command). Use 'aureport --tty' or other audit.d reading tools to read the log output, which is binary.  Mac OS does not currently contain the pam_tty_audit.so library.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1056.001-3","name":"Logging bash history to syslog","description":"There are several variables that can be set to control the appearance of the bash command prompt: PS1, PS2, PS3, PS4 and PROMPT_COMMAND. The contents of these variables are executed as if they had been typed on the command line. The PROMPT_COMMAND variable \"if set\" will be executed before the PS1 variable and can be configured to write the latest \"bash history\" entries to the syslog. To gain persistence the command could be added to the users .bashrc or .bash_aliases or the systems default .bashrc in /etc/skel/","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1056.001-4","name":"Logging sh history to syslog/messages","description":"There are several variables that can be set to control the appearance of the bash command prompt: PS1, PS2, PS3, PS4 and PROMPT_COMMAND. The contents of these variables are executed as if they had been typed on the command line. The PROMPT_COMMAND variable \"if set\" will be executed before the PS1 variable and can be configured to write the latest \"bash history\" entries to the syslog. To gain persistence the command could be added to the users .shrc or .profile","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1056.001-5","name":"Bash session based keylogger","description":"When a command is executed in bash, the BASH_COMMAND variable contains that command. For example :~$ echo $BASH_COMMAND = \"echo $BASH_COMMAND\". The trap command is not a external command, but a built-in function of bash and can be used in a script to run a bash function when some event occurs. trap will detect when the BASH_COMMAND variable value changes and then pipe that value into a file, creating a bash session based keylogger. To gain persistence the command could be added to the users .bashrc or .bash_aliases or the systems default .bashrc in /etc/skel/","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1056.001-6","name":"SSHD PAM keylogger","description":"Linux PAM (Pluggable Authentication Modules) is used in sshd authentication. The Linux audit tool auditd can use the pam_tty_audit module to enable auditing of TTY input and capture all keystrokes in a ssh session and place them in the /var/log/audit/audit.log file after the session closes.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1056.001-7","name":"Auditd keylogger","description":"The linux audit tool auditd can be used to capture 32 and 64 bit command execution and place the command in the /var/log/audit/audit.log audit log.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1056.001-8","name":"MacOS Swift Keylogger","description":"Utilizes a swift script to log keys to sout. It runs for 5 seconds then dumps the output to standard. Input Monitoring is required. Input Monitoring can be enabled in System Preferences > Security & Privacy > Privacy > Input Monitoring. Referece: https://cedowens.medium.com/taking-esf-for-a-nother-spin-6e1e6acd1b74","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1056.002","name":"Input Capture: GUI Input Capture","tactic":"TA0009","tactics":["TA0009","TA0006"],"atomicTests":[{"id":"T1056.002-1","name":"AppleScript - Prompt User for Password","description":"Prompt User for Password (Local Phishing) Reference: http://fuzzynop.blogspot.com/2014/10/osascript-for-local-phishing.html","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1056.002-2","name":"PowerShell - Prompt User for Password","description":"Prompt User for Password (Local Phishing) as seen in Stitch RAT. Upon execution, a window will appear for the user to enter their credentials. Reference: https://github.com/nathanlopez/Stitch/blob/master/PyLib/askpass.py","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1056.002-3","name":"AppleScript - Spoofing a credential prompt using osascript","description":"Prompt user for password without requiring permissions to send Apple events to System Settings. https://embracethered.com/blog/posts/2021/spoofing-credential-dialogs/","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1056.004","name":"Input Capture: Credential API Hooking","tactic":"TA0009","tactics":["TA0009","TA0006"],"atomicTests":[{"id":"T1056.004-1","name":"Hook PowerShell TLS Encrypt/Decrypt Messages","description":"Hooks functions in PowerShell to read TLS Communications","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1057","name":"Process Discovery","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1057-1","name":"Process Discovery - ps","description":"Utilize ps to identify processes. Upon successful execution, sh will execute ps and output to /tmp/loot.txt.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1057-2","name":"Process Discovery - tasklist","description":"Utilize tasklist to identify processes. Upon successful execution, cmd.exe will execute tasklist.exe to list processes. Output will be via stdout.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1057-3","name":"Process Discovery - Get-Process","description":"Utilize Get-Process PowerShell cmdlet to identify processes. Upon successful execution, powershell.exe will execute Get-Process to list processes. Output will be via stdout.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1057-4","name":"Process Discovery - get-wmiObject","description":"Utilize get-wmiObject PowerShell cmdlet to identify processes. Upon successful execution, powershell.exe will execute get-wmiObject to list processes. Output will be via stdout.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1057-5","name":"Process Discovery - wmic process","description":"Utilize windows management instrumentation to identify processes. Upon successful execution, WMIC will execute process to list processes. Output will be via stdout.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1057-6","name":"Discover Specific Process - tasklist","description":"Adversaries may use command line tools to discover specific processes in preparation of further attacks. Examples of this could be discovering the PID of lsass.exe to dump its memory or discovering whether specific security processes (e.g. AV or EDR) are running.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1057-7","name":"Process Discovery - Process Hacker","description":"Process Hacker can be exploited to infiltrate system processes, identify weak points, or achieve unauthorized control over systems. However, its malicious use can often be flagged by security defenses, rendering it a perilous tool for illegitimate purposes.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1057-8","name":"Process Discovery - PC Hunter","description":"PC Hunter is a toolkit with access to hundreds of settings including kernels, kernel modules, processes, network, startup, and more. When abused, this tool can allow threat actors to effectively access sensitive processes, collect system information, and terminate security software.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1057-9","name":"Launch Taskmgr from cmd to View running processes","description":"An adverary may launch taskmgr.exe with the /7 switch via command prompt to view processes running on the system. [Reference](https://github.com/trellix-enterprise/ac3-threat-sightings/blob/main/sightings/Sightings_Conti_Ransomware.yml)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1059","name":"Command and Scripting Interpreter","tactic":"TA0002","tactics":["TA0002"],"atomicTests":[{"id":"T1059-1","name":"AutoIt Script Execution","description":"An adversary may attempt to execute suspicious or malicious script using AutoIt software instead of regular terminal like powershell or cmd. Calculator will popup when the script is executed successfully.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1059.002","name":"Command and Scripting Interpreter: AppleScript","tactic":"TA0002","tactics":["TA0002"],"atomicTests":[{"id":"T1059.002-1","name":"AppleScript","description":"Shell Script with AppleScript. The encoded python script will perform an HTTP GET request to 127.0.0.1:80 with a session cookie of \"t3VhVOs/DyCcDTFzIKanRxkvk3I=\", unless 'Little Snitch' is installed, in which case it will just exit. You can use netcat to listen for the connection and verify execution, e.g. use \"nc -l 80\" in another terminal window before executing this test and watch for the request. Reference: https://github.com/EmpireProject/Empire","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1059.004","name":"Command and Scripting Interpreter: Bash","tactic":"TA0002","tactics":["TA0002"],"atomicTests":[{"id":"T1059.004-1","name":"Create and Execute Bash Shell Script","description":"Creates and executes a simple sh script.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1059.004-2","name":"Command-Line Interface","description":"Using Curl to download and pipe a payload to Bash. NOTE: Curl-ing to Bash is generally a bad idea if you don't control the server. Upon successful execution, sh will download via curl and wget the specified payload (echo-art-fish.sh) and set a marker file in `/tmp/art-fish.txt`.","supportedPlatforms":["linux","macos"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1059.004-3","name":"Harvest SUID executable files","description":"AutoSUID application is the Open-Source project, the main idea of which is to automate harvesting the SUID executable files and to find a way for further escalating the privileges.","supportedPlatforms":["linux"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1059.004-4","name":"LinEnum tool execution","description":"LinEnum is a bash script that performs discovery commands for accounts,processes, kernel version, applications, services, and uses the information from these commands to present operator with ways of escalating privileges or further exploitation of targeted host.","supportedPlatforms":["linux"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1059.004-5","name":"New script file in the tmp directory","description":"An attacker may create script files in the /tmp directory using the mktemp utility and execute them. The following commands creates a temp file and places a pointer to it in the variable $TMPFILE, echos the string id into it, and then executes the file using bash, which results in the id command being executed.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1059.004-6","name":"What shell is running","description":"An adversary will want to discover what shell is running so that they can tailor their attacks accordingly. The following commands will discover what shell is running.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1059.004-7","name":"What shells are available","description":"An adversary may want to discover which shell's are available so that they might switch to that shell to tailor their attacks to suit that shell. The following commands will discover what shells are available on the host.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1059.004-8","name":"Command line scripts","description":"An adversary may type in elaborate multi-line shell commands into a terminal session because they can't or don't wish to create script files on the host. The following command is a simple loop, echoing out Atomic Red Team was here!","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1059.004-9","name":"Obfuscated command line scripts","description":"An adversary may pre-compute the base64 representations of the terminal commands that they wish to execute in an attempt to avoid or frustrate detection. The following commands base64 encodes the text string id, then base64 decodes the string, then pipes it as a command to bash, which results in the id command being executed.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1059.004-10","name":"Change login shell","description":"An adversary may want to use a different login shell. The chsh command changes the user login shell. The following test, creates an art user with a /bin/bash shell, changes the users shell to sh, then deletes the art user.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1059.004-11","name":"Environment variable scripts","description":"An adversary may place scripts in an environment variable because they can't or don't wish to create script files on the host. The following test, in a bash shell, exports the ART variable containing an echo command, then pipes the variable to /bin/bash","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1059.004-12","name":"Detecting pipe-to-shell","description":"An adversary may develop a useful utility or subvert the CI/CD pipe line of a legitimate utility developer, who requires or suggests installing their utility by piping a curl download directly into bash. Of-course this is a very bad idea. The adversary may also take advantage of this BLIND install method and selectively running extra commands in the install script for those who DO pipe to bash and not for those who DO NOT. This test uses curl to download the pipe-to-shell.sh script, the first time without piping it to bash and the second piping it into bash which executes the echo command.","supportedPlatforms":["linux"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true},{"id":"T1059.004-13","name":"Current kernel information enumeration","description":"An adversary may want to enumerate the kernel information to tailor their attacks for that particular kernel. The following command will enumerate the kernel information.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1059.004-14","name":"Shell Creation using awk command","description":"In awk the begin rule runs the first record without reading or interpreting it. This way a shell can be created and used to break out from restricted environments with the awk command. Reference - https://gtfobins.github.io/gtfobins/awk/#shell","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1059.004-15","name":"Creating shell using cpan command","description":"cpan lets you execute perl commands with the ! command. It can be used to break out from restricted environments by spawning an interactive system shell. Reference - https://gtfobins.github.io/gtfobins/cpan/","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1059.004-16","name":"Shell Creation using busybox command","description":"BusyBox is a multi-call binary. A multi-call binary is an executable program that performs the same job as more than one utility program. It can be used to break out from restricted environments by spawning an interactive system shell. Reference - https://gtfobins.github.io/gtfobins/busybox/","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1059.004-17","name":"emacs spawning an interactive system shell","description":"emacs can be used to break out from restricted environments by spawning an interactive system shell. Ref: https://gtfobins.github.io/gtfobins/emacs/","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1059.005","name":"Command and Scripting Interpreter: Visual Basic","tactic":"TA0002","tactics":["TA0002"],"atomicTests":[{"id":"T1059.005-1","name":"Visual Basic script execution to gather local computer information","description":"Visual Basic execution test, execute vbscript via PowerShell. When successful, system information will be written to $env:TEMP\\T1059.005.out.txt.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1059.005-2","name":"Encoded VBS code execution","description":"This module takes an encoded VBS script and executes it from within a malicious document. By default, upon successful execution a message box will pop up displaying \"ART T1059.005\" A note regarding this module, due to the way that this module utilizes \"ScriptControl\" a 64bit version of Microsoft Office is required. You can validate this by opening WinWord -> File -> Account -> About Word","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true},{"id":"T1059.005-3","name":"Extract Memory via VBA","description":"This module attempts to emulate malware authors utilizing well known techniques to extract data from memory/binary files. To do this we first create a string in memory then pull out the pointer to that string. Finally, it uses this pointer to copy the contents of that memory location to a file stored in the $env:TEMP\\atomic_t1059_005_test_output.bin.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1059.006","name":"Command and Scripting Interpreter: Python","tactic":"TA0002","tactics":["TA0002"],"atomicTests":[{"id":"T1059.006-1","name":"Execute shell script via python's command mode arguement","description":"Download and execute shell script and write to file then execute locally using Python -c (command mode)","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1059.006-2","name":"Execute Python via scripts","description":"Create Python file (.py) that downloads and executes shell script via executor arguments","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1059.006-3","name":"Execute Python via Python executables","description":"Create Python file (.py) then compile to binary (.pyc) that downloads an external malicious script then executes locally using the supplied executor and arguments","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1059.006-4","name":"Python pty module and spawn function used to spawn sh or bash","description":"Uses the Python spawn function to spawn a sh shell followed by a bash shell. Per Volexity, this technique was observed in exploitation of Atlassian Confluence [CVE-2022-26134]. Reference: https://www.volexity.com/blog/2022/06/02/zero-day-exploitation-of-atlassian-confluence","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1059.007","name":"Command and Scripting Interpreter: JavaScript","tactic":"TA0002","tactics":["TA0002"],"atomicTests":[{"id":"T1059.007-1","name":"JScript execution to gather local computer information via cscript","description":"JScript execution test, execute JScript via cscript command. When successful, system information will be written to $env:TEMP\\T1059.007.out.txt","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1059.007-2","name":"JScript execution to gather local computer information via wscript","description":"JScript execution test, execute JScript via wscript command. When successful, system information will be shown with four message boxes.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1059.010","name":"Command and Scripting Interpreter: AutoHotKey & AutoIT","tactic":"TA0002","tactics":["TA0002"],"atomicTests":[{"id":"T1059.010-1","name":"AutoHotKey script execution","description":"An adversary may attempt to execute malicious script using AutoHotKey software instead of regular terminal like powershell or cmd. A messagebox will be displayed and calculator will popup when the script is executed successfully","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1069.001","name":"Permission Groups Discovery: Local Groups","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1069.001-1","name":"Permission Groups Discovery (Local)","description":"Permission Groups Discovery","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1069.001-2","name":"Basic Permission Groups Discovery Windows (Local)","description":"Basic Permission Groups Discovery for Windows. This test will display some errors if run on a computer not connected to a domain. Upon execution, domain information will be displayed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1069.001-3","name":"Permission Groups Discovery PowerShell (Local)","description":"Permission Groups Discovery utilizing PowerShell. This test will display some errors if run on a computer not connected to a domain. Upon execution, domain information will be displayed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1069.001-4","name":"SharpHound3 - LocalAdmin","description":"This module runs the Windows executable of SharpHound in order to remotely list members of the local Administrators group (SAMR)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1069.001-5","name":"Wmic Group Discovery","description":"Utilizing wmic.exe to enumerate groups on the local system. Upon execution, information will be displayed of local groups on system.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1069.001-6","name":"WMIObject Group Discovery","description":"Utilizing PowerShell cmdlet - get-wmiobject, to enumerate local groups on the endpoint. Upon execution, Upon execution, information will be displayed of local groups on system.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1069.001-7","name":"Permission Groups Discovery for Containers- Local Groups","description":"Attackers may try to obtain a list of services that are operating on remote hosts and local network infrastructure devices, in order to identify potential vulnerabilities that can be exploited through remote software attacks. They typically use tools to conduct port and vulnerability scans in order to obtain this information.","supportedPlatforms":["containers"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1070","name":"Indicator Removal on Host","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1070-1","name":"Indicator Removal using FSUtil","description":"Manages the update sequence number (USN) change journal, which provides a persistent log of all changes made to files on the volume. Upon execution, no output will be displayed. More information about fsutil can be found at https://docs.microsoft.com/en-us/windows-server/administration/windows-commands/fsutil-usn","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1070-2","name":"Indicator Manipulation using FSUtil","description":"Finds a file by user name (if Disk Quotas are enabled), queries allocated ranges for a file, sets a file's short name, sets a file's valid data length, sets zero data for a file, or creates a new file. Upon execution, no output will be displayed. More information about fsutil can be found at https://learn.microsoft.com/en-us/windows-server/administration/windows-commands/fsutil-file - https://tria.ge/230601-x8x6bsgb24/behavioral2","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1070.003","name":"Indicator Removal on Host: Clear Command History","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1070.003-1","name":"Clear Bash history (rm)","description":"Clears bash history via rm","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1070.003-2","name":"Clear Bash history (echo)","description":"Clears bash history via echo","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1070.003-3","name":"Clear Bash history (cat dev/null)","description":"Clears bash history via cat /dev/null","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1070.003-4","name":"Clear Bash history (ln dev/null)","description":"Clears bash history via a symlink to /dev/null","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1070.003-5","name":"Clear Bash history (truncate)","description":"Clears bash history via truncate","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1070.003-6","name":"Clear history of a bunch of shells","description":"Clears the history of a bunch of different shell types by setting the history size to zero","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1070.003-7","name":"Clear and Disable Bash History Logging","description":"Clears the history and disable bash history logging of the current shell and future shell sessions","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1070.003-8","name":"Use Space Before Command to Avoid Logging to History","description":"Using a space before a command causes the command to not be logged in the Bash History file","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1070.003-9","name":"Disable Bash History Logging with SSH -T","description":"Keeps history clear and stays out of lastlog,wtmp,btmp ssh -T keeps the ssh client from catching a proper TTY, which is what usually gets logged on lastlog","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1070.003-10","name":"Clear Docker Container Logs","description":"Clears Docker container logs using the Docker CLI and the truncate command, removing all log entries.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1070.003-11","name":"Prevent Powershell History Logging","description":"Prevents Powershell history","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1070.003-12","name":"Clear Powershell History by Deleting History File","description":"Clears Powershell history","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1070.003-13","name":"Set Custom AddToHistoryHandler to Avoid History File Logging","description":"The \"AddToHistoryHandler\" receives the current command as the $line variable and then returns $true if the line should be written to the history file. Here we simply return $false so nothing gets added to the history file for the current session.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1070.003-14","name":"Clear PowerShell Session History","description":"This technique involves using the Clear-History cmdlet in PowerShell to remove all records of previously executed commands. This action is often performed by attackers to eliminate traces of their activities, making incident detection and forensic investigation more challenging. By clearing the session history, adversaries aim to obfuscate their operational footprint.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1070.004","name":"Indicator Removal on Host: File Deletion","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1070.004-1","name":"Delete a single file - FreeBSD/Linux/macOS","description":"Delete a single file from the temporary directory","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1070.004-2","name":"Delete an entire folder - FreeBSD/Linux/macOS","description":"Recursively delete the temporary directory and all files contained within it","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1070.004-3","name":"Overwrite and delete a file with shred","description":"Use the `shred` command to overwrite the temporary file and then delete it","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1070.004-4","name":"Delete a single file - Windows cmd","description":"Delete a single file from the temporary directory using cmd.exe. Upon execution, no output will be displayed. Use File Explorer to verify the file was deleted.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1070.004-5","name":"Delete an entire folder - Windows cmd","description":"Recursively delete a folder in the temporary directory using cmd.exe. Upon execution, no output will be displayed. Use File Explorer to verify the folder was deleted.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1070.004-6","name":"Delete a single file - Windows PowerShell","description":"Delete a single file from the temporary directory using Powershell. Upon execution, no output will be displayed. Use File Explorer to verify the file was deleted.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1070.004-7","name":"Delete an entire folder - Windows PowerShell","description":"Recursively delete a folder in the temporary directory using Powershell. Upon execution, no output will be displayed. Use File Explorer to verify the folder was deleted.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1070.004-8","name":"Delete Filesystem - Linux","description":"This test deletes the entire root filesystem of a Linux system. This technique was used by Amnesia IoT malware to avoid analysis. This test is dangerous and destructive, do NOT use on production equipment.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1070.004-9","name":"Delete Prefetch File","description":"Delete a single prefetch file.  Deletion of prefetch files is a known anti-forensic technique. To verify execution, Run `(Get-ChildItem -Path \"$Env:SystemRoot\\prefetch\\*.pf\" | Measure-Object).Count` before and after the test to verify that the number of prefetch files decreases by 1.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1070.004-10","name":"Delete TeamViewer Log Files","description":"Adversaries may delete TeamViewer log files to hide activity. This should provide a high true-positive alert ration. This test just places the files in a non-TeamViewer folder, a detection would just check for a deletion event matching the TeamViewer log file format of TeamViewer_##.log. Upon execution, no output will be displayed. Use File Explorer to verify the folder was deleted. https://twitter.com/SBousseaden/status/1197524463304290305?s=20","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1070.004-11","name":"Clears Recycle bin via rd","description":"An adversary clears the recycle bin in the system partition using rd to remove traces of deleted files. [Reference](https://thedfirreport.com/2024/08/12/threat-actors-toolkit-leveraging-sliver-poshc2-batch-scripts/)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1070.005","name":"Indicator Removal on Host: Network Share Connection Removal","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1070.005-1","name":"Add Network Share","description":"Add a Network Share utilizing the command_prompt","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1070.005-2","name":"Remove Network Share","description":"Removes a Network Share utilizing the command_prompt","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1070.005-3","name":"Remove Network Share PowerShell","description":"Removes a Network Share utilizing PowerShell","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1070.005-4","name":"Disable Administrative Share Creation at Startup","description":"Administrative shares are hidden network shares created by Microsoft\u2019s Windows NT operating systems that grant system administrators remote access to every disk volume on a network-connected system. These shares are automatically created at started unless they have been purposefully disabled as is done in this Atomic test. As Microsoft puts it, \"Missing administrative shares typically indicate that the computer in question has been compromised by malicious software.\" https://threatpost.com/conti-ransomware-gang-has-full-log4shell-attack-chain/177173/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1070.005-5","name":"Remove Administrative Shares","description":"Administrative shares are hidden network shares created by Microsoft\u2019s Windows NT operating systems that grant system administrators remote access to every disk volume on a network-connected system. As Microsoft puts it, \u201cMissing administrative shares typically indicate that the computer in question has been compromised by malicious software. https://threatpost.com/conti-ransomware-gang-has-full-log4shell-attack-chain/177173/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1070.006","name":"Indicator Removal on Host: Timestomp","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1070.006-1","name":"Set a file's access timestamp","description":"Stomps on the access timestamp of a file","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1070.006-2","name":"Set a file's modification timestamp","description":"Stomps on the modification timestamp of a file","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1070.006-3","name":"Set a file's creation timestamp","description":"Stomps on the create timestamp of a file Setting the creation timestamp requires changing the system clock and reverting. Sudo or root privileges are required to change date. Use with caution.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1070.006-4","name":"Modify file timestamps using reference file","description":"Modifies the `modify` and `access` timestamps using the timestamps of a specified reference file. This technique was used by the threat actor Rocke during the compromise of Linux web servers.","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1070.006-5","name":"Windows - Modify file creation timestamp with PowerShell","description":"Modifies the file creation timestamp of a specified file. This technique was seen in use by the Stitch RAT. To verify execution, use File Explorer to view the Properties of the file and observe that the Created time is the year 1970.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1070.006-6","name":"Windows - Modify file last modified timestamp with PowerShell","description":"Modifies the file last modified timestamp of a specified file. This technique was seen in use by the Stitch RAT. To verify execution, use File Explorer to view the Properties of the file and observe that the Modified time is the year 1970.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1070.006-7","name":"Windows - Modify file last access timestamp with PowerShell","description":"Modifies the last access timestamp of a specified file. This technique was seen in use by the Stitch RAT. To verify execution, use File Explorer to view the Properties of the file and observe that the Accessed time is the year 1970.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1070.006-8","name":"Windows - Timestomp a File","description":"Timestomp kxwn.lock. Successful execution will include the placement of kxwn.lock in #{file_path} and execution of timestomp.ps1 to modify the time of the .lock file. [Mitre ATT&CK Evals](https://github.com/mitre-attack/attack-arsenal/blob/master/adversary_emulation/APT29/CALDERA_DIY/evals/data/abilities/defensive-evasion/4a2ad84e-a93a-4b2e-b1f0-c354d6a41278.yml)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1070.006-9","name":"MacOS - Timestomp Date Modified","description":"Stomps on the modification timestamp of a file using MacOS's SetFile utility","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1070.006-10","name":"Event Log Manipulations- Time slipping via Powershell","description":"Changes the system time on the computer to a time that you specify. It involves altering the system\u2019s clock or adjusting the dates of files, affecting timestamp integrity within Event Logs. This technique can disrupt the sequence of logged events, complicating incident analysis and forensics. Reference - https://detect.fyi/event-log-manipulations-1-time-slipping-55bf95631c40 https://learn.microsoft.com/en-us/powershell/module/microsoft.powershell.utility/set-date?view=powershell-7.4","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1070.008","name":"Email Collection: Mailbox Manipulation","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1070.008-1","name":"Copy and Delete Mailbox Data on Windows","description":"Copies and deletes mail data on Windows","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1070.008-2","name":"Copy and Delete Mailbox Data on Linux","description":"Copies and deletes mail data on Linux","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1070.008-3","name":"Copy and Delete Mailbox Data on macOS","description":"Copies and deletes mail data on macOS","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1070.008-4","name":"Copy and Modify Mailbox Data on Windows","description":"Copies and modifies mail data on Windows","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1070.008-5","name":"Copy and Modify Mailbox Data on Linux","description":"Copies and modifies mail data on Linux","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1070.008-6","name":"Copy and Modify Mailbox Data on macOS","description":"Copies and modifies mail data on macOS","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1071","name":"Application Layer Protocol","tactic":"TA0011","tactics":["TA0011"],"atomicTests":[{"id":"T1071-1","name":"Telnet C2","description":"An adversary may establish Telnet communication from a compromised endpoint to a command and control (C2) server in order to carry out additional attacks on objectives.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1071.004","name":"Application Layer Protocol: DNS","tactic":"TA0011","tactics":["TA0011"],"atomicTests":[{"id":"T1071.004-1","name":"DNS Large Query Volume","description":"This test simulates an infected host sending a large volume of DNS queries to a command and control server. The intent of this test is to trigger threshold based detection on the number of DNS queries either from a single source system or to a single targe domain. A custom domain and sub-domain will need to be passed as input parameters for this test to work. Upon execution, DNS information about the domain will be displayed for each callout.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1071.004-2","name":"DNS Regular Beaconing","description":"This test simulates an infected host beaconing via DNS queries to a command and control server at regular intervals over time. This behaviour is typical of implants either in an idle state waiting for instructions or configured to use a low query volume over time to evade threshold based detection. A custom domain and sub-domain will need to be passed as input parameters for this test to work. Upon execution, DNS information about the domain will be displayed for each callout.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1071.004-3","name":"DNS Long Domain Query","description":"This test simulates an infected host returning data to a command and control server using long domain names. The simulation involves sending DNS queries that gradually increase in length until reaching the maximum length. The intent is to test the effectiveness of detection of DNS queries for long domain names over a set threshold. Upon execution, DNS information about the domain will be displayed for each callout.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1071.004-4","name":"DNS C2","description":"This will attempt to start a C2 session using the DNS protocol. You will need to have a listener set up and create DNS records prior to executing this command. The following blogs have more information. https://github.com/iagox86/dnscat2 https://github.com/lukebaggett/dnscat2-powershell","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1072","name":"Software Deployment Tools","tactic":"TA0002","tactics":["TA0002","TA0008"],"atomicTests":[{"id":"T1072-1","name":"Radmin Viewer Utility","description":"An adversary may use Radmin Viewer Utility to remotely control Windows device, this will start the radmin console.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1072-2","name":"PDQ Deploy RAT","description":"An adversary may use PDQ Deploy Software to deploy the Remote Adminstartion Tool, this will start the PDQ console.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1072-3","name":"Deploy 7-Zip Using Chocolatey","description":"An adversary may use Chocolatey to remotely deploy the 7-Zip file archiver utility.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1074.001","name":"Data Staged: Local Data Staging","tactic":"TA0009","tactics":["TA0009"],"atomicTests":[{"id":"T1074.001-1","name":"Stage data from Discovery.bat","description":"Utilize powershell to download discovery.bat and save to a local file. This emulates an attacker downloading data collection tools onto the host. Upon execution, verify that the file is saved in the temp directory.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1074.001-2","name":"Stage data from Discovery.sh","description":"Utilize curl to download discovery.sh and execute a basic information gathering shell script","supportedPlatforms":["linux","macos"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true},{"id":"T1074.001-3","name":"Zip a Folder with PowerShell for Staging in Temp","description":"Use living off the land tools to zip a file and stage it in the Windows temporary folder for later exfiltration. Upon execution, Verify that a zipped folder named Folder_to_zip.zip was placed in the temp directory.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1078.001","name":"Valid Accounts: Default Accounts","tactic":"TA0003","tactics":["TA0003","TA0004","TA0001"],"atomicTests":[{"id":"T1078.001-1","name":"Enable Guest account with RDP capability and admin privileges","description":"After execution the Default Guest account will be enabled (Active) and added to Administrators and Remote Desktop Users Group, and desktop will allow multiple RDP connections.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1078.001-2","name":"Activate Guest Account","description":"The Adversaries can activate the default Guest user. The guest account is inactivated by default","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1078.001-3","name":"Enable Guest Account on macOS","description":"This test enables the guest account on macOS using sysadminctl utility.","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1078.003","name":"Valid Accounts: Local Accounts","tactic":"TA0003","tactics":["TA0003","TA0004","TA0001"],"atomicTests":[{"id":"T1078.003-1","name":"Create local account with admin privileges","description":"After execution the new account will be active and added to the Administrators group","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1078.003-2","name":"Create local account with admin privileges - MacOS","description":"After execution the new account will be active and added to the Administrators group","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1078.003-3","name":"Create local account with admin privileges using sysadminctl utility - MacOS","description":"After execution the new account will be active and added to the Administrators group","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1078.003-4","name":"Enable root account using dsenableroot utility - MacOS","description":"After execution the current/new user will have root access","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1078.003-5","name":"Add a new/existing user to the admin group using dseditgroup utility - macOS","description":"After execution the current/new user will be added to the Admin group","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1078.003-6","name":"WinPwn - Loot local Credentials - powerhell kittie","description":"Loot local Credentials - powerhell kittie technique via function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1078.003-7","name":"WinPwn - Loot local Credentials - Safetykatz","description":"Loot local Credentials - Safetykatz technique via function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1078.003-8","name":"Create local account (Linux)","description":"An adversary may wish to create an account with admin privileges to work with. In this test we create a \"art\" user with the password art, switch to art, execute whoami, exit and delete the art user.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1078.003-9","name":"Reactivate a locked/expired account (Linux)","description":"A system administrator may have locked and expired a user account rather than deleting it. \"the user is coming back, at some stage\" An adversary may reactivate a inactive account in an attempt to appear legitimate. In this test we create a \"art\" user with the password art, lock and expire the account, try to su to art and fail, unlock and renew the account, su successfully, then delete the account.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1078.003-10","name":"Reactivate a locked/expired account (FreeBSD)","description":"A system administrator may have locked and expired a user account rather than deleting it. \"the user is coming back, at some stage\" An adversary may reactivate a inactive account in an attempt to appear legitimate. In this test we create a \"art\" user with the password art, lock and expire the account, try to su to art and fail, unlock and renew the account, su successfully, then delete the account.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1078.003-11","name":"Login as nobody (Linux)","description":"An adversary may try to re-purpose a system account to appear legitimate. In this test change the login shell of the nobody account, change its password to nobody, su to nobody, exit, then reset nobody's shell to /usr/sbin/nologin. Here is how the nobody entry should look like in `/etc/passwd` before the test is executed and right after the cleanup: `# -> nobody:x:65534:65534:nobody:/nonexistent:/usr/sbin/nologin`","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1078.003-12","name":"Login as nobody (freebsd)","description":"An adversary may try to re-purpose a system account to appear legitimate. In this test change the login shell of the nobody account, change its password to nobody, su to nobody, exit, then reset nobody's shell to /usr/sbin/nologin. Here is how the nobody entry should look like in `/etc/passwd` before the test is executed and right after the cleanup: `# -> nobody:x:65534:65534:Unprivileged user:/nonexistent:/usr/sbin/nologin`","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1078.003-13","name":"Use PsExec to elevate to NT Authority\\SYSTEM account","description":"PsExec is a powerful tool most known for its remote management capability. However, it can also be used to run processes as the local system account. The local system account is a default windows account which has unrestricted access to all system resources. Upon successful execution, PsExec.exe will spawn a command prompt which will run 'whoami' as the local system account and then exit.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1078.004","name":"Valid Accounts: Cloud Accounts","tactic":"TA0003","tactics":["TA0003","TA0004","TA0001"],"atomicTests":[{"id":"T1078.004-1","name":"Creating GCP Service Account and Service Account Key","description":"GCP Service Accounts can be used to gain intial access as well as maintain persistence inside Google Cloud.","supportedPlatforms":["google-workspace","iaas:gcp"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1078.004-2","name":"Azure Persistence Automation Runbook Created or Modified","description":"Identifies when an Azure Automation runbook is created or modified. An adversary may create or modify an Azure Automation runbook to execute malicious code and maintain persistence in their target's environment.","supportedPlatforms":["iaas:azure"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1078.004-3","name":"GCP - Create Custom IAM Role","description":"This atomic will create a new IAM role. The default role permissions are: *IAM Service Account Get*. The idea for this Atomic came from a Rule published by the Elastic team. Identifies an Identity and Access Management (IAM) custom role creation in Google Cloud Platform (GCP). Custom roles are user-defined, and allow for the bundling of one or more supported permissions to meet specific needs. Custom roles will not be updated automatically and could lead to privilege creep if not carefully scrutinized. This atomic will create a new IAM role. The default role permissions are: *IAM Service Account Get* Reference: https://github.com/elastic/detection-rules/blob/main/rules/integrations/gcp/initial_access_gcp_iam_custom_role_creation.toml","supportedPlatforms":["iaas:gcp"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1083","name":"File and Directory Discovery","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1083-1","name":"File and Directory Discovery (cmd.exe)","description":"Find or discover files on the file system.  Upon successful execution, this test will output the results of all the data discovery commands to a specified file.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1083-2","name":"File and Directory Discovery (PowerShell)","description":"Find or discover files on the file system. Upon execution, file and folder information will be displayed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1083-3","name":"Nix File and Directory Discovery","description":"Find or discover files on the file system References: http://osxdaily.com/2013/01/29/list-all-files-subdirectory-contents-recursively/ https://perishablepress.com/list-files-folders-recursively-terminal/","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1083-4","name":"Nix File and Directory Discovery 2","description":"Find or discover files on the file system","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1083-5","name":"Simulating MAZE Directory Enumeration","description":"This test emulates MAZE ransomware's ability to enumerate directories using Powershell. Upon successful execution, this test will output the directory enumeration results to a specified file, as well as display them in the active window. See https://www.mandiant.com/resources/tactics-techniques-procedures-associated-with-maze-ransomware-incidents","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1083-6","name":"Launch DirLister Executable","description":"Launches the DirLister executable for a short period of time and then exits. Recently seen used by [BlackCat ransomware](https://news.sophos.com/en-us/2022/07/14/blackcat-ransomware-attacks-not-merely-a-byproduct-of-bad-luck/) to create a list of accessible directories and files.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1083-7","name":"ESXi - Enumerate VMDKs available on an ESXi Host","description":"An adversary uses the find command to enumerate vmdks on an ESXi host. [Reference](https://www.crowdstrike.com/blog/hypervisor-jackpotting-ecrime-actors-increase-targeting-of-esxi-servers/)","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1083-8","name":"Identifying Network Shares - Linux","description":"If the system uses network file systems (e.g., NFS, CIFS), findmnt can help locate paths to remote shares. Attackers may then attempt to access these shares for lateral movement or data exfiltration.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1083-9","name":"Recursive Enumerate Files And Directories By Powershell","description":"Adversary attempting to discover and collect sensitive documents and archives from a user\u2019s system. The test recursively enumerates common user folders (Documents, Downloads, Desktop, OneDrive) for file types of interest such as .pdf, .doc, .docx, .xls, .xlsx, .txt, .zip, .rar, and .7z. This behavior is similar to malware like LOSTKEYS used by COLDRIVER in January 2025, where attackers perform targeted file discovery to support strategic intelligence collection https://www.zscaler.com/blogs/security-research/coldriver-updates-arsenal-baitswitch-and-simplefix.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1087.001","name":"Account Discovery: Local Account","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1087.001-1","name":"Enumerate all accounts (Local)","description":"Enumerate all accounts by copying /etc/passwd to another file","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1087.001-2","name":"View sudoers access","description":"(requires root)","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1087.001-3","name":"View accounts with UID 0","description":"View accounts with UID 0","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1087.001-4","name":"List opened files by user","description":"List opened files by user","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1087.001-5","name":"Show if a user account has ever logged in remotely","description":"Show if a user account has ever logged in remotely","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1087.001-6","name":"Enumerate users and groups","description":"Utilize groups and id to enumerate users and groups","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1087.001-7","name":"Enumerate users and groups","description":"Utilize local utilities to enumerate users and groups","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1087.001-8","name":"Enumerate all accounts on Windows (Local)","description":"Enumerate all accounts Upon execution, multiple enumeration commands will be run and their output displayed in the PowerShell session","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1087.001-9","name":"Enumerate all accounts via PowerShell (Local)","description":"Enumerate all accounts via PowerShell. Upon execution, lots of user account and group information will be displayed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1087.001-10","name":"Enumerate logged on users via CMD (Local)","description":"Enumerate logged on users. Upon execution, logged on users will be displayed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1087.001-11","name":"ESXi - Local Account Discovery via ESXCLI","description":"An adversary can use ESXCLI to enumerate a list of all local accounts on an ESXi host. [Reference](https://lolesxi-project.github.io/LOLESXi/lolesxi/Binaries/esxcli/#account%20enumeration)\"","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1087.002","name":"Account Discovery: Domain Account","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1087.002-1","name":"Enumerate all accounts (Domain)","description":"Enumerate all accounts Upon exection, multiple enumeration commands will be run and their output displayed in the PowerShell session","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1087.002-2","name":"Enumerate all accounts via PowerShell (Domain)","description":"Enumerate all accounts via PowerShell. Upon execution, lots of user account and group information will be displayed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1087.002-3","name":"Enumerate logged on users via CMD (Domain)","description":"Enumerate logged on users. Upon exeuction, logged on users will be displayed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1087.002-4","name":"Automated AD Recon (ADRecon)","description":"ADRecon extracts and combines information about an AD environement into a report. Upon execution, an Excel file with all of the data will be generated and its path will be displayed.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1087.002-5","name":"Adfind -Listing password policy","description":"Adfind tool can be used for reconnaissance in an Active directory environment. The example chosen illustrates adfind used to query the local password policy. reference- http://www.joeware.net/freetools/tools/adfind/, https://social.technet.microsoft.com/wiki/contents/articles/7535.adfind-command-examples.aspx","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1087.002-6","name":"Adfind - Enumerate Active Directory Admins","description":"Adfind tool can be used for reconnaissance in an Active directory environment. This example has been documented by ransomware actors enumerating Active Directory Admin accounts reference- http://www.joeware.net/freetools/tools/adfind/, https://stealthbits.com/blog/fun-with-active-directorys-admincount-attribute/","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1087.002-7","name":"Adfind - Enumerate Active Directory User Objects","description":"Adfind tool can be used for reconnaissance in an Active directory environment. This example has been documented by ransomware actors enumerating Active Directory User Objects reference- http://www.joeware.net/freetools/tools/adfind/, https://www.fireeye.com/blog/threat-research/2019/04/pick-six-intercepting-a-fin6-intrusion.html","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1087.002-8","name":"Adfind - Enumerate Active Directory Exchange AD Objects","description":"Adfind tool can be used for reconnaissance in an Active directory environment. This example has been documented by ransomware actors enumerating Active Directory Exchange Objects reference- http://www.joeware.net/freetools/tools/adfind/, https://www.fireeye.com/blog/threat-research/2019/04/pick-six-intercepting-a-fin6-intrusion.html","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1087.002-9","name":"Enumerate Default Domain Admin Details (Domain)","description":"This test will enumerate the details of the built-in domain admin account","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1087.002-10","name":"Enumerate Active Directory for Unconstrained Delegation","description":"Attackers may
