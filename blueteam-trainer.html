 If the account used is not a local administrator the profiler DLL will still execute each time the CLR is loaded by a process, however, the notepad process will not execute with high integrity. Reference: https://redcanary.com/blog/cor_profiler-for-persistence/","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1574.012-3","name":"Registry-free process scope COR_PROFILER","description":"Creates process scope environment variables to enable a .NET profiler (COR_PROFILER) without making changes to the registry. The unmanaged profiler DLL (`T1574.012x64.dll`) executes when the CLR is loaded by PowerShell. Reference: https://redcanary.com/blog/cor_profiler-for-persistence/","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1578.001","name":"Modify Cloud Compute Infrastructure: Create Snapshot","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1578.001-1","name":"AWS - Create Snapshot from EBS Volume","description":"Creates an EBS snapshot in AWS using the AWS CLI. This simulates an adversary duplicating volume data via snapshots for persistence or exfiltration.","supportedPlatforms":["iaas:aws"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1578.001-2","name":"Azure - Create Snapshot from Managed Disk","description":"Creates a snapshot of a managed disk in Azure using the Azure CLI. Simulates adversary snapshotting behavior for persistence or data duplication.","supportedPlatforms":["iaas:azure"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1578.001-3","name":"GCP - Create Snapshot from Persistent Disk","description":"Creates a snapshot of a persistent disk in GCP using the gcloud CLI. Emulates adversary behavior to gain access to volume data or replicate environment state.","supportedPlatforms":["iaas:gcp"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1580","name":"Cloud Infrastructure Discovery","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1580-1","name":"AWS - EC2 Enumeration from Cloud Instance","description":"This atomic runs several API calls (sts:GetCallerIdentity, s3:ListBuckets, iam:GetAccountSummary, iam:ListRoles, iam:ListUsers, iam:GetAccountAuthorizationDetails, ec2:DescribeSnapshots, cloudtrail:DescribeTrails, guardduty:ListDetectors) from the context of an EC2 instance role. This simulates an attacker compromising an EC2 instance and running initial discovery commands on it. This atomic test leverages a tool called stratus-red-team built by DataDog (https://github.com/DataDog/stratus-red-team). Stratus Red Team is a self-contained binary. You can use it to easily detonate offensive attack techniques against a live cloud environment. Ref: https://stratus-red-team.cloud/attack-techniques/AWS/aws.discovery.ec2-enumerate-from-instance/","supportedPlatforms":["linux","macos","iaas:aws"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1580-2","name":"AWS - EC2 Security Group Enumeration","description":"Simulate an attacker's action to enumerate EC2 Security Groups in a compromised AWS environment.","supportedPlatforms":["iaas:aws"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1592.001","name":"Gather Victim Host Information: Hardware","tactic":"TA0043","tactics":["TA0043"],"atomicTests":[{"id":"T1592.001-1","name":"Enumerate PlugNPlay Camera","description":"Enumerate PlugNPlay Camera using powershell commandlet. this technique was seen in dcrat malware backdoor capabilities where it enumerate the camera info mounted on the compromised host. reference: https://www.mandiant.com/resources/analyzing-dark-crystal-rat-backdoor","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1595.003","name":"Active Scanning: Wordlist Scanning","tactic":"TA0043","tactics":["TA0043"],"atomicTests":[{"id":"T1595.003-1","name":"Web Server Wordlist Scan","description":"This test will scan a target system with a wordlist of common directories and file paths.","supportedPlatforms":["windows","linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1606.002","name":"Forge Web Credentials: SAML token","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1606.002-1","name":"Golden SAML","description":"Forge a \"Golden SAML\" token which allows to impersonate any Azure AD user, and authenticate to AADGraph (as a proof). You will need the ADFS token signing certificate (see T1552.004 to export it). More info here : https://o365blog.com/post/adfs/","supportedPlatforms":["azure-ad"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1609","name":"Kubernetes Exec Into Container","tactic":"TA0002","tactics":["TA0002"],"atomicTests":[{"id":"T1609-1","name":"ExecIntoContainer","description":"Attackers who have permissions, can run malicious commands in containers in the cluster using exec command (\u201ckubectl exec\u201d). In this method, attackers can use legitimate images, such as an OS image (e.g., Ubuntu) as a backdoor container, and run their malicious code remotely by using \u201ckubectl exec\u201d.","supportedPlatforms":["containers"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1609-2","name":"Docker Exec Into Container","description":"Attackers who have permissions, can run malicious commands in containers in the cluster using exec command (\u201cdocker exec\u201d). In this method, attackers can use legitimate images, such as an OS image (e.g., Ubuntu) as a backdoor container, and run their malicious code remotely by using \u201cdocker exec\u201d. Kinsing (Golang-based malware) was executed with an Ubuntu container entry point that runs shell scripts.","supportedPlatforms":["containers"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1610","name":"Deploy a container","tactic":"TA0002","tactics":["TA0002"],"atomicTests":[{"id":"T1610-1","name":"Deploy Docker container","description":"Adversaries may deploy containers based on retrieved or built malicious images or from benign images that download and execute malicious payloads at runtime. They can do this using docker create and docker start commands. Kinsing & Doki was exploited using this technique.","supportedPlatforms":["containers"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1611","name":"Escape to Host","tactic":"TA0004","tactics":["TA0004"],"atomicTests":[{"id":"T1611-1","name":"Deploy container using nsenter container escape","description":"In this escape `kubectl` is used to launch a new pod, with a container that has the host pids mapped into the container (`hostPID:true`). It uses the alpine linux container image. It runs with privilege on the host (`privileged:true`). When the container is launched the command `nsenter --mount=/proc/1/ns/mnt -- /bin/bash` is ran. Since the host processes have been mapped into the container, the container enters the host namespace, escaping the container. Additional Details: - https://twitter.com/mauilion/status/1129468485480751104 - https://securekubernetes.com/scenario_2_attack/","supportedPlatforms":["containers"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1611-2","name":"Mount host filesystem to escape privileged Docker container","description":"This technique abuses privileged Docker containers to mount the host's filesystem and then create a cron job to launch a reverse shell as the host's superuser. The container running the test needs be privileged.  It may take up to a minute for this to run due to how often crond triggers a job. Dev note: the echo to create cron_filename is broken up to prevent localized execution of hostname and id by Powershell.","supportedPlatforms":["containers"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1611-3","name":"Privilege Escalation via Docker Volume Mapping","description":"This test demonstrates privilege escalation by abusing Docker's volume mapping feature to gain access to the host file system. By mounting the root directory of the host into a Docker container, the attacker can use chroot to operate as root on the host system.","supportedPlatforms":["containers"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1612","name":"Build Image on Host","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1612-1","name":"Build Image On Host","description":"Adversaries may build a container image directly on a host to bypass defenses that monitor for the retrieval of malicious images from a public registry. An adversary may take advantage of that build API to build a custom image on the host that includes malware downloaded from their C2 server, and then they then may utilize Deploy Container using that custom image.","supportedPlatforms":["containers"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1613","name":"Container and Resource Discovery","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1613-1","name":"Docker Container and Resource Discovery","description":"Adversaries may attempt to discover containers and other resources that are available within a containers environment.","supportedPlatforms":["containers"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1613-2","name":"Podman Container and Resource Discovery","description":"Adversaries may attempt to discover containers and other resources that are available within a containers environment.","supportedPlatforms":["containers"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1614","name":"System Location Discovery","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1614-1","name":"Get geolocation info through IP-Lookup services using curl Windows","description":"Get geolocation info through IP-Lookup services using curl Windows. The default URL of the IP-Lookup service is https://ipinfo.io/. References: https://securelist.com/transparent-tribe-part-1/98127/ and https://news.sophos.com/en-us/2016/05/03/location-based-ransomware-threat-research/","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1614-2","name":"Get geolocation info through IP-Lookup services using curl freebsd, linux or macos","description":"Get geolocation info through IP-Lookup services using curl Windows. The default URL of the IP-Lookup service is https://ipinfo.io/. References: https://securelist.com/transparent-tribe-part-1/98127/ and https://news.sophos.com/en-us/2016/05/03/location-based-ransomware-threat-research/","supportedPlatforms":["macos","linux"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1614.001","name":"System Location Discovery: System Language Discovery","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1614.001-1","name":"Discover System Language by Registry Query","description":"Identify System language by querying the registry on an endpoint. Upon successful execution, result in number format can be looked up to correlate the language.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1614.001-2","name":"Discover System Language with chcp","description":"Identify System language with the chcp command. Upon successful execution, result in number format can be looked up to correlate the language.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1614.001-3","name":"Discover System Language with locale","description":"Identify System language with the `locale` command. Upon successful execution, the output will contain the environment variables that indicate the 5 character locale that can be looked up to correlate the language and territory.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1614.001-4","name":"Discover System Language with localectl","description":"Identify System language with the `localectl` command. Upon successful execution, the key `System Locale` from the output will contain the `LANG` environment variable that has the 5 character locale result that can be looked up to correlate the language and territory.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1614.001-5","name":"Discover System Language by locale file","description":"Identify System language with the by reading the locale configuration file. The locale configuration file contains the `LANG` environment variable which will contain the 5 character locale that can be looked up to correlate the language and territory.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1614.001-6","name":"Discover System Language by Environment Variable Query","description":"Identify System language by checking the environment variables Upon successful execution, the 5 character locale result can be looked up to correlate the language and territory. Environment query commands are likely to run with a pattern match command e.g. `env | grep LANG` Note: `env` and `printenv` will usually provide the same results. `set` is also used as a builtin command that does not generate syscall telemetry but does provide a list of the environment variables.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1614.001-7","name":"Discover System Language with dism.exe","description":"The Windows utility DISM (Deployment Image Servicing and Management) can be used to display information about international settings and languages on the currently installed Windows image using an elevated terminal.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1614.001-8","name":"Discover System Language by Windows API Query","description":"This test executes a custom script called LanguageKeyboardLayout.exe which outputs the values of the following Windows API functions to the user terminal: `GetKeyboardLayout`, `GetKeyboardLayoutList`, `GetUserDefaultUILanguage`, `GetSystemDefaultUILanguage`, `GetUserDefaultLangID`. Documentation for these functions is located [here](https://learn.microsoft.com/en-us/windows/win32/api/winuser/).","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1614.001-9","name":"Discover System Language with WMIC","description":"WMIC (Windows Management Instrumentation Command-line) is a command-line tool that provides a simplified interface to query and manage Windows system configurations, processes, and hardware information using WMI. The command in this test retrieves information about the system's locale, operating system language, and multilingual user interface (MUI) languages.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1614.001-10","name":"Discover System Language with Powershell","description":"This PowerShell script collects key system settings, such as the UI language, user language preferences, system locale, current culture, UI culture, and time zone, into a hash table. It then outputs these settings in a readable key-value format directly to the terminal. The script is simple and efficient for quickly displaying system configuration details.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1615","name":"Group Policy Discovery","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1615-1","name":"Display group policy information via gpresult","description":"Uses the built-in Windows utility gpresult to display the Resultant Set of Policy (RSoP) information for a remote user and computer The /z parameter displays all available information about Group Policy. More parameters can be found in the linked Microsoft documentation https://docs.microsoft.com/en-us/windows-server/administration/windows-commands/gpresult https://unit42.paloaltonetworks.com/emissary-trojan-changelog-did-operation-lotus-blossom-cause-it-to-evolve/ Turla has used the /z and /v parameters: https://www.welivesecurity.com/wp-content/uploads/2020/05/ESET_Turla_ComRAT.pdf","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1615-2","name":"Get-DomainGPO to display group policy information via PowerView","description":"Use PowerView to Get-DomainGPO This will only work on Windows 10 Enterprise and A DC Windows 2019.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1615-3","name":"WinPwn - GPOAudit","description":"Check domain Group policies for common misconfigurations using Grouper2 via GPOAudit function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1615-4","name":"WinPwn - GPORemoteAccessPolicy","description":"Enumerate remote access policies through group policy using GPORemoteAccessPolicy function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1615-5","name":"MSFT Get-GPO Cmdlet","description":"The Get-GPO cmdlet gets one Group Policy Object (GPO) or all the GPOs in a domain. Tested on Windows Server 2019 as a domain user with computer joined to domain. Reference: https://docs.microsoft.com/en-us/powershell/module/grouppolicy/get-gpo?view=windowsserver2022-ps","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1619","name":"Cloud Storage Object Discovery","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1619-1","name":"AWS S3 Enumeration","description":"This test will enumerate all the S3 buckets in the user account and lists all the files in each bucket.","supportedPlatforms":["iaas:aws"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1619-2","name":"Azure - Enumerate Storage Account Objects via Shared Key authorization using Azure CLI","description":"This test enumerates all existing storage accounts and tries to fetch for each account the contained storage account objects. The access to storage objects is only possible if Shared Key authorization is enabled (e.g this is the case per default for storage objects creaded by Azure Function Apps). Requirements: - The test is intended to be executed in interactive mode (with -Interactive parameter) in order to complete the az login command when MFA is required. - The EntraID user must have the role \"Storage Account Contributor\", or a role with similar permissions. Output format: Csv file that contains the found storage account objects - Columns: ResourceGroup, StorageAccountName, FileShareName, ContainerName, BlobName, TableName, QueueName - The content of these columns is filled out depending on the object. Not-required columns are left empt. Example: For a blob object the ResourceGroup, StorageAccountName, ContainerName, BlobName are filled out, the other fields are left empty.","supportedPlatforms":["iaas:azure"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1619-3","name":"Azure - Scan for Anonymous Access to Azure Storage (Powershell)","description":"Upon successful execution, this test will test for anonymous access to Azure storage containers by invoking a web request and outputting the results to a file. The corresponding response could then be interpreted to determine whether or not the resource/container exists, as well as other information. See https://ninocrudele.com/the-three-most-effective-and-dangerous-cyberattacks-to-azure-and-countermeasures-part-2-attack-the-azure-storage-service","supportedPlatforms":["iaas:azure"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1619-4","name":"Azure - Enumerate Azure Blobs with MicroBurst","description":"Upon successful execution, this test will utilize a wordlist to enumerate the public facing containers and blobs of a specified Azure storage account. See https://www.netspi.com/blog/technical/cloud-penetration-testing/anonymously-enumerating-azure-file-resources/ .","supportedPlatforms":["iaas:azure"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1620","name":"Reflective Code Loading","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1620-1","name":"WinPwn - Reflectively load Mimik@tz into memory","description":"Reflectively load Mimik@tz into memory technique via function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1622","name":"Debugger Evasion","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1622-1","name":"Detect a Debugger Presence in the Machine","description":"Detecting a running debugger process or if the debugger is attached to a process via PowerShell","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1647","name":"Plist File Modification","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1647-1","name":"Plist Modification","description":"Modify MacOS plist file in one of two directories","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1648","name":"Serverless Execution","tactic":"TA0002","tactics":["TA0002"],"atomicTests":[{"id":"T1648-1","name":"Lambda Function Hijack","description":"Modify an existing Lambda function to execute arbitrary code.","supportedPlatforms":["iaas:aws"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1649","name":"Steal or Forge Authentication Certificates","tactic":"TA0006","tactics":["TA0006"],"atomicTests":[{"id":"T1649-1","name":"Staging Local Certificates via Export-Certificate","description":"Export all user certificates and add to a compressed archive.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1651","name":"Cloud Administration Command","tactic":"TA0002","tactics":["TA0002"],"atomicTests":[{"id":"T1651-1","name":"AWS Run Command (and Control)","description":"This test simulates an adversary using the AWS Run Command service to execute commands on EC2 instances.","supportedPlatforms":["iaas:aws"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true}],"curated":false},{"id":"T1652","name":"Device Driver Discovery","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1652-1","name":"Device Driver Discovery","description":"Displays a list of installed device drivers on the local computer and their properties. Threat actors use this command to enumerate the existing drivers on the computer. Parameters: /v /fo list - Displays verbose output in a list format - the /v parameter is not valid for signed drivers /si /fo list - Provides information about signed drivers and outputs it in a list format","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1652-2","name":"Device Driver Discovery (Linux)","description":"Displays a list of loaded kernel modules on a Linux system, which is used to enumerate drivers.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1652-3","name":"Enumerate Kernel Driver Files (Linux)","description":"Finds and lists all kernel driver files on a Linux system in order to provide a broader view of available drivers, not just loaded ones.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1652-4","name":"List loaded kernel extensions (macOS)","description":"Displays a list of loaded kernel extensions (kexts) on a macOS system.","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1652-5","name":"Find Kernel Extensions (macOS)","description":"Searches for kernel extension (kext) files on a macOS system.","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1654","name":"Log Enumeration","tactic":"TA0007","tactics":["TA0007"],"atomicTests":[{"id":"T1654-1","name":"Get-EventLog To Enumerate Windows Security Log","description":"Uses the built-in PowerShell commandlet Get-EventLog to search for 'SYSTEM' keyword and saves results to a text file. This technique was observed in a [TheDFIRReport case](https://thedfirreport.com/2023/04/03/malicious-iso-file-leads-to-domain-wide-ransomware/) where the threat actor enumerated the Windows Security audit log to determine user accounts and associated IPv4 addresses. Successful execution will save matching log events to the users temp folder.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1654-2","name":"Enumerate Windows Security Log via WevtUtil","description":"WevtUtil is a command line tool that can be utilised by adversaries to gather intelligence on a targeted Windows system's logging infrastructure. By executing this command, malicious actors can enumerate all available event logs, including both default logs such as Application, Security, and System as well as any custom logs created by administrators. This information provides valuable insight into the system's logging mechanisms, potentially allowing attackers to identify gaps or weaknesses in the logging configuration","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1659","name":"Content Injection","tactic":"TA0001","tactics":["TA0001","TA0011"],"atomicTests":[{"id":"T1659-1","name":"MITM Proxy Injection","description":"Start mitmdump and verify injected header and HTML content.","supportedPlatforms":["macos","linux"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true},{"id":"T1659-2","name":"MITM Proxy Injection (Windows)","description":"Start mitmdump proxy with injection script in the background.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1685","name":"Disable or Modify Tools","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1685-1","name":"Windows Disable LSA Protection","description":"The following Atomic adds a registry entry to disable LSA Protection. The LSA controls and manages user rights information, password hashes and other important bits of information in memory. Attacker tools, such as mimikatz, rely on accessing this content to scrape password hashes or clear-text passwords. Enabling LSA Protection configures Windows to control the information stored in memory in a more secure fashion - specifically, to prevent non-protected processes from accessing that data. Upon successful execution, the registry will be modified and RunAsPPL will be set to 0, disabling Lsass protection. https://learn.microsoft.com/en-us/windows-server/security/credentials-protection-and-management/configuring-additional-lsa-protection#how-to-disable-lsa-protection https://blog.netwrix.com/2022/01/11/understanding-lsa-protection/ https://thedfirreport.com/2022/03/21/phosphorus-automates-initial-access-using-proxyshell/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-2","name":"Disable journal logging via systemctl utility","description":"The atomic test disables the journal logging using built-in systemctl utility","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-3","name":"Disable journal logging via sed utility","description":"The atomic test disables the journal logging by searching and replacing the \"Storage\" parameter to \"none\" within the journald.conf file, thus any new journal entries will only be temporarily available in memory and not written to disk","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-4","name":"Disable syslog","description":"Disables syslog collection","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1685-5","name":"Disable syslog (freebsd)","description":"Disables syslog collection","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-6","name":"Disable Cb Response","description":"Disable the Cb Response service","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-7","name":"Disable SELinux","description":"Disables SELinux enforcement","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1685-8","name":"Stop Crowdstrike Falcon on Linux","description":"Stop and disable Crowdstrike Falcon on Linux","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-9","name":"Disable Carbon Black Response","description":"Disables Carbon Black Response","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-10","name":"Disable LittleSnitch","description":"Disables LittleSnitch","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-11","name":"Disable OpenDNS Umbrella","description":"Disables OpenDNS Umbrella","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-12","name":"Disable macOS Gatekeeper","description":"Disables macOS Gatekeeper","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-13","name":"Stop and unload Crowdstrike Falcon on macOS","description":"Stop and unload Crowdstrike Falcon daemons falcond and userdaemon on macOS","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-14","name":"Unload Sysmon Filter Driver","description":"Unloads the Sysinternals Sysmon filter driver without stopping the Sysmon service. To verify successful execution, run the prereq_command's and it should fail with an error of \"sysmon filter must be loaded\".","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1685-15","name":"Uninstall Sysmon","description":"Uninstall Sysinternals Sysmon for Defense Evasion","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1685-16","name":"AMSI Bypass - AMSI InitFailed","description":"Any easy way to bypass AMSI inspection is it patch the dll in memory setting the \"amsiInitFailed\" function to true. Upon execution, no output is displayed. https://www.mdsec.co.uk/2018/06/exploring-powershell-amsi-and-logging-evasion/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-17","name":"AMSI Bypass - Remove AMSI Provider Reg Key","description":"With administrative rights, an adversary can remove the AMSI Provider registry key in HKLM\\Software\\Microsoft\\AMSI to disable AMSI inspection. This test removes the Windows Defender provider registry key. Upon execution, no output is displayed. Open Registry Editor and navigate to \"HKLM:\\SOFTWARE\\Microsoft\\AMSI\\Providers\\\" to verify that it is gone.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-18","name":"Disable Arbitrary Security Windows Service","description":"With administrative rights, an adversary can disable Windows Services related to security products. This test requires McAfeeDLPAgentService to be installed. Change the service_name input argument for your AV solution. Upon exeuction, infomration will be displayed stating the status of the service. To verify that the service has stopped, run \"sc query McAfeeDLPAgentService\"","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-19","name":"Tamper with Windows Defender ATP PowerShell","description":"Attempting to disable scheduled scanning and other parts of windows defender atp. Upon execution Virus and Threat Protection will show as disabled in Windows settings.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-20","name":"Tamper with Windows Defender Command Prompt","description":"Attempting to disable scheduled scanning and other parts of windows defender atp. These commands must be run as System, so they still fail as administrator. However, adversaries do attempt to perform this action so monitoring for these command lines can help alert to other bad things going on. Upon execution, \"Access Denied\" will be displayed twice and the WinDefend service status will be displayed.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-21","name":"Tamper with Windows Defender Registry","description":"Disable Windows Defender from starting after a reboot. Upen execution, if the computer is rebooted the entire Virus and Threat protection window in Settings will be grayed out and have no info.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-22","name":"Disable Microsoft Office Security Features","description":"Gorgon group may disable Office security features so that their code can run. Upon execution, an external document will not show any warning before editing the document. https://unit42.paloaltonetworks.com/unit42-gorgon-group-slithering-nation-state-cybercrime/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-23","name":"Remove Windows Defender Definition Files","description":"Removing definition files would cause ATP to not fire for AntiMalware. Check MpCmdRun.exe man page for info on all arguments. On later viersions of windows (1909+) this command fails even with admin due to inusfficient privelages. On older versions of windows the command will say completed. https://unit42.paloaltonetworks.com/unit42-gorgon-group-slithering-nation-state-cybercrime/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-24","name":"Stop and Remove Arbitrary Security Windows Service","description":"Beginning with Powershell 6.0, the Stop-Service cmdlet sends a stop message to the Windows Service Controller for each of the specified services. The Remove-Service cmdlet removes a Windows service in the registry and in the service database.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-25","name":"Uninstall Crowdstrike Falcon on Windows","description":"Uninstall Crowdstrike Falcon. If the WindowsSensor.exe path is not provided as an argument we need to search for it. Since the executable is located in a folder named with a random guid we need to identify it before invoking the uninstaller.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-26","name":"Tamper with Windows Defender Evade Scanning -Folder","description":"Malware can exclude a specific path from being scanned and evading detection. Upon successul execution, the file provided should be on the list of excluded path. To check the exclusion list using poweshell (Get-MpPreference).ExclusionPath","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-27","name":"Tamper with Windows Defender Evade Scanning -Extension","description":"Malware can exclude specific extensions from being scanned and evading detection. Upon successful execution, the extension(s) should be on the list of excluded extensions. To check the exclusion list using poweshell  (Get-MpPreference).ExclusionExtension.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-28","name":"Tamper with Windows Defender Evade Scanning -Process","description":"Malware can exclude specific processes from being scanned and evading detection. Upon successful execution, the process(es) should be on the list of excluded processes. To check the exclusion list using poweshell  (Get-MpPreference).ExclusionProcess.\"","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-29","name":"office-365-Disable-AntiPhishRule","description":"Using the Disable-AntiPhishRule cmdlet to disable antiphish rules in your office-365 organization.","supportedPlatforms":["office-365"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1685-30","name":"Disable Windows Defender with DISM","description":"The following Atomic will attempt to disable Windows-Defender using the built in DISM.exe, Deployment Image Servicing and Management tool. DISM is used to enumerate, install, uninstall, configure, and update features and packages in Windows images. A successful execution will not standard-out any details. Remove the quiet switch if verbosity is needed. This method will remove Defender and it's package.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-31","name":"Disable Defender Using NirSoft AdvancedRun","description":"Information on NirSoft AdvancedRun and its creators found here: http://www.nirsoft.net/utils/advanced_run.html This Atomic will run AdvancedRun.exe with similar behavior identified during the WhisperGate campaign. See https://medium.com/s2wblog/analysis-of-destructive-malware-whispergate-targeting-ukraine-9d5d158f19f3 Upon successful execution, AdvancedRun.exe will attempt to run and stop Defender, and optionally attempt to delete the Defender folder on disk.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1685-32","name":"Kill antimalware protected processes using Backstab","description":"Backstab loads Process Explorer driver which is signed by Microsoft and use it to terminate running processes protected by antimalware software such as MsSense.exe or MsMpEng.exe, which is otherwise not possible to kill. https://github.com/Yaxser/Backstab","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1685-33","name":"WinPwn - Kill the event log services for stealth","description":"Kill the event log services for stealth via function of WinPwn","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-34","name":"Tamper with Windows Defender ATP using Aliases - PowerShell","description":"Attempting to disable scheduled scanning and other parts of Windows Defender ATP using set-MpPreference aliases. Upon execution Virus and Threat Protection will show as disabled in Windows settings.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-35","name":"LockBit Black - Disable Privacy Settings Experience Using Registry -cmd","description":"LockBit Black - Disable Privacy Settings Experience Using Registry","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-36","name":"LockBit Black - Use Registry Editor to turn on automatic logon -cmd","description":"LockBit Black - Use Registry Editor to turn on automatic logon","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-37","name":"LockBit Black - Disable Privacy Settings Experience Using Registry -Powershell","description":"LockBit Black - Disable Privacy Settings Experience Using Registry","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-38","name":"Lockbit Black - Use Registry Editor to turn on automatic logon -Powershell","description":"Lockbit Black - Use Registry Editor to turn on automatic logon","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-39","name":"Disable Windows Defender with PwSh Disable-WindowsOptionalFeature","description":"The following Atomic will attempt to disable Windows-Defender using the built in PowerShell cmdlet Disable-WindowsOptionalFeature, Deployment Image Servicing and Management tool. Similar to DISM.exe, this cmdlet is used to enumerate, install, uninstall, configure, and update features and packages in Windows images. A successful execution will not standard-out any details. Remove the quiet switch if verbosity is needed. This method will remove Defender and it's packages. Reference: https://docs.microsoft.com/en-us/powershell/module/dism/disable-windowsoptionalfeature?view=windowsserver2022-ps","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-40","name":"WMIC Tamper with Windows Defender Evade Scanning Folder","description":"The following Atomic will attempt to exclude a folder within Defender leveraging WMI Reference: https://www.bleepingcomputer.com/news/security/gootkit-malware-bypasses-windows-defender-by-setting-path-exclusions/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-41","name":"Delete Windows Defender Scheduled Tasks","description":"The following atomic test will delete the Windows Defender scheduled tasks. [Reference](https://thedfirreport.com/2022/05/09/seo-poisoning-a-gootloader-story/)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1685-42","name":"Clear History","description":"Clear Shell History. This technique only affect the bash shell application.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-43","name":"Suspend History","description":"suspend Shell History seen in Awfulshred wiper- https://unix.stackexchange.com/questions/10922/temporarily-suspend-bash-history-on-a-given-shell","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-44","name":"Reboot Linux Host via Kernel System Request","description":"reboot system via system request seen in Awfulshred wiper.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-45","name":"Clear Pagging Cache","description":"clear pagging cache via system request. This is a temporary change in the system to clear paging cache. This technique seen in Awfulshred wiper as part of its malicious payload on the compromised host. added reference link for this technique: https://www.tecmint.com/clear-ram-memory-cache-buffer-and-swap-space-on-linux/","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-46","name":"Disable Memory Swap","description":"disable swapping of device paging that impaire the compromised host to swap data if the RAM is full. Awfulshred wiper used this technique as an additional payload to the compromised host and to make sure that there will be no recoverable data due to swap feature of FreeBSD/linux.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-47","name":"Disable Hypervisor-Enforced Code Integrity (HVCI)","description":"This test disables Hypervisor-Enforced Code Integrity (HVCI) by setting the registry key HKLM:\\SYSTEM\\CurrentControlSet\\Control\\DeviceGuard\\Scenarios\\HypervisorEnforcedCodeIntegrity \"Enabled\" value to \"0\". The pre-req needs to be ran in order to setup HVCI and have it enabled. We do not recommend running this in production. [Black Lotus Campaign](https://www.microsoft.com/en-us/security/blog/2023/04/11/guidance-for-investigating-attacks-using-cve-2022-21894-the-blacklotus-campaign/) [Microsoft](https://learn.microsoft.com/en-us/windows/security/threat-protection/device-guard/enable-virtualization-based-protection-of-code-integrity)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1685-48","name":"AMSI Bypass - Override AMSI via COM","description":"With administrative rights, an adversary can disable AMSI via registry value in HKCU\\Software\\Classes\\CLSID\\{fdb00e52-a214-4aa1-8fba-4357bb0072ec} by overriding the Microsoft Defender COM object for AMSI and points it to a DLL that does not exist. This is currently being used by AsyncRAT and others. https://strontic.github.io/xcyclopedia/library/clsid_fdb00e52-a214-4aa1-8fba-4357bb0072ec.html https://securitynews.sonicwall.com/xmlpost/asyncrat-variant-includes-cryptostealer-capabilites/","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-49","name":"AWS - GuardDuty Suspension or Deletion","description":"Enables GuardDuty in AWS, upon successful creation this test will suspend and then delete the GuardDuty configuration.","supportedPlatforms":["iaas:aws"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1685-50","name":"Tamper with Defender ATP on Linux/MacOS","description":"With root privileges, an adversary can disable real time protection. Note, this test assumes Defender is not in passive mode and real-time protection is enabled. The use of a managed.json on Linux or Defender .plist on MacOS will prevent these changes. Tamper protection will also prevent this (available on MacOS, but not Linux at the time of writing). Installation of MDATP is a prerequisite. Installation steps vary across MacOS and Linux distros. See Microsoft public documentation for instructions: https://learn.microsoft.com/en-us/microsoft-365/security/defender-endpoint/mac-install-manually?view=o365-worldwide https://learn.microsoft.com/en-us/microsoft-365/security/defender-endpoint/linux-install-manually?view=o365-worldwide","supportedPlatforms":["linux","macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-51","name":"Tamper with Windows Defender Registry - Reg.exe","description":"Disable Windows Defender by tampering with windows defender registry using the utility \"reg.exe\"","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-52","name":"Tamper with Windows Defender Registry - Powershell","description":"Disable Windows Defender by tampering with windows defender registry through powershell","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-53","name":"ESXi - Disable Account Lockout Policy via PowerCLI","description":"An adversary may disable account lockout policy within ESXi to have the ability to prevent defensive actions from being enforced in the future or to prevent future alerting.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1685-54","name":"Delete Microsoft Defender ASR Rules - InTune","description":"This test simulates the deletion of the ASR rules loaded by Microsoft Defender using the registry. Depending on the deployment, rules can be pushed either using GPO or InTune, This test simulates an InTune-based rules deployment.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-55","name":"Delete Microsoft Defender ASR Rules - GPO","description":"This test simulates the deletion of the ASR rules loaded by Microsoft Defender using the registry. Depending on the deployment, rules can be pushed either using GPO or InTune, This test simulates a GPO-based rules deployment.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-56","name":"AMSI Bypass - Create AMSIEnable Reg Key","description":"Threat Actor could disable the AMSI function by adding a registry value name \u201cAmsiEnable\u201d to the registry key \u201cHKCU\\Software\\Microsoft\\Windows Script\\Settings\\AmsiEnable\u201d and set its value to 0. Ref: https://mostafayahiax.medium.com/hunting-for-amsi-bypassing-methods-9886dda0bf9d","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-57","name":"Disable EventLog-Application Auto Logger Session Via Registry - Cmd","description":"This atomic simulates an activity where an attacker disables the EventLog-Application ETW Auto Logger session using the reg.exe utility to update the Windows registry value \"Start\". This would effectivly disable the Event log application channel. The changes would only take effect after a restart.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-58","name":"Disable EventLog-Application Auto Logger Session Via Registry - PowerShell","description":"This atomic simulates an activity where an attacker disables the EventLog-Application ETW Auto Logger session using the powershell.exe \"New-ItemProperty\" cmdlet to update the Windows registry value \"Start\". This would effectivly disable the Event log application channel. The changes would only take effect after a restart.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-59","name":"Disable EventLog-Application ETW Provider Via Registry - Cmd","description":"This atomic simulates an activity where an attacker disables a specific ETW provider from the EventLog-Application ETW Auto Logger session using the reg.exe utility to update the Windows registry value \"Enabled\". This would effectivly remove that provider from the session and cause to not emit any logs of that type. The changes would only take effect after a restart.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-60","name":"Disable EventLog-Application ETW Provider Via Registry - PowerShell","description":"This atomic simulates an activity where an attacker disables a specific ETW provider from the EventLog-Application ETW Auto Logger session using the powershell.exe \"New-ItemProperty\" cmdlet to update the Windows registry value \"Enabled\". This would effectivly remove that provider from the session and cause to not emit any logs of that type. The changes would only take effect after a restart.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-61","name":"Freeze PPL-protected process with EDR-Freeze","description":"This test utilizes the tool EDR-Freeze, which leverages the native Microsoft binary WerFaultSecure.exe to suspend processes protected by the Protected Process Light mechanism. PPL is a Windows security feature designed to safeguard critical system processes \u2014 such as those related to antivirus, credential protection, and system integrity \u2014 from tampering or inspection. These processes operate in a restricted environment that prevents access even from administrators or debugging tools, unless the accessing tool is signed and trusted by Microsoft. By using WerFaultSecure.exe, which is inherently trusted by the operating system, EDR-Freeze is able to bypass these restrictions and temporarily freeze PPL-protected processes for analysis or testing purposes.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-62","name":"Disable ASLR Via sysctl parameters - Linux","description":"Detects Execution of the `sysctl` command to set `kernel.randomize_va_space=0` which disables Address Space Layout Randomization (ASLR) in Linux.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-63","name":"Auditing Configuration Changes on Linux Host","description":"Emulates modification of auditd configuration files","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-64","name":"Auditing Configuration Changes on FreeBSD Host","description":"Emulates modification of auditd configuration files","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-65","name":"Logging Configuration Changes on Linux Host","description":"Emulates modification of syslog configuration.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-66","name":"Logging Configuration Changes on FreeBSD Host","description":"Emulates modification of syslog configuration.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-67","name":"Disable Powershell ETW Provider - Windows","description":"This test was created to disable the Microsoft Powershell ETW provider by using the built-in Windows tool, logman.exe. This provider is used as a common source of telemetry in AV/EDR solutions.","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1685-68","name":"Disable .NET Event Tracing for Windows Via Registry (cmd)","description":"Disables ETW for the .NET Framework using the reg.exe utility to update the Windows registry","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-69","name":"Disable .NET Event Tracing for Windows Via Registry (powershell)","description":"Disables ETW for the .NET Framework using PowerShell to update the Windows registry","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-70","name":"LockBit Black - Disable the ETW Provider of Windows Defender -cmd","description":"An adversary can disable the ETW Provider of Windows Defender, so nothing would be logged to Microsoft-Windows-Windows-Defender/Operational anymore. https://www.cisa.gov/news-events/cybersecurity-advisories/aa23-075a","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-71","name":"LockBit Black - Disable the ETW Provider of Windows Defender -Powershell","description":"An adversary can disable the ETW Provider of Windows Defender, so nothing would be logged to Microsoft-Windows-Windows-Defender/Operational anymore. https://www.cisa.gov/news-events/cybersecurity-advisories/aa23-075a","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-72","name":"Disable .NET Event Tracing for Windows Via Environment Variable HKCU Registry - Cmd","description":"Disables ETW for the .NET Framework by setting the COMPlus_ETWEnabled environment variable to 0 in the HKCU registry using the reg.exe utility. In order for changes to take effect a logout might be required.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-73","name":"Disable .NET Event Tracing for Windows Via Environment Variable HKCU Registry - PowerShell","description":"Disables ETW for the .NET Framework by setting the COMPlus_ETWEnabled environment variable to 0 in the HKCU registry using PowerShell. In order for changes to take effect a logout might be required.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-74","name":"Disable .NET Event Tracing for Windows Via Environment Variable HKLM Registry - Cmd","description":"Disables ETW for the .NET Framework by setting the COMPlus_ETWEnabled environment variable to 0 in the HKLM registry using the reg.exe utility. In order for changes to take effect a reboot might be required.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-75","name":"Disable .NET Event Tracing for Windows Via Environment Variable HKLM Registry - PowerShell","description":"Disables ETW for the .NET Framework by setting the COMPlus_ETWEnabled environment variable to 0 in the HKLM registry using PowerShell. In order for changes to take effect a reboot might be required.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685-76","name":"Block Cybersecurity communication by leveraging Windows Name Resolution Policy Table","description":"Adversaries are redirecting DNS queries to an incorrect or malicious DNS server IP, thereby blocking legitimate communications and potentially compromising the security infrastructure. This atomic test aims to respond with 127.0.0.1 when a DNS query is made for endpoint.security.microsoft.com.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1685.001","name":"Disable or Modify Tools: Disable or Modify Windows Event Log","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1685.001-1","name":"Disable Windows IIS HTTP Logging","description":"Disables HTTP logging on a Windows IIS web server as seen by Threat Group 3390 (Bronze Union). This action requires HTTP logging configurations in IIS to be unlocked. Use the cleanup commands to restore some default auditpol settings (your original settings will be lost)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685.001-2","name":"Disable Windows IIS HTTP Logging via PowerShell","description":"Disables HTTP logging on a Windows IIS web server as seen by Threat Group 3390 (Bronze Union). This action requires HTTP logging configurations in IIS to be unlocked. Use the cleanup commands to restore some default auditpol settings (your original settings will be lost)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685.001-3","name":"Kill Event Log Service Threads","description":"Kill Windows Event Log Service Threads using Invoke-Phant0m. WARNING you will need to restart PC to return to normal state with Log Service. https://artofpwn.com/phant0m-killing-windows-event-log.html","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":false},{"id":"T1685.001-4","name":"Impair Windows Audit Log Policy","description":"Disables the windows audit policy to prevent key host based telemetry being written into the event logs. [Solarigate example](https://www.microsoft.com/security/blog/2021/01/20/deep-dive-into-the-solorigate-second-stage-activation-from-sunburst-to-teardrop-and-raindrop/)","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685.001-5","name":"Clear Windows Audit Policy Config","description":"Clear the Windows audit policy using auditpol utility. This action would stop certain audit events from being recorded in the security log.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685.001-6","name":"Disable Event Logging with wevtutil","description":"Wevtutil can be used to disable logs. NOTE: RansomEXX ransomware uses this to disable Security logs post-encryption.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685.001-7","name":"Makes Eventlog blind with Phant0m","description":"Use [Phant0m](https://github.com/hlldz/Phant0m) to disable Eventlog","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1685.001-8","name":"Modify Event Log Channel Access Permissions via Registry - PowerShell","description":"This test simulates an adversary modifying access permissions for a Windows Event Log Channel by altering the \"ChannelAccess\" registry value. Specifically, it changes the Security Descriptor Definition Language (SDDL) string. These modifications can restrict or grant access to specific users or groups, potentially aiding in defense evasion by controlling who can view or modify a event log channel. Upon execution, the user shouldn't be able to access the event log channel via the event viewer or via utilities such as \"Get-EventLog\" or \"wevtutil\".","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685.001-9","name":"Modify Event Log Channel Access Permissions via Registry 2 - PowerShell","description":"This test simulates an adversary modifying access permissions for a Windows Event Log Channel by altering the \"ChannelAccess\" registry value. Specifically, it changes the Security Descriptor Definition Language (SDDL) string. These modifications can restrict or grant access to specific users or groups, potentially aiding in defense evasion by controlling who can view or modify a event log channel. Upon execution, the user shouldn't be able to access the event log channel via the event viewer or via utilities such as \"Get-EventLog\" or \"wevtutil\".","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685.001-10","name":"Modify Event Log Access Permissions via Registry - PowerShell","description":"This test simulates an adversary modifying access permissions for a Windows Event Log channel by setting the \"CustomSD\" registry value. Specifically, it changes the Security Descriptor Definition Language (SDDL) string. These modifications can restrict or grant access to specific users or groups, potentially aiding in defense evasion by controlling who can view or modify a event log channel. Upon execution, the user shouldn't be able to access the event log channel via the event viewer or via utilities such as \"Get-EventLog\" or \"wevtutil\".","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1685.002","name":"Disable or Modify Tools: Disable or Modify Cloud Log","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1685.002-1","name":"AWS - CloudTrail Changes","description":"Creates a new cloudTrail in AWS, Upon successful creation it will Update,Stop and Delete the cloudTrail","supportedPlatforms":["iaas:aws"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1685.002-2","name":"Azure - Eventhub Deletion","description":"Identifies an Event Hub deletion in Azure. An Event Hub is an event processing service that ingests and processes large volumes of events and data. An adversary may delete an Event Hub in an attempt to evade detection. https://docs.microsoft.com/en-us/azure/event-hubs/event-hubs-about.","supportedPlatforms":["iaas:azure"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1685.002-3","name":"Office 365 - Exchange Audit Log Disabled","description":"You can use the Exchange Management Shell to enable or disable mailbox audit logging for a mailbox. Unified or Admin Audit logs are disabled via the Exchange Powershell cmdline. https://github.com/Azure/Azure-Sentinel/blob/master/Detections/OfficeActivity/exchange_auditlogdisabled.yaml","supportedPlatforms":["office-365"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1685.002-4","name":"AWS - Disable CloudTrail Logging Through Event Selectors using Stratus","description":"Update event selectors in AWS CloudTrail to disable the logging of certain management events to evade defense. This Atomic test leverages a tool called Stratus-Red-Team built by DataDog (https://github.com/DataDog/stratus-red-team). Stratus Red Team is a self-contained binary. You can use it to easily detonate offensive attack techniques against a live cloud environment. Ref: https://stratus-red-team.cloud/attack-techniques/AWS/aws.defense-evasion.cloudtrail-event-selectors/","supportedPlatforms":["linux","macos","iaas:aws"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1685.002-5","name":"AWS - CloudTrail Logs Impairment Through S3 Lifecycle Rule using Stratus","description":"This Atomic test will use the Stratus Red Team will first setup a CloudTrail logging into an S3 bucket and will then make an API call to update the lifecycle rule on that S3 bucket with an expiration date of 1 day. This will essentially delete all the logs after one day. Adversaries often do this actiivity to evade detection. Stratus Red Team is a self-contained binary. You can use it to easily detonate offensive attack techniques against a live cloud environment. ref: https://stratus-red-team.cloud/attack-techniques/AWS/aws.defense-evasion.cloudtrail-lifecycle-rule/","supportedPlatforms":["linux","macos","iaas:aws"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1685.002-6","name":"AWS - Remove VPC Flow Logs using Stratus","description":"This Atomic will attempt to remove AWS VPC Flow Logs configuration. Stratus Red Team is a self-contained binary. You can use it to easily detonate offensive attack techniques against a live cloud environment. Ref: https://stratus-red-team.cloud/attack-techniques/AWS/aws.defense-evasion.vpc-remove-flow-logs/","supportedPlatforms":["linux","macos","iaas:aws"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1685.002-7","name":"AWS - CloudWatch Log Group Deletes","description":"Creates a new cloudWatch log group in AWS, Upon successful creation it will Delete the group. Attackers can use this technique to evade defenses by deleting the log stream. Once it is deleted, the logs created by the attackers will not be logged. https://www.elastic.co/guide/en/security/current/aws-cloudwatch-log-group-deletion.html#aws-cloudwatch-log-group-deletion","supportedPlatforms":["iaas:aws"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1685.002-8","name":"AWS CloudWatch Log Stream Deletes","description":"Creates a new cloudWatch log stream in AWS, Upon successful creation it will Delete the stream. Attackers can use this technique to evade defenses by deleting the log stream. Once it is deleted, the logs created by the attackers will not be logged. https://www.elastic.co/guide/en/security/current/aws-cloudwatch-log-stream-deletion.html","supportedPlatforms":["iaas:aws"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1685.002-9","name":"Office 365 - Set Audit Bypass For a Mailbox","description":"Use Exchange Management Shell to Mailbox auditing to bypass. It will prevent any mailbox audit logging entries being generated for the target e-mail box. https://learn.microsoft.com/en-us/powershell/module/exchange/set-mailboxauditbypassassociation?view=exchange-ps","supportedPlatforms":["office-365"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1685.002-10","name":"GCP - Delete Activity Event Log","description":"GCP provides 4 types of Cloud Audit Logs: Admin Activity, Data Access, System Events, and Policy Denied. An adversary may attempt to delete logs in order to hide their activity. However, Admin Activity, System Events, and Policy Deny events logs cannot be deleted. This Atomic attempts to delete the Activity Event log. An event is generated under the method name of `google.logging.v2.LoggingServiceV2.DeleteLog` with a Serverity of `ERROR`.","supportedPlatforms":["iaas:gcp"],"offlineCapable":false,"prereqStage":true,"hasPrereqs":true},{"id":"T1685.002-11","name":"AWS - Config Logs Disabled","description":"Disables AWS Config by stopping the configuration recorder, deleting the delivery channel, and deleting the configuration recorder. An attacker with sufficient permissions can use this to stop configuration change recording and avoid detection of subsequent activity.","supportedPlatforms":["iaas:aws"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1685.004","name":"Disable or Modify Tools: Disable or Modify Linux Audit System Log","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1685.004-1","name":"Delete all auditd rules using auditctl","description":"Using 'auditctl -D' deletes all existing audit rules, resulting in the loss of previously configured monitoring settings and the audit trail. This action reduces visibility into system activities, potentially leading to compliance concerns and hampering security monitoring efforts. Additionally, it poses a risk of covering unauthorized activities by erasing evidence from audit logs.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1685.004-2","name":"Disable auditd using auditctl","description":"The command `auditctl -e 0` disables the audit system. By setting the parameter to `0`, auditing is deactivated, halting the monitoring and recording of security-related events. This action stops the generation of audit logs, ceasing the collection of data regarding system activities. Disabling auditing may be done for various reasons, such as troubleshooting, performance optimization, or temporarily suspending auditing requirements, but it reduces visibility into system events and can impact security monitoring and compliance efforts.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1685.005","name":"Disable or Modify Tools: Clear Windows Event Logs","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1685.005-1","name":"Clear Logs","description":"Upon execution this test will clear Windows Event Logs. Open the System.evtx logs at C:\\Windows\\System32\\winevt\\Logs and verify that it is now empty.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685.005-2","name":"Delete System Logs Using Clear-EventLog","description":"Clear event logs using built-in PowerShell commands. Upon successful execution, you should see the list of deleted event logs Upon execution, open the Security.evtx logs at C:\\Windows\\System32\\winevt\\Logs and verify that it is now empty or has very few logs in it.","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685.005-3","name":"Clear Event Logs via VBA","description":"This module utilizes WMI via VBA to clear the Security and Backup eventlogs from the system. Elevation is required for this module to execute properly, otherwise WINWORD will throw an \"Access Denied\" error","supportedPlatforms":["windows"],"offlineCapable":false,"prereqStage":false,"hasPrereqs":true}],"curated":false},{"id":"T1685.006","name":"Disable or Modify Tools: Clear Linux or Mac System Logs","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1685.006-1","name":"rm -rf","description":"Delete system and audit logs","supportedPlatforms":["macos","linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1685.006-2","name":"rm -rf","description":"Delete messages and security logs","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685.006-3","name":"Delete log files using built-in log utility","description":"This test deletes main log datastore, inflight log data, time-to-live data(TTL), fault and error content","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685.006-4","name":"Truncate system log files via truncate utility","description":"This test truncates the system log files using the truncate utility with (-s 0) parameter which sets file size to zero, thus emptying the file content","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1685.006-5","name":"Truncate system log files via truncate utility (freebsd)","description":"This test truncates the system log files using the truncate utility with (-s 0 or --size=0) parameter which sets file size to zero, thus emptying the file content","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685.006-6","name":"Delete log files via cat utility by appending /dev/null or /dev/zero","description":"The first sub-test truncates the log file to zero bytes via /dev/null and the second sub-test fills the log file with null bytes(zeroes) via /dev/zero, using cat utility","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1685.006-7","name":"Delete log files via cat utility by appending /dev/null or /dev/zero (freebsd)","description":"The first sub-test truncates the log file to zero bytes via /dev/null and the second sub-test fills the log file with null bytes(zeroes) via /dev/zero, using cat utility","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685.006-8","name":"System log file deletion via find utility","description":"This test finds and deletes the system log files within /var/log/ directory using various executions(rm, shred, unlink)","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1685.006-9","name":"Overwrite macOS system log via echo utility","description":"This test overwrites the contents of system log file with an empty string using echo utility","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685.006-10","name":"Overwrite FreeBSD system log via echo utility","description":"This test overwrites the contents of system log file with an empty string using echo utility","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685.006-11","name":"Real-time system log clearance/deletion","description":"This test reads real-time system log file and writes empty string to it, thus clearing the log file without tampering with the logging process","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685.006-12","name":"Delete system log files via unlink utility","description":"This test deletes the system log file using unlink utility","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1685.006-13","name":"Delete system log files via unlink utility (freebsd)","description":"This test deletes the messages log file using unlink utility","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1685.006-14","name":"Delete system log files using shred utility","description":"This test overwrites the contents of the log file with zero bytes(-z) using three passes(-n 3) of data, and then delete the file(-u) securely","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1685.006-15","name":"Delete system log files using srm utility","description":"This test securely deletes the system log files individually and recursively using the srm utility. Install srm using Homebrew with the command: brew install khell/homebrew-srm/srm Refer: https://github.com/khell/homebrew-srm/issues/1 for installation","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1685.006-16","name":"Delete system log files using OSAScript","description":"This test deletes the system log file using osascript via \"do shell script\"(sh/bash by default) which in-turn spawns rm utility, requires admin privileges","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1685.006-17","name":"Delete system log files using Applescript","description":"This test deletes the system log file using applescript using osascript via Finder application Note: The user may be prompted to grant access to the Finder application before the command can be executed successfully as part of TCC(Transparency, Consent, and Control) Framework. Refer: https://www.rainforestqa.com/blog/macos-tcc-db-deep-dive","supportedPlatforms":["macos"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1685.006-18","name":"Delete system journal logs via rm and journalctl utilities","description":"The first sub-test deletes the journal files using rm utility in the \"/var/log/journal/\" directory and the second sub-test clears the journal by modifiying time period of logs that should be retained to zero.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1685.006-19","name":"Overwrite Linux Mail Spool","description":"This test overwrites the Linux mail spool of a specified user. This technique was used by threat actor Rocke during the exploitation of Linux web servers.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1685.006-20","name":"Overwrite Linux Log","description":"This test overwrites the specified log. This technique was used by threat actor Rocke during the exploitation of Linux web servers.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false}],"curated":false},{"id":"T1686","name":"Disable or Modify System Firewall","tactic":"TA0002","tactics":[],"atomicTests":[{"id":"T1686-1","name":"Disable Microsoft Defender Firewall","description":"Disables the Microsoft Defender Firewall for the current profile. Caution if you access remotely the host where the test runs! Especially with the cleanup command which will re-enable firewall for the current profile...","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1686-2","name":"Disable Microsoft Defender Firewall via Registry","description":"Disables the Microsoft Defender Firewall for the public profile via registry Caution if you access remotely the host where the test runs! Especially with the cleanup command which will re-enable firewall for the current profile...","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1686-3","name":"Allow SMB and RDP on Microsoft Defender Firewall","description":"Allow all SMB and RDP rules on the Microsoft Defender Firewall for all profiles. Caution if you access remotely the host where the test runs! Especially with the cleanup command which will reset the firewall and risk disabling those services...","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1686-4","name":"Opening ports for proxy - HARDRAIN","description":"This test creates a listening interface on a victim device. This tactic was used by HARDRAIN for proxying. reference: https://www.us-cert.gov/sites/default/files/publications/MAR-10135536-F.pdf","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1686-5","name":"Open a local port through Windows Firewall to any profile","description":"This test will attempt to open a local port defined by input arguments to any profile","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1686-6","name":"Allow Executable Through Firewall Located in Non-Standard Location","description":"This test will attempt to allow an executable through the system firewall located in the Users directory","supportedPlatforms":["windows"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":false},{"id":"T1686-7","name":"Stop/Start UFW firewall","description":"Stop the Uncomplicated Firewall (UFW) if installed.","supportedPlatforms":["linux"],"offlineCapable":true,"prereqStage":false,"hasPrereqs":true},{"id":"T1686-8","name":"Stop/Start Packet Filter","description":"Sto
