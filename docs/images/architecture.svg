<svg width="100%" viewBox="0 0 680 380" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Blue Team Trainer architecture</title>
  <desc>Three virtual machines on an isolated network: the Analyst VM running the platform UI and backend, the Logging VM running Splunk and Velociraptor in Docker, and the Victim VM running Atomic Red Team. The Analyst connects to the Victim via WinRM on port 5985. The Velociraptor agent on the Victim connects back to the server on port 8001.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .t { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 14px; fill: #2C2C2A; }
      .ts { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 12px; fill: #5F5E5A; }
      .th { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
      .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
      @media (prefers-color-scheme: dark) {
        .t, .th { fill: #F1EFE8; }
        .ts { fill: #B4B2A9; }
        .arr { stroke: #B4B2A9; }
      }
    </style>
  </defs>

  <g>
    <rect x="40" y="40" width="270" height="130" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text class="th" x="175" y="68" text-anchor="middle" style="fill:#0C447C">Analyst VM (Ubuntu 25.10)</text>
    <text class="ts" x="175" y="92" text-anchor="middle" style="fill:#185FA5">Backend: FastAPI on :8000</text>
    <text class="ts" x="175" y="112" text-anchor="middle" style="fill:#185FA5">Frontend: HTTP on :8080</text>
    <text class="ts" x="175" y="132" text-anchor="middle" style="fill:#185FA5">8 GB RAM · 40 GB disk</text>
  </g>

  <g>
    <rect x="370" y="40" width="270" height="130" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text class="th" x="505" y="68" text-anchor="middle" style="fill:#3C3489">Logging VM (Ubuntu 26)</text>
    <text class="ts" x="505" y="92" text-anchor="middle" style="fill:#534AB7">Splunk container (HEC :8088)</text>
    <text class="ts" x="505" y="112" text-anchor="middle" style="fill:#534AB7">Velociraptor (GUI :8889)</text>
    <text class="ts" x="505" y="132" text-anchor="middle" style="fill:#534AB7">8 GB RAM · 60 GB disk</text>
  </g>

  <g>
    <rect x="205" y="240" width="270" height="100" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
    <text class="th" x="340" y="268" text-anchor="middle" style="fill:#712B13">Victim VM (Windows 11)</text>
    <text class="ts" x="340" y="292" text-anchor="middle" style="fill:#993C1D">Atomic Red Team + agent</text>
    <text class="ts" x="340" y="312" text-anchor="middle" style="fill:#993C1D">4 GB RAM · 60 GB disk</text>
  </g>

  <line x1="175" y1="170" x2="280" y2="240" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="195" y="218">WinRM :5985</text>

  <line x1="400" y1="240" x2="505" y2="170" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="445" y="218" text-anchor="start">agent :8001</text>

  <text class="ts" x="340" y="365" text-anchor="middle">All three VMs on a host-only / isolated network</text>
</svg>
