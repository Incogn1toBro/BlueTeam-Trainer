<svg width="100%" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Build phases overview</title>
  <desc>Five-phase build sequence: Logging VM, Analyst VM, Victim VM, Pipeline, Launch.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .t { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 14px; fill: #2C2C2A; }
      .ts { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 12px; fill: #5F5E5A; }
      .th { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
      .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
      @media (prefers-color-scheme: dark) {
        .t, .th { fill: #F1EFE8; }
        .ts { fill: #B4B2A9; }
        .arr { stroke: #B4B2A9; }
      }
    </style>
  </defs>

  <text class="th" x="340" y="32" text-anchor="middle">Build sequence</text>
  <text class="ts" x="340" y="52" text-anchor="middle">Five phases, ~60 to 90 minutes end to end</text>

  <g>
    <rect x="20" y="80" width="120" height="70" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text class="ts" x="80" y="100" text-anchor="middle" dominant-baseline="central" style="fill:#534AB7">Phase 1</text>
    <text class="th" x="80" y="120" text-anchor="middle" dominant-baseline="central" style="fill:#3C3489">Logging VM</text>
    <text class="ts" x="80" y="138" text-anchor="middle" dominant-baseline="central" style="fill:#534AB7">~15 min</text>
  </g>

  <g>
    <rect x="160" y="80" width="120" height="70" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text class="ts" x="220" y="100" text-anchor="middle" dominant-baseline="central" style="fill:#185FA5">Phase 2</text>
    <text class="th" x="220" y="120" text-anchor="middle" dominant-baseline="central" style="fill:#0C447C">Analyst VM</text>
    <text class="ts" x="220" y="138" text-anchor="middle" dominant-baseline="central" style="fill:#185FA5">~5 min</text>
  </g>

  <g>
    <rect x="300" y="80" width="120" height="70" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
    <text class="ts" x="360" y="100" text-anchor="middle" dominant-baseline="central" style="fill:#993C1D">Phase 3</text>
    <text class="th" x="360" y="120" text-anchor="middle" dominant-baseline="central" style="fill:#712B13">Victim VM</text>
    <text class="ts" x="360" y="138" text-anchor="middle" dominant-baseline="central" style="fill:#993C1D">~20 min</text>
  </g>

  <g>
    <rect x="440" y="80" width="120" height="70" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="ts" x="500" y="100" text-anchor="middle" dominant-baseline="central" style="fill:#0F6E56">Phase 4</text>
    <text class="th" x="500" y="120" text-anchor="middle" dominant-baseline="central" style="fill:#085041">Pipeline</text>
    <text class="ts" x="500" y="138" text-anchor="middle" dominant-baseline="central" style="fill:#0F6E56">~10 min</text>
  </g>

  <g>
    <rect x="580" y="80" width="80" height="70" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
    <text class="ts" x="620" y="100" text-anchor="middle" dominant-baseline="central" style="fill:#3B6D11">Phase 5</text>
    <text class="th" x="620" y="120" text-anchor="middle" dominant-baseline="central" style="fill:#27500A">Launch</text>
    <text class="ts" x="620" y="138" text-anchor="middle" dominant-baseline="central" style="fill:#3B6D11">~5 min</text>
  </g>

  <line x1="142" y1="115" x2="158" y2="115" class="arr" marker-end="url(#arrow)"/>
  <line x1="282" y1="115" x2="298" y2="115" class="arr" marker-end="url(#arrow)"/>
  <line x1="422" y1="115" x2="438" y2="115" class="arr" marker-end="url(#arrow)"/>
  <line x1="562" y1="115" x2="578" y2="115" class="arr" marker-end="url(#arrow)"/>

  <text class="ts" x="340" y="180" text-anchor="middle">Each phase ends with a verification checkpoint. Do not skip ahead.</text>
</svg>
