<svg width="100%" viewBox="0 0 680 220" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Blue Team Trainer hero banner</title>
  <desc>A horizontal banner showing the four-step loop: pick technique, detonate, collect, hunt — flowing left to right with directional arrows.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .t { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 14px; fill: #2C2C2A; }
      .ts { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 12px; fill: #5F5E5A; }
      .th { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
      .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
      @media (prefers-color-scheme: dark) {
        .t, .th { fill: #F1EFE8; }
        .ts { fill: #B4B2A9; }
        .arr { stroke: #B4B2A9; }
      }
    </style>
  </defs>

  <text class="th" x="340" y="38" text-anchor="middle" style="font-size:22px;font-weight:500">Blue Team Trainer</text>
  <text class="ts" x="340" y="62" text-anchor="middle">Detonate. Collect. Hunt.</text>

  <g>
    <rect x="30" y="100" width="140" height="64" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
    <text class="th" x="100" y="130" text-anchor="middle" dominant-baseline="central" style="fill:#444441">Pick technique</text>
    <text class="ts" x="100" y="150" text-anchor="middle" dominant-baseline="central" style="fill:#5F5E5A">From ATT&amp;CK browser</text>
  </g>

  <g>
    <rect x="200" y="100" width="140" height="64" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
    <text class="th" x="270" y="130" text-anchor="middle" dominant-baseline="central" style="fill:#712B13">Detonate</text>
    <text class="ts" x="270" y="150" text-anchor="middle" dominant-baseline="central" style="fill:#993C1D">Atomic Red Team</text>
  </g>

  <g>
    <rect x="370" y="100" width="140" height="64" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text class="th" x="440" y="130" text-anchor="middle" dominant-baseline="central" style="fill:#085041">Collect</text>
    <text class="ts" x="440" y="150" text-anchor="middle" dominant-baseline="central" style="fill:#0F6E56">Velociraptor</text>
  </g>

  <g>
    <rect x="540" y="100" width="120" height="64" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text class="th" x="600" y="130" text-anchor="middle" dominant-baseline="central" style="fill:#0C447C">Hunt</text>
    <text class="ts" x="600" y="150" text-anchor="middle" dominant-baseline="central" style="fill:#185FA5">Splunk + PowerShell</text>
  </g>

  <line x1="172" y1="132" x2="198" y2="132" class="arr" marker-end="url(#arrow)"/>
  <line x1="342" y1="132" x2="368" y2="132" class="arr" marker-end="url(#arrow)"/>
  <line x1="512" y1="132" x2="538" y2="132" class="arr" marker-end="url(#arrow)"/>

  <text class="ts" x="340" y="200" text-anchor="middle">Real ATT&amp;CK techniques, real telemetry, in a safe lab</text>
</svg>
