# Blue Team Trainer - Splunk props.conf
#
# Drop into:  $SPLUNK_HOME/etc/system/local/props.conf
# Inside the container that's:  /opt/splunk/etc/system/local/props.conf
#
# Configures the [vql] sourcetype so Velociraptor uploads land cleanly in
# Splunk: JSON-extracted, with timestamps from the appropriate artifact field.

[vql]
INDEXED_EXTRACTIONS = json
DATETIME_CONFIG = CURRENT
TZ = GMT
category = Custom
pulldown_type = 1
TRANSFORMS-vql-sourcetype = vql-sourcetype,vql-timestamp
TRUNCATE = 512000
